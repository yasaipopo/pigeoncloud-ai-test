          source:
            - help#19666629662489
  notes: '別人性必須: マスターと制限ユーザーの2アカウントで権限の効きを確認する。setup mcp で制限ユーザーを前倒し作成し、検証主操作はUI。リソースは「J7-」プレフィックス。'
- id: J8
  name: WF(申請→承認)
  priority: P1
  roles:
    - master
    - applicant
    - approver
  fixtures:
    - fx-workflow
  destructive: false
  scope: local
  phases:
    - phase: 別ロールの準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: MCP/debugで「J8-」プレフィックスの申請者・承認者2名（互いに別ユーザー）が作成され、ユーザー一覧に氏名の異なる2行が表示される
          source:
            - B-11-2
            - help#19710699416985
    - phase: ワークフロー設定
      action: ui
      checkpoints:
        - obs: 対象テーブルにワークフローを設定し承認者を指定して保存すると、テーブルでワークフロー（承認）が有効化される
          source:
