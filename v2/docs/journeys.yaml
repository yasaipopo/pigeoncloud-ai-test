- id: J1
  name: "管理者オンボーディング"
  priority: P1
  roles: ["master"]
  fixtures: ["fx-org"]
  destructive: false
  scope: local
  # checkpoints合計: 12 / フェーズ数: 8
  phases:
    - phase: "ログイン"
      action: ui
      checkpoints:
        - obs: "ログイン画面（/admin/login）にID入力欄・パスワード入力欄・「ログイン」ボタン・「Ver.」を含むバージョン表記が表示される"
          source: ["A-1-1", "help#19655525782041"]
        - obs: "マスターでログイン後、URLが /admin/dashboard を含みナビゲーションバーとサイドメニューが表示される"
          source: ["A-1-1", "help#19655558353177"]
    - phase: "システム利用状況の確認"
      action: ui
      checkpoints:
        - obs: "「システム利用状況」画面にユーザー数・テーブル数・メール通知数の現在値が数値で表示される"
          source: ["A-7-1", "help#19736501355801"]
    - phase: "ユーザー追加"
      action: ui
      checkpoints:
        - obs: "ユーザー管理で「J1-」プレフィックスのユーザータイプ「ユーザー」を全項目入力で追加すると、ユーザー一覧に追加メールアドレスの行が表示される"
          source: ["A-2-2", "help#19708065383321"]
        - obs: "氏名・メール等の必須項目を未入力で「登録」を押すと必須項目エラーが表示され追加されない"
          source: ["A-2-3"]
        - obs: "ユーザー追加後にシステム利用状況のユーザー数表示が1増える"
          source: ["A-7-1", "help#19736501355801"]
    - phase: "組織追加"
      action: ui
      checkpoints:
        - obs: "組織管理で「J1-org」を必須項目入力（親組織なし）で追加すると組織一覧に表示される"
          source: ["A-5-1", "help#19709331452697"]
        - obs: "親組織を選択して子組織を追加すると、組織ツリー上で親組織配下に表示される"
          source: ["A-5-2", "help#19709331452697"]
    - phase: "役職追加"
      action: ui
      checkpoints:
        - obs: "役職管理で「J1-役職」を新規登録すると役職一覧に追加した役職名が表示される"
          source: ["A-67-1", "help#19709489360025"]
    - phase: "ユーザー情報編集"
      action: ui
      checkpoints:
        - obs: "自分（マスター）の氏名を変更して保存すると、ナビゲーション右上の表示名が変更後の氏名になる"
          source: ["A-3-3", "help#19707933976601"]
    - phase: "操作ログの確認"
      action: ui
      checkpoints:
        - obs: "ログ→ログ画面に、直前のユーザー追加・組織追加の操作ログ行（操作者・日時付き）が表示される"
          source: ["A-13-1", "help#19710092964377"]
    - phase: "ログアウト"
      action: ui
      checkpoints:
        - obs: "右上アバターから「ログアウト」を選ぶとURLが /admin/login を含みID入力欄が表示される"
          source: ["A-1-1"]
  notes: "1認証セッションで「初期セットアップ管理者が組織を立ち上げる」一連の流れを通す。マスターadminの認証情報は変更しない。作成リソースは全て「J1-」プレフィックス。"
- id: J2
