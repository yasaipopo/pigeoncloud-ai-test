          source: ["A-15-2"]
    - phase: "ダッシュボード表示"
      action: ui
      checkpoints:
        - obs: "集計の「ダッシュボードに表示」を有効化すると、ダッシュボードに集計テーブルが表示される"
          source: ["A-23-1", "help#19736349477785"]
        - obs: "ダッシュボードのチャートをドラッグ&ドロップで並び替えると、並び順が変更される"
          source: ["A-78-1"]
    - phase: "チャート作成"
      action: ui
      checkpoints:
        - obs: "チャート追加で棒グラフを設定すると、集計値が棒グラフで表示される"
          source: ["A-105-02", "help#19660061709465"]
        - obs: "チャートの「過去分も全て加算」を有効化すると、過去分を含めた累積値で表示される"
          source: ["A-105-02"]
    - phase: "チャートの共有・絞り込み"
      action: ui
      checkpoints:
        - obs: "チャートを「自分のみ表示」で保存すると、作成ユーザー以外には表示されない"
          source: ["A-16-2", "A-37-1"]
        - obs: "チャートの絞り込みで条件を設定すると、条件通りの集計結果でチャート表示される"
          source: ["A-66-1"]
  notes: "集計（クロス/絞り込み/装飾/共有）とチャート（種類/累積/共有/絞り込み）、ダッシュボード表示を1セッションで通す。リソースは「J12-」プレフィックス。"
