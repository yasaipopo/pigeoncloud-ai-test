          source: ["A-4-4", "help#19707349888665"]
        - obs: "フィールドを編集して項目名を変更し保存すると、フィールド一覧の項目名が更新される"
          source: ["A-4-5"]
        - obs: "フィールドを削除すると、フィールド一覧とレコード登録画面から該当項目が消える"
          source: ["A-4-6"]
    - phase: "追加オプション設定"
      action: ui
      checkpoints:
        - obs: "追加オプションで一覧「1ページあたりの表示データ数」を5行に設定すると、テーブル一覧が5行単位で表示される"
          source: ["A-109-1", "help#19707390652057"]
        - obs: "追加オプションで「デフォルトのソート順」をID昇順に設定すると、一覧がID昇順で表示される"
          source: ["A-109-2"]
    - phase: "レコード追加で動作確認"
      action: ui
      checkpoints:
        - obs: "「J2-基本」にレコードを1件追加すると、一覧に追加した値の行が表示される"
          source: ["A-9-1", "help#19657963779097"]
    - phase: "テーブル複製・JSONエクスポート"
      action: ui
      checkpoints:
        - obs: "テーブルの複製を実行すると、「J2-基本」の定義を引き継いだ複製テーブルが一覧に追加される"
          source: ["help#19707614354969"]
        - obs: "テーブル設定をJSONファイルでエクスポートすると、項目定義を含むJSONがダウンロードされる"
          source: ["help#19663448575641"]
    - phase: "テーブル削除"
      action: ui
      checkpoints:
        - obs: "複製したテーブルを削除すると、サイドメニューとテーブル管理一覧から該当テーブルが消える"
          source: ["help#19661069329433"]
  notes: "1セッションでテーブルを作り・項目を組み・レイアウト/追加オプションを整え・複製/エクスポート/削除まで通す。リソースは「J2-」プレフィックス。"
- id: J3
  name: "項目型ぜんぶ盛り"
  priority: P1
  roles: ["master"]
  fixtures: ["fx-schema"]
  destructive: false
  scope: local
  # checkpoints合計: 18 / フェーズ数: 6
  phases:
    - phase: "テキスト系項目"
      setup: mcp
      action: ui
      checkpoints:
        - obs: "文字列(一行)項目を追加しレコードに値を入力すると、一覧・詳細に入力文字列が表示される"
          source: ["A-113-01", "help#19666709590809"]
        - obs: "文章(複数行・通常テキスト)項目で改行を含む値を保存すると、詳細画面で改行が保持されて表示される"
          source: ["help#19685752825241"]
        - obs: "文章(複数行・リッチテキスト)項目で太字・箇条書きを入れて保存すると、詳細画面で書式付きで表示される"
          source: ["help#19685752825241"]
        - obs: "固定テキスト項目を設定すると、レコード登録画面に編集不可の固定文言が表示される"
          source: ["help#19707292147737"]
    - phase: "数値・日時系項目"
      action: ui
      checkpoints:
        - obs: "数値(整数)項目に桁区切りありを設定し1000以上を入力すると、一覧でカンマ区切り表示される"
          source: ["A-14-5", "help#19666749123737"]
        - obs: "数値(小数)項目に小数値を入力すると、設定した小数桁で表示される"
          source: ["A-14-6", "help#19666749123737"]
        - obs: "日時項目で「デフォルトで現在日時」を有効化しレコード追加すると、一覧に「YYYY-MM-DD HH:MM」形式の現在日時が表示される"
          source: ["A-101-1", "help#19666789006745"]
        - obs: "日付のみ項目は「YYYY-MM-DD」、時刻のみ項目は「HH:MM」形式で表示される"
          source: ["A-101-2", "A-101-3", "help#19666789006745"]
    - phase: "選択肢系項目"
      action: ui
      checkpoints:
        - obs: "ラジオボタン(単一選択)項目を選択肢AA,BB,CCで追加すると、レコード登録画面で単一選択UIが表示され選択値が保存される"
          source: ["A-14-7", "help#19666791306649"]
        - obs: "選択肢(複数選択)項目で複数値を選択して保存すると、詳細画面に選択した複数値が表示される"
          source: ["help#19685923823641"]
        - obs: "Yes/No項目をレコードでONにすると、一覧でON状態が表示される"
          source: ["help#19685853749145"]
    - phase: "メディア・ファイル系項目"
      action: ui
      checkpoints:
        - obs: "画像項目に画像ファイルをアップロードすると、詳細画面にサムネイルが表示される"
          source: ["help#19685978944025"]
        - obs: "ファイル項目にPDFをアップロードすると、詳細画面にファイル名とダウンロードリンクが表示される"
          source: ["help#19685607757465"]
    - phase: "計算・自動採番項目"
      action: ui
      checkpoints:
        - obs: "計算項目に数式（例: 金額×2）を設定すると、レコードに計算結果が自動表示される"
          source: ["help#19685690616601"]
        - obs: "計算式を未入力で追加すると必須項目エラーが表示される"
          source: ["A-51-2"]
        - obs: "自動採番項目を設定すると、レコード追加ごとに連番が自動付与される"
          source: ["help#19666652317209"]
    - phase: "リレーション系項目"
      action: ui
      checkpoints:
        - obs: "他テーブル参照項目を設定すると、レコード登録時に参照先テーブルのレコードを選択でき、選択値が表示される"
          source: ["B-22-1", "help#19686010433305"]
        - obs: "関連レコード一覧項目を設定すると、詳細画面に関連する他テーブルのレコードが一覧表示される"
          source: ["help#19707238540953"]
  notes: "全項目型を1テーブルに追加し、レコード登録→一覧/詳細での表示形式を確認する。中核はUI必須（API代替禁止）。リソースは「J3-」プレフィックス。"
