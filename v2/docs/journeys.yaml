            - A-7-1
            - help#19736501355801
    - phase: データバックアップ
      action: ui
      checkpoints:
        - obs: データのバックアップ画面でバックアップを実行/ダウンロードできる
          source:
            - help#19655862590873
    - phase: 自動ログアウト時間の実動作
      action: ui
      checkpoints:
        - obs: '共通設定で自動ログアウト時間を小さい値（例: 最小分）に設定して保存後、throwawayユーザーでログインし操作せず設定時間以上放置すると、再操作時にセッションが切れてログイン画面（/admin/login）に落ちる（⚠️global・放置待機が必要・検証後に元の値へ復元）'
          source:
            - B-212-3
            - help#19801318723993
    - phase: パスワード強制変更間隔の実動作
      action: ui
      checkpoints:
        - obs: パスワード強制変更画面表示の間隔日数を実動作確認できる値に設定し、条件を満たすthrowawayユーザーでログインすると、パスワード変更画面が強制表示される（⚠️global・経過日条件が必要なため throwaway の最終変更日を debug 等で調整・検証後に元の値へ復元）
          source:
            - B-89-1
            - help#19800944860953
  notes: destructive/global系をここに隔離。/admin/setting/** のテナント全体設定に触れるため必ずチェーン最後尾で実行し、テスト後に元の設定値へ復元する。
- id: J14
  name: 認証・アクセス制御
  priority: P1
  roles:
    - master
    - restricted-user
    - throwaway
  fixtures:
    - fx-perm
  destructive: true
  scope: global
  phases:
    - phase: 誤パスワードログイン
      action: ui
      checkpoints:
        - obs: ログイン画面で正しいIDと誤ったパスワードを入力して「ログイン」を押すと「ログインに失敗しました」等のエラーが表示され、URLが /admin/login のまま留まる
          source:
            - A-38-1
            - help#19655525782041
    - phase: 未ログイン時の直リンクアクセス誘導
      setup: mcp
      action: ui
      checkpoints:
        - obs: ログアウト状態で /admin/dataset/edit/{既存テーブルID} を直接開くと、ログイン画面（/admin/login）にリダイレクトされる
          source:
            - A-26-1
            - help#19655525782041
        - obs: そのログイン画面でログインすると、最初に要求した /admin/dataset/edit/{既存テーブルID} のURLに着地する（元の遷移先が保持される）
          source:
            - A-26-1
    - phase: 二段階認証の有効化とメールコードログイン
      setup: mcp
      action: ui
      checkpoints:
        - obs: 'throwawayユーザー（メールIDアカウント）で二段階認証を有効化（A-8-1）すると、設定一覧に二段階認証ONが表示される（⚠️destructive: 検証後に無効化して復元）'
          source:
            - A-8-1
            - help#19799097115033
        - obs: 二段階認証ON状態で当該ユーザーがログインすると認証コード入力画面に進み、Mailosaur/mail-checkerで取得したメール記載のコードを入力するとログインが通過し /admin/dashboard に着地する（⚠️メール待機が必要）
          source:
            - A-8-1
            - help#19799097115033
        - obs: 二段階認証を無効化（A-8-2）すると、設定一覧で二段階認証OFFに戻り、次回ログインでコード入力を求められない（復元）
          source:
            - A-8-2
            - help#19799097115033
        - obs: メールアドレス形式でないID（非メールID）のユーザーでは、二段階認証を設定しようとしても設定できない旨が表示され有効化できない
          source:
            - B-267
            - help#19799097115033
    - phase: アカウントロックと解除
      setup: mcp
      action: ui
      checkpoints:
        - obs: throwawayユーザーで規定回数連続して誤パスワードを入力すると、アカウントがロックされ正しいパスワードでもログインできなくなる旨が表示される（⚠️throwaway専用・本番マスターでは絶対に試行しない）
          source:
            - help#27473035018777
        - obs: 'マスターがユーザー管理から当該throwawayユーザーのロックを解除（別人性: 操作者=マスター、対象=throwawayで表示名が異なる）すると、当該ユーザーが正しいパスワードで再ログインできる'
          source:
            - help#27473035018777
    - phase: 初回パスワード強制リセット設定
      action: ui
      checkpoints:
        - obs: ユーザー追加時に初回パスワード強制リセットをON（A-24-1）にしてthrowawayユーザーを作成すると、そのユーザーの初回ログイン直後にパスワード変更画面が強制表示される（⚠️throwaway使用）
          source:
            - A-24-1
            - help#19707933976601
        - obs: 初回パスワード強制リセットをOFF（A-24-2）にして作成したthrowawayユーザーは、初回ログイン後そのまま /admin/dashboard に着地しパスワード変更を強制されない
          source:
            - A-24-2
    - phase: パスワード変更・忘れ
      action: ui
      checkpoints:
        - obs: throwawayユーザーが自分のパスワードを変更（A-3-9/A-3-10）して保存後ログアウトし、新パスワードで再ログインできる（⚠️throwaway専用・マスター認証情報は変更しない）
          source:
            - A-3-9
            - A-3-10
        - obs: ログイン画面の「パスワードをお忘れの方」からthrowawayユーザーのメールアドレスを送信するとリセットメールが届き（Mailosaur/mail-checkerで取得）、リンクから新パスワードを再設定して新パスワードでログインできる（⚠️メール待機が必要）
          source:
            - help#23992144701593
    - phase: 権限設定ユーザー/組織削除後の整合
      action: ui
      checkpoints:
        - obs: テーブル権限に設定したユーザーを削除（B-31-1）しても、当該テーブルの権限設定画面や一覧でエラーが発生せず開ける
          source:
            - B-31-1
        - obs: テーブル権限に設定した組織を削除（B-31-2）しても、当該テーブルの権限設定画面や一覧でエラーが発生せず開ける
          source:
            - B-31-2
    - phase: 全端末ログアウト
      action: ui
      checkpoints:
        - obs: 同一throwawayユーザーで2つのブラウザコンテキスト（端末）からログインした状態で、一方から「全端末からログアウト」を実行すると、両コンテキストともセッションが切断され次操作でログイン画面に落ちる
          source:
            - B-212-4
  notes: 'destructive/global: 二段階認証ON/OFF・初回PW強制リセット等のグローバル/ユーザー設定に触れるためチェーン最後尾で実行。マスターadminの認証情報は絶対に変更しない。ロック試行・PW変更は専用throwawayユーザーで行い、検証後に設定（2FA/強制リセット）を元へ復元する。別人性必須: ロック解除は操作者=マスター・対象=throwawayで表示名が異なることを観測。メールコード/リセットメールはMailosaur/mail-checkerで取得し反映待ちを考慮する。リソースは「J14-」プレフィックス。'
- id: J15
  name: アクセス許可IP
  priority: P2
  roles:
    - master
    - throwaway
  fixtures:
    - fx-perm
  destructive: true
  scope: global
  phases:
    - phase: 未設定は全IP許可
      action: ui
      checkpoints:
        - obs: アクセス許可IP設定が未設定（空）の状態では、現在の送信元IPからログイン・操作が問題なくできる（=全IP許可）
          source:
            - B-60-1
            - help#28520625069977
    - phase: 0.0.0.0/0 全許可
      action: ui
      checkpoints:
        - obs: 'アクセス許可IPに 0.0.0.0/0 を設定して保存すると、現在の送信元IPからアクセスでき、設定一覧に 0.0.0.0/0 が表示される（⚠️destructive: 検証後に元の設定へ復元）'
          source:
            - B-60-2
            - help#28520625069977
    - phase: 自送信元IPを含むCIDR許可
      action: ui
      checkpoints:
        - obs: 自分の送信元IP（egress IP）を含むCIDRを許可に設定して保存すると、自分のアクセスが引き続き許可される（⚠️egress IP前提・B-60-3〜9のCIDR算術バリエーションは本観点に圧縮。検証後に元の設定へ復元）
          source:
            - B-60-3
            - B-60-9
            - help#28520625069977
    - phase: 自IPを除外した許可で締め出し
      action: ui
      checkpoints:
        - obs: '許可CIDRから自分の送信元IPを除外した範囲のみを設定して保存し再アクセスすると、IP不一致でアクセスがブロックされる（⚠️destructive・自分が締め出される: 直前に別管理コンテキストか debug 経由で設定を戻せる手段を確保し、マスター復元を必ず実施。B-60-10〜14のバリエーションは本観点に圧縮）'
          source:
            - B-60-10
            - B-60-14
            - help#28520625069977
  notes: 'destructive: アクセス許可IPはテナント全体に効くためチェーン最後尾で実行し、検証後に必ず元の設定（通常は未設定/全許可）へ復元する。自IP除外フェーズは自分自身が締め出されるため、設定を戻せる手段（別経路/debug）を事前確保すること。❌E2E対象外（integration責務）: 第三者の別IPからのblock実証（B-60-10〜14の他者視点）と、全ユーザーに一律でIP制限をかける挙動（help#28520625069977）は、ブラウザの通常動線（単一egress IP）では再現できないため checkpoint にしない。リソースは「J15-」プレフィックス。'
- id: J16
  name: UI動的表示制御（表示条件・必須条件・計算・回帰）
  priority: P1
  roles:
    - master
    - restricted-user
  fixtures:
    - fx-schema
    - fx-perm
  destructive: false
  scope: local
  phases:
    - phase: 表示条件の基本（値変更で表示/非表示）
      setup: mcp
      action: ui
      checkpoints:
        - obs: レコード編集で条件元項目A（選択肢）を「対象外の値」に変えると条件項目Bがフォームから消えて非表示になり、Aを「条件一致の値」に戻すとページ再読込なしでBがリアルタイムに再表示される
          source:
            - help#19666709590809
            - B-231
        - obs: A=対象外でBが非表示の状態のまま保存すると一覧・詳細にBが出ず、A=一致で保存するとBの入力値が一覧・詳細に表示される
          source:
            - help#19666709590809
    - phase: 表示条件の複合（複数条件）
      action: ui
      checkpoints:
        - obs: Bに表示条件を2件設定したテーブルで、両条件を満たすとBが表示され、片方の条件を満たさない値に変えるとBがリアルタイムに非表示になる（複数条件＝全条件成立で表示。AND/OR厳密仕様は要マニュアル確認）
          source:
            - help#19666709590809
            - 要マニュアル確認
    - phase: 自己言及型の表示条件（ID＝ID）
      setup: mcp
      action: ui
      checkpoints:
        - obs: 表示する条件を「ID」＝「ID」とした自己言及型の関連レコード一覧項目を持つテーブルで、レコード詳細を開くと当該項目がバグ表示・エラーにならず関連レコード一覧が描画される
          source:
            - help#19707238540953
            - B-14-26
    - phase: 必須条件（条件付き必須）
      action: ui
      checkpoints:
        - obs: 「他の項目を条件で利用する」で必須条件（例：金額Aが金額C以上のとき必須）を設定した項目は、条件不成立（金額A<金額C）のとき当該項目を未入力のまま保存でき、必須エラーが表示されず一覧に登録される
          source:
            - help#19666709590809
            - B-231
        - obs: 同じ必須条件で条件成立（金額A≧金額C）の状態にして当該項目を未入力で保存すると、必須項目エラーが表示され保存されない
          source:
            - help#19666709590809
            - B-231
    - phase: 計算項目のリアルタイム表示
      setup: mcp
      action: ui
      checkpoints:
        - obs: 計算式「{価格}*{数量}」を設定した計算項目で、価格と数量を入力すると保存前のフォーム上で積（例：価格100×数量3→300）がリアルタイムに表示される
          source:
            - help#19685690616601
            - B-186
        - obs: 自動計算ON（リアルタイム更新有効）の計算項目で、参照元の数量を入力後に変更すると、計算結果がページ再読込なしで再計算されて表示される
          source:
            - help#19685690616601
            - B-174
    - phase: 表示条件で隠れた項目のデータ保持
      action: ui
      checkpoints:
        - obs: 条件項目Bに値を入力した後、条件元Aを対象外の値に変えてBを非表示にし、その状態で保存→詳細を再表示してからAを条件一致に戻すと、非表示中も消えずに保持されていたBの値が表示される
          source:
            - help#19666709590809
            - pigeon_cloud#2885
    - phase: 回帰ピン（#2885：自己言及表示条件×制限権限×下書き）
      setup: mcp
      action: ui
      checkpoints:
        - obs: 自己言及型表示条件と自動入力を持つテーブルを、制限権限ユーザー（ログイン名がマスターと異なる別人性）でレコード編集し「下書き保存」した後に再度開くと、入力済みデータが保持され、かつ条件成立中の条件項目が表示されたまま描画される（下書きはUI専用操作、制限ユーザーはMCP/debugで前倒し作成）
          source:
            - pigeon_cloud#2885
            - B-14-26
    - phase: 権限×表示条件の組合せ
      action: ui
      checkpoints:
        - obs: 制限ユーザー（別人性：ログイン名がマスターと異なる）で同テーブルのレコードを開き、条件元Aを条件一致の値にすると条件項目Bが表示され、対象外の値にするとBが非表示になり、表示条件が権限制限下でも条件どおりに効く
          source:
            - help#19666709590809
            - help#27467012835481
        - obs: 制限ユーザーに項目非表示の項目権限が設定された条件項目は、表示条件が成立してもなお権限により制限ユーザーのフォーム・詳細に表示されない（権限非表示が表示条件より優先される。優先順位の厳密仕様は要マニュアル確認）
          source:
            - help#29759923226393
            - 要マニュアル確認
  notes: MCPでテーブル定義（表示条件設定・必須条件設定・計算項目・自己言及型表示条件・項目権限grant）と制限ユーザーを前倒し用意し、検証主操作はすべてUI（フォームで値を変更して描画変化・リアルタイム計算・保存後保持を観測）。API直叩きでの代替は禁止。#2885型回帰は共有stagingのため反証対照（修正の有無で再現/解消の対照）は不可＝ブラウザ通常動線が壊れず通るかのカバーとして位置づけ、反証対照はL1統合テスト（pigeon_cloud側Unit/Integration）の責務と明記。別人性必須：制限権限フェーズはマスターと異なるログイン名の制限ユーザーで操作する。リソースは「J16-」プレフィックス。
- id: J17
  name: 項目型網羅2(書式・表示変種・採番/計算/参照の意味ある挙動)
  priority: P1
  roles:
    - master
  fixtures:
    - fx-schema
  destructive: false
  scope: local
  phases:
    - phase: 文字列(一行)の書式オプション(メール/URL)
      action: ui
      checkpoints:
        - obs: 文字列(一行)項目「J17-メール」を種類「メールアドレス」で項目追加画面からUI作成し、レコードに不正値「abc」を入力して保存しようとすると、メール形式の入力エラーが表示され保存されない
          source:
            - A-1-メール書式
            - help#19666709590809
        - obs: 「J17-メール」に正しい値「a@example.com」を入力すると保存でき、一覧・詳細に「a@example.com」が表示される
          source:
            - help#19666709590809
        - obs: 文字列(一行)項目「J17-URL」を種類「URL」でUI作成し、値「https://example.com」を保存すると、詳細画面でクリック可能なリンク(aタグ)として表示される
          source:
            - A-139-URL書式
            - help#19666709590809
    - phase: 数値の表示変種(単位・マイナス)
      setup: mcp
      action: ui
      checkpoints:
        - obs: 数値項目「J17-率」に単位記号「%」を末尾表示で設定し「50」を入力すると、一覧で「50%」と表示される
          source:
            - A-132-01
            - help#19666749123737
        - obs: 数値項目「J17-金額」に単位記号「$」を先頭表示で設定し「100」を入力すると、一覧で「$100」と表示される
          source:
            - A-132-01
            - help#19666749123737
        - obs: 数値項目で「マイナス符号を▲で表示」を有効にし「-500」を入力すると、一覧で「▲500」と表示される
          source:
            - help#19666749123737
        - obs: 数値項目で「マイナス値を赤字で表示」を有効にし負値を入力すると、一覧でその値が赤色(文字色)で表示される
          source:
            - help#19666749123737
    - phase: 日時の変種(年月・自動補完)
      setup: mcp
      action: ui
      checkpoints:
        - obs: 日時項目「J17-年月」を種類「年月」で設定し2026年6月を入力すると、一覧・詳細で「2026-06」形式で表示される
          source:
            - A-年月(種類年月)
            - help#19666789006745
        - obs: 種類「時刻のみ」の項目に「730」と入力してフォーカスアウトすると「7:30」に自動補完される
          source:
            - help#19666789006745
        - obs: 種類「日時」の項目に「20251204 1705」と入力してフォーカスアウトすると「2025/12/04 17:05」に自動補完される
          source:
            - help#19666789006745
    - phase: 選択肢(単一選択)のプルダウン表示
      setup: mcp
      action: ui
      checkpoints:
        - obs: 選択肢(単一選択)項目を表示形式「プルダウン」で選択肢AA,BB,CCを設定すると、レコード登録画面でプルダウン(select)UIが表示され、選択したBBが保存・表示される
          source:
            - help#19666791306649
    - phase: 画像・ファイルの変種(複数値・ブラウザ表示)
      setup: mcp
      action: ui
      checkpoints:
        - obs: 画像項目で「複数の値の登録を許可する」を有効にし2枚の画像をアップロードすると、詳細画面に2つのサムネイルが表示される
          source:
            - A-422-画像複数
            - help#19685978944025
        - obs: 画像項目で「画像の縦横サイズを表示」を有効にすると、詳細画面でアップロード画像に縦横サイズ(px)が併記表示される
          source:
            - help#19685978944025
        - obs: ファイル項目で「複数の値の登録を許可する」を有効にし2件のファイルをアップロードすると、詳細画面に2件のファイル名が表示される
          source:
            - help#19685607757465
        - obs: ファイル項目で「ブラウザで表示する(画像/PDF/動画)」を有効にしPDFを登録すると、詳細でファイルを開いた際にダウンロードではなくブラウザ内(別タブ/インライン)でPDFが表示される
          source:
            - help#19685607757465
    - phase: 計算項目の自動更新・ユニーク
      setup: mcp
      action: ui
      checkpoints:
        - obs: 計算項目で「計算値の自動更新」を有効にし、元の数値項目の値をレコード編集で変更して保存すると、計算結果がリアルタイム(保存時)に再計算された値へ更新される
          source:
            - help#19685690616601
        - obs: 計算項目で「計算値の自動更新」を無効にすると、元項目の値を後から変更しても計算結果は初回計算値のまま保持される
          source:
            - help#19685690616601
        - obs: 計算項目は「計算値の自動更新」が無効のときだけ「値の重複を禁止する(ユニーク)」を設定でき、同一計算結果のレコードを追加すると重複エラーで保存できない
          source:
            - B-6307
            - B-6308
            - help#19685690616601
    - phase: 自動採番のフォーマット・リセット
      setup: mcp
      action: ui
      checkpoints:
        - obs: 自動採番項目にフォーマット「ID-{YYYY}-{MM}-{ID:4}」を設定して2026年6月にレコードを追加すると、採番値が「ID-2026-06-0001」形式で付与される
          source:
            - B-273
            - help#19666652317209
        - obs: 自動採番の設定で「カウンターをリセット」を実行した後に新規レコードを追加すると、採番が初期番号(0001相当)から再開される
          source:
            - A-115-01
            - help#19666652317209
    - phase: ルックアップ(項目のコピー)の自動反映
      setup: mcp
      action: ui
      checkpoints:
        - obs: 他テーブル参照のルックアップ(項目のコピー)で「自動反映する」を有効に設定した項目は、参照元レコードの値を更新すると、参照しているレコード側のコピー値も更新後の値に変わる
          source:
            - A-13x-ルックアップ
            - help#19686010433305
        - obs: ルックアップで「自動反映する」を無効にした項目は、参照元レコードの値を後から更新してもコピー値は初回取得値のまま変わらない
          source:
            - A-1368-ルックアップ自動反映なし
            - help#19686010433305
    - phase: 子テーブル(入力フォームにする)
      setup: mcp
      action: ui
      checkpoints:
        - obs: 他テーブル参照項目で「入力フォームにする(子要素機能)」を有効にすると、親テーブルの詳細/編集画面に子テーブルのレコードを表形式で一覧表示でき、その場で子レコードを追加できる
          source:
            - help#19686010433305
    - phase: ユニーク(一意)制約
      setup: mcp
      action: ui
      checkpoints:
        - obs: 文字列(一行)項目に「値の重複を禁止する」を設定し、既存レコードと同一の値で新規レコードを登録しようとすると「1件のエラーがあります。既存の項目のデータの1つがユニークでなければなりません。」のエラーが表示され保存されない
          source:
            - B-1055
            - help#19666652317209
  notes: |
    J3(項目型ぜんぶ盛り)で未カバーの「意味ある変種」を集約。冗長な総当りはせず代表値1点で観測。
    「項目を作る動線(UI生成)」は先頭フェーズで最低1本UIで残す(MCP化で生成バグを不可視にしない)。
    それ以降のフェーズは項目定義をsetup:mcpで前倒しし、検証主操作(値入力→表示変化の観測)はすべてUI。
    色/IPアドレス/パスワードは公式に項目型が存在しないためシナリオ対象外。リソースは「J17-」プレフィックス。
- id: J18
  name: テーブル管理(グループ・複製コピー範囲・JSON入出力・レイアウト列数)
  priority: P2
  roles:
    - master
  fixtures: []
  destructive: false
  scope: local
  phases:
    - phase: テーブルグループ管理
      setup: mcp
      action: ui
      checkpoints:
        - obs: テーブル管理で新規グループ「J18-グループ」を作成すると、サイドメニュー/メニュー並び替え画面にグループ「J18-グループ」が表示される
          source:
            - A-465-グループ作成
            - help#19662345752601
        - obs: メニュー並び替えで対象テーブルを「J18-グループ」の「ここにドロップでグループに追加」へドラッグ&ドロップすると、エラーなく当該テーブルがグループ配下に表示される
          source:
            - A-465
            - help#19662345752601
        - obs: グループ配下のテーブルをグループ外へドラッグ&ドロップすると、エラーなく当該テーブルがグループから外れて表示される
          source:
            - A-469
            - help#19662345752601
        - obs: 「全て展開」をクリックするとグループ配下のテーブルが全て展開表示され、「全て閉じる」でグループ配下が全て閉じる
          source:
            - A-471
            - A-473
            - help#19662345752601
    - phase: テーブル複製のコピー範囲
      setup: mcp
      action: ui
      checkpoints:
        - obs: 権限・通知・フィルタを設定済みのテーブルを複製する際に「権限設定をコピー」「通知設定をコピー」「フィルタをコピー」を有効にすると、複製先テーブルに同じ権限設定・通知設定・フィルタが引き継がれて表示される
          source:
            - A-113-20
            - help#19707614354969
        - obs: テーブル複製ではテーブル定義(項目)はコピーされるが、元テーブルのレコードデータは複製先に含まれず、複製先テーブルのレコード一覧は0件で表示される
          source:
            - help#19707614354969
    - phase: JSON入出力(エクスポート・インポート)
      action: ui
      checkpoints:
        - obs: テーブル設定のエクスポートで「データを含める」「権限設定を含める」「フィルタ/ビューを含める」「通知設定を含める」を有効にしてJSONをダウンロードすると、JSON内に項目定義に加えレコードデータ・権限・フィルタ・通知が含まれる
          source:
            - help#19663448575641
        - obs: テーブル管理「JSONから追加」でエクスポートしたJSONファイルをアップロードすると、項目定義を引き継いだテーブルが新規にテーブル管理一覧へ追加される
          source:
            - help#19663331553433
    - phase: レイアウト列数・配置(3-4列・詳細適用)
      setup: mcp
      action: ui
      checkpoints:
        - obs: 登録画面レイアウトを3列に設定して項目を各列へ配置し保存すると、レコード登録画面で項目が3列で配置表示される
          source:
            - A-113-18
            - help#19663843714329
        - obs: 「レイアウトを詳細画面にも適用」を有効にすると、レコード詳細画面も登録画面と同じ列レイアウトで表示される
          source:
            - help#19663843714329
  notes: |
    J2(テーブル設計基本)で未カバーのテーブル管理動線を集約。
    複製はコピー範囲(権限/通知/フィルタ)とレコード非コピーを観測。JSONはエクスポートのオプション網羅＋インポート(JSONから追加)を追加(J2はエクスポートのみだった)。
    レイアウトはJ2の2列に対し3列＋詳細画面適用を追加。グループ操作はドラッグ&ドロップ。リソースは「J18-」プレフィックス。
    複数テーブル/グループを作るためdestructive:falseだが後続干渉を避け「J18-」プレフィックスで自リソースのみ操作。
- id: J19
  name: ビュー（一覧表示カスタマイズ）
  priority: P2
  roles:
    - master
    - user
  fixtures:
    - fx-basic
  destructive: false
  scope: local
  phases:
    - phase: ビュー準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: 「J17-」プレフィックスのテーブル（文字列項目3つ・数値項目1つ）とレコード3件以上が作成され、一覧画面に表示される
          source:
            - help#27395046258969
    - phase: 項目の表示／非表示
      action: ui
      checkpoints:
        - obs: ビュー作成の「項目」タブで一部項目を非表示エリアへドラッグして保存し、そのビューを適用すると、一覧画面に非表示にした項目の列が表示されない（残りの項目列のみ表示）
          source:
            - help#27395046258969
        - obs: ビューの適用先を「一覧画面／詳細画面／編集画面」のいずれかに設定でき、設定した画面にのみ項目表示の調整が反映される
          source:
            - help#27395046258969
            - 113-17
    - phase: 並び順設定
      action: ui
      checkpoints:
        - obs: 「並び順」タブで数値項目を「昇順」に設定して保存しビューを適用すると、一覧のレコードが数値項目の昇順（小→大）で並ぶ
          source:
            - help#27395046258969
        - obs: 並び順に2項目（第1キー昇順・第2キー降順）を登録すると、第1キー優先・同値は第2キーで並んだ順序で一覧表示される
          source:
            - help#27395046258969
    - phase: 行に色を付ける（一覧）
      action: ui
      checkpoints:
        - obs: 「行に色を付ける」で「数値項目が100以上なら背景=赤」の条件・色を設定して保存・適用すると、条件に合致する行の背景のみ赤になり非合致行は無色のまま
          source:
            - help#27395046258969
            - A-87-1
        - obs: 行色条件を2件（異なる条件・異なる色）登録すると、各行が合致した条件の色で塗り分けられ、下に追加した条件が上位条件として優先適用される
          source:
            - help#27395046258969
            - A-87-2
    - phase: デフォルト設定と共有
      action: ui
      checkpoints:
        - obs: 「デフォルト設定」タブで「全てのユーザーのデフォルトにする」をONにして保存すると、別ユーザー（J17-user）でテーブルを開いた際に最初からそのビューが適用された一覧が表示される
          source:
            - help#27395046258969
        - obs: 別ユーザー（J17-user・作成者=master と表示名が異なる）でログインしても共有ビューが選択肢に表示され、適用すると master と同じ項目表示・並び順になる
          source:
            - help#27395046258969
    - phase: ビューの解除
      action: ui
      checkpoints:
        - obs: ビュー適用中に「ビューを解除」を選ぶと、項目表示・並び順・行色がリセットされた通常のテーブル一覧（全項目・既定順）に戻る
          source:
            - help#27395046258969
  notes: |
    一覧表示カスタマイズ(ビュー)を1セッションで通す。J12の「集計の行色/共有」とは別UI(ビュー作成)。
    別ユーザー(J17-user)を使う共有/デフォルト検証は「作成者master と表示名が異なる第三者」で確認する(別人性)。
    リソースは「J17-」プレフィックス。
- id: J20
  name: カレンダー表示
  priority: P2
  roles:
    - master
  fixtures:
    - fx-basic
  destructive: false
  scope: local
  phases:
    - phase: カレンダー準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: 「J18-」プレフィックスのテーブル（日時項目「開始」「終了」・文字列項目「件名」を含む）と、開始/終了日時を入れたレコード2件以上が作成される
          source:
            - help#19764437975705
    - phase: カレンダー表示の有効化
      action: ui
      checkpoints:
        - obs: テーブル設定→「一覧画面」で「カレンダー表示」をONにし、参照する日時フィールドに「開始」、表示フィールドに「{件名}」を指定して「更新」で保存すると、一覧メニューにカレンダー表示が追加される
          source:
            - help#19764437975705
        - obs: カレンダーを開くと、レコードの「開始」日時のマス目に「件名」の値が予定として表示される
          source:
            - help#19764437975705
    - phase: from-to形式（期間表示）
      action: ui
      checkpoints:
        - obs: 「参照する日時フィールドをfrom,toの形式にする」をONにし開始日時=「開始」・終了日時=「終了」を指定して保存すると、開始から終了まで複数日にまたがる予定としてカレンダー上に帯表示される
          source:
            - help#19764437975705
            - '214'
    - phase: 表示ビュー切替
      action: ui
      checkpoints:
        - obs: カレンダー右上のアイコンで「週」表示に切り替えると、エラーなく1週間分の日付列のカレンダーになる
          source:
            - 114-01
        - obs: 「日」表示に切り替えると、エラーなく当日1日分の時間軸カレンダーになり、「>」で翌日へ移動できる
          source:
            - 114-02
            - help#19764437975705
    - phase: 予定のドラッグ移動
      action: ui
      checkpoints:
        - obs: カレンダー上の予定を別日へドラッグ&ドロップで移動すると、完了メッセージが表示され、対象レコードの日時項目が移動先の日付に更新される
          source:
            - '215'
            - help#19764437975705
    - phase: 背景色設定
      action: ui
      checkpoints:
        - obs: カレンダー設定で「+カレンダーの背景色を追加」で対象日=「sunday」・背景色を指定して保存すると、カレンダー上の日曜列の背景が設定色になる
          source:
            - help#19764437975705
  notes: |
    カレンダー有効化(参照日時/from-to)→月/週/日切替→予定D&D移動→背景色を1セッションで。
    日時項目が前提なので準備フェーズで「開始/終了」日時項目を必ず作る。リソースは「J18-」プレフィックス。
- id: J21
  name: 帳票・PDF出力
  priority: P2
  roles:
    - master
  fixtures:
    - fx-basic
  destructive: false
  scope: local
  phases:
    - phase: 帳票準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: 「J19-」プレフィックスのテーブル（文字列項目「件名」「宛先」を含む）とレコード1件（件名/宛先に値あり）が作成される
          source:
            - help#19656261965721
    - phase: 帳票テンプレート登録
      action: ui
      checkpoints:
        - obs: セルに ${J19-請求書.件名} ${J19-請求書.宛先} を記述したExcelテンプレートを帳票登録すると、エラーなく登録され帳票一覧にアイコン（歯車）付きで表示される
          source:
            - help#19656261965721
            - 9-7
            - '216'
        - obs: Excel以外のファイル形式（txt や png 等）を帳票登録しようとすると、帳票登録エラーが表示され登録されない
          source:
            - 56-1
    - phase: 帳票出力（Excel）
      action: ui
      checkpoints:
        - obs: 帳票登録後にレコード詳細を開くと「帳票出力」ボタンが表示される
          source:
            - 9-7
        - obs: 「帳票出力」でExcelを選ぶとファイルがダウンロードされ、開くと ${…} 記述セルがレコードの「件名」「宛先」の実値に置換されている
          source:
            - help#19656261965721
            - '206'
    - phase: PDF変換出力
      action: ui
      checkpoints:
        - obs: 帳票出力でPDF形式を選ぶと、エラーなくPDFファイルがダウンロードされる（⚠ PDFバイナリ内の差し込み値の文字照合はブラウザで開けないため Excel 出力側で値検証する）
          source:
            - '206'
            - '198'
    - phase: 出力ファイル名フォーマット
      action: ui
      checkpoints:
        - obs: 帳票の「出力ファイル名フォーマット」に %m-%d を設定してExcel出力すると、ダウンロードファイル名が「MM-DD.xlsx」（出力月日、例 03-15.xlsx）になる
          source:
            - '207'
        - obs: 同フォーマットでPDF出力すると、ダウンロードファイル名が「MM-DD.pdf」になる
          source:
            - '208'
    - phase: 一括帳票出力
      action: ui
      checkpoints:
        - obs: 一覧で複数レコードを選択して一括帳票出力を実行すると、処理ジョブが走り（反映まで待つ）、各レコード分の帳票をまとめたzipがダウンロードされる（⚠ zip内ファイル個数の確認まで。中身PDFの値照合は単票Excel側で担保）
          source:
            - help#19736760520345
            - '196'
  notes: |
    ${テーブル.項目}テンプレ登録→非Excelエラー→出力ボタン→Excel/PDF出力→ファイル名フォーマット→一括(zip)を1セッションで。
    差し込み値の照合はExcel出力で実施(PDF/zipはブラウザで中身を開けないため出力成功+ファイル名/個数まで)。リソースは「J19-」プレフィックス。
- id: J22
  name: 集計方法の網羅（数値表示仕様）
  priority: P2
  roles:
    - master
  fixtures:
    - fx-basic
  destructive: false
  scope: local
  phases:
    - phase: 集計用データ準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: 「J20-」プレフィックスのテーブル（整数項目「金額」桁区切り表示ON・小数項目「率」・日時項目「日付」）とレコード4件（金額に 1000/2000/3000/4000 等）が作成される
          source:
            - help#19659532678553
            - 14-5
    - phase: 合計・件数集計
      action: ui
      checkpoints:
        - obs: 集計設定で集計項目=「金額」・集計方法=「合計」で表示すると、4件合計（例 10000）が桁区切り「10,000」で表示される
          source:
            - help#19659532678553
            - 14-5
        - obs: 集計方法=「件数」で表示すると、対象レコード件数（例 4）が数値で表示される
          source:
            - help#19659532678553
    - phase: 平均・最大・最小集計
      action: ui
      checkpoints:
        - obs: 整数項目「金額」で集計方法=「平均」を表示すると、平均値が小数第一位まで（例 2500.0）表示される
          source:
            - 110-01
        - obs: 小数項目「率」で集計方法=「平均」を表示すると、設定した小数桁数＋1桁まで表示される
          source:
            - 110-02
        - obs: 集計方法=「最大」または「最小」を選ぶと日時項目（日付）も集計対象に選択でき、対象項目の最大値／最小値が表示される
          source:
            - help#19659532678553
    - phase: 0件時の0表示
      action: ui
      checkpoints:
        - obs: 絞り込みで合致レコードが0件になる条件を設定して合計集計を表示すると、集計値がブランクではなく「0」と表示される
          source:
            - help#19659532678553
            - A-65-1
    - phase: 計算項目を使った集計
      action: ui
      checkpoints:
        - obs: 集計項目1・集計項目2を指定し、集計項目3に計算式 {集計項目1}-{集計項目2} を入力して表示すると、2集計値の差分が計算されて表示される
          source:
            - 120-05
            - help#19659900435097
  notes: |
    集計"方法"(合計/件数/平均/最大/最小)と数値表示仕様(桁区切り/平均の小数桁/0件時0/計算項目)を網羅。J12の集計作成とは観点が別。
    桁区切りは数値項目側の設定(桁区切り表示ON)を前提に、集計結果側でカンマ表示されることを見る。リソースは「J20-」プレフィックス。
- id: J23
  name: チャート種類の網羅
  priority: P3
  roles:
    - master
  fixtures:
    - fx-basic
  destructive: false
  scope: local
  phases:
    - phase: チャート用データ準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: 「J21-」プレフィックスのテーブル（カテゴリ項目「区分」・数値項目「数量」「金額」）とレコード複数件が作成され、集計の土台になる
          source:
            - help#19660061709465
    - phase: 線グラフ
      action: ui
      checkpoints:
        - obs: チャート追加で集計項目のグラフ種類=「線グラフ」を選んで表示すると、集計値が折れ線で結ばれた線グラフで表示される
          source:
            - help#19660061709465
            - 105-01
    - phase: 円グラフ
      action: ui
      checkpoints:
        - obs: グラフ種類で円グラフ系を選んで表示すると、区分ごとの構成比が円（扇形）で表示される
          source:
            - help#19660061709465
            - 105-01
    - phase: 複合グラフ（線＋棒同時）
      action: ui
      checkpoints:
        - obs: 集計項目「数量」のグラフ種類=「棒グラフ」、集計項目「金額」のグラフ種類=「線グラフ」を設定して表示すると、1つのチャート上に棒グラフと線グラフが同時に描画される
          source:
            - help#19660129256089
            - 123-01
    - phase: Y軸設定
      action: ui
      checkpoints:
        - obs: チャート設定でデータ項目（X軸）と集計項目（Y軸）を指定して表示すると、指定どおりの軸割り当てでチャート表示され、エラーが出ない
          source:
            - 123-01
            - help#19660061709465
  notes: |
    チャートの"種類"(線/円/複合)とY軸割り当てを網羅。J12の棒グラフ・累積・共有・絞り込みとは別観点。P3(余裕があれば)。
    リソースは「J21-」プレフィックス。
- id: J24
  name: 通知トリガー・条件・置換の網羅
  priority: P2
  roles:
    - master
  fixtures:
    - fx-notify
  destructive: false
  scope: local
  phases:
    - phase: 通知トリガー準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: 「J22-」プレフィックスの対象テーブルと通知先ユーザー1名（master とは別の表示名）が作成される
          source:
            - help#19710190002457
            - B-6-1
    - phase: アクション別トリガー（作成／更新／削除）
      action: ui
      checkpoints:
        - obs: 通知設定でアクション=「作成」のみを有効にし、対象テーブルにレコードを作成すると通知先に画面通知が届き、レコードを更新しても作成由来の追加通知は届かない
          source:
            - 6-1
        - obs: アクション=「更新」を有効にした別設定で既存レコードを更新すると、更新を契機に通知が届く
          source:
            - 6-2
        - obs: アクション=「削除」を有効にした設定で対象レコードを削除すると、削除を契機に通知が届く
          source:
            - 6-3
    - phase: ワークフローステータス変更トリガー
      action: ui
      checkpoints:
        - obs: 対象テーブルでワークフローをONにし、アクション=「ワークフローステータス変更時」を設定して申請を行うと、ステータス変化を契機に通知が届く
          source:
            - 6-4
    - phase: 条件付き通知
      action: ui
      checkpoints:
        - obs: 通知設定の条件に「区分」が「重要」と一致を設定し、区分=「重要」のレコードを作成すると通知が届くが、区分=「通常」のレコードを作成しても通知が届かない
          source:
            - 80-1
            - help#19710190002457
    - phase: 通知内容の表示項目（置換）
      action: ui
      checkpoints:
        - obs: 通知内容の表示項目で「テーブル名」をチェックして通知すると、通知本文に対象テーブル名が差し込まれて表示される
          source:
            - 81-1
        - obs: 表示項目で「URL」をチェックすると、通知本文に該当レコードへのURLが差し込まれて表示される
          source:
            - 81-2
        - obs: 表示項目で「作成(更新)データ」をチェックすると、通知本文に作成／更新したレコードの項目値が差し込まれて表示される
          source:
            - 81-3
    - phase: リマインダの条件・タイミング
      action: ui
      checkpoints:
        - obs: リマインダ設定で条件=「作成者」が一致・タイミング=「作成日時」の1分後を設定し、対象レコードを追加すると、約1分後に通知先へリマインダ通知が届く
          source:
            - 80-1
            - help#19710190002457
  notes: |
    通知の起点(作成/更新/削除/WFステータス変更)・条件付き発火・本文への項目置換(テーブル名/URL/データ)・リマインダ条件を網羅。J10の通知先網羅とは別観点。
    通知先は「masterと異なる表示名のJ22-user」を使い別人性を担保。Webhook検証は webhook-checker(http://test.yaspp.net/pigeon/webhook.php) 前提。リソースは「J22-」プレフィックス。
- id: J25
  name: メール配信の対象抽出・HTML・フォーム拡張
  priority: P2
  roles:
    - master
  fixtures:
    - fx-mail
  destructive: false
  scope: local
  phases:
    - phase: 配信・フォーム準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: 「J23-」プレフィックスの対象テーブル（メールアドレス項目・区分項目を含む）とレコード複数件（Mailosaur受信可能アドレスを含む）が作成される
          source:
            - help#19801803381145
    - phase: 配信リストの対象抽出（フィルタ）
      action: ui
      checkpoints:
        - obs: 配信リストにフィルタ条件「区分」が「会員」と一致を設定して配信すると、区分=「会員」のレコードのアドレスにのみメールが届き、区分=「非会員」には届かない（Mailosaurで受信突合）
          source:
            - 99-12
            - help#19801803381145
    - phase: HTMLメール配信
      action: ui
      checkpoints:
        - obs: テキストタイプ=HTMLのテンプレートで配信すると、受信メールがHTML本文（装飾/リンクが反映された見た目）で届く（Mailosaurの本文がHTMLパート含む）
          source:
            - B-99-2
            - help#19801803381145
    - phase: 差し込みタグ（ファイル項目）
      action: ui
      checkpoints:
        - obs: メール本文に {ファイル項目名} の差し込みタグを入れCc/Bccも設定して配信すると、To/Cc/Bccすべてに届き、ファイル項目が添付として送られる
          source:
            - '201'
    - phase: 公開フォームのビュー設定と回答登録
      action: ui
      checkpoints:
        - obs: 公開フォーム有効化後にビューの「表示」エリアへドラッグした項目だけが公開フォーム画面に入力欄として現れ、非表示項目は出ない
          source:
            - help#19796387440665
        - obs: 公開フォームURLを未ログインで開いて入力・送信すると、対象テーブルに回答内容のレコードが1件登録される（反映まで待って一覧で確認）
          source:
            - '129'
            - help#19796387440665
    - phase: 公開フォームURLの初期値反映
      action: ui
      checkpoints:
        - obs: 公開フォームURL末尾に ?姓=AAA&名=BBB を付けて開くと、フォームの「姓」欄に AAA、「名」欄に BBB が初期表示される
          source:
            - '812'
            - help#19796387440665
    - phase: 埋め込みフォーム
      action: ui
      checkpoints:
        - obs: テーブル設定の追加オプションで「埋め込みフォームをONにする」を有効化すると、メニューに「埋め込みフォームリンク」が追加され、リンク（埋め込み用URL）をコピーできる
          source:
            - '128'
            - help#19764544542233
        - obs: 埋め込みフォームURLを直接ブラウザで開いて入力・送信すると、対象テーブルにレコードが登録される（外部サイト貼付は埋め込みURLを直接開いて代替）
          source:
            - 25-8
            - help#19764544542233
  notes: |
    配信リストのフィルタ抽出・HTML配信・差し込み(ファイル/Cc/Bcc)・公開フォームのビュー制御/初期値(?項目=値)・埋め込みフォームを網羅。J11の基本配信/取込とは別観点。
    ⚠ 実メール受信は mail-checker/Mailosaur で突合。大量送信はしない(対象は数件)。埋込の「他サイト貼付」は埋込URL直開きで代替(E2Eブラウザ動線)。リソースは「J23-」プレフィックス。
- id: J26
  name: ダッシュボード編集権限
  priority: P3
  roles:
    - master
    - user
  fixtures:
    - fx-org
  destructive: false
  scope: global
  phases:
    - phase: 権限設定の準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: 「J24-」プレフィックスの一般ユーザー1名（master とは別の表示名）が作成され、ユーザー一覧に表示される
          source:
            - help#19710406238105
    - phase: 編集権限の付与
      action: ui
      checkpoints:
        - obs: 管理者設定→権限設定でダッシュボード（掲示板）の編集権限を J24-user に付与して更新すると、権限設定一覧にそのユーザー行が表示される
          source:
            - help#19710406238105
    - phase: 権限の反映確認
      action: ui
      checkpoints:
        - obs: 権限を付与した J24-user（master と別人）でログインするとダッシュボード（掲示板）に編集アイコンが表示され編集できる
          source:
            - help#19710406238105
        - obs: 編集権限を付与していない別ユーザーでログインすると、ダッシュボード（掲示板）の編集アイコンが表示されず編集できない
          source:
            - help#19710406238105
  notes: |
    ダッシュボード(掲示板)の編集権限をユーザー単位で付与し、付与/非付与で編集可否が分かれることを別人性込みで確認。
    /admin/setting 系の権限設定に触れるため scope: global(チェーン最後尾)。リソースは「J24-」プレフィックス。
