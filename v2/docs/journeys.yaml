        - obs: "項目権限設定で特定項目を制限ユーザーに非表示に設定すると、制限ユーザーのレコード詳細で該当項目が表示されない"
          source: ["help#29759923226393"]
        - obs: "項目を編集不可に設定すると、制限ユーザーのレコード編集画面で該当項目が読み取り専用表示になる"
          source: ["help#29759923226393"]
    - phase: "グループ権限設定"
      action: ui
      checkpoints:
        - obs: "グループの権限設定で制限ユーザーにグループ閲覧権限を付与すると、制限ユーザーにグループ内テーブルが表示される"
          source: ["B-155-2", "help#19665959159833"]
        - obs: "グループ自体の閲覧権限をOFFにすると、制限ユーザーにグループが表示されない"
          source: ["help#29756761517465"]
    - phase: "ダッシュボード権限"
      action: ui
      checkpoints:
        - obs: "ダッシュボードの権限設定で制限ユーザーに特定チャートの非表示を設定すると、制限ユーザーのダッシュボードに該当チャートが出ない"
          source: ["help#19710406238105"]
    - phase: "権限の差分確認"
      action: ui
      checkpoints:
        - obs: "マスターと制限ユーザーで同一テーブルを開くと、マスターは全項目・全ボタン、制限ユーザーは制限後の項目・ボタンのみ表示され、2アカウントの表示差が確認できる（別人性）"
          source: ["help#19666629662489"]
  notes: "別人性必須: マスターと制限ユーザーの2アカウントで権限の効きを確認する。setup mcp で制限ユーザーを前倒し作成し、検証主操作はUI。リソースは「J7-」プレフィックス。"
- id: J8
  name: "WF(申請→承認)"
  priority: P1
  roles: ["master", "applicant", "approver"]
  fixtures: ["fx-workflow"]
  destructive: false
  scope: local
  # checkpoints合計: 14 / フェーズ数: 8
  phases:
    - phase: "別ロールの準備"
      setup: mcp
      action: ui
      checkpoints:
        - obs: "MCP/debugで「J8-」プレフィックスの申請者・承認者2名（互いに別ユーザー）が作成され、ユーザー一覧に氏名の異なる2行が表示される"
          source: ["B-11-2", "help#19710699416985"]
    - phase: "ワークフロー設定"
      action: ui
      checkpoints:
        - obs: "対象テーブルにワークフローを設定し承認者を指定して保存すると、テーブルでワークフロー（承認）が有効化される"
          source: ["B-11-1", "help#19710834753945"]
    - phase: "申請（申請者）"
      action: ui
      checkpoints:
        - obs: "申請者でログインしレコードを申請すると、ワークフロー状態が「申請中(要確認)」になる"
          source: ["B-11-2", "help#19710702198425"]
        - obs: "申請者の承認状況に、申請者と異なる表示名の承認者が次の承認者として表示される（別人性）"
          source: ["B-11-2"]
    - phase: "承認（承認者）"
      action: ui
      checkpoints:
        - obs: "承認者でログインすると（ログイン名が申請者と異なる）、承認待ち一覧に申請レコードが表示される（別人性）"
          source: ["B-11-2", "help#19710702198425"]
        - obs: "承認者が「承認」するとワークフロー状態が「承認済み」になり、承認履歴に承認者の表示名と承認日時が記録される"
          source: ["B-11-2"]
        - obs: "承認履歴上、申請者と承認者の表示名が異なることが確認できる（別人性の必須観点）"
          source: ["B-11-2"]
    - phase: "否認と再申請"
      action: ui
      checkpoints:
        - obs: "別レコードを承認者が「否認」すると、ワークフロー状態が「否認」になり否認コメントが表示される"
          source: ["B-11-4"]
        - obs: "否認されたレコードを申請者が編集して再申請すると、再び「申請中(要確認)」になる"
          source: ["B-11-4", "B-11-7"]
    - phase: "通知の確認"
      action: ui
      checkpoints:
        - obs: "申請時に承認者へ、承認時に申請者へ、画面上の通知（ベル/タスク通知）が表示される"
          source: ["B-11-3", "help#19875911533849"]
        - obs: "申請者のタスク・通知管理画面に、承認結果（承認/否認）が通知として記録される"
          source: ["B-11-3", "help#19875911533849"]
    - phase: "承認者の編集可否設定"
      action: ui
      checkpoints:
        - obs: "「ワークフロー承認者はデータ編集可能」をONにすると、承認者の承認画面でレコード項目が編集可能になる"
          source: ["B-11-6"]
        - obs: "同設定をOFFにすると、承認者の承認画面でレコード項目が読み取り専用になる"
          source: ["B-11-6"]
    - phase: "申請の取り下げ"
      action: ui
      checkpoints:
        - obs: "申請者が自分の申請中レコードを取り下げると状態が未申請に戻り、取り下げは申請者本人のみ可能で第三者は不可である（別人性の境界）"
          source: ["pigeon_cloud#3696", "B-11-2"]
  notes: "別人性必須(wf-001教訓): 申請者≠承認者を別アカウントで実行し、承認履歴で表示名が異なることを観測する。中核はUI必須。リソースは「J8-」プレフィックス。"
- id: J9
  name: "WF応用"
  priority: P2
  roles: ["master", "applicant", "approver1", "approver2"]
  fixtures: ["fx-workflow"]
  destructive: false
  scope: local
  # checkpoints合計: 11 / フェーズ数: 8
  phases:
    - phase: "複数承認者の準備"
      setup: mcp
      action: ui
      checkpoints:
        - obs: "「J9-」プレフィックスの申請者1名・承認者2名（B,C・互いに別ユーザー）が作成され、ユーザー一覧に氏名の異なる3行が表示される"
          source: ["B-11-3", "help#30339369151001"]
    - phase: "並行承認の設定"
      action: ui
      checkpoints:
        - obs: "ワークフローに並行承認（BとC両方の承認が必要）を設定して保存すると、設定画面に並行承認の承認者2名が表示される"
          source: ["B-11-3", "help#30339369151001"]
    - phase: "並行承認の実行"
      action: ui
      checkpoints:
        - obs: "申請後、承認者B・C双方が承認するとワークフロー状態が「承認済み」になる（別人性: 申請者≠B≠C）"
          source: ["B-11-3"]
        - obs: "承認者の一方が否認すると、ワークフロー状態が「否認」になる"
          source: ["B-11-3"]
        - obs: "申請時はBへ、Bが承認するとCへ、C承認時は申請者へ、承認順に通知が遷移する"
          source: ["B-11-3"]
    - phase: "順次承認ルート"
      action: ui
      checkpoints:
        - obs: "直列承認ルートでは、Bの承認が完了するまでCの承認待ち一覧に表示されない"
          source: ["B-11-3", "help#19710702198425"]
    - phase: "ワークフローに入る条件"
      action: ui
      checkpoints:
        - obs: "「ワークフローに入る条件」を金額>10000等で設定すると、条件を満たすレコードのみ申請対象になり、満たさないレコードは申請不要で登録される"
          source: ["B-11-8", "help#30340280858521"]
        - obs: "条件を満たさないレコードは、ワークフロー状態欄が空（対象外）で表示される"
          source: ["help#30340280858521"]
    - phase: "組織での承認者指定"
      action: ui
      checkpoints:
        - obs: "承認者を組織で指定すると、その組織に属するいずれかのユーザーが承認すれば承認済みになる"
          source: ["B-11-5", "help#30339369151001"]
    - phase: "CSVでワークフロー作成"
      action: ui
      checkpoints:
        - obs: "CSVアップロードでワークフローを作成すると、設定画面に取り込んだ承認ルートが反映表示される"
          source: ["help#30351561801369"]
    - phase: "WF状態での集計絞り込み"
      action: ui
      checkpoints:
        - obs: "集計の絞り込みで「ワークフローが申請中(要確認)と一致」を設定し保存すると、申請中レコードのみの集計結果が表示される"
          source: ["A-85-1"]
  notes: "別人性必須: 並行承認/組織承認を申請者≠承認者B≠承認者Cで実行する。リソースは「J9-」プレフィックス。"
- id: J10
  name: "通知設定"
  priority: P2
  roles: ["master"]
  fixtures: ["fx-notify"]
  destructive: false
  scope: local
  # checkpoints合計: 10 / フェーズ数: 8
  phases:
    - phase: "通知設定の準備"
      setup: mcp
      action: ui
      checkpoints:
        - obs: "「J10-」プレフィックスの通知先テーブルと通知先ユーザー1名が作成され、一覧に表示される"
          source: ["B-6-1", "help#19710190002457"]
    - phase: "ユーザー宛通知"
      action: ui
      checkpoints:
        - obs: "通知設定で通知先にユーザーを指定し、対象テーブルにレコードを作成すると、指定ユーザーへ画面通知が表示される"
          source: ["B-6-1", "help#19710190002457"]
    - phase: "メールアドレス宛通知"
      action: ui
      checkpoints:
        - obs: "通知先メールアドレスを設定しレコードを作成すると、設定したメールアドレスへ通知メールが届く"
          source: ["B-6-1", "help#19710190002457"]
        - obs: "メール通知をtext形式にする設定を有効にすると、通知メールがテキスト形式で届く"
          source: ["help#26118050758937"]
    - phase: "Webhook通知"
      action: ui
      checkpoints:
        - obs: "通知先にWebhook URLを設定しレコードを作成すると、Webhook受信先にレコード情報を含むPOSTが届く"
          source: ["B-6-2", "help#42015967824409"]
    - phase: "組織宛通知"
      action: ui
      checkpoints:
        - obs: "通知先に組織を設定しレコードを作成すると、その組織所属ユーザーへ通知が行われる"
          source: ["B-6-5"]
    - phase: "リマインダ設定"
      action: ui
      checkpoints:
        - obs: "リマインダ設定で日時項目を基準に通知日時を設定すると、設定内容が保存され通知設定一覧に表示される"
          source: ["B-6-1", "help#19710190002457"]
    - phase: "通知の必須バリデーション"
      action: ui
      checkpoints:
        - obs: "通知設定で「アクション」を未入力のまま「登録」を押すと、必須項目エラーが表示される"
          source: ["--54-1"]
    - phase: "通知先削除後の整合"
      action: ui
      checkpoints:
        - obs: "通知先に設定したユーザーを削除して設定を保存しても、他機能にエラーが発生せず保存できる"
          source: ["B-32-1"]
        - obs: "通知先に設定した組織を削除して設定を保存しても、エラーが発生しない"
          source: ["B-32-2"]
  notes: "レコード作成を契機に各通知先（ユーザー/メール/Webhook/組織）へ通知が飛ぶこと、リマインダ・必須バリデーション・通知先削除後の整合を1セッションで確認。リソースは「J10-」プレフィックス。"
- id: J11
  name: "メール配信・取込"
  priority: P2
  roles: ["master"]
  fixtures: ["fx-mail"]
  destructive: false
  scope: local
  # checkpoints合計: 12 / フェーズ数: 6
  phases:
    - phase: "メールテンプレート作成"
      setup: mcp
      action: ui
      checkpoints:
        - obs: "メール配信→メールテンプレートでテキストタイプTEXTを選び全項目入力で新規作成すると、テンプレート一覧に表示される"
          source: ["B-99-1", "help#19801803381145"]
        - obs: "テキストタイプHTMLでメールテンプレートを新規作成できる"
          source: ["B-99-2"]
        - obs: "テンプレート名・件名・本文を未入力で登録すると、それぞれ必須エラーになる"
