          source: ["help#19801890111257"]
        - obs: "配信リストとテンプレートを指定して配信すると、配信リストのアドレスへメールが届く"
          source: ["help#19801803381145"]
    - phase: "メール取り込み"
      action: ui
      checkpoints:
        - obs: "メール取り込み設定で取込先テーブルとIMAP接続条件を設定して保存すると、設定一覧に表示される"
          source: ["B-188-1", "help#19801973874073"]
        - obs: "臨時のメール取り込みを実行すると、取込メールの件名・本文が取込先テーブルのレコードとして登録される"
          source: ["B-188-2", "help#19801973874073"]
    - phase: "公開フォームからの登録"
      action: ui
      checkpoints:
        - obs: "公開フォームリンクを有効化すると、公開URLが発行される"
          source: ["help#19796387440665"]
        - obs: "公開フォームURLを未ログイン状態で開いて入力・送信すると、対象テーブルにレコードが登録される"
          source: ["B-135", "help#19764544542233"]
    - phase: "ステップメール"
      action: ui
      checkpoints:
        - obs: "ステップメール設定で配信間隔を設定すると、設定したスケジュールが配信予定一覧に表示される"
          source: ["help#19801850743577"]
  notes: "メールテンプレート/配信リスト/差し込み/配信→メール取込→公開フォーム→ステップメールを1セッションで通す。リソースは「J11-」プレフィックス。"
- id: J12
  name: "集計・可視化"
  priority: P2
  roles: ["master"]
  fixtures: ["fx-basic"]
  destructive: false
  scope: local
  # checkpoints合計: 14 / フェーズ数: 7
  phases:
    - phase: "集計の作成"
      setup: mcp
      action: ui
      checkpoints:
        - obs: "テーブルの集計設定でタイトル・集計項目を設定し保存すると、集計結果がテーブル形式で表示される"
          source: ["A-23-1", "help#19659532678553"]
        - obs: "クロス集計（行・列）を設定すると、行項目×列項目のクロス表が表示される"
          source: ["help#19659976375705"]
    - phase: "集計の絞り込み・ソート"
      action: ui
      checkpoints:
        - obs: "絞り込みタブで「空ではない」条件を設定して表示すると、条件に合致する集計結果のみ表示される"
          source: ["A-65-1", "help#19659734308633"]
