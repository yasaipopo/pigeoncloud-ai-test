- id: J1
  name: 管理者オンボーディング
  priority: P1
  roles:
    - master
  fixtures:
    - fx-org
  destructive: false
  scope: local
  phases:
    - phase: ログイン
      action: ui
      checkpoints:
        - obs: ログイン画面（/admin/login）にID入力欄・パスワード入力欄・「ログイン」ボタン・「Ver.」を含むバージョン表記が表示される
          source:
            - A-1-1
            - help#19655525782041
        - obs: マスターでログイン後、URLが /admin/dashboard を含みナビゲーションバーとサイドメニューが表示される
          source:
            - A-1-1
            - help#19655558353177
    - phase: システム利用状況の確認
      action: ui
      checkpoints:
        - obs: 「システム利用状況」画面にユーザー数・テーブル数・メール通知数の現在値が数値で表示される
          source:
            - A-7-1
            - help#19736501355801
    - phase: ユーザー追加
      action: ui
      checkpoints:
        - obs: ユーザー管理で「J1-」プレフィックスのユーザータイプ「ユーザー」を全項目入力で追加すると、ユーザー一覧に追加メールアドレスの行が表示される
          source:
            - A-2-2
            - help#19708065383321
        - obs: 氏名・メール等の必須項目を未入力で「登録」を押すと必須項目エラーが表示され追加されない
          source:
            - A-2-3
        - obs: ユーザー追加後にシステム利用状況のユーザー数表示が1増える
          source:
            - A-7-1
            - help#19736501355801
    - phase: 組織追加
      action: ui
      checkpoints:
        - obs: 組織管理で「J1-org」を必須項目入力（親組織なし）で追加すると組織一覧に表示される
          source:
            - A-5-1
            - help#19709331452697
        - obs: 親組織を選択して子組織を追加すると、組織ツリー上で親組織配下に表示される
          source:
            - A-5-2
            - help#19709331452697
    - phase: 役職追加
      action: ui
      checkpoints:
        - obs: 役職管理で「J1-役職」を新規登録すると役職一覧に追加した役職名が表示される
          source:
            - A-67-1
            - help#19709489360025
    - phase: ユーザー情報編集
      action: ui
      checkpoints:
        - obs: 自分（マスター）の氏名を変更して保存すると、ナビゲーション右上の表示名が変更後の氏名になる
          source:
            - A-3-3
            - help#19707933976601
    - phase: 操作ログの確認
      action: ui
      checkpoints:
        - obs: ログ→ログ画面に、直前のユーザー追加・組織追加の操作ログ行（操作者・日時付き）が表示される
          source:
            - A-13-1
            - help#19710092964377
    - phase: ログアウト
      action: ui
      checkpoints:
        - obs: 右上アバターから「ログアウト」を選ぶとURLが /admin/login を含みID入力欄が表示される
          source:
            - A-1-1
  notes: 1認証セッションで「初期セットアップ管理者が組織を立ち上げる」一連の流れを通す。マスターadminの認証情報は変更しない。作成リソースは全て「J1-」プレフィックス。
- id: J2
  name: テーブル設計(基本)
  priority: P1
  roles:
    - master
  fixtures: []
  destructive: false
  scope: local
  phases:
    - phase: テーブル新規作成
      action: ui
      checkpoints:
        - obs: テーブル管理「追加」から「J2-基本」テーブルを作成すると、サイドメニューとテーブル管理一覧に「J2-基本」が表示される
          source:
            - A-4-1
            - help#19660902939417
        - obs: テンプレートからテーブルを作成すると、テンプレート定義の項目が初期作成された状態でテーブルが追加される
          source:
            - A-4-3
            - help#19661724437785
    - phase: 基本項目の追加
      action: ui
      checkpoints:
        - obs: 「項目を追加する」から文字列(一行)項目「J2-氏名」を追加すると、テーブル設定のフィールド一覧に表示される
          source:
            - A-14-4
            - help#19666709590809
        - obs: 数値項目「J2-金額」を整数・桁区切りありで追加すると設定内容通り作成される
          source:
            - A-14-5
            - help#19666749123737
        - obs: 項目名を未入力で「追加する」を押すと必須項目エラーが表示され追加されない
          source:
            - A-47-1
    - phase: レイアウト設定（2列）
      action: ui
      checkpoints:
        - obs: 登録画面レイアウトを2列に設定して保存後、レコード登録画面で項目が2列で配置される
          source:
            - A-113-01
            - help#19663843714329
    - phase: フィールド編集・順番変更・削除
      action: ui
      checkpoints:
        - obs: フィールド一覧でフィールドをドラッグして順番変更し保存すると、レコード登録画面の項目順が変わる
          source:
            - A-4-4
            - help#19707349888665
        - obs: フィールドを編集して項目名を変更し保存すると、フィールド一覧の項目名が更新される
          source:
            - A-4-5
        - obs: フィールドを削除すると、フィールド一覧とレコード登録画面から該当項目が消える
          source:
            - A-4-6
    - phase: 追加オプション設定
      action: ui
      checkpoints:
        - obs: 追加オプションで一覧「1ページあたりの表示データ数」を5行に設定すると、テーブル一覧が5行単位で表示される
          source:
            - A-109-1
            - help#19707390652057
        - obs: 追加オプションで「デフォルトのソート順」をID昇順に設定すると、一覧がID昇順で表示される
          source:
            - A-109-2
    - phase: レコード追加で動作確認
      action: ui
      checkpoints:
        - obs: 「J2-基本」にレコードを1件追加すると、一覧に追加した値の行が表示される
          source:
            - A-9-1
            - help#19657963779097
    - phase: テーブル複製・JSONエクスポート
      action: ui
      checkpoints:
        - obs: テーブルの複製を実行すると、「J2-基本」の定義を引き継いだ複製テーブルが一覧に追加される
          source:
            - help#19707614354969
        - obs: テーブル設定をJSONファイルでエクスポートすると、項目定義を含むJSONがダウンロードされる
          source:
            - help#19663448575641
    - phase: テーブル削除
      action: ui
      checkpoints:
        - obs: 複製したテーブルを削除すると、サイドメニューとテーブル管理一覧から該当テーブルが消える
          source:
            - help#19661069329433
  notes: 1セッションでテーブルを作り・項目を組み・レイアウト/追加オプションを整え・複製/エクスポート/削除まで通す。リソースは「J2-」プレフィックス。
- id: J3
  name: 項目型ぜんぶ盛り
  priority: P1
  roles:
    - master
  fixtures:
    - fx-schema
  destructive: false
  scope: local
  phases:
    - phase: テキスト系項目
      setup: mcp
      action: ui
      checkpoints:
        - obs: 文字列(一行)項目を追加しレコードに値を入力すると、一覧・詳細に入力文字列が表示される
          source:
            - A-113-01
            - help#19666709590809
        - obs: 文章(複数行・通常テキスト)項目で改行を含む値を保存すると、詳細画面で改行が保持されて表示される
          source:
            - help#19685752825241
        - obs: 文章(複数行・リッチテキスト)項目で太字・箇条書きを入れて保存すると、詳細画面で書式付きで表示される
          source:
            - help#19685752825241
        - obs: 固定テキスト項目を設定すると、レコード登録画面に編集不可の固定文言が表示される
          source:
            - help#19707292147737
    - phase: 数値・日時系項目
      action: ui
      checkpoints:
        - obs: 数値(整数)項目に桁区切りありを設定し1000以上を入力すると、一覧でカンマ区切り表示される
          source:
            - A-14-5
            - help#19666749123737
        - obs: 数値(小数)項目に小数値を入力すると、設定した小数桁で表示される
          source:
            - A-14-6
            - help#19666749123737
        - obs: 日時項目で「デフォルトで現在日時」を有効化しレコード追加すると、一覧に「YYYY-MM-DD HH:MM」形式の現在日時が表示される
          source:
            - A-101-1
            - help#19666789006745
        - obs: 日付のみ項目は「YYYY-MM-DD」、時刻のみ項目は「HH:MM」形式で表示される
          source:
            - A-101-2
            - A-101-3
            - help#19666789006745
    - phase: 選択肢系項目
      action: ui
      checkpoints:
        - obs: ラジオボタン(単一選択)項目を選択肢AA,BB,CCで追加すると、レコード登録画面で単一選択UIが表示され選択値が保存される
          source:
            - A-14-7
            - help#19666791306649
        - obs: 選択肢(複数選択)項目で複数値を選択して保存すると、詳細画面に選択した複数値が表示される
          source:
            - help#19685923823641
        - obs: Yes/No項目をレコードでONにすると、一覧でON状態が表示される
          source:
            - help#19685853749145
    - phase: メディア・ファイル系項目
      action: ui
      checkpoints:
        - obs: 画像項目に画像ファイルをアップロードすると、詳細画面にサムネイルが表示される
          source:
            - help#19685978944025
        - obs: ファイル項目にPDFをアップロードすると、詳細画面にファイル名とダウンロードリンクが表示される
          source:
            - help#19685607757465
    - phase: 計算・自動採番項目
      action: ui
      checkpoints:
        - obs: '計算項目に数式（例: 金額×2）を設定すると、レコードに計算結果が自動表示される'
          source:
            - help#19685690616601
        - obs: 計算式を未入力で追加すると必須項目エラーが表示される
          source:
            - A-51-2
        - obs: 自動採番項目を設定すると、レコード追加ごとに連番が自動付与される
          source:
            - help#19666652317209
    - phase: リレーション系項目
      action: ui
      checkpoints:
        - obs: 他テーブル参照項目を設定すると、レコード登録時に参照先テーブルのレコードを選択でき、選択値が表示される
          source:
            - B-22-1
            - help#19686010433305
        - obs: 関連レコード一覧項目を設定すると、詳細画面に関連する他テーブルのレコードが一覧表示される
          source:
            - help#19707238540953
  notes: 全項目型を1テーブルに追加し、レコード登録→一覧/詳細での表示形式を確認する。中核はUI必須（API代替禁止）。リソースは「J3-」プレフィックス。
- id: J4
  name: 項目名・入力バリデーション
  priority: P2
  roles:
    - master
  fixtures: []
  destructive: false
  scope: local
  phases:
    - phase: 項目名のパディング除去
      action: ui
      checkpoints:
        - obs: 文字列(一行)項目名の前後に半角スペースを入れて保存後、再度設定を開くと半角スペースが除去された項目名で保存されている
          source:
            - A-93-1
        - obs: 項目名の前後に全角スペースを入れて保存すると、全角スペースが除去されて保存される
          source:
            - B-項目名パディング(全角)
        - obs: 項目名の前後にタブを入れて保存すると、タブが除去されて保存される
          source:
            - B-項目名パディング(タブ)
    - phase: 必須項目バリデーション
      action: ui
      checkpoints:
        - obs: 日時項目を項目名未入力で追加すると「必須項目未入力」エラーが表示される
          source:
            - A-47-1
        - obs: 計算項目を計算式未入力で追加すると必須項目エラーが表示される
          source:
            - A-51-1
            - A-51-2
    - phase: 項目の種類変更
      action: ui
      checkpoints:
        - obs: 既存の日時項目の種類を「日付のみ」へ変更して保存すると、レコード表示が変更後の日付形式になる
          source:
            - A-19-1
            - help#19707403137945
  notes: 項目名のパディング除去・必須/型バリデーションをまとめて確認する。リソースは「J4-」プレフィックス。
- id: J5
  name: レコード運用CRUD
  priority: P1
  roles:
    - master
  fixtures:
    - fx-basic
  destructive: false
  scope: local
  phases:
    - phase: レコード作成
      setup: mcp
      action: ui
      checkpoints:
        - obs: レコードを新規作成して保存すると、一覧と詳細画面に入力値が表示される
          source:
            - A-9-1
            - help#19657963779097
    - phase: 検索・絞り込み
      action: ui
      checkpoints:
        - obs: 検索キーワードを入力して検索すると一致レコードのみ一覧表示され、検索クリア後（反映を待ってから）全件に戻る
          source:
            - A-9-8
            - help#19656092667417
    - phase: 詳細・編集
      action: ui
      checkpoints:
        - obs: 一覧から詳細画面を開くと、登録した全項目の値が表示される
          source:
            - help#19655938647833
        - obs: レコードを編集して保存すると、一覧・詳細の値が更新される
          source:
            - A-9-1
    - phase: ロック
      action: ui
      checkpoints:
        - obs: レコードをロックすると、他ユーザーから編集ロック中である旨が表示される
          source:
            - help#19655994643609
    - phase: コメント・メンション
      action: ui
      checkpoints:
        - obs: レコードにコメントを登録すると詳細画面にコメントが時系列で表示され、一覧のコメントアイコンにマウスオーバーで件数と最新投稿時間が表示される
          source:
            - A-143-01
            - help#19736072126489
    - phase: 更新履歴
      action: ui
      checkpoints:
        - obs: レコードの更新履歴を開くと、編集操作の履歴（操作者・日時・変更内容）が表示される
          source:
            - help#19736138637465
    - phase: 複製
      action: ui
      checkpoints:
        - obs: レコードの複製ボタンで複製すると、値を引き継いだ新規レコードが作成される
          source:
            - A-107-01
    - phase: 一覧カスタマイズ・削除
      action: ui
      checkpoints:
        - obs: 列幅を変更して保存すると、再表示後も列幅が保持される
          source:
            - help#19657907427609
        - obs: 列を固定表示に設定すると、横スクロール時も該当列が固定される
          source:
            - help#19656339654297
        - obs: 一覧でレコードをダブルクリックすると、詳細画面が開く
          source:
            - help#19736521405593
        - obs: レコードを削除すると（反映を待ってから）一覧から該当行が消える
          source:
            - A-9-1
  notes: 1セッションでレコードの作成→検索→編集→ロック→コメント→履歴→複製→削除と一覧カスタマイズを通す。中核はUI必須。リソースは「J5-」プレフィックス。
- id: J6
  name: 一括編集・CSV入出力
  priority: P2
  roles:
    - master
  fixtures:
    - fx-basic
  destructive: false
  scope: local
  phases:
    - phase: 一括編集
      setup: mcp
      action: ui
      checkpoints:
        - obs: 一覧で複数レコードを選択し一括編集で項目値を更新すると、選択した全レコードの該当項目が同一値に更新される
          source:
            - B-180-1
            - help#19656141292825
        - obs: フィルタで絞り込んだレコードを全選択して一括編集すると、絞り込み対象のレコードのみ更新される
          source:
            - B-180-4
    - phase: CSVダウンロード
      action: ui
      checkpoints:
        - obs: レコード一覧をCSVダウンロードすると、項目をヘッダーに含むCSVファイルがダウンロードされる
          source:
            - B-148-01
            - help#19659104989721
        - obs: 並び替えをしてCSVダウンロードすると、その並び順が反映されたCSVになる
          source:
            - B-161
        - obs: 子テーブルが設定されたテーブルのCSVダウンロードに、子テーブルの情報が含まれる
          source:
            - B-148-01
    - phase: CSVアップロード
      action: ui
      checkpoints:
        - obs: 「CSVダウンロード(空)」のヘッダー付き空CSVに値を記入してアップロードすると、レコードが一括登録される
          source:
            - B-148-03
            - help#19659276546585
        - obs: 子テーブル情報を含むCSVをアップロードすると、子テーブルの情報も反映される
          source:
            - B-148-02
    - phase: CSVアップロードのエラー
      action: ui
      checkpoints:
        - obs: ヘッダー行なしのCSVをアップロードすると、インポートエラーが表示される
          source:
            - B-55-1
        - obs: CSV以外のファイルをアップロードすると、インポートエラーが表示される
          source:
            - B-55-2
  notes: 一括編集とCSVダウンロード/アップロード（正常・エラー・子テーブル）を1セッションで通す。リソースは「J6-」プレフィックス。
- id: J7
  name: テーブル権限設定
  priority: P1
  roles:
    - master
    - restricted-user
  fixtures:
    - fx-perm
  destructive: false
  scope: local
  phases:
    - phase: 権限設定の準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: MCP/debugで「J7-」プレフィックスの制限ユーザー1名と権限テスト用テーブルが作成され、ユーザー一覧・テーブル管理一覧に表示される
          source:
            - help#19666629662489
    - phase: テーブル権限設定
      action: ui
      checkpoints:
        - obs: テーブル権限設定で制限ユーザーに「閲覧のみ」を付与して保存すると、権限一覧に該当ユーザーの閲覧権限が表示される
          source:
            - B-11-? テーブル権限
            - help#46996533214617
        - obs: '制限ユーザーでログインすると（別人性: ログイン名がマスターと異なる）、権限のあるテーブルのみサイドメニューに表示され、未付与テーブルは表示されない'
          source:
            - help#19664446929177
        - obs: 閲覧のみ権限の制限ユーザーには、該当テーブルで「追加」「編集」ボタンが表示されない
          source:
            - help#27467012835481
    - phase: 項目権限設定
      action: ui
      checkpoints:
        - obs: 項目権限設定で特定項目を制限ユーザーに非表示に設定すると、制限ユーザーのレコード詳細で該当項目が表示されない
          source:
            - help#29759923226393
        - obs: 項目を編集不可に設定すると、制限ユーザーのレコード編集画面で該当項目が読み取り専用表示になる
          source:
            - help#29759923226393
    - phase: グループ権限設定
      action: ui
      checkpoints:
        - obs: グループの権限設定で制限ユーザーにグループ閲覧権限を付与すると、制限ユーザーにグループ内テーブルが表示される
          source:
            - B-155-2
            - help#19665959159833
        - obs: グループ自体の閲覧権限をOFFにすると、制限ユーザーにグループが表示されない
          source:
            - help#29756761517465
    - phase: ダッシュボード権限
      action: ui
      checkpoints:
        - obs: ダッシュボードの権限設定で制限ユーザーに特定チャートの非表示を設定すると、制限ユーザーのダッシュボードに該当チャートが出ない
          source:
            - help#19710406238105
    - phase: 権限の差分確認
      action: ui
      checkpoints:
        - obs: マスターと制限ユーザーで同一テーブルを開くと、マスターは全項目・全ボタン、制限ユーザーは制限後の項目・ボタンのみ表示され、2アカウントの表示差が確認できる（別人性）
          source:
            - help#19666629662489
  notes: '別人性必須: マスターと制限ユーザーの2アカウントで権限の効きを確認する。setup mcp で制限ユーザーを前倒し作成し、検証主操作はUI。リソースは「J7-」プレフィックス。'
- id: J8
  name: WF(申請→承認)
  priority: P1
  roles:
    - master
    - applicant
    - approver
  fixtures:
    - fx-workflow
  destructive: false
  scope: local
  phases:
    - phase: 別ロールの準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: MCP/debugで「J8-」プレフィックスの申請者・承認者2名（互いに別ユーザー）が作成され、ユーザー一覧に氏名の異なる2行が表示される
          source:
            - B-11-2
            - help#19710699416985
    - phase: ワークフロー設定
      action: ui
      checkpoints:
        - obs: 対象テーブルにワークフローを設定し承認者を指定して保存すると、テーブルでワークフロー（承認）が有効化される
          source:
            - B-11-1
            - help#19710834753945
    - phase: 申請（申請者）
      action: ui
      checkpoints:
        - obs: 申請者でログインしレコードを申請すると、ワークフロー状態が「申請中(要確認)」になる
          source:
            - B-11-2
            - help#19710702198425
        - obs: 申請者の承認状況に、申請者と異なる表示名の承認者が次の承認者として表示される（別人性）
          source:
            - B-11-2
    - phase: 承認（承認者）
      action: ui
      checkpoints:
        - obs: 承認者でログインすると（ログイン名が申請者と異なる）、承認待ち一覧に申請レコードが表示される（別人性）
          source:
            - B-11-2
            - help#19710702198425
        - obs: 承認者が「承認」するとワークフロー状態が「承認済み」になり、承認履歴に承認者の表示名と承認日時が記録される
          source:
            - B-11-2
        - obs: 承認履歴上、申請者と承認者の表示名が異なることが確認できる（別人性の必須観点）
          source:
            - B-11-2
    - phase: 否認と再申請
      action: ui
      checkpoints:
        - obs: 別レコードを承認者が「否認」すると、ワークフロー状態が「否認」になり否認コメントが表示される
          source:
            - B-11-4
        - obs: 否認されたレコードを申請者が編集して再申請すると、再び「申請中(要確認)」になる
          source:
            - B-11-4
            - B-11-7
    - phase: 通知の確認
      action: ui
      checkpoints:
        - obs: 申請時に承認者へ、承認時に申請者へ、画面上の通知（ベル/タスク通知）が表示される
          source:
            - B-11-3
            - help#19875911533849
        - obs: 申請者のタスク・通知管理画面に、承認結果（承認/否認）が通知として記録される
          source:
            - B-11-3
            - help#19875911533849
    - phase: 承認者の編集可否設定
      action: ui
      checkpoints:
        - obs: 「ワークフロー承認者はデータ編集可能」をONにすると、承認者の承認画面でレコード項目が編集可能になる
          source:
            - B-11-6
        - obs: 同設定をOFFにすると、承認者の承認画面でレコード項目が読み取り専用になる
          source:
            - B-11-6
    - phase: 申請の取り下げ
      action: ui
      checkpoints:
        - obs: 申請者が自分の申請中レコードを取り下げると状態が未申請に戻り、取り下げは申請者本人のみ可能で第三者は不可である（別人性の境界）
          source:
            - pigeon_cloud#3696
            - B-11-2
    - phase: 取り下げ時の通知とコメント
      action: ui
      checkpoints:
        - obs: '申請者が申請中レコードを取り下げる際に取り下げコメントを入力すると、承認者へ取り下げの画面通知が表示され、レコード履歴/コメントに取り下げコメントが残る（⚠️通知反映待ちを考慮・別人性: 取り下げ操作者=申請者、通知先=承認者）'
          source:
            - B-64-1
    - phase: 承認者の編集可否設定（追加対比）
      action: ui
      checkpoints:
        - obs: 「ワークフロー承認者はデータ編集可能」をON（B-11-6）にすると、承認者の承認画面でレコード項目が編集可能になる
          source:
            - B-11-6
            - B-21-1
        - obs: 同設定をOFFにすると、承認者の承認画面でレコード項目が読み取り専用（編集不可）で表示される
          source:
            - B-11-6
            - B-21-1
  notes: '別人性必須(wf-001教訓): 申請者≠承認者を別アカウントで実行し、承認履歴で表示名が異なることを観測する。中核はUI必須。リソースは「J8-」プレフィックス。'
- id: J9
  name: WF応用
  priority: P2
  roles:
    - master
    - applicant
    - approver1
    - approver2
  fixtures:
    - fx-workflow
  destructive: false
  scope: local
  phases:
    - phase: 複数承認者の準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: 「J9-」プレフィックスの申請者1名・承認者2名（B,C・互いに別ユーザー）が作成され、ユーザー一覧に氏名の異なる3行が表示される
          source:
            - B-11-3
            - help#30339369151001
    - phase: 並行承認の設定
      action: ui
      checkpoints:
        - obs: ワークフローに並行承認（BとC両方の承認が必要）を設定して保存すると、設定画面に並行承認の承認者2名が表示される
          source:
            - B-11-3
            - help#30339369151001
    - phase: 並行承認の実行
      action: ui
      checkpoints:
        - obs: '申請後、承認者B・C双方が承認するとワークフロー状態が「承認済み」になる（別人性: 申請者≠B≠C）'
          source:
            - B-11-3
        - obs: 承認者の一方が否認すると、ワークフロー状態が「否認」になる
          source:
            - B-11-3
        - obs: 申請時はBへ、Bが承認するとCへ、C承認時は申請者へ、承認順に通知が遷移する
          source:
            - B-11-3
    - phase: 順次承認ルート
      action: ui
      checkpoints:
        - obs: 直列承認ルートでは、Bの承認が完了するまでCの承認待ち一覧に表示されない
          source:
            - B-11-3
            - help#19710702198425
    - phase: ワークフローに入る条件
      action: ui
      checkpoints:
        - obs: 「ワークフローに入る条件」を金額>10000等で設定すると、条件を満たすレコードのみ申請対象になり、満たさないレコードは申請不要で登録される
          source:
            - B-11-8
            - help#30340280858521
        - obs: 条件を満たさないレコードは、ワークフロー状態欄が空（対象外）で表示される
          source:
            - help#30340280858521
    - phase: 組織での承認者指定
      action: ui
      checkpoints:
        - obs: 承認者を組織で指定すると、その組織に属するいずれかのユーザーが承認すれば承認済みになる
          source:
            - B-11-5
            - help#30339369151001
    - phase: CSVでワークフロー作成
      action: ui
      checkpoints:
        - obs: CSVアップロードでワークフローを作成すると、設定画面に取り込んだ承認ルートが反映表示される
          source:
            - help#30351561801369
    - phase: WF状態での集計絞り込み
      action: ui
      checkpoints:
        - obs: 集計の絞り込みで「ワークフローが申請中(要確認)と一致」を設定し保存すると、申請中レコードのみの集計結果が表示される
          source:
            - A-85-1
  notes: '別人性必須: 並行承認/組織承認を申請者≠承認者B≠承認者Cで実行する。リソースは「J9-」プレフィックス。'
- id: J9b
  name: WF応用2(引き上げ・一括・整合性)
  priority: P2
  roles:
    - master
    - applicant
    - approver1
    - approver2
  fixtures:
    - fx-workflow
  destructive: false
  scope: local
  phases:
    - phase: 複数ロールの準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: 「J9b-」プレフィックスの申請者1名・承認者2名（互いに別ユーザー）が作成され、ユーザー一覧に氏名の異なる3行が表示される
          source:
            - B-106
            - help#30339369151001
    - phase: 引き上げ承認（対比）
      action: ui
      checkpoints:
        - obs: 承認者を「ユーザー指定」で設定した申請に対しては、上位者が承認を引き上げて承認できる「引き上げ承認」ボタンが表示され、引き上げ承認すると承認済みになる（B-106の15→3-4圧縮）
          source:
            - B-106
        - obs: 承認者を「組織指定」で設定した申請では、引き上げ承認ボタンが表示されない（ユーザー指定との対比が核）
          source:
            - B-106
    - phase: 一括承認・否認・取り下げ・削除
      action: ui
      checkpoints:
        - obs: '承認待ち一覧で複数の申請レコードを選択して一括承認すると、選択した全件のワークフロー状態が「承認済み」になる（B-111の16→3圧縮・別人性: 承認者は申請者と別ユーザー）'
          source:
            - B-111
        - obs: 複数の申請レコードを選択して一括否認すると選択した全件が「否認」になり、申請者が複数の申請中レコードを選択して一括取り下げすると全件が未申請に戻る
          source:
            - B-111
    - phase: 役職指定の承認者解決
      action: ui
      checkpoints:
        - obs: '承認者を「組織＋役職」で指定すると、その組織でその役職を持つユーザーが承認待ち一覧に申請を持ち、当該役職者が承認すると承認済みになる（別人性: 申請者≠当該役職者）'
          source:
            - B-68
    - phase: WFフロー固定（テンプレート）
      action: ui
      checkpoints:
        - obs: ワークフローのフロー固定テンプレート（fix_flow）を設定すると、申請者がレコードを申請する際に承認者を選択する画面が出ず、テンプレート定義の承認ルートで申請が進む
          source:
            - B-21-3
            - B-68-5
            - B-68-8
    - phase: 承認済み後の再申請
      action: ui
      checkpoints:
        - obs: 再申請可能設定をONにしたワークフローで、一度承認済みになったレコードを申請者が編集して再度申請すると、再び「申請中(要確認)」になる
          source:
            - B-21-2
    - phase: 承認者削除後の表示
      action: ui
      checkpoints:
        - obs: 承認者にユーザー指定したワークフローで当該ユーザーを削除すると、承認ルート表示に削除済みユーザーの氏名がそのまま残って表示される（B-28-1/B-28-3）
          source:
            - B-28-1
            - B-28-3
        - obs: 承認者に組織指定したワークフローで当該組織を削除すると、承認ルート表示に「!削除された組織!(XX)」の形式で表示される（B-28-2/B-28-4）
          source:
            - B-28-2
            - B-28-4
    - phase: 自分自身が承認者に含まれる
      action: ui
      checkpoints:
        - obs: 申請者自身が承認者（または承認組織）に含まれるワークフローで申請すると、自分の承認待ちには自分の申請が出る/出ない等の仕様通りに表示され、承認フローが破綻せず完了できる
          source:
            - B-166
  notes: '別人性必須: 申請者≠承認者・複数承認者は互いに別ユーザー。引き上げ承認はユーザー指定/組織指定の対比が核（B-106）。一括操作はB-111、役職指定はB-68を圧縮。承認者削除後の表示文言（削除済み氏名残り/「!削除された組織!(XX)」）を必ず観測。検証主操作はUI。リソースは「J9b-」プレフィックス。'
- id: J10
  name: 通知設定
  priority: P2
  roles:
    - master
  fixtures:
    - fx-notify
  destructive: false
  scope: local
  phases:
    - phase: 通知設定の準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: 「J10-」プレフィックスの通知先テーブルと通知先ユーザー1名が作成され、一覧に表示される
          source:
            - B-6-1
            - help#19710190002457
    - phase: ユーザー宛通知
      action: ui
      checkpoints:
        - obs: 通知設定で通知先にユーザーを指定し、対象テーブルにレコードを作成すると、指定ユーザーへ画面通知が表示される
          source:
            - B-6-1
            - help#19710190002457
    - phase: メールアドレス宛通知
      action: ui
      checkpoints:
        - obs: 通知先メールアドレスを設定しレコードを作成すると、設定したメールアドレスへ通知メールが届く
          source:
            - B-6-1
            - help#19710190002457
        - obs: メール通知をtext形式にする設定を有効にすると、通知メールがテキスト形式で届く
          source:
            - help#26118050758937
    - phase: Webhook通知
      action: ui
      checkpoints:
        - obs: 通知先にWebhook URLを設定しレコードを作成すると、Webhook受信先にレコード情報を含むPOSTが届く
          source:
            - B-6-2
            - help#42015967824409
    - phase: 組織宛通知
      action: ui
      checkpoints:
        - obs: 通知先に組織を設定しレコードを作成すると、その組織所属ユーザーへ通知が行われる
          source:
            - B-6-5
    - phase: リマインダ設定
      action: ui
      checkpoints:
        - obs: リマインダ設定で日時項目を基準に通知日時を設定すると、設定内容が保存され通知設定一覧に表示される
          source:
            - B-6-1
            - help#19710190002457
    - phase: 通知の必須バリデーション
      action: ui
      checkpoints:
        - obs: 通知設定で「アクション」を未入力のまま「登録」を押すと、必須項目エラーが表示される
          source:
            - '--54-1'
    - phase: 通知先削除後の整合
      action: ui
      checkpoints:
        - obs: 通知先に設定したユーザーを削除して設定を保存しても、他機能にエラーが発生せず保存できる
          source:
            - B-32-1
        - obs: 通知先に設定した組織を削除して設定を保存しても、エラーが発生しない
          source:
            - B-32-2
  notes: レコード作成を契機に各通知先（ユーザー/メール/Webhook/組織）へ通知が飛ぶこと、リマインダ・必須バリデーション・通知先削除後の整合を1セッションで確認。リソースは「J10-」プレフィックス。
