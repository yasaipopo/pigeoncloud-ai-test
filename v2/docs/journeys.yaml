            - help#19801850743577
  notes: メールテンプレート/配信リスト/差し込み/配信→メール取込→公開フォーム→ステップメールを1セッションで通す。リソースは「J11-」プレフィックス。
- id: J12
  name: 集計・可視化
  priority: P2
  roles:
    - master
  fixtures:
    - fx-basic
  destructive: false
  scope: local
  phases:
    - phase: 集計の作成
      setup: mcp
      action: ui
      checkpoints:
        - obs: テーブルの集計設定でタイトル・集計項目を設定し保存すると、集計結果がテーブル形式で表示される
          source:
            - A-23-1
            - help#19659532678553
        - obs: クロス集計（行・列）を設定すると、行項目×列項目のクロス表が表示される
          source:
            - help#19659976375705
    - phase: 集計の絞り込み・ソート
      action: ui
      checkpoints:
        - obs: 絞り込みタブで「空ではない」条件を設定して表示すると、条件に合致する集計結果のみ表示される
          source:
            - A-65-1
            - help#19659734308633
        - obs: ソート順を設定してカスタムフィルターに保存すると、保存した並び順で集計結果が表示される
          source:
