- id: J1
  name: 管理者オンボーディング
  priority: P1
  roles:
    - master
  fixtures:
    - fx-org
  destructive: false
  scope: local
  phases:
    - phase: ログイン
      action: ui
      checkpoints:
        - obs: ログイン画面（/admin/login）にID入力欄・パスワード入力欄・「ログイン」ボタン・「Ver.」を含むバージョン表記が表示される
          source:
            - A-1-1
            - help#19655525782041
        - obs: マスターでログイン後、URLが /admin/dashboard を含みナビゲーションバーとサイドメニューが表示される
          source:
            - A-1-1
            - help#19655558353177
    - phase: システム利用状況の確認
      action: ui
      checkpoints:
        - obs: 「システム利用状況」画面にユーザー数・テーブル数・メール通知数の現在値が数値で表示される
          source:
            - A-7-1
            - help#19736501355801
    - phase: ユーザー追加
      action: ui
      checkpoints:
        - obs: ユーザー管理で「J1-」プレフィックスのユーザータイプ「ユーザー」を全項目入力で追加すると、ユーザー一覧に追加メールアドレスの行が表示される
          source:
            - A-2-2
            - help#19708065383321
        - obs: 氏名・メール等の必須項目を未入力で「登録」を押すと必須項目エラーが表示され追加されない
          source:
            - A-2-3
        - obs: ユーザー追加後にシステム利用状況のユーザー数表示が1増える
          source:
            - A-7-1
            - help#19736501355801
    - phase: 組織追加
      action: ui
      checkpoints:
        - obs: 組織管理で「J1-org」を必須項目入力（親組織なし）で追加すると組織一覧に表示される
          source:
            - A-5-1
            - help#19709331452697
        - obs: 親組織を選択して子組織を追加すると、組織ツリー上で親組織配下に表示される
          source:
            - A-5-2
            - help#19709331452697
    - phase: 役職追加
      action: ui
      checkpoints:
        - obs: 役職管理で「J1-役職」を新規登録すると役職一覧に追加した役職名が表示される
          source:
            - A-67-1
            - help#19709489360025
    - phase: ユーザー情報編集
      action: ui
      checkpoints:
        - obs: 自分（マスター）の氏名を変更して保存すると、ナビゲーション右上の表示名が変更後の氏名になる
          source:
            - A-3-3
            - help#19707933976601
    - phase: 操作ログの確認
      action: ui
      checkpoints:
        - obs: ログ→ログ画面に、直前のユーザー追加・組織追加の操作ログ行（操作者・日時付き）が表示される
          source:
            - A-13-1
            - help#19710092964377
    - phase: ログアウト
      action: ui
      checkpoints:
        - obs: 右上アバターから「ログアウト」を選ぶとURLが /admin/login を含みID入力欄が表示される
          source:
            - A-1-1
  notes: 1認証セッションで「初期セットアップ管理者が組織を立ち上げる」一連の流れを通す。マスターadminの認証情報は変更しない。作成リソースは全て「J1-」プレフィックス。
- id: J2
  name: テーブル設計(基本)
  priority: P1
  roles:
    - master
  fixtures: []
  destructive: false
  scope: local
  phases:
    - phase: テーブル新規作成
      action: ui
      checkpoints:
        - obs: テーブル管理「追加」から「J2-基本」テーブルを作成すると、サイドメニューとテーブル管理一覧に「J2-基本」が表示される
          source:
            - A-4-1
            - help#19660902939417
        - obs: テンプレートからテーブルを作成すると、テンプレート定義の項目が初期作成された状態でテーブルが追加される
          source:
            - A-4-3
            - help#19661724437785
    - phase: 基本項目の追加
      action: ui
      checkpoints:
        - obs: 「項目を追加する」から文字列(一行)項目「J2-氏名」を追加すると、テーブル設定のフィールド一覧に表示される
          source:
            - A-14-4
            - help#19666709590809
        - obs: 数値項目「J2-金額」を整数・桁区切りありで追加すると設定内容通り作成される
          source:
            - A-14-5
            - help#19666749123737
        - obs: 項目名を未入力で「追加する」を押すと必須項目エラーが表示され追加されない
          source:
            - A-47-1
    - phase: レイアウト設定（2列）
      action: ui
      checkpoints:
        - obs: 登録画面レイアウトを2列に設定して保存後、レコード登録画面で項目が2列で配置される
          source:
            - A-113-01
            - help#19663843714329
    - phase: フィールド編集・順番変更・削除
      action: ui
      checkpoints:
        - obs: フィールド一覧でフィールドをドラッグして順番変更し保存すると、レコード登録画面の項目順が変わる
          source:
            - A-4-4
            - help#19707349888665
        - obs: フィールドを編集して項目名を変更し保存すると、フィールド一覧の項目名が更新される
          source:
            - A-4-5
        - obs: フィールドを削除すると、フィールド一覧とレコード登録画面から該当項目が消える
          source:
            - A-4-6
    - phase: 追加オプション設定
      action: ui
      checkpoints:
        - obs: 追加オプションで一覧「1ページあたりの表示データ数」を5行に設定すると、テーブル一覧が5行単位で表示される
          source:
            - A-109-1
            - help#19707390652057
        - obs: 追加オプションで「デフォルトのソート順」をID昇順に設定すると、一覧がID昇順で表示される
          source:
            - A-109-2
    - phase: レコード追加で動作確認
      action: ui
      checkpoints:
        - obs: 「J2-基本」にレコードを1件追加すると、一覧に追加した値の行が表示される
          source:
            - A-9-1
            - help#19657963779097
    - phase: テーブル複製・JSONエクスポート
      action: ui
      checkpoints:
        - obs: テーブルの複製を実行すると、「J2-基本」の定義を引き継いだ複製テーブルが一覧に追加される
          source:
            - help#19707614354969
        - obs: テーブル設定をJSONファイルでエクスポートすると、項目定義を含むJSONがダウンロードされる
          source:
            - help#19663448575641
    - phase: テーブル削除
      action: ui
      checkpoints:
        - obs: 複製したテーブルを削除すると、サイドメニューとテーブル管理一覧から該当テーブルが消える
          source:
            - help#19661069329433
  notes: 1セッションでテーブルを作り・項目を組み・レイアウト/追加オプションを整え・複製/エクスポート/削除まで通す。リソースは「J2-」プレフィックス。
- id: J3
  name: 項目型ぜんぶ盛り
  priority: P1
  roles:
    - master
  fixtures:
    - fx-schema
  destructive: false
  scope: local
  phases:
    - phase: テキスト系項目
      setup: mcp
      action: ui
      checkpoints:
        - obs: 文字列(一行)項目を追加しレコードに値を入力すると、一覧・詳細に入力文字列が表示される
          source:
            - A-113-01
            - help#19666709590809
        - obs: 文章(複数行・通常テキスト)項目で改行を含む値を保存すると、詳細画面で改行が保持されて表示される
          source:
            - help#19685752825241
        - obs: 文章(複数行・リッチテキスト)項目で太字・箇条書きを入れて保存すると、詳細画面で書式付きで表示される
          source:
            - help#19685752825241
        - obs: 固定テキスト項目を設定すると、レコード登録画面に編集不可の固定文言が表示される
          source:
            - help#19707292147737
    - phase: 数値・日時系項目
      action: ui
      checkpoints:
        - obs: 数値(整数)項目に桁区切りありを設定し1000以上を入力すると、一覧でカンマ区切り表示される
          source:
            - A-14-5
            - help#19666749123737
        - obs: 数値(小数)項目に小数値を入力すると、設定した小数桁で表示される
          source:
            - A-14-6
            - help#19666749123737
        - obs: 日時項目で「デフォルトで現在日時」を有効化しレコード追加すると、一覧に「YYYY-MM-DD HH:MM」形式の現在日時が表示される
          source:
            - A-101-1
            - help#19666789006745
        - obs: 日付のみ項目は「YYYY-MM-DD」、時刻のみ項目は「HH:MM」形式で表示される
          source:
            - A-101-2
            - A-101-3
            - help#19666789006745
    - phase: 選択肢系項目
      action: ui
      checkpoints:
        - obs: ラジオボタン(単一選択)項目を選択肢AA,BB,CCで追加すると、レコード登録画面で単一選択UIが表示され選択値が保存される
          source:
            - A-14-7
            - help#19666791306649
        - obs: 選択肢(複数選択)項目で複数値を選択して保存すると、詳細画面に選択した複数値が表示される
          source:
            - help#19685923823641
        - obs: Yes/No項目をレコードでONにすると、一覧でON状態が表示される
          source:
            - help#19685853749145
    - phase: メディア・ファイル系項目
      action: ui
      checkpoints:
        - obs: 画像項目に画像ファイルをアップロードすると、詳細画面にサムネイルが表示される
          source:
            - help#19685978944025
        - obs: ファイル項目にPDFをアップロードすると、詳細画面にファイル名とダウンロードリンクが表示される
          source:
            - help#19685607757465
    - phase: 計算・自動採番項目
      action: ui
      checkpoints:
        - obs: '計算項目に数式（例: 金額×2）を設定すると、レコードに計算結果が自動表示される'
          source:
            - help#19685690616601
        - obs: 計算式を未入力で追加すると必須項目エラーが表示される
          source:
            - A-51-2
        - obs: 自動採番項目を設定すると、レコード追加ごとに連番が自動付与される
          source:
            - help#19666652317209
    - phase: リレーション系項目
      action: ui
      checkpoints:
        - obs: 他テーブル参照項目を設定すると、レコード登録時に参照先テーブルのレコードを選択でき、選択値が表示される
          source:
            - B-22-1
            - help#19686010433305
        - obs: 関連レコード一覧項目を設定すると、詳細画面に関連する他テーブルのレコードが一覧表示される
          source:
            - help#19707238540953
  notes: 全項目型を1テーブルに追加し、レコード登録→一覧/詳細での表示形式を確認する。中核はUI必須（API代替禁止）。リソースは「J3-」プレフィックス。
- id: J4
  name: 項目名・入力バリデーション
  priority: P2
  roles:
    - master
  fixtures: []
  destructive: false
  scope: local
  phases:
    - phase: 項目名のパディング除去
      action: ui
      checkpoints:
        - obs: 文字列(一行)項目名の前後に半角スペースを入れて保存後、再度設定を開くと半角スペースが除去された項目名で保存されている
          source:
            - A-93-1
        - obs: 項目名の前後に全角スペースを入れて保存すると、全角スペースが除去されて保存される
          source:
            - B-項目名パディング(全角)
        - obs: 項目名の前後にタブを入れて保存すると、タブが除去されて保存される
          source:
            - B-項目名パディング(タブ)
    - phase: 必須項目バリデーション
      action: ui
      checkpoints:
        - obs: 日時項目を項目名未入力で追加すると「必須項目未入力」エラーが表示される
          source:
            - A-47-1
        - obs: 計算項目を計算式未入力で追加すると必須項目エラーが表示される
          source:
            - A-51-1
            - A-51-2
    - phase: 項目の種類変更
      action: ui
      checkpoints:
        - obs: 既存の日時項目の種類を「日付のみ」へ変更して保存すると、レコード表示が変更後の日付形式になる
          source:
            - A-19-1
            - help#19707403137945
  notes: 項目名のパディング除去・必須/型バリデーションをまとめて確認する。リソースは「J4-」プレフィックス。
- id: J5
  name: レコード運用CRUD
  priority: P1
  roles:
    - master
  fixtures:
    - fx-basic
  destructive: false
  scope: local
  phases:
    - phase: レコード作成
      setup: mcp
      action: ui
      checkpoints:
        - obs: レコードを新規作成して保存すると、一覧と詳細画面に入力値が表示される
          source:
            - A-9-1
            - help#19657963779097
    - phase: 検索・絞り込み
      action: ui
      checkpoints:
        - obs: 検索キーワードを入力して検索すると一致レコードのみ一覧表示され、検索クリア後（反映を待ってから）全件に戻る
          source:
            - A-9-8
            - help#19656092667417
    - phase: 詳細・編集
      action: ui
      checkpoints:
        - obs: 一覧から詳細画面を開くと、登録した全項目の値が表示される
          source:
            - help#19655938647833
        - obs: レコードを編集して保存すると、一覧・詳細の値が更新される
          source:
            - A-9-1
    - phase: ロック
      action: ui
      checkpoints:
        - obs: レコードをロックすると、他ユーザーから編集ロック中である旨が表示される
          source:
            - help#19655994643609
    - phase: コメント・メンション
      action: ui
      checkpoints:
        - obs: レコードにコメントを登録すると詳細画面にコメントが時系列で表示され、一覧のコメントアイコンにマウスオーバーで件数と最新投稿時間が表示される
          source:
            - A-143-01
            - help#19736072126489
    - phase: 更新履歴
      action: ui
      checkpoints:
        - obs: レコードの更新履歴を開くと、編集操作の履歴（操作者・日時・変更内容）が表示される
          source:
            - help#19736138637465
    - phase: 複製
      action: ui
      checkpoints:
        - obs: レコードの複製ボタンで複製すると、値を引き継いだ新規レコードが作成される
          source:
            - A-107-01
    - phase: 一覧カスタマイズ・削除
      action: ui
      checkpoints:
        - obs: 列幅を変更して保存すると、再表示後も列幅が保持される
          source:
            - help#19657907427609
        - obs: 列を固定表示に設定すると、横スクロール時も該当列が固定される
          source:
            - help#19656339654297
        - obs: 一覧でレコードをダブルクリックすると、詳細画面が開く
          source:
            - help#19736521405593
        - obs: レコードを削除すると（反映を待ってから）一覧から該当行が消える
          source:
            - A-9-1
  notes: 1セッションでレコードの作成→検索→編集→ロック→コメント→履歴→複製→削除と一覧カスタマイズを通す。中核はUI必須。リソースは「J5-」プレフィックス。
- id: J5b
  name: レコード運用2（検索・絞り込み・ソート・ビュー・ページング）
  priority: P2
  roles:
    - master
  fixtures:
    - fx-basic
  destructive: false
  scope: local
  phases:
    - phase: 検索の正規化（かな・全半角の区別なし）
      setup: mcp
      action: ui
      checkpoints:
        - obs: 一覧上部の虫眼鏡アイコンから「ピジョン」で検索すると、表記の異なる「ぴじょん」「ピジョン」「ﾋﾟｼﾞｮﾝ」の3レコードが全て一致して一覧に表示される（ひらがな/全角カナ/半角カナを区別せず検索）
          source:
            - help#19656092667417
            - A-9-8
        - obs: 半角「123」で検索すると全角「１２３」のレコードも一致して表示される（全角/半角数字を区別しない）
          source:
            - help#19656092667417
    - phase: 0件ヒット時の表示と全件復帰
      action: ui
      checkpoints:
        - obs: どのレコードにも一致しないキーワード（例：J5b-ZZZNOHIT）で検索すると、一覧に1件も表示されず0件状態になる（曖昧語禁止のため「該当の行が表示されない＝表示件数0」を観測。0件メッセージ文言は要マニュアル確認）
          source:
            - help#19656092667417
            - 要マニュアル確認
        - obs: 検索キーワードをクリアすると（反映を待ってから）一覧が検索前の全件表示に戻る
          source:
            - help#19656092667417
            - A-9-8
    - phase: 絞り込み（複数条件・詳細検索）
      action: ui
      checkpoints:
        - obs: 虫眼鏡（フィルタ/集計）の絞り込みタブで「条件を追加」を使い2件の条件（例：金額が空でない＋金額が100以上）を設定し「表示」すると、両条件を満たすレコードのみ一覧に絞り込まれる（複数条件＝全条件成立で絞り込み。AND/OR厳密仕様は要マニュアル確認）
          source:
            - help#19656092667417
            - 要マニュアル確認
        - obs: 日時項目で相対値（例：今日以降）の絞り込み条件を設定して表示すると、条件に合致する日時のレコードのみが一覧表示される
          source:
            - 151-1
            - help#19656092667417
    - phase: ビュー作成（列の表示/非表示・並び順・一覧反映）
      action: ui
      checkpoints:
        - obs: ビュー作成の項目タブで特定項目を非表示エリアへドラッグして保存し一覧へ反映すると、その列が一覧から消える（再度表示エリアに戻すと列が復帰する）
          source:
            - help#27395046258969
        - obs: ビュー作成の並び順タブで「金額：降順」を1件追加して一覧へ反映すると、一覧が金額の大きい順に並ぶ
          source:
            - help#27395046258969
        - obs: 並び順タブで2件（例：金額：降順→ID：昇順）を登録して反映すると、金額が同値のレコード同士はID昇順で並ぶ（複数項目ソートの第2キーが効く）
          source:
            - help#27395046258969
    - phase: デフォルトビューの適用
      action: ui
      checkpoints:
        - obs: ビューのデフォルト設定タブで「全てのユーザーのデフォルトにする」にチェックして保存すると、次回テーブルを開いた時に当該ビュー（列構成・並び順）が初期表示として適用される
          source:
            - help#27395046258969
            - '200'
    - phase: ページング
      action: ui
      checkpoints:
        - obs: 追加オプションで1ページあたりの表示データ数を5件に設定したテーブルに6件以上レコードを用意すると、一覧下部にページ送り（ページネーション）が表示され、現在ページには5件のみ表示される
          source:
            - A-109-1
            - help#19707390652057
        - obs: ページネーションで2ページ目に移動すると、1ページ目に出ていなかった残りのレコードが表示される
          source:
            - A-109-1
            - help#19707390652057
  notes: J5(レコード運用CRUD)で未カバーの検索正規化・0件表示・複数条件絞り込み・ビュー(列表示/並び順)・デフォルトビュー・ページングを1セッションで通す。検索→クリア→絞り込み等の非同期反映は「反映を待ってから」観測する（偽FAIL防止）。デフォルトソート単体(A-109-2)はJ2でカバー済みのため本ジャーニーは複数項目ソート(第2キー)を観点にする。リソースは「J5b-」プレフィックス。
- id: J5c
  name: レコード運用3（編集ロック・ファイル添付・コメント/メンション）
  priority: P1
  roles:
    - master
    - second-user
  fixtures:
    - fx-perm
  destructive: false
  scope: local
  phases:
    - phase: 別ユーザーの準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: MCP/debugで「J5c-」プレフィックスの第2ユーザー1名（マスターと別人）とレコード素地が作成され、ユーザー一覧にマスターと異なる氏名の行が表示される
          source:
            - help#19655994643609
    - phase: 編集ロックの取得と他ユーザー視点（別人性）
      action: ui
      checkpoints:
        - obs: マスターがレコードの編集画面を開いて編集中にすると当該レコードがロックされ、一覧/詳細の左側にロックアイコンが表示される
          source:
            - help#19655994643609
        - obs: 第2ユーザー（ログイン名がマスターと異なる別人性）で同じレコードを開くと、左側にロックアイコンが表示され、編集（保存）操作ができない（編集導線が無効化される）
          source:
            - help#19655994643609
            - B-180-3
    - phase: ロックの解除（マスターのみ・別人性）
      action: ui
      checkpoints:
        - obs: 第2ユーザー（別人）のロックレコード画面には、ロック解除アイコン/導線が表示されない（解除はマスターのみ可能の境界）
          source:
            - help#19655994643609
        - obs: マスターでログインしロックアイコンをクリック→確認ポップアップで「はい」を選ぶと（反映を待ってから）ロックが解除され、一覧/詳細からロックアイコンが消える
          source:
            - help#19655994643609
    - phase: ファイル添付（複数・画像/PDF アップロード）
      action: ui
      checkpoints:
        - obs: 複数ファイル可に設定したファイル項目に、画像1点とPDF1点をドラッグ&ドロップ（またはクリックでファイル選択）でアップロードすると、プログレスバー進行後に2ファイルのファイル名が表示されて保存できる
          source:
            - help#50000000000001
            - 108-1
        - obs: 保存後のレコード詳細・一覧で（サムネイル生成の反映を待ってから）、画像ファイルはサムネイル（縮小画像）が表示される
          source:
            - help#50000000000002
            - 108-1
    - phase: ファイルのプレビュー・ダウンロード・ZIP取得
      action: ui
      checkpoints:
        - obs: 詳細画面で画像/PDFのファイル名リンクをクリックすると、新しいタブでブラウザ内プレビュー表示される
          source:
            - help#50000000000002
        - obs: 複数ファイルを添付した項目の「ZIP」アイコンをクリックするとZIPファイルがダウンロードされ、解凍するとアップロードした全ファイルが含まれている
          source:
            - 108-1
            - help#50000000000002
        - obs: マスターが添付済みファイル2点のうち1点を削除して保存すると（反映を待ってから）、詳細・一覧の該当項目から削除したファイルのみが消え、残り1点は表示されたまま残る
          source:
            - '257'
            - help#50000000000001
    - phase: コメントとメンション通知（別人性）
      action: ui
      checkpoints:
        - obs: レコード詳細の右上コメントアイコンからコメントを入力し「送信」すると、コメントが詳細画面に時系列で表示される
          source:
            - help#19736072126489
            - A-143-01
        - obs: 'コメント欄で「@」を入力して第2ユーザー（マスターと別人）を指定して送信すると、第2ユーザーでログインした際にメンション通知が届いている（別人性: 通知先=第2ユーザー、送信者=マスターで氏名が異なる。⚠️通知の反映待ちを考慮）'
          source:
            - 69-1
            - help#19736072126489
        - obs: 実在しないユーザー名で「@」メンションして送信しても誰にも通知されず、コメント自体は通常どおり保存・表示される
          source:
            - 69-3
            - help#19736072126489
    - phase: コメント削除は送信者のみ（別人性の境界）
      action: ui
      checkpoints:
        - obs: マスターが投稿したコメントには、マスター本人の画面でごみ箱アイコンが表示されクリックで削除できる
          source:
            - help#19736072126489
        - obs: 同じコメントを第2ユーザー（別人）で見ると、ごみ箱（削除）アイコンが表示されず削除できない（コメント削除は送信者のみ可能の境界を別人性で確認）
          source:
            - help#19736072126489
  notes: '別人性必須: 編集ロック中の他ユーザー視点・メンション通知先・コメント削除権限を、マスターと別人の第2ユーザー2アカウントで確認する。第2ユーザーはMCP/debugで前倒し作成し、検証主操作（ファイルUP/プレビュー/コメント/メンション/ロック解除）は全てUI（ファイルアップロードはUI専用・MCP不可）。J3で単一画像/PDFの項目型表示は済のため、本ジャーニーは複数ファイル+ZIP+プレビューと、ロック/メンション/削除の別人性を観点にする。非同期(メンション通知/ロック反映)は反映待ち。リソースは「J5c-」プレフィックス。'
- id: J6
  name: 一括編集・CSV入出力
  priority: P2
  roles:
    - master
  fixtures:
    - fx-basic
  destructive: false
  scope: local
  phases:
    - phase: 一括編集
      setup: mcp
      action: ui
      checkpoints:
        - obs: 一覧で複数レコードを選択し一括編集で項目値を更新すると、選択した全レコードの該当項目が同一値に更新される
          source:
            - B-180-1
            - help#19656141292825
        - obs: フィルタで絞り込んだレコードを全選択して一括編集すると、絞り込み対象のレコードのみ更新される
          source:
            - B-180-4
    - phase: CSVダウンロード
      action: ui
      checkpoints:
        - obs: レコード一覧をCSVダウンロードすると、項目をヘッダーに含むCSVファイルがダウンロードされる
          source:
            - B-148-01
            - help#19659104989721
        - obs: 並び替えをしてCSVダウンロードすると、その並び順が反映されたCSVになる
          source:
            - B-161
        - obs: 子テーブルが設定されたテーブルのCSVダウンロードに、子テーブルの情報が含まれる
          source:
            - B-148-01
    - phase: CSVアップロード
      action: ui
      checkpoints:
        - obs: 「CSVダウンロード(空)」のヘッダー付き空CSVに値を記入してアップロードすると、レコードが一括登録される
          source:
            - B-148-03
            - help#19659276546585
        - obs: 子テーブル情報を含むCSVをアップロードすると、子テーブルの情報も反映される
          source:
            - B-148-02
    - phase: CSVアップロードのエラー
      action: ui
      checkpoints:
        - obs: ヘッダー行なしのCSVをアップロードすると、インポートエラーが表示される
          source:
            - B-55-1
        - obs: CSV以外のファイルをアップロードすると、インポートエラーが表示される
          source:
            - B-55-2
  notes: 一括編集とCSVダウンロード/アップロード（正常・エラー・子テーブル）を1セッションで通す。リソースは「J6-」プレフィックス。
- id: J6b
  name: 一括操作2（編集モード・全選択一括編集・一括削除・CSVオプション）
  priority: P2
  roles:
    - master
  fixtures:
    - fx-basic
  destructive: true
  scope: local
  phases:
    - phase: 一括編集の準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: MCP/debugで「J6b-」プレフィックスのテーブルに複数件（例：5件）のレコードが用意され、一覧に5行表示される
          source:
            - help#19656141292825
    - phase: 全選択での一括編集（ヘッダーチェックボックス）
      action: ui
      checkpoints:
        - obs: 一覧左上の項目名横のチェックボックス（全選択）にチェックを入れるとテーブル内の全レコードにチェックが入り、一括編集を実行して項目値を更新すると（反映を待ってから）全件の該当項目が同一値に更新される
          source:
            - help#19656141292825
            - B-180-1
    - phase: 編集モード（一覧でのインライン複数編集）
      action: ui
      checkpoints:
        - obs: 一覧画面左上の「編集モード」をクリックすると一覧上でセルを直接編集できる状態になり、複数レコードの値を編集して保存すると（反映を待ってから）一覧・詳細に編集後の値が表示される
          source:
            - help#19656141292825
        - obs: 子テーブル（子レコード）のテーブルでは、一覧左上の三本線メニューに「一括編集」「編集モード」が表示されない（子テーブルは一括編集・編集モード非対応）
          source:
            - help#19656141292825
    - phase: 選択レコードの一括削除（件数表示・チェック解除）
      action: ui
      checkpoints:
        - obs: 一覧でレコード左端のチェックボックスを複数チェックすると、連動して「一括削除」ボタンと選択件数が表示される
          source:
            - 167-1
        - obs: チェックを外すと選択件数が減り、全て外すと「一括削除」ボタンが消える（選択状態と削除導線が連動）
          source:
            - 167-1
        - obs: 2件を選択して一括削除を実行すると（反映を待ってから）選択した2件のみが一覧から消え、未選択のレコードは残る
          source:
            - 167-1
            - A-9-1
    - phase: CSVアップロードのオプション（必須項目空の許可）
      action: ui
      checkpoints:
        - obs: テーブル編集の「アップロード時、必須項目が空の状態でも許可」をONにして必須項目が空のCSVをアップロードすると、インポートエラーにならず取込完了し（反映を待ってから）CSV行数分のレコードが一覧に追加される（必須項目は空のまま保存される）
          source:
            - 193-1
        - obs: 同オプションをOFFにして必須項目が空のCSVをアップロードすると、インポートエラーが表示され取り込まれない（一覧の件数が増えない）
          source:
            - 193-2
        - obs: CSVダウンロードで取得したヘッダー付き空CSVに値を記入し、文字コードを変えず（同じエンコーディングのまま）アップロードすると文字化けせずに取り込まれる（対応エンコーディングの詳細は要マニュアル確認）
          source:
            - B-148-03
            - 要マニュアル確認
        - obs: 既存レコードのID列を含むCSVで一部項目の値を変更してアップロードすると、新規行が増えずに当該IDの既存レコードが更新される（キー一致での更新・反映を待ってから一覧で確認）
          source:
            - 113-22
            - help#19659104989721
    - phase: CSVダウンロードのオプション（現在のフィルタ・並び順反映）
      action: ui
      checkpoints:
        - obs: 一覧を絞り込み（フィルタ適用）した状態で「CSVに現在のフィルタを反映する」をONにしてCSVダウンロードすると、絞り込み後のレコードのみがCSVに出力される
          source:
            - 164-1
            - B-161
        - obs: 数値・計算項目で桁区切り（カンマ区切り）をONに設定したテーブルをCSVダウンロードすると、該当データにカンマが付与された値で出力される
          source:
            - '231'
    - phase: 全データ一括削除（destructive・専用テーブル）
      action: ui
      checkpoints:
        - obs: テーブル管理→追加オプション設定で「メニューに『全てのデータを削除』を表示」を有効化して更新すると、対象テーブルの左上メニューに「全てのデータを削除」が表示される
          source:
            - help#19659487514009
        - obs: 左上メニューの「全てのデータを削除」を実行すると（反映を待ってから）当該テーブルの全レコードが一覧から消え0件になる（⚠️destructive・復旧不可。J6b専用テーブルで実施しチェーン最後尾に置く）
          source:
            - help#19659487514009
  notes: 'destructive: 全データ一括削除フェーズは対象テーブルのレコードを全消去するため、J6b専用テーブルで実施しチェーン最後尾に置く（他フェーズで使うテーブルとは別テーブルにする）。J6(一括編集選択/フィルタ中・CSV基本)で未カバーの「全選択(ヘッダーチェック)」「編集モード(インライン)」「選択レコードの一括削除＋件数表示/チェック解除」「CSVオプション(必須空許可ON/OFF・フィルタ反映・カンマ区切り)」「全データ一括削除」を観点にする。非同期反映(一括更新/一括削除/全削除)は「反映を待ってから」観測。検証主操作はUI(CSVアップロードはファイル選択UI)。リソースは「J6b-」プレフィックス。'
- id: J7
