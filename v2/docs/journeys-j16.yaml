- id: J16
  name: UI動的表示制御（表示条件・必須条件・計算・回帰）
  priority: P1
  roles:
    - master
    - restricted-user
  fixtures:
    - fx-schema
    - fx-perm
  destructive: false
  scope: local
  phases:
    - phase: 表示条件の基本（値変更で表示/非表示）
      setup: mcp
      action: ui
      checkpoints:
        - obs: レコード編集で条件元項目A（選択肢）を「対象外の値」に変えると条件項目Bがフォームから消えて非表示になり、Aを「条件一致の値」に戻すとページ再読込なしでBがリアルタイムに再表示される
          source:
            - help#19666709590809
            - B-231
        - obs: A=対象外でBが非表示の状態のまま保存すると一覧・詳細にBが出ず、A=一致で保存するとBの入力値が一覧・詳細に表示される
          source:
            - help#19666709590809
    - phase: 表示条件の複合（複数条件）
      action: ui
      checkpoints:
        - obs: Bに表示条件を2件設定したテーブルで、両条件を満たすとBが表示され、片方の条件を満たさない値に変えるとBがリアルタイムに非表示になる（複数条件＝全条件成立で表示。AND/OR厳密仕様は要マニュアル確認）
          source:
            - help#19666709590809
            - 要マニュアル確認
    - phase: 自己言及型の表示条件（ID＝ID）
      setup: mcp
      action: ui
      checkpoints:
        - obs: 表示する条件を「ID」＝「ID」とした自己言及型の関連レコード一覧項目を持つテーブルで、レコード詳細を開くと当該項目がバグ表示・エラーにならず関連レコード一覧が描画される
          source:
            - help#19707238540953
            - B-14-26
    - phase: 必須条件（条件付き必須）
      action: ui
      checkpoints:
        - obs: 「他の項目を条件で利用する」で必須条件（例：金額Aが金額C以上のとき必須）を設定した項目は、条件不成立（金額A<金額C）のとき当該項目を未入力のまま保存でき、必須エラーが表示されず一覧に登録される
          source:
            - help#19666709590809
            - B-231
        - obs: 同じ必須条件で条件成立（金額A≧金額C）の状態にして当該項目を未入力で保存すると、必須項目エラーが表示され保存されない
          source:
            - help#19666709590809
            - B-231
    - phase: 計算項目のリアルタイム表示
      setup: mcp
      action: ui
      checkpoints:
        - obs: 計算式「{価格}*{数量}」を設定した計算項目で、価格と数量を入力すると保存前のフォーム上で積（例：価格100×数量3→300）がリアルタイムに表示される
          source:
            - help#19685690616601
            - B-186
        - obs: 自動計算ON（リアルタイム更新有効）の計算項目で、参照元の数量を入力後に変更すると、計算結果がページ再読込なしで再計算されて表示される
          source:
            - help#19685690616601
            - B-174
    - phase: 表示条件で隠れた項目のデータ保持
      action: ui
      checkpoints:
        - obs: 条件項目Bに値を入力した後、条件元Aを対象外の値に変えてBを非表示にし、その状態で保存→詳細を再表示してからAを条件一致に戻すと、非表示中も消えずに保持されていたBの値が表示される
          source:
            - help#19666709590809
            - pigeon_cloud#2885
    - phase: 回帰ピン（#2885：自己言及表示条件×制限権限×下書き）
      setup: mcp
      action: ui
      checkpoints:
        - obs: '自己言及型表示条件と自動入力を持つテーブルを、制限権限ユーザー（ログイン名がマスターと異なる別人性）でレコード編集し「下書き保存」した後に再度開くと、入力済みデータが保持され、かつ条件成立中の条件項目が表示されたまま描画される（下書きはUI専用操作、制限ユーザーはMCP/debugで前倒し作成）'
          source:
            - pigeon_cloud#2885
            - B-14-26
    - phase: 権限×表示条件の組合せ
      action: ui
      checkpoints:
        - obs: '制限ユーザー（別人性：ログイン名がマスターと異なる）で同テーブルのレコードを開き、条件元Aを条件一致の値にすると条件項目Bが表示され、対象外の値にするとBが非表示になり、表示条件が権限制限下でも条件どおりに効く'
          source:
            - help#19666709590809
            - help#27467012835481
        - obs: 制限ユーザーに項目非表示の項目権限が設定された条件項目は、表示条件が成立してもなお権限により制限ユーザーのフォーム・詳細に表示されない（権限非表示が表示条件より優先される。優先順位の厳密仕様は要マニュアル確認）
          source:
            - help#29759923226393
            - 要マニュアル確認
  notes: 'MCPでテーブル定義（表示条件設定・必須条件設定・計算項目・自己言及型表示条件・項目権限grant）と制限ユーザーを前倒し用意し、検証主操作はすべてUI（フォームで値を変更して描画変化・リアルタイム計算・保存後保持を観測）。API直叩きでの代替は禁止。#2885型回帰は共有stagingのため反証対照（修正の有無で再現/解消の対照）は不可＝ブラウザ通常動線が壊れず通るかのカバーとして位置づけ、反証対照はL1統合テスト（pigeon_cloud側Unit/Integration）の責務と明記。別人性必須：制限権限フェーズはマスターと異なるログイン名の制限ユーザーで操作する。リソースは「J16-」プレフィックス。'
