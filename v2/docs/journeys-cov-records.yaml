# =====================================================================
# レコード運用・一括操作・CSV・検索/ソート/フィルタ・ファイル添付・
# コメント/メンション・更新履歴ログ 領域（J5/J6関連）の網羅拡張
# 既存 v2/docs/journeys.yaml の J5(レコード運用CRUD)/J6(一括編集・CSV) で
# 抜けていた「意味ある変種」のみを新ジャーニーとして定義（既存重複は除外）。
# スキーマは既存 journeys.yaml と同一。検証主操作は全て UI（API代替禁止）。
# 期待値は公式ヘルプ（pigeon-help-2026）を正とする。
# =====================================================================
- id: J5b
  name: レコード運用2（検索・絞り込み・ソート・ビュー・ページング）
  priority: P2
  roles:
    - master
  fixtures:
    - fx-basic
  destructive: false
  scope: local
  phases:
    - phase: 検索の正規化（かな・全半角の区別なし）
      setup: mcp
      action: ui
      checkpoints:
        - obs: 一覧上部の虫眼鏡アイコンから「ピジョン」で検索すると、表記の異なる「ぴじょん」「ピジョン」「ﾋﾟｼﾞｮﾝ」の3レコードが全て一致して一覧に表示される（ひらがな/全角カナ/半角カナを区別せず検索）
          source:
            - help#19656092667417
            - A-9-8
        - obs: '半角「123」で検索すると全角「１２３」のレコードも一致して表示される（全角/半角数字を区別しない）'
          source:
            - help#19656092667417
    - phase: 0件ヒット時の表示と全件復帰
      action: ui
      checkpoints:
        - obs: どのレコードにも一致しないキーワード（例：J5b-ZZZNOHIT）で検索すると、一覧に1件も表示されず0件状態になる（曖昧語禁止のため「該当の行が表示されない＝表示件数0」を観測。0件メッセージ文言は要マニュアル確認）
          source:
            - help#19656092667417
            - 要マニュアル確認
        - obs: 検索キーワードをクリアすると（反映を待ってから）一覧が検索前の全件表示に戻る
          source:
            - help#19656092667417
            - A-9-8
    - phase: 絞り込み（複数条件・詳細検索）
      action: ui
      checkpoints:
        - obs: 虫眼鏡（フィルタ/集計）の絞り込みタブで「条件を追加」を使い2件の条件（例：金額が空でない＋金額が100以上）を設定し「表示」すると、両条件を満たすレコードのみ一覧に絞り込まれる（複数条件＝全条件成立で絞り込み。AND/OR厳密仕様は要マニュアル確認）
          source:
            - help#19656092667417
            - 要マニュアル確認
        - obs: 日時項目で相対値（例：今日以降）の絞り込み条件を設定して表示すると、条件に合致する日時のレコードのみが一覧表示される
          source:
            - '151-1'
            - help#19656092667417
    - phase: ビュー作成（列の表示/非表示・並び順・一覧反映）
      action: ui
      checkpoints:
        - obs: ビュー作成の項目タブで特定項目を非表示エリアへドラッグして保存し一覧へ反映すると、その列が一覧から消える（再度表示エリアに戻すと列が復帰する）
          source:
            - help#27395046258969
        - obs: ビュー作成の並び順タブで「金額：降順」を1件追加して一覧へ反映すると、一覧が金額の大きい順に並ぶ
          source:
            - help#27395046258969
        - obs: 並び順タブで2件（例：金額：降順→ID：昇順）を登録して反映すると、金額が同値のレコード同士はID昇順で並ぶ（複数項目ソートの第2キーが効く）
          source:
            - help#27395046258969
    - phase: デフォルトビューの適用
      action: ui
      checkpoints:
        - obs: ビューのデフォルト設定タブで「全てのユーザーのデフォルトにする」にチェックして保存すると、次回テーブルを開いた時に当該ビュー（列構成・並び順）が初期表示として適用される
          source:
            - help#27395046258969
            - '200'
    - phase: ページング
      action: ui
      checkpoints:
        - obs: 追加オプションで1ページあたりの表示データ数を5件に設定したテーブルに6件以上レコードを用意すると、一覧下部にページ送り（ページネーション）が表示され、現在ページには5件のみ表示される
          source:
            - A-109-1
            - help#19707390652057
        - obs: ページネーションで2ページ目に移動すると、1ページ目に出ていなかった残りのレコードが表示される
          source:
            - A-109-1
            - help#19707390652057
  notes: J5(レコード運用CRUD)で未カバーの検索正規化・0件表示・複数条件絞り込み・ビュー(列表示/並び順)・デフォルトビュー・ページングを1セッションで通す。検索→クリア→絞り込み等の非同期反映は「反映を待ってから」観測する（偽FAIL防止）。デフォルトソート単体(A-109-2)はJ2でカバー済みのため本ジャーニーは複数項目ソート(第2キー)を観点にする。リソースは「J5b-」プレフィックス。
- id: J5c
  name: レコード運用3（編集ロック・ファイル添付・コメント/メンション）
  priority: P1
  roles:
    - master
    - second-user
  fixtures:
    - fx-perm
  destructive: false
  scope: local
  phases:
    - phase: 別ユーザーの準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: MCP/debugで「J5c-」プレフィックスの第2ユーザー1名（マスターと別人）とレコード素地が作成され、ユーザー一覧にマスターと異なる氏名の行が表示される
          source:
            - help#19655994643609
    - phase: 編集ロックの取得と他ユーザー視点（別人性）
      action: ui
      checkpoints:
        - obs: マスターがレコードの編集画面を開いて編集中にすると当該レコードがロックされ、一覧/詳細の左側にロックアイコンが表示される
          source:
            - help#19655994643609
        - obs: '第2ユーザー（ログイン名がマスターと異なる別人性）で同じレコードを開くと、左側にロックアイコンが表示され、編集（保存）操作ができない（編集導線が無効化される）'
          source:
            - help#19655994643609
            - B-180-3
    - phase: ロックの解除（マスターのみ・別人性）
      action: ui
      checkpoints:
        - obs: 第2ユーザー（別人）のロックレコード画面には、ロック解除アイコン/導線が表示されない（解除はマスターのみ可能の境界）
          source:
            - help#19655994643609
        - obs: マスターでログインしロックアイコンをクリック→確認ポップアップで「はい」を選ぶと（反映を待ってから）ロックが解除され、一覧/詳細からロックアイコンが消える
          source:
            - help#19655994643609
    - phase: ファイル添付（複数・画像/PDF アップロード）
      action: ui
      checkpoints:
        - obs: 複数ファイル可に設定したファイル項目に、画像1点とPDF1点をドラッグ&ドロップ（またはクリックでファイル選択）でアップロードすると、プログレスバー進行後に2ファイルのファイル名が表示されて保存できる
          source:
            - help#50000000000001
            - '108-1'
        - obs: 保存後のレコード詳細・一覧で（サムネイル生成の反映を待ってから）、画像ファイルはサムネイル（縮小画像）が表示される
          source:
            - help#50000000000002
            - '108-1'
    - phase: ファイルのプレビュー・ダウンロード・ZIP取得
      action: ui
      checkpoints:
        - obs: 詳細画面で画像/PDFのファイル名リンクをクリックすると、新しいタブでブラウザ内プレビュー表示される
          source:
            - help#50000000000002
        - obs: 複数ファイルを添付した項目の「ZIP」アイコンをクリックするとZIPファイルがダウンロードされ、解凍するとアップロードした全ファイルが含まれている
          source:
            - '108-1'
            - help#50000000000002
        - obs: マスターが添付済みファイル2点のうち1点を削除して保存すると（反映を待ってから）、詳細・一覧の該当項目から削除したファイルのみが消え、残り1点は表示されたまま残る
          source:
            - '257'
            - help#50000000000001
    - phase: コメントとメンション通知（別人性）
      action: ui
      checkpoints:
        - obs: レコード詳細の右上コメントアイコンからコメントを入力し「送信」すると、コメントが詳細画面に時系列で表示される
          source:
            - help#19736072126489
            - A-143-01
        - obs: 'コメント欄で「@」を入力して第2ユーザー（マスターと別人）を指定して送信すると、第2ユーザーでログインした際にメンション通知が届いている（別人性: 通知先=第2ユーザー、送信者=マスターで氏名が異なる。⚠️通知の反映待ちを考慮）'
          source:
            - '69-1'
            - help#19736072126489
        - obs: 実在しないユーザー名で「@」メンションして送信しても誰にも通知されず、コメント自体は通常どおり保存・表示される
          source:
            - '69-3'
            - help#19736072126489
    - phase: コメント削除は送信者のみ（別人性の境界）
      action: ui
      checkpoints:
        - obs: 'マスターが投稿したコメントには、マスター本人の画面でごみ箱アイコンが表示されクリックで削除できる'
          source:
            - help#19736072126489
        - obs: '同じコメントを第2ユーザー（別人）で見ると、ごみ箱（削除）アイコンが表示されず削除できない（コメント削除は送信者のみ可能の境界を別人性で確認）'
          source:
            - help#19736072126489
  notes: '別人性必須: 編集ロック中の他ユーザー視点・メンション通知先・コメント削除権限を、マスターと別人の第2ユーザー2アカウントで確認する。第2ユーザーはMCP/debugで前倒し作成し、検証主操作（ファイルUP/プレビュー/コメント/メンション/ロック解除）は全てUI（ファイルアップロードはUI専用・MCP不可）。J3で単一画像/PDFの項目型表示は済のため、本ジャーニーは複数ファイル+ZIP+プレビューと、ロック/メンション/削除の別人性を観点にする。非同期(メンション通知/ロック反映)は反映待ち。リソースは「J5c-」プレフィックス。'
- id: J6b
  name: 一括操作2（編集モード・全選択一括編集・一括削除・CSVオプション）
  priority: P2
  roles:
    - master
  fixtures:
    - fx-basic
  destructive: true
  scope: local
  phases:
    - phase: 一括編集の準備
      setup: mcp
      action: ui
      checkpoints:
        - obs: MCP/debugで「J6b-」プレフィックスのテーブルに複数件（例：5件）のレコードが用意され、一覧に5行表示される
          source:
            - help#19656141292825
    - phase: 全選択での一括編集（ヘッダーチェックボックス）
      action: ui
      checkpoints:
        - obs: 一覧左上の項目名横のチェックボックス（全選択）にチェックを入れるとテーブル内の全レコードにチェックが入り、一括編集を実行して項目値を更新すると（反映を待ってから）全件の該当項目が同一値に更新される
          source:
            - help#19656141292825
            - B-180-1
    - phase: 編集モード（一覧でのインライン複数編集）
      action: ui
      checkpoints:
        - obs: 一覧画面左上の「編集モード」をクリックすると一覧上でセルを直接編集できる状態になり、複数レコードの値を編集して保存すると（反映を待ってから）一覧・詳細に編集後の値が表示される
          source:
            - help#19656141292825
        - obs: 子テーブル（子レコード）のテーブルでは、一覧左上の三本線メニューに「一括編集」「編集モード」が表示されない（子テーブルは一括編集・編集モード非対応）
          source:
            - help#19656141292825
    - phase: 選択レコードの一括削除（件数表示・チェック解除）
      action: ui
      checkpoints:
        - obs: 一覧でレコード左端のチェックボックスを複数チェックすると、連動して「一括削除」ボタンと選択件数が表示される
          source:
            - '167-1'
        - obs: チェックを外すと選択件数が減り、全て外すと「一括削除」ボタンが消える（選択状態と削除導線が連動）
          source:
            - '167-1'
        - obs: 2件を選択して一括削除を実行すると（反映を待ってから）選択した2件のみが一覧から消え、未選択のレコードは残る
          source:
            - '167-1'
            - A-9-1
    - phase: CSVアップロードのオプション（必須項目空の許可）
      action: ui
      checkpoints:
        - obs: テーブル編集の「アップロード時、必須項目が空の状態でも許可」をONにして必須項目が空のCSVをアップロードすると、インポートエラーにならず取込完了し（反映を待ってから）CSV行数分のレコードが一覧に追加される（必須項目は空のまま保存される）
          source:
            - '193-1'
        - obs: 同オプションをOFFにして必須項目が空のCSVをアップロードすると、インポートエラーが表示され取り込まれない（一覧の件数が増えない）
          source:
            - '193-2'
        - obs: CSVダウンロードで取得したヘッダー付き空CSVに値を記入し、文字コードを変えず（同じエンコーディングのまま）アップロードすると文字化けせずに取り込まれる（対応エンコーディングの詳細は要マニュアル確認）
          source:
            - B-148-03
            - 要マニュアル確認
        - obs: 既存レコードのID列を含むCSVで一部項目の値を変更してアップロードすると、新規行が増えずに当該IDの既存レコードが更新される（キー一致での更新・反映を待ってから一覧で確認）
          source:
            - '113-22'
            - help#19659104989721
    - phase: CSVダウンロードのオプション（現在のフィルタ・並び順反映）
      action: ui
      checkpoints:
        - obs: 一覧を絞り込み（フィルタ適用）した状態で「CSVに現在のフィルタを反映する」をONにしてCSVダウンロードすると、絞り込み後のレコードのみがCSVに出力される
          source:
            - '164-1'
            - B-161
        - obs: 数値・計算項目で桁区切り（カンマ区切り）をONに設定したテーブルをCSVダウンロードすると、該当データにカンマが付与された値で出力される
          source:
            - '231'
    - phase: 全データ一括削除（destructive・専用テーブル）
      action: ui
      checkpoints:
        - obs: テーブル管理→追加オプション設定で「メニューに『全てのデータを削除』を表示」を有効化して更新すると、対象テーブルの左上メニューに「全てのデータを削除」が表示される
          source:
            - help#19659487514009
        - obs: 左上メニューの「全てのデータを削除」を実行すると（反映を待ってから）当該テーブルの全レコードが一覧から消え0件になる（⚠️destructive・復旧不可。J6b専用テーブルで実施しチェーン最後尾に置く）
          source:
            - help#19659487514009
  notes: 'destructive: 全データ一括削除フェーズは対象テーブルのレコードを全消去するため、J6b専用テーブルで実施しチェーン最後尾に置く（他フェーズで使うテーブルとは別テーブルにする）。J6(一括編集選択/フィルタ中・CSV基本)で未カバーの「全選択(ヘッダーチェック)」「編集モード(インライン)」「選択レコードの一括削除＋件数表示/チェック解除」「CSVオプション(必須空許可ON/OFF・フィルタ反映・カンマ区切り)」「全データ一括削除」を観点にする。非同期反映(一括更新/一括削除/全削除)は「反映を待ってから」観測。検証主操作はUI(CSVアップロードはファイル選択UI)。リソースは「J6b-」プレフィックス。'
