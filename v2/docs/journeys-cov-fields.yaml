# =============================================================================
# 項目型・テーブル定義・レイアウト領域(J2/J3)カバレッジ拡張
# 既存 v2/docs/journeys.yaml と同一スキーマ。新ジャーニー J17/J18 として追加する拡張分のみ。
# 期待値はマニュアル根拠(help#xxxx)。CSV由来は元No(A-xx / B-xx)を併記。
#
# 【重要・前提確認】公式項目タイプは14種(help#29585192422553)。
#   ・メールアドレス/URL は「文字列(一行)」の書式オプション(独立型ではない) help#19666709590809
#   ・年月 は「日時」の種類オプション help#19666789006745
#   ・ルックアップ/子テーブル は「他テーブル参照」の機能 help#19686010433305
#   ・カラー(色)/IPアドレス/パスワード は公式マニュアルに項目型として存在しない
#     (IPアドレスはユーザー単位のアクセス制限機能。色/パスワードは記事なし)
#     → 項目型としてのE2Eシナリオは作らない(存在しない動線をテストしない)
# =============================================================================

- id: J17
  name: 項目型網羅2(書式・表示変種・採番/計算/参照の意味ある挙動)
  priority: P1
  roles:
    - master
  fixtures:
    - fx-schema
  destructive: false
  scope: local
  phases:
    # 「項目を作る動線(UI生成)」を最低1本UIで残す: 本フェーズの項目追加はUIで実施(MCP化禁止)
    - phase: 文字列(一行)の書式オプション(メール/URL)
      action: ui
      checkpoints:
        - obs: 文字列(一行)項目「J17-メール」を種類「メールアドレス」で項目追加画面からUI作成し、レコードに不正値「abc」を入力して保存しようとすると、メール形式の入力エラーが表示され保存されない
          source:
            - A-1-メール書式
            - help#19666709590809
        - obs: 「J17-メール」に正しい値「a@example.com」を入力すると保存でき、一覧・詳細に「a@example.com」が表示される
          source:
            - help#19666709590809
        - obs: 文字列(一行)項目「J17-URL」を種類「URL」でUI作成し、値「https://example.com」を保存すると、詳細画面でクリック可能なリンク(aタグ)として表示される
          source:
            - A-139-URL書式
            - help#19666709590809
    - phase: 数値の表示変種(単位・マイナス)
      setup: mcp
      action: ui
      checkpoints:
        - obs: 数値項目「J17-率」に単位記号「%」を末尾表示で設定し「50」を入力すると、一覧で「50%」と表示される
          source:
            - A-132-01
            - help#19666749123737
        - obs: 数値項目「J17-金額」に単位記号「$」を先頭表示で設定し「100」を入力すると、一覧で「$100」と表示される
          source:
            - A-132-01
            - help#19666749123737
        - obs: 数値項目で「マイナス符号を▲で表示」を有効にし「-500」を入力すると、一覧で「▲500」と表示される
          source:
            - help#19666749123737
        - obs: 数値項目で「マイナス値を赤字で表示」を有効にし負値を入力すると、一覧でその値が赤色(文字色)で表示される
          source:
            - help#19666749123737
    - phase: 日時の変種(年月・自動補完)
      setup: mcp
      action: ui
      checkpoints:
        - obs: 日時項目「J17-年月」を種類「年月」で設定し2026年6月を入力すると、一覧・詳細で「2026-06」形式で表示される
          source:
            - A-年月(種類年月)
            - help#19666789006745
        - obs: 種類「時刻のみ」の項目に「730」と入力してフォーカスアウトすると「7:30」に自動補完される
          source:
            - help#19666789006745
        - obs: 種類「日時」の項目に「20251204 1705」と入力してフォーカスアウトすると「2025/12/04 17:05」に自動補完される
          source:
            - help#19666789006745
    - phase: 選択肢(単一選択)のプルダウン表示
      setup: mcp
      action: ui
      checkpoints:
        - obs: 選択肢(単一選択)項目を表示形式「プルダウン」で選択肢AA,BB,CCを設定すると、レコード登録画面でプルダウン(select)UIが表示され、選択したBBが保存・表示される
          source:
            - help#19666791306649
    - phase: 画像・ファイルの変種(複数値・ブラウザ表示)
      setup: mcp
      action: ui
      checkpoints:
        - obs: 画像項目で「複数の値の登録を許可する」を有効にし2枚の画像をアップロードすると、詳細画面に2つのサムネイルが表示される
          source:
            - A-422-画像複数
            - help#19685978944025
        - obs: 画像項目で「画像の縦横サイズを表示」を有効にすると、詳細画面でアップロード画像に縦横サイズ(px)が併記表示される
          source:
            - help#19685978944025
        - obs: ファイル項目で「複数の値の登録を許可する」を有効にし2件のファイルをアップロードすると、詳細画面に2件のファイル名が表示される
          source:
            - help#19685607757465
        - obs: ファイル項目で「ブラウザで表示する(画像/PDF/動画)」を有効にしPDFを登録すると、詳細でファイルを開いた際にダウンロードではなくブラウザ内(別タブ/インライン)でPDFが表示される
          source:
            - help#19685607757465
    - phase: 計算項目の自動更新・ユニーク
      setup: mcp
      action: ui
      checkpoints:
        - obs: 計算項目で「計算値の自動更新」を有効にし、元の数値項目の値をレコード編集で変更して保存すると、計算結果がリアルタイム(保存時)に再計算された値へ更新される
          source:
            - help#19685690616601
        - obs: 計算項目で「計算値の自動更新」を無効にすると、元項目の値を後から変更しても計算結果は初回計算値のまま保持される
          source:
            - help#19685690616601
        - obs: 計算項目は「計算値の自動更新」が無効のときだけ「値の重複を禁止する(ユニーク)」を設定でき、同一計算結果のレコードを追加すると重複エラーで保存できない
          source:
            - B-6307
            - B-6308
            - help#19685690616601
    - phase: 自動採番のフォーマット・リセット
      setup: mcp
      action: ui
      checkpoints:
        - obs: 自動採番項目にフォーマット「ID-{YYYY}-{MM}-{ID:4}」を設定して2026年6月にレコードを追加すると、採番値が「ID-2026-06-0001」形式で付与される
          source:
            - B-273
            - help#19666652317209
        - obs: 自動採番の設定で「カウンターをリセット」を実行した後に新規レコードを追加すると、採番が初期番号(0001相当)から再開される
          source:
            - A-115-01
            - help#19666652317209
    - phase: ルックアップ(項目のコピー)の自動反映
      setup: mcp
      action: ui
      checkpoints:
        - obs: 他テーブル参照のルックアップ(項目のコピー)で「自動反映する」を有効に設定した項目は、参照元レコードの値を更新すると、参照しているレコード側のコピー値も更新後の値に変わる
          source:
            - A-13x-ルックアップ
            - help#19686010433305
        - obs: ルックアップで「自動反映する」を無効にした項目は、参照元レコードの値を後から更新してもコピー値は初回取得値のまま変わらない
          source:
            - A-1368-ルックアップ自動反映なし
            - help#19686010433305
    - phase: 子テーブル(入力フォームにする)
      setup: mcp
      action: ui
      checkpoints:
        - obs: 他テーブル参照項目で「入力フォームにする(子要素機能)」を有効にすると、親テーブルの詳細/編集画面に子テーブルのレコードを表形式で一覧表示でき、その場で子レコードを追加できる
          source:
            - help#19686010433305
    - phase: ユニーク(一意)制約
      setup: mcp
      action: ui
      checkpoints:
        - obs: 文字列(一行)項目に「値の重複を禁止する」を設定し、既存レコードと同一の値で新規レコードを登録しようとすると「1件のエラーがあります。既存の項目のデータの1つがユニークでなければなりません。」のエラーが表示され保存されない
          source:
            - B-1055
            - help#19666652317209
  notes: |
    J3(項目型ぜんぶ盛り)で未カバーの「意味ある変種」を集約。冗長な総当りはせず代表値1点で観測。
    「項目を作る動線(UI生成)」は先頭フェーズで最低1本UIで残す(MCP化で生成バグを不可視にしない)。
    それ以降のフェーズは項目定義をsetup:mcpで前倒しし、検証主操作(値入力→表示変化の観測)はすべてUI。
    色/IPアドレス/パスワードは公式に項目型が存在しないためシナリオ対象外。リソースは「J17-」プレフィックス。

- id: J18
  name: テーブル管理(グループ・複製コピー範囲・JSON入出力・レイアウト列数)
  priority: P2
  roles:
    - master
  fixtures: []
  destructive: false
  scope: local
  phases:
    - phase: テーブルグループ管理
      setup: mcp
      action: ui
      checkpoints:
        - obs: テーブル管理で新規グループ「J18-グループ」を作成すると、サイドメニュー/メニュー並び替え画面にグループ「J18-グループ」が表示される
          source:
            - A-465-グループ作成
            - help#19662345752601
        - obs: メニュー並び替えで対象テーブルを「J18-グループ」の「ここにドロップでグループに追加」へドラッグ&ドロップすると、エラーなく当該テーブルがグループ配下に表示される
          source:
            - A-465
            - help#19662345752601
        - obs: グループ配下のテーブルをグループ外へドラッグ&ドロップすると、エラーなく当該テーブルがグループから外れて表示される
          source:
            - A-469
            - help#19662345752601
        - obs: 「全て展開」をクリックするとグループ配下のテーブルが全て展開表示され、「全て閉じる」でグループ配下が全て閉じる
          source:
            - A-471
            - A-473
            - help#19662345752601
    - phase: テーブル複製のコピー範囲
      setup: mcp
      action: ui
      checkpoints:
        - obs: 権限・通知・フィルタを設定済みのテーブルを複製する際に「権限設定をコピー」「通知設定をコピー」「フィルタをコピー」を有効にすると、複製先テーブルに同じ権限設定・通知設定・フィルタが引き継がれて表示される
          source:
            - A-113-20
            - help#19707614354969
        - obs: テーブル複製ではテーブル定義(項目)はコピーされるが、元テーブルのレコードデータは複製先に含まれず、複製先テーブルのレコード一覧は0件で表示される
          source:
            - help#19707614354969
    - phase: JSON入出力(エクスポート・インポート)
      action: ui
      checkpoints:
        - obs: テーブル設定のエクスポートで「データを含める」「権限設定を含める」「フィルタ/ビューを含める」「通知設定を含める」を有効にしてJSONをダウンロードすると、JSON内に項目定義に加えレコードデータ・権限・フィルタ・通知が含まれる
          source:
            - help#19663448575641
        - obs: テーブル管理「JSONから追加」でエクスポートしたJSONファイルをアップロードすると、項目定義を引き継いだテーブルが新規にテーブル管理一覧へ追加される
          source:
            - help#19663331553433
    - phase: レイアウト列数・配置(3-4列・詳細適用)
      setup: mcp
      action: ui
      checkpoints:
        - obs: 登録画面レイアウトを3列に設定して項目を各列へ配置し保存すると、レコード登録画面で項目が3列で配置表示される
          source:
            - A-113-18
            - help#19663843714329
        - obs: 「レイアウトを詳細画面にも適用」を有効にすると、レコード詳細画面も登録画面と同じ列レイアウトで表示される
          source:
            - help#19663843714329
  notes: |
    J2(テーブル設計基本)で未カバーのテーブル管理動線を集約。
    複製はコピー範囲(権限/通知/フィルタ)とレコード非コピーを観測。JSONはエクスポートのオプション網羅＋インポート(JSONから追加)を追加(J2はエクスポートのみだった)。
    レイアウトはJ2の2列に対し3列＋詳細画面適用を追加。グループ操作はドラッグ&ドロップ。リソースは「J18-」プレフィックス。
    複数テーブル/グループを作るためdestructive:falseだが後続干渉を避け「J18-」プレフィックスで自リソースのみ操作。
