cases:
- case_no: ntf-010
  sheet: B
  feature: 通知設定
  category: |-
    アクション：ワークフローステータス変更時
    通知するワークフローステータス：申請時
  description: |-
    ①新規に「通知設定」を行う
    ②通知設定内、「アクション：ワークフローステータス変更時」にチェックを入れ且つ「通知するワークフローステータス」に「申請時」にチェックを入れ、「登録」ボタンをクリック
    ③本設定で対象にしたテーブル一覧を開き、新規にレコード追加（申請）を実施。
  expected: |-
    ・②完了後、エラーなく設定保存が完了すること。
    ・③実施後、通知設定先に通知が行われること。
  movie: NT01
  detailed_flow: |-
    【NT01 テストフロー】この動画で確認するテスト番号:
      ntf-010        (旧: 102-1)   通知設定
      ntf-020        (旧: 102-2)   通知設定
      ntf-030        (旧: 102-3)   通知設定
      ntf-040        (旧: 102-4)   通知設定
      ntf-050        (旧: 102-5)   通知設定
      ntf-060        (旧: 102-6)   通知設定

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    1. /admin/notification を開く
    2. 追加ボタン（button.btn.btn-sm.btn-outline-primary.pl-2.mr-2 の fa-plus アイコン）をクリックして /admin/notification/edit/new に遷移
    3. テーブル選択（#table_shortcut）でALLテストテーブルを選択
    4. 通知名（#name）に「WF申請時通知テスト」を入力
    5. 通知設定セクションの「通知設定を追加する」をクリック
    6. アクションの「ワークフローステータス変更時」チェックボックスをONにする
    7. 表示された「通知するワークフローステータス」から「申請時」チェックボックスをONにする
    8. 「登録」ボタンをクリックして保存
    9. 通知設定一覧（/admin/notification）に戻り、作成した通知設定がリストに表示されることを確認
    10. テーブル一覧からワークフロー設定済みのレコードを新規追加（申請）する
    11. 通知ログ（/admin/notification_log）を開き、申請時の通知がステータス「success」で記録されていることを確認
  old_case_no: 102-1
