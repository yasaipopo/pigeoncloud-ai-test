- case_no: 102-10
  sheet: B
  feature: 通知設定
  category: 'アクション：ワークフローステータス変更時

    通知するワークフローステータス：全てチェック'
  description: '①新規に「通知設定」を行う

    ②通知設定内、「アクション：ワークフローステータス変更時」にチェックを入れ且つ「通知するワークフローステータス」の全てにチェックを入れ、「登録」ボタンをクリック

    ③本設定で対象にしたテーブル一覧を開き、新規にレコード追加（申請）を実施。

    ④申請者にて取り下げを実施。'
  expected: '・②完了後、エラーなく設定保存が完了すること。

    ・④実施後、通知設定先に通知が行われること。'
