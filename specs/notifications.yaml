    [0:00] ntf-110 ── 通知設定のコピー
    1. 既存の通知設定の一覧画面でコピーアイコン（または「コピー」ボタン）をクリックする
    2. ✅ エラーなくコピーが完了し、一覧に複製された設定が追加されること
    3. コピーした設定の詳細を開いて元の設定と比較する
    4. ✅ テーブル・通知先・アクション・リマインダ設定など全項目がコピーされていること

    [0:01] ntf-120 ── 通知設定の有効ON
    1. 既存の通知設定を開き、有効フラグを「ON」に設定して保存する
    2. ✅ 通知設定一覧で該当設定の有効状態が「ON」になっていること
    3. 対象テーブルにレコードを作成する
    4. ✅ 通知が正常に送信されること（通知ログに記録あり）

    [0:01] ntf-130 ── 通知設定の有効OFF
    1. 既存の通知設定を開き、有効フラグを「OFF」に設定して保存する
    2. ✅ 通知設定一覧で該当設定の有効状態が「OFF」になっていること
    3. 対象テーブルにレコードを作成する
    4. ✅ 通知が送信されないこと（通知ログに新しいレコードが追加されないこと）
    5. ✅ リマインダ設定も含めて通知が停止していること
