    （必須項目チェック）'
  description: '①左ペインより「ステップメール設定」をクリック。

    ②「＋」アイコンをクリック。

    ③ステップ「＋追加する」を2回クリックし、何も入力せずに「登録」ボタンをクリック。'
  expected: '以下、未入力のエラーが出力されること。


