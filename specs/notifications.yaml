- case_no: 150-2
  sheet: B
  feature: メール配信
  category: 'ステップメール設定

    ※ステップ設定（１つ）

    ※テンプレート仕様：テンプレート'
  description: '①左ペインより「ステップメール設定」をクリック。

    ②「＋」アイコンをクリック。

    ③以下の通り設定を行いステップ「追加する」ボタンをクリックする。

    　　・有効：ON

    　　・ステップメール名：テスト用のステップメール名を入力

    　　・配信リスト：該当の配信リストを選択

    　　・送信時刻：該当の時刻を入力（0~24時で指定可能）

    ④以下の通り設定を行い、「登録」ボタンをクリックする。

    　　・テンプレート仕様：テンプレート

    　　・テンプレート：該当のテンプレートを選択

    　　・添付ファイル：該当のテスト用テンプレートファイルを添付。'
  expected: '・配信リストに設定されているテーブルのメールアドレスに対して、設定した送付時刻にメール送信されること。


    ・受信メールの内容が以下の通りとなっていること。


    　-添付ファイルが設定した添付ファイルであること。

    　-メール文面がテンプレートの内容であること。'
- case_no: 150-3
  sheet: B
  feature: メール配信
  category: 'ステップメール設定

