- case_no: '112'
  sheet: B
  feature: 通知設定
  category: 設定のコピー
  description: ①通知設定のコピーを行う。
  expected: |-
    エラーなく処理が完了すること。
    全ての設定情報が抜けもれなくコピーされていること。
  movie: NT03
  detailed_flow: |
    1. /admin/notification を開く
    2. 通知設定が存在しない場合は、追加ボタンから新規に通知設定を1件作成する（テーブル・通知名・アクション・通知先メール設定済みのもの）
    3. 通知設定一覧の行にある「複製」ボタン（button.btn.btn-info）をクリック
    4. 複製確認ダイアログが表示された場合はOKをクリック
    5. 通知設定一覧に新しい行が追加されていることを確認（locator('table tr') の件数が増加）
    6. 複製された通知設定の編集アイコンをクリックして詳細を開く
    7. 元の通知設定と同じテーブル・アクション・通知先が設定されていることを確認
    8. 通知名に「コピー」などのサフィックスが付与されているかを確認
- case_no: 133-01
  sheet: B
  feature: 通知設定
  category: 有効／無効
  description: |-
    ①通知設定を開く
    ②有効→ONへ設定し保存する。
  expected: 該当の通知設定が有効になっていること。
  movie: NT03
  detailed_flow: |
    1. /admin/notification を開く
    2. 通知設定が存在しない場合は追加ボタンから新規に作成する
    3. 通知設定一覧の行にある有効トグル（input[type=checkbox].switch-input またはトグルスイッチ）をクリックしてONにする
    4. 通知設定の編集アイコンをクリックして詳細ページを開く（または更新ボタンをクリック）
    5. 有効フラグがONになっていることを確認（トグルがONの状態、一覧の「有効」列が「On」表示）
    6. 通知設定が有効な状態でテーブルにレコードを作成する
    7. /admin/notification_log で通知ログが記録されていることを確認
- case_no: 133-02
  sheet: B
  feature: 通知設定
  category: 有効／無効
  description: |-
    ①通知設定を開く
    ②有効→OFFへ設定し保存する。
    ※OFFにしてもリマインダが有効になっている不具合が以前あったので注意
  expected: 該当の通知設定が無効になっていること。
  movie: NT03
  detailed_flow: |
    1. /admin/notification を開く
    2. 通知設定が1件以上あることを確認（ない場合は追加ボタンから作成）
    3. 通知設定一覧の「有効」列のトグルスイッチをOFF（無効）にクリックする
    4. 通知設定一覧の「有効」列が「Off」表示になっていることを確認
    5. テーブルにレコードを作成する（通知設定が無効なので通知は発生しないはず）
    6. /admin/notification_log を開き、OFFにした通知設定からの新しい通知ログが記録されていないことを確認
    7. さらにリマインダ設定がある場合、リマインダも停止していることを確認（リマインダ通知ログが発生しないこと）
