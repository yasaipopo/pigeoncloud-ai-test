- case_no: ntf-070
  sheet: B
  feature: 通知設定
  category: Webhook設定（1つ設定）
  description: |-
    ①通知設定を開く
    ②Webhook設定を１つ設定する。
    ③「通知先ユーザー」「通知先メールアドレス」「通知先組織」は全て設定を行い
    　 【通知設定】／【リマインド設定】の全てを設定する
    ④該当のテーブルに対して申請処理を行う。
    ●WebhookURL
    http://test.yaspp.net/pigeon/display.php?key=henmi
  expected: |-
    ・設定したWebhookへの通知が行われること
    ・その他通知先についても、【通知設定】／【リマインド設定】の設定通りの通知が行われること。
  movie: NT02
  detailed_flow: |-
    【NT02 テストフロー】この動画で確認するテスト番号:
      [0:33] ntf-070 (旧: 105-01)  Webhook設定（1つ）で通知が届くこと
      [0:33] ntf-080 (旧: 105-02)  Webhook設定（複数）で全Webhookへ通知が届くこと
      [0:00] ntf-090 (旧: 105-03)  Slack Webhook設定（1つ）でSlackへ通知が届くこと

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:33] ntf-070 ── Webhook設定（1つ）での通知
    1. /admin/notification を開き、追加ボタンをクリックして新規作成画面に遷移する
    2. テーブルを選択し通知名を入力する
    3. 「通知先ユーザー」にテストユーザーを設定する
    4. 「通知先メールアドレス」に test@loftal.sakura.ne.jp を入力する
    5. 「通知先組織」に組織を設定する
    6. 「Webhook url」欄に http://test.yaspp.net/pigeon/webhook.php?key=105-01 を入力する
    7. 「通知設定を追加する」をクリックしてアクション「作成」を設定する
    8. リマインダ設定のテキストとタイミングも設定する
    9. 「登録」ボタンをクリックして保存する
    10. 対象テーブルに新規レコードを作成する
    11. ✅ http://test.yaspp.net/pigeon/display.php?key=105-01 でWebhook受信データが表示されること
    12. ✅ 通知先のメールアドレス・ユーザー・組織へも通知が届いていること

    [0:33] ntf-080 ── Webhook設定（複数）での通知
    1. 新規通知設定画面でWebhook URLを2つ以上設定して登録する
    2. 対象テーブルに新規レコードを作成する
    3. ✅ 設定した複数のWebhookそれぞれに受信データが表示されること

    [0:00] ntf-090 ── Slack Webhook設定（1つ）での通知
    1. 新規通知設定画面でSlack Webhook URLを1つ設定して登録する
    2. 対象テーブルに新規レコードを作成する
    3. ✅ 設定したSlackチャンネルに通知メッセージが届くこと
  old_case_no: 105-01
