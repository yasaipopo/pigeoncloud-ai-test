    ④「不明なエラー」が発生せずに通知が送信されることを確認する
  expected: 複数値メールアドレス項目を通知先に設定してもエラーなく通知が送信されること
  movie: UC16
  detailed_flow: |
    1. ALLテストテーブルのフィールド設定で「文字列(一行)」項目を追加し、「複数の値の登録を許可する」をONにし、種類を「メールアドレス」に設定する
    2. /admin/notification を開いて追加ボタンをクリック
    3. テーブルを選択し通知設定を作成する
    4. 「追加の通知先対象項目」に上記で作成した複数値メールアドレス項目を選択する
    5. 「通知設定を追加する」でアクション「作成」をONにして「登録」をクリック
    6. 該当テーブルに新規レコードを作成し、複数値メールアドレス項目に複数のメールアドレスを入力する（例: a@test.com, b@test.com）
    7. レコードを保存する
    8. /admin/notification_log で「不明なエラー」が発生せず通知ログが「success」で記録されていることを確認する
    9. 複数アドレス宛にそれぞれ通知が送信されていることを確認する
