    ②各アクション（レコード追加・編集・削除・WFステータス変更）のトリガーを設定する
    ③通知先ユーザー・メールアドレス・組織を設定する
    ④Webhook/Slack Webhook設定を行い、通知が送信されることを確認する
    ⑤通知設定の有効/無効の切り替えを確認する
