cases:
- case_no: ntf-010
  sheet: B
  feature: 通知設定
  category: |-
    アクション：ワークフローステータス変更時
    通知するワークフローステータス：申請時
  description: |-
    ①新規に「通知設定」を行う
    ②通知設定内、「アクション：ワークフローステータス変更時」にチェックを入れ且つ「通知するワークフローステータス」に「申請時」にチェックを入れ、「登録」ボタンをクリック
    ③本設定で対象にしたテーブル一覧を開き、新規にレコード追加（申請）を実施。
  expected: |-
    ・②完了後、エラーなく設定保存が完了すること。
    ・③実施後、通知設定先に通知が行われること。
  movie: NT01
  detailed_flow: |-
    【NT01 テストフロー】この動画で確認するテスト番号:
      [0:01] ntf-010 (旧: 102-1)  WFステータス「申請時」での通知
      [0:00] ntf-020 (旧: 102-2)  WFステータス「各承認者の承認時」での通知
      [0:00] ntf-030 (旧: 102-3)  WFステータス「否認時」での通知
      [0:00] ntf-040 (旧: 102-4)  WFステータス「最終承認時」での通知
      [0:00] ntf-050 (旧: 102-5)  WFステータス「取り下げ時」での通知
      [0:01] ntf-060 (旧: 102-6)  WFステータス全てチェックでの通知

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:01] ntf-010 ── WFステータス「申請時」での通知
    1. /admin/notification を開き、追加ボタンをクリックして通知設定新規作成画面に遷移する
    2. テーブルを選択し、通知名「WF申請時通知テスト」を入力する
    3. 「通知設定を追加する」をクリックし、アクションで「ワークフローステータス変更時」を選択する
    4. 表示された「通知するワークフローステータス」で「申請時」にチェックを入れる
    5. 「登録」ボタンをクリックして保存する
    6. ✅ 通知設定一覧に作成した設定が表示されること
    7. ワークフロー設定済みテーブルに新規レコードを作成して申請する
    8. ✅ /admin/notification_log で申請時の通知が「success」ステータスで記録されること

    [0:00] ntf-020 ── WFステータス「各承認者の承認時」での通知
    1. 新規通知設定を作成し、ワークフローステータスに「各承認者の承認時」を設定して登録する
    2. 対象テーブルに複数承認者を設定したレコードを申請する
    3. 各承認者でそれぞれ承認作業を実施する
    4. ✅ 承認のたびに通知ログに「success」レコードが追加されること

    [0:00] ntf-030 ── WFステータス「否認時」での通知
    1. 新規通知設定で「否認時」を選択して登録する
    2. 対象テーブルにレコードを申請し、承認者が否認する
    3. ✅ /admin/notification_log に否認時の通知が「success」で記録されること

    [0:00] ntf-040 ── WFステータス「最終承認時」での通知
    1. 新規通知設定で「最終承認時」を選択して登録する
    2. 組織宛に申請し、組織内の全ユーザーが承認して最終承認に至る
    3. ✅ /admin/notification_log に最終承認時の通知が「success」で記録されること

    [0:00] ntf-050 ── WFステータス「取り下げ時」での通知
    1. 新規通知設定で「取り下げ時」を選択して登録する
    2. レコードを申請後、申請者が取り下げを実施する
    3. ✅ /admin/notification_log に取り下げ時の通知が「success」で記録されること

    [0:01] ntf-060 ── WFステータス全てチェックでの通知
    1. 新規通知設定で「ワークフローステータス変更時」を選択し、サブ項目を全てチェックして登録する
    2. レコードを申請する
    3. ✅ /admin/notification_log に申請時の通知が記録されること
    4. ✅ 通知設定ページでワークフロー関連の設定項目が正常に表示されること
  old_case_no: 102-1
