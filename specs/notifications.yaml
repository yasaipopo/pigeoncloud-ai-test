  description: "①左ペインより「ステップメール設定」をクリック。\n②「＋」アイコンをクリック。\n③以下の通り設定を行いステップ「追加する」ボタンをクリックする。\n　　・有効：ON\n　　・ステップメール名：テスト用のステップメール名を入力\n　　・配信リスト：該当の配信リストを選択\n　　・送信時刻：該当の時刻を入力（0~24時で指定可能）\n④以下の通り設定を行い、ステップ「＋追加する」ボタンをクリックする。\n\
    　　・テンプレート仕様：テンプレート\n　　・テンプレート：該当のテンプレートを選択\n　　・添付ファイル：該当のテスト用テンプレートファイルを添付。\n⑤以下の通り設定を行い、「登録」ボタンをクリックする。\r\n　　・テンプレート仕様：テンプレート\r\n　　・テンプレート：該当のテンプレートを選択\r\n　　・前ステップからの間隔日数 ：1日\r\n　　・添付ファイル：該当のテスト用テンプレートファイルを添付。"
  expected: 左記設定通りのメール送信ができ且つ設定通りの文面や添付メールとなっていること。
