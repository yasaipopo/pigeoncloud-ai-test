    7. 設定が保存され通知設定一覧に表示されることを確認する
    8. 該当テーブルに新規レコードを作成し、他テーブル参照項目（組織）に値を設定する
    9. /admin/notification_log で参照された組織に属するユーザーへの通知ログが記録されていることを確認する
