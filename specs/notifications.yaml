- case_no: 54-1
  status: partial
  steps: '1. beforeAll: create-all-type-table API呼び出し

    2. beforeAll: create-all-type-data API呼び出し (count:1, pattern:''fixed'')

    3. テーブルIDをAPIリスト取得から設定

    4. 通知設定ページ（/admin/dataset__{tableId}/notification）に遷移

    5. 「追加」ボタンが存在する場合はクリック

    6. アクション未入力で「登録」ボタンをクリック

    7. エラーメッセージの存在を確認（console.log）

    8. afterAll: delete-all-type-tables API呼び出し

    '
  assertions: '- エラーメッセージ数をconsole.logするのみ（アサートなし）

    '
  gaps: '⚠️ YAMLでは「必須項目未入力のエラーが発生すること」が期待されるが、エラーの発生をアサートしていない

    ⚠️ エラーメッセージの内容確認なし

    ⚠️ 追加ボタン・送信ボタンが存在しない場合でもパスする（条件付き）

    '
