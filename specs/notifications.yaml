- case_no: ntf-070
  sheet: B
  feature: 通知設定
  category: Webhook設定（1つ設定）
  description: |-
    ①通知設定を開く
    ②Webhook設定を１つ設定する。
    ③「通知先ユーザー」「通知先メールアドレス」「通知先組織」は全て設定を行い
    　 【通知設定】／【リマインド設定】の全てを設定する
    ④該当のテーブルに対して申請処理を行う。
    ●WebhookURL
    http://test.yaspp.net/pigeon/display.php?key=henmi
  expected: |-
    ・設定したWebhookへの通知が行われること
    ・その他通知先についても、【通知設定】／【リマインド設定】の設定通りの通知が行われること。
  movie: NT02
  detailed_flow: |-
    【NT02 テストフロー】この動画で確認するテスト番号:
      ntf-070        (旧: 105-01)  通知設定
      ntf-080        (旧: 105-02)  通知設定
      ntf-090        (旧: 105-03)  通知設定

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    1. /admin/notification を開く
    2. 追加ボタンをクリックして /admin/notification/edit/new に遷移
    3. テーブルを選択し通知名を入力
    4. 「通知先ユーザー」入力欄にテストユーザーを設定
    5. 「通知先メールアドレス」入力欄にtest@loftal.sakura.ne.jpを入力
    6. 「通知先組織」入力欄に組織を設定
    7. 「Webhook url」入力欄に http://test.yaspp.net/pigeon/webhook.php?key=105-01 を入力
    8. 「通知設定を追加する」をクリックしてアクション（作成）を設定する
    9. リマインダ設定も追加する（リマインドテキスト入力、タイミング設定）
    10. 「登録」ボタンをクリックして保存
    11. ALLテストテーブルに新規レコードを作成する
    12. http://test.yaspp.net/pigeon/display.php?key=105-01 にアクセスしてWebhook受信データが表示されることを確認
  old_case_no: 105-01
