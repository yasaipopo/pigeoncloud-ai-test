group: 通知設定・メール配信
spec_file: tests/notifications.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: 102-1
  sheet: B
  feature: 通知設定
  category: |-
    アクション：ワークフローステータス変更時
    通知するワークフローステータス：申請時
  description: |-
    ①新規に「通知設定」を行う
    ②通知設定内、「アクション：ワークフローステータス変更時」にチェックを入れ且つ「通知するワークフローステータス」に「申請時」にチェックを入れ、「登録」ボタンをクリック
    ③本設定で対象にしたテーブル一覧を開き、新規にレコード追加（申請）を実施。
  expected: |-
    ・②完了後、エラーなく設定保存が完了すること。
    ・③実施後、通知設定先に通知が行われること。
  movie: NT01
  detailed_flow: |
    1. /admin/notification を開く
    2. 追加ボタン（button.btn.btn-sm.btn-outline-primary.pl-2.mr-2 の fa-plus アイコン）をクリックして /admin/notification/edit/new に遷移
    3. テーブル選択（#table_shortcut）でALLテストテーブルを選択
    4. 通知名（#name）に「WF申請時通知テスト」を入力
    5. 通知設定セクションの「通知設定を追加する」をクリック
    6. アクションの「ワークフローステータス変更時」チェックボックスをONにする
    7. 表示された「通知するワークフローステータス」から「申請時」チェックボックスをONにする
    8. 「登録」ボタンをクリックして保存
    9. 通知設定一覧（/admin/notification）に戻り、作成した通知設定がリストに表示されることを確認
    10. テーブル一覧からワークフロー設定済みのレコードを新規追加（申請）する
    11. 通知ログ（/admin/notification_log）を開き、申請時の通知がステータス「success」で記録されていることを確認
- case_no: 102-2
  sheet: B
  feature: 通知設定
  category: |-
    アクション：ワークフローステータス変更時
    通知するワークフローステータス：各承認者の承認時
  description: |-
    ①新規に「通知設定」を行う
    ②通知設定内、「アクション：ワークフローステータス変更時」にチェックを入れ且つ「通知するワークフローステータス」に「各承認者の承認時」にチェックを入れ、「登録」ボタンをクリック
    ③本設定で対象にしたテーブル一覧を開き、新規にレコード追加（申請）を実施（承認者は複数設定）
    ④複数設定した承認者にて、それぞれ承認作業実施
  expected: |-
    ・②完了後、エラーなく設定保存が完了すること。
    ・④実施後、通知設定先に各承認者の承認のたびに通知が行われること。
  movie: NT01
  detailed_flow: |
    1. /admin/notification を開く
    2. 追加ボタン（button.btn-outline-primary の fa-plus アイコン）をクリック
    3. テーブル（#table_shortcut）でALLテストテーブルを選択
    4. 通知名（#name）に「WF各承認者通知テスト」を入力
    5. 「通知設定を追加する」をクリック
    6. アクション「ワークフローステータス変更時」をON
    7. 「各承認者の承認時」チェックボックスをONにする
    8. 「登録」ボタンをクリックして保存
    9. 通知設定一覧に通知設定が追加されたことを確認（.pc-notification table に1行以上表示）
    10. テーブルにワークフロー付きレコードを申請し、承認者A・承認者Bがそれぞれ承認する
    11. /admin/notification_log で承認ごとに通知ログが2件記録されていることを確認
