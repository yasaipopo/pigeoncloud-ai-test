    [0:00] ntf-100 ── Slack Webhook設定（複数）での通知
    1. /admin/notification を開き、追加ボタンをクリックして新規作成画面に遷移する
    2. テーブルを選択し通知名を入力する
    3. 「通知先Slack Webhook URL」に1つ目のURLを入力し、追加ボタンで2つ目のURLも入力する
    4. 「通知設定を追加する」でアクション「作成」を設定して登録する
    5. 対象テーブルに新規レコードを作成する
