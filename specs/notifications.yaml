  description: |-
    ①通知設定を開く。
    ②設定済み通知設定の編集アイコンをクリックする。
    ③通知設定編集画面内の【通知先メールアドレス】の「+」をクリックし
    　追加で通知先メールアドレスを追加し「更新」ボタンをクリックし設定を保存する。
    ④①で通知設定が行われているテーブルに対して、新規追加作業を実施する。
  expected: |-
    設定された通知先メールアドレスに対して通知が行われること。
    また、他通知設定についても問題がないこと。
  movie: NT06
  detailed_flow: |-
    【NT06 テストフロー】この動画で確認するテスト番号:
      [0:01] ntf-390 (旧: 62-1)  通知先メールアドレスを追加して作成時通知が届くこと
      [0:01] ntf-400 (旧: 62-2)  通知先メールアドレスを変更して更新時通知が届くこと
      [0:00] ntf-410 (旧: 62-3)  通知先メールアドレスを削除して削除時通知が届くこと
      [0:01] ntf-420 (旧: 62-4)  通知先メールアドレス追加でWFステータス変更時通知が届くこと
      [0:33] ntf-430 (旧: 6-1)   通知・リマインダの全設定で作成アクション時に通知が届くこと
      [0:01] ntf-440 (旧: 6-2)   通知・リマインダの全設定で更新アクション時に通知が届くこと
      [0:01] ntf-450 (旧: 6-3)   通知・リマインダの全設定で削除アクション時に通知が届くこと
      [0:01] ntf-460 (旧: 6-4)   通知・リマインダの全設定でWFステータス変更時に通知が届くこと
      [0:01] ntf-470 (旧: 6-5)   組織宛ての通知設定で組織メンバーに通知が届くこと
      [0:01] ntf-480 (旧: 80-1)  リマインダ設定（分後）で指定時間後に通知が届くこと
      [0:01] ntf-490 (旧: 80-2)  リマインダ設定（WF申請中）でリマインダ通知が届くこと
      [0:01] ntf-500 (旧: 81-1)  表示項目「テーブル名のみ」で通知内容に反映されること
      [0:01] ntf-510 (旧: 81-2)  表示項目「URLのみ」で通知内容に反映されること
      [0:01] ntf-520 (旧: 81-3)  表示項目「作成(更新)データのみ」で通知内容に反映されること
      [0:01] ntf-530 (旧: 81-4)  表示項目「更新者のみ」で通知内容に反映されること

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:01] ntf-390 ── 通知先メールアドレスを追加（作成時通知）
    1. /admin/notification を開き、既存の通知設定の編集アイコンをクリックして編集画面に遷移する
    2. 「通知先メールアドレス」欄の「+」ボタンをクリックして入力欄を追加する
    3. test@loftal.sakura.ne.jp を入力して「更新」ボタンをクリックして保存する
    4. ✅ 通知設定一覧の通知先メールアドレス欄に設定したアドレスが表示されること
    5. 対象テーブルに新規レコードを作成する
    6. ✅ /admin/notification_log に設定したメールアドレス宛の通知ログが記録されること

    [0:01] ntf-400 ── 通知先メールアドレスを変更（更新時通知）
    1. 通知設定の編集画面で既存の通知先メールアドレスを別のアドレスに変更して保存する
    2. 対象テーブルのレコードを更新する
    3. ✅ 変更後のメールアドレスへ通知が届くこと

    [0:00] ntf-410 ── 通知先メールアドレスを削除（削除時通知）
    1. 通知設定の編集画面で通知先メールアドレスを追加し、その後削除ボタンで削除して保存する
    2. 対象テーブルのレコードを削除する
    3. ✅ 設定が正しく保存され通知動作に問題がないこと

    [0:01] ntf-420 ── 通知先メールアドレス追加（WFステータス変更時）
    1. 通知設定の編集画面で通知先メールアドレスを追加して保存する
    2. 対象テーブルでワークフロー承認作業を実施する
    3. ✅ 設定したメールアドレスへWFステータス変更時の通知が届くこと

    [1:05] ntf-430〜460 ── 通知先全種別（Slack・ユーザー・組織・メール）の通知テスト
    1. Slack Webhook URL・通知先ユーザー・通知先組織・通知先メールアドレスを全て設定する
    2. 通知設定とリマインダ設定を行い「登録」する
    3. ntf-430: アクション「作成」でレコードを新規作成する
    4. ✅ 設定したSlack・ユーザー・組織・メールアドレスへそれぞれ通知が届くこと
    5. ntf-440: アクション「更新」でレコードを更新する → ✅ 全通知先に通知が届くこと
    6. ntf-450: アクション「削除」でレコードを削除する → ✅ 全通知先に通知が届くこと
    7. ntf-460: アクション「WFステータス変更時」で承認作業を行う → ✅ 全通知先に通知が届くこと

    [0:01] ntf-470 ── 組織宛ての通知
    1. 通知先に組織を設定して「登録」する
    2. 対象テーブルにレコードを作成する
    3. ✅ 組織に属するユーザー全員へ通知が届くこと

    [0:01] ntf-480 ── リマインダ設定（分後）
    1. リマインダ設定で「作成日時の1分後」に通知するよう設定し、条件を「作成者がマスターA」にして登録する
    2. マスターAユーザーで対象テーブルに新規レコードを追加する
    3. ✅ 1分後に設定した通知先へリマインダ通知が届くこと

    [0:01] ntf-490 ── リマインダ設定（WF申請中）
    1. リマインダ設定で「作成日時の1分後」・条件「ワークフローが申請中」に設定して登録する
    2. 対象テーブルに新規レコードを追加して申請する
    3. ✅ 1分後に設定した通知先へリマインダ通知が届くこと

    [0:01] ntf-500 ── 表示項目「テーブル名のみ」
    1. 通知設定の表示項目で「テーブル名」のみチェックし、他はOFFにして保存する
    2. 対象テーブルに新規レコードを追加する
    3. ✅ 通知メール本文にテーブル名は含まれ、URL・データ・更新者・フッターは含まれないこと

    [0:01] ntf-510 ── 表示項目「URLのみ」
    1. 表示項目で「URL」のみチェックして保存する
    2. ✅ 通知メール本文にレコードURLは含まれ、他の項目は含まれないこと

    [0:01] ntf-520 ── 表示項目「作成(更新)データのみ」
    1. 表示項目で「作成(更新)データ」のみチェックして保存する
    2. ✅ 通知メール本文に作成・更新されたデータの内容は含まれ、他の項目は含まれないこと

    [0:01] ntf-530 ── 表示項目「更新者のみ」
    1. 表示項目で「更新者」のみチェックして保存する
    2. ✅ 通知メール本文に更新者の情報は含まれ、他の項目は含まれないこと
