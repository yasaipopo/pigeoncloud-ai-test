# ──────────────────────────────────────────────
# movie: TM01 (tpl-010〜tpl-060 を1動画で確認)
# ──────────────────────────────────────────────
- case_no: tpl-010
  feature: テンプレート
  description: ①テンプレート一覧モーダルが正常に表示されること
  expected: |
    エラーなくページが正常に表示されること
  movie: TM01
  detailed_flow: |
    【TM01 テストフロー】この動画で確認するテスト番号:
      tpl-010        (旧: TMPL-01)  テンプレート一覧表示
      tpl-020        (旧: TMPL-02)  テンプレート詳細確認
      tpl-030        (旧: TMPL-03)  「戻る」で一覧に戻る
      tpl-040        (旧: TMPL-04)  テンプレートインストール
      tpl-050        (旧: TMPL-05)  モーダルを閉じる
      tpl-060        (旧: TMPL-06)  テンプレート名表示

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] tpl-010 ── テンプレート一覧モーダルが表示されること
    1. ダッシュボードを開き、サイドバーの「+」→「テンプレートから追加」をクリック
    2. ✅ テンプレートモーダルが表示されること
    3. ✅ テンプレート一覧（#templates）が表示され、アイコンが1件以上あること
    4. ✅ 「スキップ」ボタンが表示されること

    tpl-020 ── テンプレートの詳細を確認できること
    5. テンプレートアイコンをクリック
    6. ✅ テンプレート詳細（説明テキストまたはプレビュー）が表示されること

    tpl-030 ── 「戻る」で一覧に戻れること
    7. 詳細画面で「戻る」ボタンをクリック
    8. ✅ テンプレート一覧（#templates）が再び表示されること

    tpl-040 ── テンプレートをインストールできること
    9. テンプレートアイコンをクリック→「インストール」ボタンをクリック
    10. ✅ エラーなくインストール処理が完了すること
    11. ✅ サイドバーに新しいテーブルリンクが追加されること

    tpl-050 ── テンプレートモーダルを閉じられること
    12. テンプレートモーダルを再度開く
    13. 「スキップ」ボタンをクリック
    14. ✅ モーダルが閉じられること

    tpl-060 ── テンプレート一覧にテンプレート名が表示されること
    15. テンプレートモーダルを開く
    16. ✅ 各テンプレートアイコンにテンプレート名テキストが含まれること
  old_case_no: TMPL-01
