- case_no: fld5-010
  feature: フィールド追加オプション
  description: ①文字列(一行)フィールドの追加オプション（表示条件）UIが確認できること
  expected: |
    文字列(一行)フィールドの追加オプション（表示条件）UIが確認できること
  movie: F501
  detailed_flow: |-
    【F501 テストフロー】この動画で確認するテスト番号:
      fld5-010       (旧: 850-1)   フィールド追加オプション
      fld5-020       (旧: 850-2)   フィールド追加オプション
      fld5-030       (旧: 850-3)   フィールド追加オプション
      fld5-040       (旧: 850-4)   フィールド追加オプション
      fld5-050       (旧: 850-5)   フィールド追加オプション
      fld5-060       (旧: 850-6)   フィールド追加オプション
      fld5-070       (旧: 850-7)   フィールド追加オプション
      fld5-080       (旧: 850-8)   フィールド追加オプション
      fld5-090       (旧: 850-9)   フィールド追加オプション
      fld5-100       (旧: 850-10)  フィールド追加オプション
      fld5-110       (旧: 850-11)  フィールド追加オプション
      fld5-120       (旧: 850-12)  フィールド追加オプション
      fld5-130       (旧: 850-13)  フィールド追加オプション

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    【前提】ALLテストテーブルが作成済みであること（getAllTypeTableId で取得）
    【URL】/admin/dataset/edit/{tableId}
    【フィールドタイプ】文字列(一行) = type: 'text'
    【settingTypes label】'文字列(一行)'（edit.component.ts の settingTypes に未定義のため、DBのtype='text'は独自表示）
    【ALLテストフィールドlabelキーワード】'テキスト'
    【手順】
    1. フィールド設定ページ（/admin/dataset/edit/{tableId}）に遷移する
       - await page.goto(BASE_URL + '/admin/dataset/edit/' + tableId)
       - await page.waitForSelector('.overSetting', { timeout: 180000 })
    2. getFieldLabelMap() でフィールド名→overSettingインデックスのマップを取得する
    3. findIndexByLabel(labelMap, ['テキスト']) でインデックスを特定し、openFieldDialogByIndex() でクリックする
       - セレクター: .overSetting（nth(idx)をクリック）
       - クリック後: モーダル（.modal.show）が表示される
    4. 「追加オプション設定」ボタンをクリックして追加オプションセクションを展開する
       - セレクター: .modal.show button:has-text("追加オプション設定")
       - HTMLソース: dataset-field-one.component.html L1122（type != 'fixed_html' の場合表示）
    5. 「表示条件設定」ラベルが表示されていることを確認する
       - セレクター: .modal.show .locator('text=表示条件設定').first()
       - HTMLソース: dataset-field-one.component.html L1261-1272（!isAdd() && type != 'relation_table'）
    6. 「条件追加」ボタンが存在することを確認する
       - セレクター: .modal.show button:has-text("条件追加")
    【期待値アサーション】
    - expect(page.locator('.modal.show button:has-text("追加オプション設定")')).toBeVisible()
    - expect(page.locator('.modal.show').locator('text=表示条件設定').first()).toBeVisible()
    - expect(await page.locator('.modal.show button:has-text("条件追加")').count()).toBeGreaterThan(0)
  old_case_no: 850-1
