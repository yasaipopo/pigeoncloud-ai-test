    [0:00] fld5-010 ── 文字列(一行)フィールドの追加オプション（表示条件）UIが確認できること
    1. テーブル設定画面（/admin/dataset/edit/{tableId}）を開く
    2. フィールド一覧から「テキスト」（文字列一行）フィールド行の設定ボタンをクリックして編集モーダルを開く
    3. 「追加オプション設定」ボタンをクリックして追加オプションセクションを展開する
    4. 「表示条件設定」ラベルと「条件追加」ボタンが表示されていることを確認する
    ✅ 「追加オプション設定」ボタンが表示されること
