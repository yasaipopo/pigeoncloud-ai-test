- case_no: 99-1
  feature: メール配信・通知
  description: ①メールテンプレートをテキストタイプTEXTで新規作成がエラーなく行えること
  expected: |
    エラーが発生しないこと
  movie: N201
  detailed_flow: |
    1. /admin/mail_template を開く
    2. Angular初期化（body[data-ng-ready="true"]）を待つ
    3. ページが /admin/ のURLを含むことを確認
    4. body に「Internal Server Error」が含まれないことを確認
    5. .content, .main-content, main などのコンテンツ領域が表示されることを確認
    6. button:has-text("追加") または a:has-text("追加")（追加ボタン）をクリック
    7. テキストタイプ選択で「TEXT」を選択
    8. 件名・本文を入力して登録ボタンをクリック
    9. エラーメッセージが表示されないことを確認

