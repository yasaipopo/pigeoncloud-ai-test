  feature: テーブル権限設定
  category: ユーザーの権限設定
  description: |-
    ①該当のテーブルに対して、以下の通り「全ユーザーの権限設定」を行う。
    ②＜ユーザー＞。
    ③1ユーザーを選択。
    ④＜権限＞。
    ⑤・閲覧（チェック）
    ⑥・編集（チェック）
    ⑦・集計（チェック）
    ⑧・CSVダウンロード不可（チェック）
    ⑨・CSVアップロード不可（チェック）
    ⑩＜閲覧／編集できるレコードを条件で制限＞。
    ⑪・フィールド条件：が次の値以下。
    ⑫＜編集できるレコードを条件で制限＞。
    ⑬・が次の値以下。
    ⑭＜非表示フィールド＞。
    ⑮・非表示とするフィールドを１つ設定。
  expected: "設定を行ったテーブルに対して、以下設定が反映されていること。\n\n・閲覧\r\n・編集\r\n・集計\r\n・CSVダウンロード不可\r\n・CSVアップロード不可\r\n\n\n＜閲覧／編集できるレコードを条件で制限＞\n・フィールド条件に合った制御\n＜編集できるレコードを条件で制限＞\n・条件に合った制御\n＜非表示フィールド＞\n・設定したフィールドが非表示となっていること。"
  movie: TD07
  detailed_flow: |-
    1. /admin/dataset にアクセスしてテーブル管理一覧を表示する。
    2. 対象テーブルの編集アイコンをクリックし、テーブル設定画面（/admin/dataset/edit/{tableId}）に遷移する。
    3. 「権限設定」ボタンをクリックして権限設定画面に遷移する（/admin/dataset/edit/{tableId}/permission）。
    4. 指定された権限グループ（全ユーザー/組織/ユーザー）と権限（閲覧/編集/集計等）を設定する。
    5. 閲覧/編集できるレコードを条件で制限する場合は条件を設定する。
    6. 非表示フィールドを設定する場合は対象フィールドを選択する。
    7. 「更新する」または「追加する」ボタンをクリックして設定を保存する。
    8. 設定したユーザー/組織でログインし、テーブルに期待した権限が適用されていることを確認する。
