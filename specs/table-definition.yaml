group: テーブル定義・テーブル管理・テーブル設定
spec_file: tests/table-definition.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
  - case_no: tbl-010
    sheet: A
    feature: テーブル定義
    category: |-
      ＜追加オプション設定＞
      詳細画面  ->  複製ボタンを非表示＜有効＞
    description: |-
      ①テーブル管理より、該当のテーブル編集画面を開く。
      ②「追加オプション設定」をクリックし、詳細画面 --> 「複製ボタンを非表示」の「有効」にチェックを入れ設定を保存する。
    expected: レコード詳細画面に複製ボタンが表示されていないことを確認する。
    movie: TD02
    detailed_flow: |-
      【TD02 テストフロー】この動画で確認するテスト番号:
        tbl-010 (旧: 107-01)  詳細画面 → 複製ボタンを非表示〈有効〉
        tbl-020 (旧: 107-02)  詳細画面 → 複製ボタンを非表示〈無効〉
        tbl-100 (旧: 109-17)  詳細画面 → ログとコメントをまとめて表示〈有効〉
        tbl-110 (旧: 109-18)  詳細画面 → ログとコメントをまとめて表示〈無効〉
        tbl-120 (旧: 109-19)  編集画面 → 保存時コメントポップアップ〈有効〉
        tbl-140 (旧: 109-20)  編集画面 → 保存時コメントポップアップ〈無効〉
        tbl-150 (旧: 109-21)  編集画面 → フォームのスタイル〈フォーム〉
        tbl-160 (旧: 109-22)  編集画面 → フォームのスタイル〈アンケート〉

      ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      [0:00] tbl-010 ── 詳細画面 → 複製ボタンを非表示〈有効〉
      1. テーブル管理（/admin/dataset）を開く
      2. 対象テーブルの編集アイコンをクリックしてテーブル設定画面に遷移する
      3. 「詳細・編集画面」タブをクリックする
      4. 「追加オプション設定」を展開し、詳細画面→「複製ボタンを非表示」の「有効」にチェックを入れる
      5. 「更新する」ボタンをクリックして保存する
      6. テーブルのレコード一覧を開き、任意のレコードをクリックして詳細画面を開く
      7. ✅ 詳細画面に「複製」ボタンが表示されていないこと

      [tbl-020] 複製ボタンを非表示〈無効〉は同じ手順でチェックを外して保存
        ✅ 詳細画面に「複製」ボタンが表示されること

      [tbl-100] ログとコメントをまとめて表示〈有効〉は同じタブで「ログとコメントをまとめて表示する」にチェックを入れて保存
        ✅ レコード詳細画面でログとコメントが1つのセクションにまとめて表示されること

      [tbl-110] ログとコメントをまとめて表示〈無効〉はチェックを外す
        ✅ ログとコメントが別々のセクションに分かれて表示されること

      [tbl-120] 保存時コメントポップアップ〈有効〉は「編集画面」セクションで「保存時にコメントを残すポップアップを出す」にチェックを入れる
        ✅ レコード編集画面で保存ボタンを押した際にコメント入力ポップアップが表示されること

      [tbl-140] 保存時コメントポップアップ〈無効〉はチェックを外す
        ✅ 保存時にポップアップが表示されないこと

      [tbl-150] フォームのスタイル〈フォーム〉は「フォームのスタイル」を「フォーム」に設定して保存
        ✅ 編集画面がフォームスタイルで表示されること

      [tbl-160] フォームのスタイル〈アンケート〉は「フォームのスタイル」を「アンケート」に設定して保存
        ✅ 編集画面がアンケートスタイルで表示されること
    old_case_no: 107-01
