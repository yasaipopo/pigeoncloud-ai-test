  - case_no: tbl-030
    sheet: A
    feature: テーブル定義
    category: |-
      ＜追加オプション設定＞
      一覧画面　->　作成日時を表示＜無効＞
    description: |-
      ①テーブル管理より、該当のテーブル編集画面を開く。
      ②「追加オプション設定」をクリックし、一覧画面 --> 「作成日時を表示」の「有効」のチェックを外し設定を保存する。
    expected: テーブル一覧上に作成日時が表示されなくなること。
    movie: TD01
    detailed_flow: |-
      【TD01 テストフロー】この動画で確認するテスト番号:
        tbl-030 (旧: 109-10)  一覧画面 → 作成日時を表示〈無効〉
        tbl-040 (旧: 109-11)  一覧画面 → 作成者を表示〈有効〉
        tbl-050 (旧: 109-12)  一覧画面 → 作成者を表示〈無効〉
        tbl-060 (旧: 109-13)  一覧画面 → 全データ削除ボタンを表示〈有効〉
        tbl-070 (旧: 109-14)  一覧画面 → 全データ削除ボタンを表示〈無効〉
        tbl-080 (旧: 109-15)  一覧画面 → 一覧編集／登録モード〈有効〉
        tbl-090 (旧: 109-16)  一覧画面 → 一覧編集／登録モード〈無効〉
        tbl-130 (旧: 109-1)   一覧画面 → 1ページあたりの表示データ数
        tbl-190 (旧: 109-2)   一覧画面 → デフォルトのソート順
        tbl-200 (旧: 109-3)   一覧画面 → カレンダー表示〈有効〉
        tbl-210 (旧: 109-4)   一覧画面 → カレンダー表示〈無効〉
        tbl-220 (旧: 109-5)   一覧画面 → IDを表示〈有効〉
        tbl-230 (旧: 109-6)   一覧画面 → IDを表示〈無効〉
        tbl-240 (旧: 109-7)   一覧画面 → 更新日時を表示〈有効〉
        tbl-250 (旧: 109-8)   一覧画面 → 更新日時を表示〈無効〉
        tbl-260 (旧: 109-9)   一覧画面 → 作成日時を表示〈有効〉

      ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      [0:00] tbl-030 ── 一覧画面 → 作成日時を表示〈無効〉
      1. テーブル管理（/admin/dataset）を開く
      2. 対象テーブルの編集アイコンをクリックしてテーブル設定画面に遷移する
      3. 「一覧画面」タブをクリックする
      4. 「追加オプション設定」を展開し、「作成日時を表示」の有効チェックを外す
      5. 「更新する」ボタンをクリックして保存する
      6. テーブルのレコード一覧を開く
      7. ✅ テーブルの列ヘッダーに「作成日時」が表示されていないこと

      [tbl-040] 作成者を表示〈有効〉は同じ手順で「作成者を表示」にチェックを入れて保存
        ✅ テーブル一覧の列ヘッダーに「作成者」が表示されること

      [tbl-050] 作成者を表示〈無効〉は同じ手順でチェックを外して保存
        ✅ テーブル一覧の列ヘッダーに「作成者」が表示されないこと

      [tbl-060] 全データ削除ボタンを表示〈有効〉は「メニューに「全てのデータを削除」を表示」にチェックを入れる
        ✅ テーブル一覧のメニューに「全てのデータを削除」ボタンが表示されること

      [tbl-070] 全データ削除ボタンを表示〈無効〉はチェックを外す
        ✅ テーブル一覧のメニューに「全てのデータを削除」ボタンが表示されないこと

      [tbl-080] 一覧編集／登録モード〈有効〉は「一覧編集／登録モード」にチェックを入れる
        ✅ テーブル一覧で直接行を編集・追加できる「編集モード」ボタンが表示されること

      [tbl-090] 一覧編集／登録モード〈無効〉はチェックを外す
        ✅ 「編集モード」ボタンが一覧画面から消えること

      [tbl-130] 1ページあたりの表示データ数を「5(行)」に設定して保存
        ✅ テーブル一覧が5行単位でページネーションされること

      [tbl-190] デフォルトのソート順を「ID（昇順）」に設定して保存
        ✅ テーブル一覧がID昇順で表示されること

      [tbl-200] カレンダー表示〈有効〉は「カレンダー表示」にチェックを入れて該当設定を行い保存
        ✅ テーブル一覧にカレンダー表示モードが有効になること

      [tbl-210] カレンダー表示〈無効〉はチェックを外す
        ✅ カレンダー表示が無効になること

      [tbl-220] IDを表示〈有効〉は「IDを表示」にチェックを入れて保存
        ✅ テーブル一覧の列ヘッダーに「ID」が表示されること

      [tbl-230] IDを表示〈無効〉はチェックを外す
        ✅ 「ID」列が表示されないこと

      [tbl-240] 更新日時を表示〈有効〉は「更新日時を表示」にチェックを入れて保存
        ✅ テーブル一覧の列ヘッダーに「更新日時」が表示されること

      [tbl-250] 更新日時を表示〈無効〉はチェックを外す
        ✅ 「更新日時」列が表示されないこと

      [tbl-260] 作成日時を表示〈有効〉は「作成日時を表示」にチェックを入れて保存
        ✅ テーブル一覧の列ヘッダーに「作成日時」が表示されること
    old_case_no: 109-10
