- case_no: '228'
  sheet: A
  feature: 他テーブル参照
  category: 表示条件設定
  description: '①テーブルへの項目追加で「選択」を追加し保存する

    ②保存後、「他テーブル参照」の設定を開き、「追加オプション」ボタンをクリック

    ③条件追加ボタンをクリックし、表示条件設定項目が表示されていることを確認

    ④対象の項目を選択後、「～が次と一致」を選択し検索文言を入力し保存する。

    ⑤④の設定が機能していることを確認する

    ※④の「～が次と一致」のところは全種類確認する

    ※④のところは「他の項目を条件で利用する」を有効にしたテストも実施し、「～が次と一致」のところは全種類動作確認する'
  expected: 設定した表示条件どおりの表示となること。
- case_no: '242'
  sheet: A
  feature: 他テーブル参照
  category: 必須条件設定
  description: '①テーブルへの項目追加で「他テーブル参照」を追加し保存する

    ②保存後、「他テーブル参照」の設定を開き、「追加オプション」ボタンをクリック

    ③「必須設定」⇒『必須項目にする』をチェックし、必須条件設定項目が表示されていることを確認

    ④対象の項目を選択後、「～が次と一致」を選択し検索文言を入力し保存する。

    ⑤④の設定が機能していることを確認する

    ※④の「～が次と一致」のところは全種類確認する

    ※④のところは「他の項目を条件で利用する」を有効にしたテストも実施し、「～が次と一致」のところは全種類動作確認する'
  expected: 設定した必須条件どおりの表示となること。
