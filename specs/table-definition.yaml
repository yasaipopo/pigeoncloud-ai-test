- case_no: TBL-FULL
  feature: テーブル定義・フィールド設定総合
  category: 動画単位
  description: |
    ①テーブルを新規作成する
    ②各種フィールド（テキスト・数値・日時・計算・参照）を追加・設定する
    ③テーブル定義の変更（順番入替・コピー・削除）を確認する
    ④計算項目でIF文のnull判定が正しく動作することを確認
    ⑤日時項目(年月)で全角数字入力時の半角変換を確認
    ⑥他テーブル参照の並び順・デフォルト値設定が正しく機能することを確認
    ⑦関連レコードの配置位置設定が正しく表示されることを確認
    ⑧ページネーション（≪≫ボタン）の動作を確認
    ⑨リッチテキストのHTMLタグ非露出を確認
    ⑩装飾テキストの正常表示を確認
    ⑪ビュー設定（表示/非表示・表示順・サイズ等）を確認する
  expected: |
    テーブル定義の作成・変更・各フィールド設定・計算・参照・ビューが全て正常に動作すること
