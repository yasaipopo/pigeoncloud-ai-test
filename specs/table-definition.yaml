- case_no: 153-10
  sheet: B
  feature: テーブル
  category: |-
    権限設定
    （詳細設定）
    ※テーブル権限設定＋【高度な設定】項目権限設定
  description: |-
    ①テーブル管理より、該当テーブルの編集アイコンをクリック。
    ②権限設定をクリック。
    ③「詳細設定」を選択し、テーブル権限設定を以下の通り設定し「追加する」をクリック。
    　・権限グループ：全ユーザー
    　・テーブル項目設定：チェックなし
    　・閲覧のみチェックあり
    　・閲覧条件：IDが次の値以上「2」
    　・編集条件：IDが次の値以上「3」
    　・非表示項目：該当の項目を選択
    ④【高度な設定】項目権限設定を以下の通り設定し、「更新」をクリック。
    　・対象項目：該当の項目を選択
    　・権限グループ：該当のユーザー1名（マスターユーザーは設定しない）＋該当の組織1つを選択
    　・閲覧権限：ON
    　・編集権限：ON
    ⑤上記④に該当するユーザーでログインし該当テーブルの操作実施。
    ⑥上記④以外のユーザーでログインし該当テーブルの操作実施。
  expected: |-
    ④に該当するユーザーでログインした際、該当項目が閲覧可能＋編集可能であること。


    ④に該当しないユーザーの場合、該当項目が閲覧のみであること。
  movie: TD07
  detailed_flow: |-
    1. /admin/dataset にアクセスしてテーブル管理一覧を表示する。
    2. 対象テーブルの編集アイコンをクリックし、テーブル設定画面に遷移する。
    3. 「権限設定」ボタンをクリックして権限設定画面に遷移する。
