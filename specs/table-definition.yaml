  detailed_flow: |-
    1. /admin/dataset にアクセスしてテーブル管理一覧を表示する。
    2. 対象テーブルの編集アイコンをクリックし、テーブル設定画面に遷移する。
    3. 左サイドメニューの「詳細・編集画面」タブをクリックする。
    4. 「追加オプション設定」セクションを展開し、「複製ボタンを非表示」の「有効」チェックボックスをオフにする。
    5. 「更新する」ボタンをクリックして設定を保存する。
    6. /admin/dataset__{tableId} にアクセスしてレコード一覧を表示する。
    7. 任意のレコード行をクリックしてレコード詳細画面に遷移する。
    8. レコード詳細画面に「複製」ボタンが表示されていることを確認する。
