    sheet: A
    feature: テーブル定義
    category: |-
      ＜追加オプション設定＞
      メニュー　->　グループ＜有効＞
    description: |-
      ①テーブル管理より、該当のテーブル編集画面を開く。
      ②「追加オプション設定」をクリックし、メニュー --> 「グループ」へ「テストグループ」と入力し設定を保存する。
    expected: 該当のテーブルがテストグループの配下となること。
    movie: TD03
    detailed_flow: |-
      【TD03 テストフロー】この動画で確認するテスト番号:
        tbl-170 (旧: 109-23)  メニュー → グループ設定〈有効〉
        tbl-180 (旧: 109-24)  メニュー → グループ設定〈無効〉

