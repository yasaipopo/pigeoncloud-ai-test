    movie: TD12
    detailed_flow: |-
      【TD12 テストフロー】この動画で確認するテスト番号:
        tbl-1470 (旧: 476)   バグ修正確認 → 子テーブルのSUMIF計算
        tbl-1480 (旧: 488)   バグ修正確認 → 子テーブルの{親テーブル::項目名}計算
        tbl-1490 (旧: 493)   バグ修正確認 → 複製しない項目への子テーブル設定
        tbl-1500 (旧: 507)   バグ修正確認 → 他テーブル参照を用いたリアルタイム計算
        tbl-1510 (旧: 539)   バグ修正確認 → 日時フィールド（年月）の全角入力変換
        tbl-1520 (旧: 555)   バグ修正確認 → 子テーブルのリアルタイム反映
        tbl-1530 (旧: 558)   バグ修正確認 → 子テーブルのルックアップリアルタイム反映
        tbl-1540 (旧: 583)   バグ修正確認 → 子テーブル複製時の「複製しない項目」設定
        tbl-1550 (旧: 636)   バグ修正確認 → 重複キーの登録制御
        tbl-1560 (旧: 654)   バグ修正確認 → ルックアップ項目の一覧表示文字数制限
        tbl-1570 (旧: 693)   バグ修正確認 → 子テーブルの必須条件×ルックアップの×マーク

      ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      [0:00] tbl-1470 ── 子テーブルのSUMIF計算
      1. 親テーブルに子テーブルを設定し、子テーブルにSUMIF等の計算フィールドを追加して保存する
      2. 親テーブルのレコード詳細画面（/admin/dataset__{tableId}/view/{id}）を開く
      3. ✅ 子テーブルのSUMIF計算結果が正しく表示されること

      [tbl-1480] 子テーブルに{親テーブル::項目名}を含む計算項目がある状態で子テーブルのレコードを登録する
        ✅ データが親テーブルにも子テーブルにも正しく反映されること

      [tbl-1490] 「レコード複製する項目を指定」の「複製しない項目」に子テーブルを設定した状態で親レコードを複製する
        ✅ 「複製しない項目」に設定した子テーブルが複製されないこと

      [tbl-1500] 計算式に{他テーブル参照項目名::参照テーブルの他項目名}を含む計算項目があるテーブルでレコードを編集する
        ✅ 計算項目がリアルタイムで計算されて表示されること

      [tbl-1510] 日時フィールド（種類：年月）に全角で年（例：２０１４）を入力してF10キーで半角変換する
        ✅ 全角→半角変換が正しく行われ、必須項目エラーにならないこと

      [tbl-1520] 親テーブルに計算項目がない状態で子テーブルのレコードを追加・編集する
        ✅ 子テーブルの変更が親テーブルにリアルタイムで反映されること

      [tbl-1530] 子テーブルで他テーブル参照項目を選択した際に、ルックアップ項目が編集中にリアルタイムで反映されることを確認する
        ✅ 選択変更のたびにルックアップ値が即座に反映されること

      [tbl-1540] 子テーブルで「複製しない項目」設定がある状態で、親テーブル側の複製ボタンをクリックして子テーブルを複製する
        ✅ 「複製しない項目」に設定した項目が複製されないこと

      [tbl-1550] 重複キー制限があるフィールドで既存レコードと同じキー値のレコードを更新しようとする
        ✅ 重複エラーが表示されて更新できないこと

      [tbl-1560] ルックアップ項目に文章（複数行）があり「全てを表示」チェックを外して表示文字数を設定する
        ✅ 設定した表示文字数が適用されること

      [tbl-1570] 子テーブルの他テーブル参照項目を必須項目にし必須条件を設定した場合に、必須条件が満たされない時の入力フォームを確認する
        ✅ 必須条件が満たされない場合に×マークが正しく表示されること
