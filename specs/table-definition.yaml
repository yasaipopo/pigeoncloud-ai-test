group: テーブル定義・テーブル管理・テーブル設定
spec_file: tests/table-definition.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: 107-01
  sheet: A
  feature: テーブル定義
  category: |-
    ＜追加オプション設定＞
    詳細画面  ->  複製ボタンを非表示＜有効＞
  description: |-
    ①テーブル管理より、該当のテーブル編集画面を開く。
    ②「追加オプション設定」をクリックし、詳細画面 --> 「複製ボタンを非表示」の「有効」にチェックを入れ設定を保存する。
  expected: レコード詳細画面に複製ボタンが表示されていないことを確認する。
  movie: TD02
  detailed_flow: |-
    1. /admin/dataset にアクセスしてテーブル管理一覧を表示する。
    2. 対象テーブルの編集アイコンをクリックし、テーブル設定画面（/admin/dataset/edit/{tableId}）に遷移する。
    3. 左サイドメニューの「詳細・編集画面」タブ（.dataset-tabs [role=tab]）をクリックする。
    4. 「追加オプション設定」セクションを展開し、詳細画面 -> 「複製ボタンを非表示」の「有効」チェックボックスをオンにする。
    5. 「更新する」ボタン（button[type=submit].btn-primary）をクリックして設定を保存する。
    6. /admin/dataset__{tableId} にアクセスして対象テーブルのレコード一覧を表示する。
    7. 任意のレコード行をクリックしてレコード詳細画面に遷移する。
    8. レコード詳細画面に「複製」ボタンが表示されていないことを確認する（.btn-duplicate または「複製」テキストを含む要素が0件）。
- case_no: 107-02
  sheet: A
  feature: テーブル定義
  category: |-
