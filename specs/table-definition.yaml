  feature: 主キー複数項目設定（UI上のレコード作成時）
  description: |-
    ①テーブル設定で複数の項目を主キーとして設定する
    ②Pigeon UI上でレコードを新規作成し、既存レコードと同じ主キー値の組み合わせで登録を試みる
    ③エラーが表示されてレコード作成が阻止されることを確認する
    ④異なる主キー値の組み合わせでは正常に作成できることを確認する
  expected: 主キー複数項目設定がUI上のレコード作成時にも機能し、重複する主キーのレコードが作成できないこと
  movie: UC11
  detailed_flow: |-
    1. テーブル設定で複数の項目を主キーとして設定して保存する。
    2. /admin/dataset__{tableId}/add にアクセスして既存レコードと同じ主キーの組み合わせで値を入力して「保存」ボタンをクリックする。
    3. 「重複エラー」が表示されてレコード作成が阻止されることを確認する。
    4. 異なる主キーの組み合わせでは正常に保存できることを確認する。
