- case_no: CHILD-FULL
  feature: 子テーブル機能総合
  category: 動画単位
  description: |
    ①親テーブルに子テーブルを追加する
    ②子テーブルに{親テーブル::項目名}の計算式を設定し、リアルタイム計算を確認
    ③子テーブルの他テーブル参照でルックアップ値が正しく反映されることを確認
    ④子テーブルの複製（複製する/しないの項目指定含む）を確認
    ⑤子テーブルの個数制限設定が機能することを確認
    ⑥子テーブル全般の動作（関連レコード表示条件・親テーブル参照等）を確認
  expected: |
    子テーブルの計算・ルックアップ・複製・個数制限・全般機能が全て正常に動作すること
  includes:
  - CHILD-CALC
  - CHILD-DUPLICATE
  - CHILD-LIMIT
  - CHILD-LOOKUP
  - CHILD-MISC
