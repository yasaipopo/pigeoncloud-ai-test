- case_no: sys-050
  sheet: A
  feature: その他設定
  category: 新規ユーザーログイン時のパスワードリセット
  description: |-
    ①「その他設定」より「新規ユーザーのログイン時のパスワードリセットをOFFにする」にチェックを入れて「更新」ボタンをクリック

    ②新規ユーザーを作成

    ③新規ユーザーでログイン
  expected: 新規ユーザーで初回ログイン時、パスワード変更が画面が表示されないこと。
  movie: SS01
  detailed_flow: |-
    【SS01 テストフロー】この動画で確認するテスト番号:
      sys-050 (旧: 24-1)  その他設定 — パスワードリセットOFFで初回ログイン時パスワード変更なし
      sys-060 (旧: 24-2)  その他設定 — パスワードリセットONで初回ログイン時パスワード変更あり
      sys-070 (旧: 58-1)  その他設定 — 利用規約表示ONでログイン時に利用規約が表示される
      sys-080 (旧: 58-2)  その他設定 — 利用規約表示OFFでログイン時に利用規約が表示されない
      sys-140 (旧: 8-1)   その他設定 — 二段階認証を有効化
      sys-150 (旧: 8-2)   その他設定 — 二段階認証を無効化
      sys-280 (旧: 89-1)  その他設定 — パスワード強制変更間隔の設定と他設定への無影響確認

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] sys-140 ── 二段階認証を有効化
    1. その他設定ページ (/admin/admin_setting) を開く
    2. ✅ 「二段階認証を有効にする」ラベルと設定フォームが表示されること
    3. APIで二段階認証をONに設定し保存する
    4. ✅ 設定が保存されて二段階認証チェックボックスがONになること

    [0:05] sys-150 ── 二段階認証を無効化
    1. 引き続きその他設定ページを表示
    2. APIで二段階認証をOFFに設定し保存する
    3. ✅ 「二段階認証を有効にする」チェックボックスがOFF（未チェック）になること

    [0:10] sys-050 ── パスワードリセットOFFで初回ログイン時パスワード変更なし
    1. その他設定ページを開く
    2. ✅ 「新規ユーザーのログイン時のパスワードリセットをOFFにする」ラベルが表示されること
    3. APIで「パスワードリセットをOFFにする」設定をONにして保存する
    4. ✅ 設定が保存されてチェックボックスがONになること
    5. 設定をOFF（デフォルト）に戻す

    [0:15] sys-060 ── パスワードリセットONで初回ログイン時パスワード変更あり
    1. その他設定ページを開く
    2. APIで「パスワードリセットをOFFにする」設定をOFFにして保存する
    3. ✅ チェックボックスがOFF（未チェック）になること（= パスワードリセットがON状態）

    [0:20] sys-070 ── 利用規約表示ONでログイン時に利用規約が表示される
    1. その他設定ページを開く
    2. ✅ 「初回ログイン時に利用規約を表示する」ラベルが表示されること
    3. APIで利用規約表示をONに設定する
    4. ✅ 設定APIが成功すること（設定値がtrueに変わること）
    5. 設定をOFFに戻す（他テストへの影響防止）

    [0:25] sys-080 ── 利用規約表示OFFでログイン時に利用規約が表示されない
    1. APIで利用規約表示をONにしてから、OFFに変更して保存する
    2. ✅ 設定ページの利用規約チェックボックスがOFF（未チェック）になること

    [0:30] sys-280 ── パスワード強制変更間隔の設定と他設定への無影響確認
    1. その他設定ページを開く
    2. ✅ 「パスワード強制変更画面表示の間隔日数」入力フィールドが表示されること
    3. APIで間隔日数を9999日に設定して保存する
    4. ✅ 設定が保存されて間隔日数が9999になること
    5. 間隔日数を空にリセットする（パスワード強制変更が誘発されないよう）
    6. ✅ その他設定ページがエラーなく表示されること（他設定項目が壊れていないこと）
  old_case_no: 24-1
