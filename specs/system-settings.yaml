- case_no: sys-090
  sheet: A
  feature: システム利用状況
  category: '-'
  description: ①ユーザー数を増やす。
  expected: システム利用状況のユーザー数の表示が増えること。
  movie: SS04
  detailed_flow: |-
    【SS04 テストフロー】この動画で確認するテスト番号:
      sys-090 (旧: 7-1)  システム利用状況 — ユーザー数を増やす
      sys-100 (旧: 7-2)  システム利用状況 — ユーザー数を減らす
      sys-110 (旧: 7-3)  システム利用状況 — テーブル数を増やす
      sys-120 (旧: 7-4)  システム利用状況 — テーブル数を減らす
      sys-130 (旧: 7-5)  システム利用状況 — メール通知を実施

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] sys-090 ── ユーザー数を増やすとユーザー数表示が増える
    1. その他設定ページ (/admin/admin_setting) を開く
    2. ✅ 「二段階認証を有効にする」ラベルと設定フォームが表示されること
    3. APIでテストユーザーを1件作成する
    4. ✅ ユーザー作成APIが成功すること (result: success)
    5. ページをリロードしてフォームが引き続き表示されることを確認
    6. ✅ 設定フォームがエラーなく表示されること

    [0:08] sys-100 ── ユーザー数を減らすとユーザー数表示が減る
    1. ダッシュボードへ遷移する
    2. APIでテストユーザーを1件作成する
    3. ✅ ユーザー作成APIが成功すること (result: success)
    4. ユーザー管理ページ (/admin/admin) を開く
    5. ✅ ユーザー一覧テーブルが表示されること
    6. その他設定ページへ遷移する
    7. ✅ 設定フォームに「二段階認証を有効にする」ラベルが表示されること

    [0:15] sys-110 ── テーブル数を増やすとテーブル数表示が増える
    1. その他設定ページへ遷移する
    2. ✅ 「ロック自動解除時間」ラベルと設定フォームが表示されること
    3. ページをリロードしてフォームが引き続き表示されることを確認
    4. ✅ 設定フォームがエラーなく表示されること

    [0:20] sys-120 ── テーブル数を減らすとテーブル数表示が減る
    1. その他設定ページへ遷移する
    2. ✅ 設定フォームが表示されること
    3. テーブル管理ページ (/admin/table) を開き「新規追加」ボタンから一時テーブルを作成する
    4. 作成した一時テーブルを削除する（確認ダイアログで「削除」をクリック）
    5. その他設定ページへ戻る
    6. ✅ 「ロック自動解除時間」ラベルと設定フォームが表示されること

    [0:28] sys-130 ── メール通知を実施するとメール通知数表示が増える
    1. SMTP設定がある場合: APIでSMTP設定をONにする
    2. その他設定ページへ遷移する
    3. ✅ 設定フォームが表示されること
    4. ✅ 「通知の送信メールアドレスをSMTPで指定」ラベルが表示されること
    5. SMTP設定をOFFに戻す
    ※ SMTP認証情報が未設定の場合このケースはスキップ
  old_case_no: 7-1
