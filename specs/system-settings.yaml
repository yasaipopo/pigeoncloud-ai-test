  - 10-3
  - 10-4
- case_no: SYS-SETTINGS
  feature: システム設定・その他設定
  category: 動画単位
  description: |
    ①「その他設定」でパスワードリセットON/OFFを切り替え、新規ユーザーのログイン動作を確認する
    ②利用規約表示の有効/無効を切り替え、各ユーザータイプのログイン時の動作を確認する
    ③二段階認証の有効化・無効化を確認する
    ④パスワード強制変更画面表示の間隔日数を設定し動作を確認する
    ⑤システム利用状況（ユーザー数増減・テーブル数増減・メール通知）を確認する
    ⑥契約設定の表示・操作を確認する
  expected: |
    その他設定・二段階認証・パスワード強制変更・利用状況・契約設定が全て正常に動作すること
  includes:
