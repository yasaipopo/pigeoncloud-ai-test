- case_no: sys-050
  sheet: A
  feature: その他設定
  category: 新規ユーザーログイン時のパスワードリセット
  description: |-
    ①「その他設定」より「新規ユーザーのログイン時のパスワードリセットをOFFにする」にチェックを入れて「更新」ボタンをクリック

    ②新規ユーザーを作成

    ③新規ユーザーでログイン
  expected: 新規ユーザーで初回ログイン時、パスワード変更が画面が表示されないこと。
  movie: SS01
  detailed_flow: |-
    【SS01 テストフロー】この動画で確認するテスト番号:
      sys-050        (旧: 24-1)    その他設定
      sys-060        (旧: 24-2)    その他設定
      sys-070        (旧: 58-1)    その他設定
      sys-080        (旧: 58-2)    その他設定
      sys-140        (旧: 8-1)     その他設定
      sys-150        (旧: 8-2)     その他設定
      sys-280        (旧: 89-1)    その他設定

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    # パスワードリセットOFF設定で初回ログインのパスワード変更画面が表示されないことを確認
    1. その他設定ページへ遷移: `await page.goto(BASE_URL + '/admin/admin_setting/edit/1')`
    2. Angularロード待機
    3. 「新規ユーザーのログイン時のパスワードリセットをOFFにする」チェックボックスをONにする
    4. 「更新」または「保存」ボタンをクリック: `await page.locator('button:has-text("更新"), button:has-text("保存")').click()`
    5. 保存成功を確認
    6. debug APIで新規ユーザーを作成: `await debugApiPost(page, '/admin/debug/create-user')`
    7. 作成されたユーザーID（例: ishikawa+N@loftal.jp）とパスワード（admin）を取得
    8. 別ページ（プライベートウィンドウ相当）で新規ユーザーとしてログイン: ログインページで新規ユーザーIDとパスワードを入力
    9. ダッシュボードまたは通常ページに遷移し、パスワード変更画面が表示されないことを確認
    10. テスト後: その他設定のチェックを元に戻す
    # Assert
    - 「新規ユーザーのログイン時のパスワードリセットをOFFにする」ONの状態で初回ログイン時にパスワード変更画面が表示されないこと
    - ダッシュボードに直接遷移できること
  old_case_no: 24-1
