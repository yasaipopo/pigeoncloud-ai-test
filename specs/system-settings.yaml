- case_no: sys-160
  sheet: A
  feature: 共通設定
  category: レコード
  description: ①レコードの詳細情報表示を行う。
  expected: エラーなくレコードの詳細情報表示が行えること。
  movie: SS02
  detailed_flow: |-
    【SS02 テストフロー】この動画で確認するテスト番号:
      sys-160        (旧: 9-10)    共通設定
      sys-170        (旧: 9-11)    共通設定
      sys-180        (旧: 9-12)    共通設定
      sys-190        (旧: 9-1)     共通設定
      sys-200        (旧: 9-4)     共通設定
      sys-210        (旧: 9-5)     共通設定
      sys-220        (旧: 9-6)     共通設定
      sys-230        (旧: 9-8)     共通設定
      sys-240        (旧: 9-9)     共通設定
      sys-290        (旧: 9-2)     共通設定
      sys-300        (旧: 9-3)     共通設定
      sys-310        (旧: 9-7)     共通設定

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    # レコード詳細ページの表示確認
    1. テーブルID取得: `const tableId = await getAllTypeTableId(page)`
    2. レコード一覧へ遷移: `await page.goto(BASE_URL + '/admin/dataset__' + tableId)`
    3. Angularロード待機
    4. レコードが存在することを確認
    5. 最初のレコードの詳細リンクをクリック（行の目アイコンまたは詳細ボタン）: `await page.locator('table tbody tr:first-child td a, table tbody tr:first-child .detail-link').first().click()`
    6. レコード詳細ページが表示されることを確認: `await expect(page).toHaveURL(new RegExp('/admin/dataset__' + tableId + '/\\d+'))`
    7. フィールド名と値が表示されていることを確認: `await expect(page.locator('.record-detail, .field-value, [class*="detail-view"]')).toBeVisible()`
    # Assert
    - レコード詳細ページが表示されること
    - フィールド名と値が表示されること
    - エラーが出ないこと
  old_case_no: 9-10
