    11. 5秒待機してもアラートが消えていないことを確認: `await page.waitForTimeout(5000); await expect(page.locator('.alert-success, .toast')).toBeVisible()`
    12. テスト後: 設定を元に戻す（チェックをOFFにして保存）
    # Assert
    - アラートが表示されること
    - 5秒後もアラートが自動で消えていないこと
    - エラーが出ないこと

