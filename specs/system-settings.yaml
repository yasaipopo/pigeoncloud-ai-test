- case_no: sys-010
  sheet: A
  feature: 共通設定
  category: テーブル
  description: ①テーブルの順番入れ替えを行う。
  expected: エラーなくテーブルの順番変更が行えること。
  movie: SS03
  detailed_flow: |-
    【SS03 テストフロー】この動画で確認するテスト番号:
      sys-010        (旧: 10-1)    共通設定
      sys-020        (旧: 10-2)    共通設定
      sys-030        (旧: 10-3)    共通設定
      sys-040        (旧: 10-4)    共通設定

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    # テーブル定義一覧でドラッグ&ドロップによる並び替えを確認
    1. テーブル管理ページへ遷移: `await page.goto(BASE_URL + '/admin/dataset')`
    2. Angularロード待機: `await waitForAngular(page)`
    3. 「メニュー並び替え」ボタンが存在することを確認: `await expect(page.locator('button:has-text("メニュー並び替え")')).toBeVisible()`
    4. 「メニュー並び替え」ボタンをクリック
    5. 並び替えUIが表示されることを確認（ドラッグハンドルが現れる）
    6. Playwright drag APIで1番目のテーブルを2番目の位置にドラッグ: `await page.locator('.sortable-item').first().dragTo(page.locator('.sortable-item').nth(1))`
    7. 保存またはページをリロードして並び順が変更されていることを確認
    # Assert
    - 「メニュー並び替え」ボタンが存在すること
    - ドラッグ操作後に並び順が変更されること（または保存UIが表示されること）
    - エラーが出ないこと（Internal Server Error を含まない）
  old_case_no: 10-1
