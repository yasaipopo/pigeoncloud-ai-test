- case_no: sys-010
  sheet: A
  feature: 共通設定
  category: テーブル
  description: ①テーブルの順番入れ替えを行う。
  expected: エラーなくテーブルの順番変更が行えること。
  movie: SS03
  detailed_flow: |-
    【SS03 テストフロー】この動画で確認するテスト番号:
      sys-010 (旧: 10-1)  共通設定 — テーブルの順番入れ替え
      sys-020 (旧: 10-2)  共通設定 — テーブル情報詳細表示
      sys-030 (旧: 10-3)  共通設定 — テーブル定義の変更
      sys-040 (旧: 10-4)  共通設定 — テーブルの削除

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] sys-010 ── テーブルの順番入れ替え
    1. テーブル定義一覧 (/admin/dataset) を開く
    2. ✅ 「メニュー並び替え」ボタンが表示されること
    3. テーブル行をドラッグして順番を入れ替える
    4. ✅ ページがエラーなく表示され続けること（Internal Server Error が表示されないこと）

    [0:05] sys-020 ── テーブル情報詳細表示
    1. 引き続きテーブル定義一覧を表示
    2. ✅ 「メニュー並び替え」ボタンが表示されること
    3. ✅ テーブルの一覧行（テーブル名・件数等）が表示されること

    [0:10] sys-030 ── テーブル定義の変更
    1. ALLテストテーブルのレコード一覧 (/admin/dataset__N) を開く
    2. ✅ テーブル名「ALLテストテーブル」がヘッダーに表示されること
    3. ✅ 簡易検索フォームが表示されること
    4. ✅ IDカラムヘッダーが表示されること

    [0:15] sys-040 ── テーブルの削除
    1. 削除用の一時テーブルを作成し、削除APIを実行する
    2. ✅ 削除APIがエラーなく呼び出せること（result: success が返ること）
  old_case_no: 10-1
