group: 共通設定・システム設定・契約設定
spec_file: tests/system-settings.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: 10-1
  sheet: A
  feature: 共通設定
  category: テーブル
  description: ①テーブルの順番入れ替えを行う。
  expected: エラーなくテーブルの順番変更が行えること。
  movie: SS03
  detailed_flow: |
    # テーブル定義一覧でドラッグ&ドロップによる並び替えを確認
    1. テーブル管理ページへ遷移: `await page.goto(BASE_URL + '/admin/dataset')`
    2. Angularロード待機: `await waitForAngular(page)`
    3. 「メニュー並び替え」ボタンが存在することを確認: `await expect(page.locator('button:has-text("メニュー並び替え")')).toBeVisible()`
    4. 「メニュー並び替え」ボタンをクリック
    5. 並び替えUIが表示されることを確認（ドラッグハンドルが現れる）
    6. Playwright drag APIで1番目のテーブルを2番目の位置にドラッグ: `await page.locator('.sortable-item').first().dragTo(page.locator('.sortable-item').nth(1))`
    7. 保存またはページをリロードして並び順が変更されていることを確認
    # Assert
    - 「メニュー並び替え」ボタンが存在すること
    - ドラッグ操作後に並び順が変更されること（または保存UIが表示されること）
    - エラーが出ないこと（Internal Server Error を含まない）

- case_no: 10-2
  sheet: A
  feature: 共通設定
  category: テーブル
  description: ①テーブル情報詳細表示を行う。
  expected: エラーなくテーブル詳細情報の表示が行えること。
  movie: SS03
  detailed_flow: |
    # テーブル一覧からテーブル詳細（フィールド定義一覧）を表示
    1. テーブルID取得: `const tableId = await getAllTypeTableId(page)`
    2. テーブル管理ページへ遷移: `await page.goto(BASE_URL + '/admin/dataset')`
    3. Angularロード待機
    4. ALLテストテーブルの詳細ボタン（infoアイコンまたは行クリック）を探す
    5. テーブル名「ALLテストテーブル」の行の詳細ボタンをクリック: `await page.locator('a[href*="dataset__' + tableId + '"]').first().click()`
    6. ALLテストテーブルのフィールド定義一覧またはテーブル詳細ページが表示される: `await expect(page).toHaveURL(new RegExp('/admin/dataset__' + tableId))`
    7. テーブル名が表示されていることを確認: `await expect(page.locator('h1, h2, h3, h4, h5')).toContainText('ALLテスト')`
    8. フィールド一覧が表示されていることを確認（フィールドIDと名前が表示される）
    # Assert
    - テーブル詳細ページが表示されること
    - テーブル名・フィールド情報が表示されること
    - エラーが出ないこと

- case_no: 10-3
  sheet: A
  feature: 共通設定
  category: テーブル
  description: ①テーブル定義の変更を行う。
  expected: エラーなくテーブル定義の変更が行えること。
  movie: SS03
  detailed_flow: |
    # テーブル定義の変更（フィールド設定変更）を確認
    1. テーブルID取得: `const tableId = await getAllTypeTableId(page)`
    2. テーブル管理ページへ遷移: `await page.goto(BASE_URL + '/admin/dataset')`
    3. Angularロード待機
    4. テーブル一覧でALLテストテーブルの設定ボタン（鉛筆アイコン等）を探す
    5. ALLテストテーブルのフィールド定義ページへ: ギアアイコンボタンをクリックして「テーブル設定」を選択
    6. テーブル定義編集ページが表示されることを確認: `await expect(page).toHaveURL(new RegExp('/admin/dataset/edit/' + tableId + '|/admin/dataset__' + tableId + '/field'))`
    7. テーブル名または説明フィールドを変更（テスト後に元に戻す）
    8. 保存ボタンをクリック: `await page.locator('button:has-text("保存"), button:has-text("更新")').click()`
    9. 保存成功のアラートまたはページ遷移を確認
    # Assert
    - テーブル定義の編集UIが表示されること
    - 変更を保存できること
    - エラーが出ないこと

- case_no: 10-4
  sheet: A
  feature: 共通設定
  category: テーブル
  description: ①テーブルの削除を行う。
  expected: エラーなくテーブルの削除が行えること。
  movie: SS03
  detailed_flow: |
    # テーブル削除の動作確認（テスト専用の一時テーブルを作成して削除）
    # 注意: ALLテストテーブルは削除しない。専用の一時テーブルを使用
    1. debug APIで一時テーブルを作成: `await debugApiPost(page, '/admin/debug/create-all-type-table')`（または通常UIでテーブル作成）
    2. テーブル管理ページへ遷移: `await page.goto(BASE_URL + '/admin/dataset')`
    3. Angularロード待機
    4. 作成したテーブルの行を特定
    5. ギアメニューから「テーブル削除」を選択: `await page.locator('button#table-setting-btn').click()`, `await page.locator('text=テーブル削除').click()`
    6. 確認ダイアログが表示される
    7. 「削除する」ボタンをクリック: `await page.locator('#confirm-submit-btn:has-text("削除")').click()`
    8. テーブル一覧から削除したテーブルが消えることを確認
    # Assert
    - テーブルを削除できること
    - 削除後にテーブル一覧から消えること
    - エラーが出ないこと

- case_no: 24-1
  sheet: A
  feature: その他設定
  category: 新規ユーザーログイン時のパスワードリセット
  description: |-
    ①「その他設定」より「新規ユーザーのログイン時のパスワードリセットをOFFにする」にチェックを入れて「更新」ボタンをクリック

    ②新規ユーザーを作成

    ③新規ユーザーでログイン
  expected: 新規ユーザーで初回ログイン時、パスワード変更が画面が表示されないこと。
  movie: SS01
  detailed_flow: |
    # パスワードリセットOFF設定で初回ログインのパスワード変更画面が表示されないことを確認
    1. その他設定ページへ遷移: `await page.goto(BASE_URL + '/admin/admin_setting/edit/1')`
    2. Angularロード待機
    3. 「新規ユーザーのログイン時のパスワードリセットをOFFにする」チェックボックスをONにする
    4. 「更新」または「保存」ボタンをクリック: `await page.locator('button:has-text("更新"), button:has-text("保存")').click()`
    5. 保存成功を確認
    6. debug APIで新規ユーザーを作成: `await debugApiPost(page, '/admin/debug/create-user')`
    7. 作成されたユーザーID（例: ishikawa+N@loftal.jp）とパスワード（admin）を取得
    8. 別ページ（プライベートウィンドウ相当）で新規ユーザーとしてログイン: ログインページで新規ユーザーIDとパスワードを入力
    9. ダッシュボードまたは通常ページに遷移し、パスワード変更画面が表示されないことを確認
    10. テスト後: その他設定のチェックを元に戻す
    # Assert
    - 「新規ユーザーのログイン時のパスワードリセットをOFFにする」ONの状態で初回ログイン時にパスワード変更画面が表示されないこと
    - ダッシュボードに直接遷移できること

