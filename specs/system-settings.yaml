- case_no: 58-1
  sheet: A
  feature: その他設定
  category: ログイン時に利用規約を表示する
  description: |-
    ①「その他設定」より、「初回ログイン時に利用規約を表示する」の有効にチェックを入れ「更新」ボタンをクリック。
    ②「マスターユーザー」でログインする。
    ③「通常ユーザー」でログインする。
  expected: マスターユーザー／通常ユーザーともにログイン時に利用規約が表示されること。
  movie: SS01
  detailed_flow: |
    # 利用規約表示設定ONでログイン時に利用規約が表示されることを確認
    1. その他設定ページへ遷移: `await page.goto(BASE_URL + '/admin/admin_setting/edit/1')`
    2. Angularロード待機
    3. 「初回ログイン時に利用規約を表示する」チェックボックスをONにする
    4. 「更新」ボタンをクリック
    5. 保存成功を確認
    6. ログアウトして再度マスターユーザー（admin）でログイン
    7. 利用規約ページが表示されることを確認: `await expect(page.locator('text=利用規約, [class*="terms"], h1:has-text("利用規約")')).toBeVisible()`
    8. 「同意する」ボタンをクリック
    9. ダッシュボードに遷移することを確認
    10. debug APIで通常ユーザーを作成してログイン
    11. 通常ユーザーにも利用規約が表示されることを確認
    12. テスト後: その他設定のチェックを元に戻す
    # Assert
    - マスターユーザーのログイン時に利用規約が表示されること
    - 通常ユーザーのログイン時にも利用規約が表示されること

- case_no: 58-2
  sheet: A
  feature: その他設定
  category: ログイン時に利用規約を表示しない
  description: |-
    ①「その他設定」より、「初回ログイン時に利用規約を表示する」の有効にチェックを外し「更新」ボタンをクリック。
    ②「マスターユーザー」でログインする。
    ③「通常ユーザー」でログインする。
  expected: マスターユーザー／通常ユーザーともにログイン時に利用規約が表示されなくなること。
  movie: SS01
  detailed_flow: |
    # 利用規約表示設定OFFでログイン時に利用規約が表示されないことを確認
    1. その他設定ページへ遷移: `await page.goto(BASE_URL + '/admin/admin_setting/edit/1')`
    2. Angularロード待機
    3. 「初回ログイン時に利用規約を表示する」チェックボックスをOFF（未チェック）にする
    4. 「更新」ボタンをクリック
    5. 保存成功を確認
    6. ログアウトして再度マスターユーザー（admin）でログイン
    7. 利用規約ページが表示されないことを確認（直接ダッシュボードへ遷移）: `await expect(page).toHaveURL(/dashboard/)`
    8. 利用規約を示すテキストが存在しないことを確認: `await expect(page.locator('text=利用規約')).not.toBeVisible()`
    9. テスト後: 設定を元の状態に戻す
    # Assert
    - チェックOFF後にマスターユーザーでログインした際に利用規約が表示されないこと
    - ダッシュボードに直接遷移できること

- case_no: 7-1
  sheet: A
  feature: システム利用状況
  category: '-'
  description: ①ユーザー数を増やす。
  expected: システム利用状況のユーザー数の表示が増えること。
  movie: SS04
  detailed_flow: |
    # ユーザーを追加してシステム利用状況のユーザー数が増えることを確認
    1. システム利用状況ページへ遷移: `await page.goto(BASE_URL + '/admin/info/management')`
    2. Angularロード待機
    3. 現在のユーザー数を記録: `const beforeText = await page.locator('text=現在ログインユーザー数, text=ユーザー').first().textContent()`
    4. debug APIでユーザーを追加: `await debugApiPost(page, '/admin/debug/create-user')`
    5. システム利用状況ページをリロード: `await page.reload()`
    6. Angularロード待機
    7. ユーザー数が増えていることを確認: `await expect(page.locator(':text("テスト"), :text("ユーザー数")')).toContainText()`
    # Assert
    - ユーザー追加後にシステム利用状況のユーザー数が増えること（または /admin/admin ページでユーザー一覧件数が増えること）
    - エラーが出ないこと

- case_no: 7-2
  sheet: A
  feature: システム利用状況
  category: '-'
  description: ①ユーザー数を減らす。
  expected: システム利用状況のユーザー数の表示が減ること。
  movie: SS04
  detailed_flow: |
    # ユーザーを削除してシステム利用状況のユーザー数が減ることを確認
    1. システム利用状況ページへ遷移: `await page.goto(BASE_URL + '/admin/info/management')`
    2. Angularロード待機
    3. ユーザー管理ページへ遷移: `await page.goto(BASE_URL + '/admin/admin')`
    4. 現在のユーザー数を記録: `const beforeCount = await page.locator('table tbody tr').count()`
    5. テストユーザーを削除（debug APIで作成済みのユーザー）
    6. ページをリロード
    7. ユーザー一覧の件数が減っていることを確認: `expect(await page.locator('table tbody tr').count()).toBeLessThan(beforeCount)`
    8. システム利用状況ページで確認: `await page.goto(BASE_URL + '/admin/info/management')`
    # Assert
    - ユーザー削除後にユーザー管理の件数が減ること
    - エラーが出ないこと

