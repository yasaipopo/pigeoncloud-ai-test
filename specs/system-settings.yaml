- case_no: 8-1
  sheet: A
  feature: その他設定
  category: 二段階認証
  description: ①二段階認証を有効化する。
  expected: 2段階認証の設定が行われること。
  movie: SS01
  detailed_flow: |
    # 二段階認証を有効化して設定が保存されることを確認
    1. その他設定ページへ遷移: `await page.goto(BASE_URL + '/admin/admin_setting/edit/1')`
    2. Angularロード待機
    3. 「二段階認証を有効にする」のチェックボックスを探す: `await page.locator('label:has-text("二段階認証")')`
    4. チェックボックスを確認（現在の状態を記録）
    5. チェックボックスをONにする: `await page.locator('input[type="checkbox"]:near(:text("二段階認証"))').check()`
    6. 「更新」ボタンをクリック: `await page.locator('button:has-text("更新"), button:has-text("保存")').click()`
    7. 保存成功（アラートまたはページ更新）を確認
    8. ページをリロードして設定が保持されることを確認: `await expect(page.locator('input[type="checkbox"]:near(:text("二段階認証"))')).toBeChecked()`
    9. テスト後: チェックを元の状態に戻す
    # Assert
    - 二段階認証チェックボックスがONになること
    - 設定が保存・保持されること
    - エラーが出ないこと

- case_no: 8-2
  sheet: A
  feature: その他設定
  category: 二段階認証
  description: ①二段階認証を無効化する。
  expected: 2段階認証の設定が解除されること。
  movie: SS01
  detailed_flow: |
    # 二段階認証を無効化して設定が保存されることを確認
    1. その他設定ページへ遷移: `await page.goto(BASE_URL + '/admin/admin_setting/edit/1')`
    2. Angularロード待機
    3. 「二段階認証を有効にする」チェックボックスをOFFにする
    4. 「更新」ボタンをクリック
    5. 保存成功を確認
    6. ページをリロードしてチェックがOFFになっていることを確認: `await expect(page.locator('input[type="checkbox"]:near(:text("二段階認証"))')).not.toBeChecked()`
    # Assert
    - 二段階認証チェックボックスがOFFになること
