- case_no: '391'
  sheet: B
  feature: その他設定
  description: |-
    ①システム設定のその他設定を開く
    ②「アラートを自動で閉じない」設定を有効にする
    ③保存する
    ④レコードを登録し、成功アラートが表示されることを確認する
    ⑤アラートが自動で消えずに表示され続けることを確認する
  expected: 「アラートを自動で閉じない」設定を有効にした場合、アラートが自動で閉じずに表示され続けること
  movie: UC04
  detailed_flow: |
    # 「アラートを自動で閉じない」設定でアラートが自動消去されないことを確認
    1. その他設定ページへ遷移: `await page.goto(BASE_URL + '/admin/admin_setting/edit/1')`
    2. Angularロード待機
    3. 「アラートを自動で閉じない」チェックボックスをONにする: `await page.locator('input[type="checkbox"]:near(:text("アラートを自動で閉じない"))').check()`
    4. 「更新」ボタンをクリック
    5. 保存成功を確認
    6. テーブルID取得: `const tableId = await getAllTypeTableId(page)`
    7. レコード一覧へ遷移
    8. 「+」ボタンでレコード追加モーダルを開く
