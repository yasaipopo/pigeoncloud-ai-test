- case_no: SYS-TABLE
  feature: テーブル管理・レコード操作
  category: 動画単位
  description: |
    ①テーブルの順番入れ替えを行う
    ②テーブル情報詳細表示を行う
    ③テーブル定義の変更を行う
    ④テーブルの削除を行う
    ⑤レコードの追加・詳細表示・編集・削除を行う
    ⑥全てのデータ削除を実行する
    ⑦集計・チャート追加・データ検索を行う
    ⑧CSVダウンロード・アップロードを行う
    ⑨帳票登録を行う
  expected: |
    テーブル管理のCRUD・レコード操作・集計・CSV・帳票が全て正常に動作すること
  includes:
  - 9-1
  - 9-2
  - 9-3
  - 9-4
  - 9-5
  - 9-6
  - 9-7
  - 9-8
  - 9-9
