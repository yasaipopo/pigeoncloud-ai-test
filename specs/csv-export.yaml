cases:
- case_no: 148-01
  sheet: B
  feature: CSVダウンロード
  category: CSVダウンロード/アップロードに子テーブルも含める
  description: |
    子テーブルが設定されているテーブルよりCSVダウンロードを実施する
    ①CSVダウンロード項目に固定テキストが含まれないことを確認（#337 バグ修正確認）
    ②クロス集計フィルタ適用状態でCSVダウンロードがエラーなく完了することを確認（#378 バグ修正確認）
    ③文字列(一行)に「1-03」等の日付風文字列が入っている場合、CSVで「1月3日」に変換されずそのまま出力されることを確認（#393 バグ修正確認）
    ④テーブル作成者以外のテーブル管理者でも子テーブルのCSVダウンロードができることを確認（#438 バグ修正確認）
    ⑤文字列(一行)の「複数の値の登録を許可する」が有効な項目のCSV出力が正しいことを確認（#485 機能改善確認）
    ⑥フィルタで「高度な機能」使用時のCSVダウンロードが正しく動作することを確認（#808 バグ修正確認）
  expected: 'CSVダウンロードがエラーなく完了し、CSVファイルの中に子テーブルの情報が含まれていること

    #337の修正確認含む、#378の修正確認含む、#393の修正確認含む、#438の修正確認含む、#485の修正確認含む、#808の修正確認含む

    '
  includes:
  - '337'
  - '378'
  - '393'
  - '438'
  - '485'
  - '808'
- case_no: 148-02
  sheet: B
  feature: CSVアップロード
  category: CSVダウンロード/アップロードに子テーブルも含める
  description: |
    子テーブルが設定されているテーブルへCSVアップロードを実施する
    ※アップロードするCSVファイルには子テーブルの情報を含める。
    ①一行目の項目名が異なる場合や選択肢に存在しない値がある場合に分かりやすいエラーメッセージが表示されることを確認（#309 機能改善確認）
    ②CSVアップロードの注意書きに「作成者、最終更新者は自動更新されます」の記載があることを確認（#313 機能改善確認）
    ③ユーザー管理テーブルでCSVアップロード時に組織が正しく反映されることを確認（#372 バグ修正確認）
    ④変更対象以外の項目を空白にしてアップロードした場合、既存値が消えないことを確認（#483 バグ修正確認）
    ⑤数値項目で「0」をCSVアップロードした場合に正しく認識されることを確認（#495 バグ修正確認）
    ⑥CSVアップロードで項目の値がずれないことを確認（#538 バグ修正確認）
    ⑦同組織を複数設定しているユーザーのCSVダウンロード/アップロードで全組織が保持されることを確認（#605 バグ修正確認）
  expected: 'CSVアップロードがエラーなく完了し、子テーブルの情報も反映されること。

    #309の修正確認含む、#313の修正確認含む、#372の修正確認含む、#483の修正確認含む、#495の修正確認含む、#538の修正確認含む、#605の修正確認含む

    '
  includes:
  - '309'
  - '313'
  - '372'
  - '483'
  - '495'
  - '538'
  - '605'
