group: CSV・Excel・JSON・ZIPダウンロード・アップロード
spec_file: tests/csv-export.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: CSV-FULL
  feature: CSV・インポート/エクスポート総合
  category: 動画単位
  description: |
    ①CSVダウンロードを実行し、ファイルが正常にダウンロードされることを確認する
    ②CSVアップロードを実行し、データが正しくインポートされることを確認する
    ③Excelインポートの動作を確認する
    ④JSONエクスポート→インポートでデータが正しく復元されることを確認する
    ⑤大量データのCSV操作を確認する
    ⑥各種バグ修正確認
  expected: |
    CSVダウンロード・アップロード・Excelインポート・JSONエクスポート/インポートが全て正常に動作すること
  includes:
  - CSV-JSON
  - 55-1
  - 55-2
  - 148-01
  - 148-02
  - 148-03
  - '161'
  - '173'
  - '181'
  - 193-1
  - 193-2
  - 194-1
  - 194-2
  - '224'
  - '231'
  - '233'
  - '255'
  - '379'
  - '444'
  - '611'
actual_steps:
- case_no: 55-1
  status: partial
  steps: '1. test.describe.configure({ mode: ''serial'' }) でシリアル実行

    2. セットアップテストでcreate-all-type-table API呼び出し

    3. テーブルIDを /tmp/csv_export_test_table_id.txt に保存

    4. テーブルページに遷移

    5. CSVアップロードモーダルを開く（openCsvUploadModal関数）

    6. ヘッダー行なしの一時CSVファイルを /tmp/test-no-header.csv として作成

    7. fileInput.setInputFiles() でファイルをセット

    8. アップロードボタンをクリック

    9. 結果をconsole.logに出力

    '
  assertions: '- expect(page.locator(''.navbar'')).toBeVisible()

    - エラーメッセージの存在を console.log するのみ（アサートなし）

    '
  gaps: '⚠️ YAMLでは「インポートエラーが発生すること」が期待されているが、spec.jsはエラーの発生をアサートしていない

    ⚠️ エラーメッセージの内容確認なし（console.logのみ）

    ⚠️ try/catchでエラーを無視している可能性あり

    '
- case_no: 55-2
  status: partial
  steps: '1. CSVアップロードモーダルを開く

    2. CSV以外のファイル（テキストファイル）を作成して setInputFiles

    3. アップロードボタンをクリック

    4. 結果確認

    '
  assertions: '- expect(page.locator(''.navbar'')).toBeVisible()

    - エラーメッセージ存在の console.log のみ

    '
  gaps: '⚠️ 55-1と同様、エラーが実際に発生することをアサートしていない

    ⚠️ ファイル形式バリデーションが機能しているかの検証なし

    '
- case_no: 148-01
  status: partial
  steps: '1. テーブル編集画面のCSVタブに移動（navigateToEditCsvTab）

    2. 子テーブルCSVラベルの存在確認（console.log）

    3. スイッチ7番目（use_child_on_csv）をONにして保存

    4. テーブル一覧に戻りCSVアップロードモーダルを開く

