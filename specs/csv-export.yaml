    [0:00] csv-110 ── JSONエクスポートモーダルにダウンロードオプションが表示されること
    1. テーブル管理一覧（/admin/dataset）を開く
    2. テーブルのチェックボックスを1件選択する
    3. 「JSONエクスポート」ボタンをクリックする
