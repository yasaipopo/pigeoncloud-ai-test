group: CSV・Excel・JSON・ZIPダウンロード・アップロード
spec_file: tests/csv-export.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: 148-01
  sheet: B
  feature: CSVダウンロード
  category: CSVダウンロード/アップロードに子テーブルも含める
  description: ①子テーブルが設定されているテーブルよりCSVダウンロードを実施する
  expected: CSVダウンロードがエラーなく完了し、CSVファイルの中に子テーブルの情報が含まれていること
  movie: CE01
  detailed_flow: |
    1. /admin/dataset/edit/{tableId} を開く
    2. a.nav-link:has-text("CSV") をクリックしてCSVタブを開く
    3. 「CSVダウンロード/アップロードに子テーブルも含める」スイッチ（input[type=checkbox]）がONであることを確認する
    4. ONでなければスイッチをONにして保存ボタン（button:has-text("保存")）をクリックする
    5. /admin/dataset__{tableId} （テーブル一覧）に遷移する
    6. button.dropdown-toggle:has(.fa-bars) をクリックしてドロップダウンを開く
    7. a.dropdown-item:has-text("CSVダウンロード") をクリックする
    8. .modal.show が表示されることを確認する
    9. ダウンロードボタン（button:has-text("ダウンロード"), a:has-text("ダウンロード")）が表示されていることを確認する
    10. .alert-danger が表示されていないことを確認する
- case_no: 148-02
  sheet: B
  feature: CSVアップロード
  category: CSVダウンロード/アップロードに子テーブルも含める
  description: |-
    ①子テーブルが設定されているテーブルへCSVアップロードを実施する。
    ②※アップロードするCSVファイルには子テーブルの情報を含める。
  expected: CSVアップロードがエラーなく完了し、子テーブルの情報も反映されること。
  movie: CE02
  detailed_flow: |
    1. /admin/dataset/edit/{tableId} を開く
    2. a.nav-link:has-text("CSV") をクリックしてCSVタブを開く
    3. 「CSVダウンロード/アップロードに子テーブルも含める」スイッチがONになっていることを確認する
    4. /admin/dataset__{tableId} （テーブル一覧）に遷移する
    5. button.dropdown-toggle:has(.fa-bars) をクリックしてドロップダウンを開く
    6. a.dropdown-item:has-text("CSVアップロード") をクリックする
    7. .modal.show が表示されることを確認する
    8. 子テーブルの列（カラム名）を含むCSVファイルをinput[type=file]にsetInputFilesでセットする
    9. アップロードボタン（button:has-text("アップロード")）をクリックする
    10. /admin/csv（CSV UP/DL履歴）で処理結果を確認し、エラーが発生していないことを確認する
