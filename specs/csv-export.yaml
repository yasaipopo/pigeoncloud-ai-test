- case_no: '181'
  sheet: B
  feature: CSV
  category: CSVアップロード
  description: |-
    ①既存テーブルに対して、テーブルの項目設定で複数選択項目に対して最低数1と項目設定を行い保存する。
    ②フォームより、①で設定追加したテーブルのデータを複数登録。
    　(テーブルデータの一つは①で追加した項目の最低数をセット)
    ③上記テーブルのCSVダウンロードを実施
    ④③のデータを修正し、CSVアップロード実施。
  expected: |-
    ・エラーとならないこと
    https://henmi022.pigeon-demo.com/admin/dataset__33
  movie: CE02
  detailed_flow: |
    1. /admin/dataset/edit/{tableId} を開く
    2. フィールド編集タブ（a.nav-link:has-text("フィールド")）をクリックする
    3. チェックボックス（複数選択）フィールドを選択し、「最低数」に1を設定して保存する
    4. /admin/dataset__{tableId}/add （新規登録フォーム）でテストデータを2件以上登録する（うち1件は最低数設定の選択肢を選択）
    5. /admin/dataset__{tableId} に戻りCSVダウンロードを実行する（button.dropdown-toggle:has(.fa-bars) → a:has-text("CSVダウンロード")）
    6. ダウンロードされたCSVの内容を取得または確認する
    7. CSVデータを修正してアップロードする（button.dropdown-toggle:has(.fa-bars) → a:has-text("CSVアップロード") → input[type=file]にCSVファイルをセット）
    8. アップロードボタンをクリックし、/admin/csv でエラーが発生していないことを確認する
