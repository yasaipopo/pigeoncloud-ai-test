  assertions: '- expect(csvDlItem.first()).toBeVisible()

    - expect(await page.locator(''.alert-danger'').count()).toBe(0)

    '
  gaps: '⚠️ 子テーブル含むCSVを実際にダウンロードして内容確認するステップなし

    ⚠️ 子テーブルのデータがCSVに含まれているかの検証なし

    ⚠️ スイッチが7番目にない場合は条件付きでスキップされる

    '
