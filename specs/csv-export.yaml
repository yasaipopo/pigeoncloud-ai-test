- case_no: csv-010
  sheet: B
  feature: CSVダウンロード
  category: CSVダウンロード/アップロードに子テーブルも含める
  description: ①子テーブルが設定されているテーブルよりCSVダウンロードを実施する
  expected: CSVダウンロードがエラーなく完了し、CSVファイルの中に子テーブルの情報が含まれていること
  movie: CE01
  detailed_flow: |-
    【CE01 テストフロー】この動画で確認するテスト番号:
      csv-010        (旧: 148-01)  CSVダウンロード
      csv-040        (旧: 161)     CSVダウンロード
      csv-120        (旧: 231)     CSVダウンロード
      csv-140        (旧: 255)     CSVダウンロード

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] csv-140 ── CSVダウンロードモーダルが開きダウンロードボタンが表示されること
    1. テーブル一覧（/admin/dataset__{tableId}）を開く
    2. 簡易検索に文字を入力してフィルターを適用する
    3. ハンバーガーメニュー（☰）をクリック → 「CSVダウンロード」を選択する
    4. ✅ CSVダウンロードモーダルが表示されること
    5. ✅ 「ダウンロード」ボタンが表示されること
    6. ✅ エラー（赤いアラート）が表示されないこと
    7. ダウンロードボタンをクリックし、CSVファイルのダウンロードが開始されることを確認する

    [0:20] csv-040 ── ソート後にCSVダウンロードを実行するとモーダルが表示されること
    1. テーブル一覧を開き、テーブルヘッダー列をクリックして並び替えを行う
    2. 簡易検索でフィルターを適用する
    3. ハンバーガーメニュー（☰）→「CSVダウンロード」をクリックする
    4. ✅ CSVダウンロードモーダルが表示されること
    5. ✅ フィルタ反映のチェックボックスが存在すること
    6. ✅ 「ダウンロード」ボタンが表示されること
    7. キャンセルボタンでモーダルを閉じる

    [0:35] csv-120 ── CSVダウンロードモーダルにフィルタ反映オプションが表示されること
    1. テーブル一覧を開き、フィルターを適用する
    2. ハンバーガーメニュー（☰）→「CSVダウンロード」をクリックする
    3. ✅ CSVダウンロードモーダルが表示され、フィルタ反映チェックボックスが存在すること

    ※ csv-010: 子テーブルを含むCSVダウンロード設定については「148-01〜03」テスト（別テスト）で検証
  old_case_no: 148-01
- case_no: csv-020
  sheet: B
  feature: CSVアップロード
  category: CSVダウンロード/アップロードに子テーブルも含める
  description: |-
    ①子テーブルが設定されているテーブルへCSVアップロードを実施する。
    ②※アップロードするCSVファイルには子テーブルの情報を含める。
  expected: CSVアップロードがエラーなく完了し、子テーブルの情報も反映されること。
  movie: CE02
  detailed_flow: |-
    【CE02 テストフロー】この動画で確認するテスト番号:
      csv-020        (旧: 148-02)  CSVアップロード
      csv-030        (旧: 148-03)  CSVアップロード
      csv-060        (旧: 181)     CSV
      csv-070        (旧: 193-1)   CSV
      csv-080        (旧: 193-2)   CSV
      csv-090        (旧: 194-1)   CSV
      csv-100        (旧: 194-2)   CSV
      csv-130        (旧: 233)     CSVアップロード
      csv-150        (旧: 55-1)    CSVアップロード
      csv-160        (旧: 55-2)    CSVアップロード
      csv-180        (旧: 309)     文字列
      csv-190        (旧: 313)     文字列

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] csv-150 ── ヘッダー行なしCSVをアップロードするとインポートエラーが発生すること
    1. テーブル一覧（/admin/dataset__{tableId}）を開く
    2. ハンバーガーメニュー（☰）→「CSVアップロード」をクリックする
    3. ✅ CSVアップロードモーダルが表示されること
    4. ヘッダー行を含まないCSVファイル（データ行のみ）をファイル選択欄にセットする
    5. 「アップロード」ボタンをクリックする
    6. モーダルが閉じ、アップロード処理がキューに入ることを確認する
    7. /admin/csv（CSV UP/DL履歴）ページを開いて処理完了を待つ
    8. ✅ 最新行に「失敗」が表示されること
    9. ✅ エラーメッセージに「ヘッダー（1行目）が一致しません」が含まれること

    [1:00] csv-160 ── CSV以外のファイルをアップロードするとインポートエラーが発生すること
    1. テーブル一覧を開き、ハンバーガーメニュー（☰）→「CSVアップロード」をクリックする
    2. .txt拡張子のファイルをファイル選択欄にセットして「アップロード」をクリックする
    3. /admin/csv で処理結果を確認する
    4. ✅ アップロードがエラーまたはボタン無効化（失敗）として処理されること

    [2:00] csv-070 ── テーブル設定で「必須項目空を許可(ON)」にすると必須項目が空のCSVをアップロードできること
    1. テーブル設定（/admin/dataset/edit/{tableId}）→「CSV」タブを開く
    2. 「アップロード時必須項目が空の状態でも許可」の1番目のスイッチをONにする
    3. 「更新」ボタンをクリックして保存する
    4. ✅ エラーアラートが表示されないこと
    5. テーブル一覧を開き、ハンバーガーメニュー（☰）→「CSVアップロード」をクリックする
    6. ✅ CSVアップロードモーダルのUIが正常に表示されること（ファイル選択欄・「アップロード」ボタン・「CSVダウンロード」ボタンが存在すること）
    7. キャンセルボタンでモーダルを閉じる

    [3:00] csv-080 ── テーブル設定で「必須項目空を許可(OFF)」にすると必須項目が空のCSVはエラーになること
    1. テーブル設定→「CSV」タブで1番目のスイッチをOFFにして「更新」をクリックする
    2. ✅ エラーアラートが表示されないこと（設定保存成功）

    [3:30] csv-090 ── 「選択肢がない場合自動追加(ON)」の設定をテーブル編集で確認できること
    1. テーブル設定→「CSV」タブを開き、スイッチの総数を確認する
    2. 6番目のスイッチ（選択肢自動追加）をONにして「更新」をクリックする
    3. ✅ エラーアラートが表示されないこと

    [4:00] csv-100 ── 「選択肢がない場合自動追加(OFF)」の設定をテーブル編集で確認できること
    1. テーブル設定→「CSV」タブで6番目のスイッチをOFFにして「更新」をクリックする
    2. ✅ エラーアラートが表示されないこと

    [4:30] csv-060 / csv-130 ── CSVアップロードモーダルのUIが正常に表示されること
    1. テーブル一覧を開き、ハンバーガーメニュー（☰）→「CSVアップロード」をクリックする
    2. ✅ CSVアップロードモーダルが表示され、タイトルに「CSVアップロード」が含まれること
    3. ✅ ガイドテキスト（赤い注意書き）が表示されること
    4. ✅ ファイル選択欄（input[type=file]）が存在すること
    5. ✅ 「CSVダウンロード」ボタンが表示されること
    6. キャンセルボタンでモーダルを閉じる

    [5:30] csv-020 ── 子テーブルが設定されているテーブルへCSVアップロードするとUIが表示されること
    1. テーブル一覧を開き、ハンバーガーメニュー（☰）→「CSVアップロード」をクリックする
    2. ✅ CSVアップロードモーダルが表示されること
    3. ✅ ファイル選択欄と「アップロード」ボタンが存在すること

    [6:00] csv-030 ── CSVアップロードモーダルで「CSVダウンロード(空)」ボタンが表示されること
    1. CSVアップロードモーダルを開く（前ステップと同じ画面）
    2. ✅ 「CSVダウンロード（空）」ボタンが表示されること

    [6:30] csv-180 ── CSVアップロード時に項目行不一致や選択肢不一致の場合に具体的なエラーメッセージが表示されること
    1. テーブル一覧を開き、CSVアップロードモーダルを開く
    2. 項目名が異なるCSVファイル（wrong_header.csv）をセットして「アップロード」をクリックする
    3. /admin/csv で処理完了を待つ
    4. ✅ 「失敗」行にヘッダー・一致・項目などのキーワードを含むエラーメッセージが表示されること

    [7:30] csv-190 ── CSVアップロードの注意書きに「作成者、最終更新者」が含まれること
    1. テーブル一覧を開き、CSVアップロードモーダルを開く
    2. ✅ モーダル内の注意書きに「作成者」または「最終更新者」の文言が含まれること
    3. キャンセルボタンでモーダルを閉じる
