- case_no: WF-ADVANCED
  feature: ワークフロー応用
  category: 動画単位
  description: |
    ①組織承認フローを設定し、組織ごとの承認者で承認が動作することを確認
    ②ワークフローフィールド連携（WFステータスの項目表示・計算）を確認
    ③ワークフローバッジ表示が正しいことを確認
    ④ワークフロールックアップ（承認者情報の参照等）が正しく動作することを確認
    ⑤ワークフロー特殊パターン（代理承認・段飛ばし等）のテスト
    ⑥子テーブルのワークフロー連携を確認
  expected: |
