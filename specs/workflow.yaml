  movie: WF04
  detailed_flow: "【WF04 テストフロー】この動画で確認するテスト番号:\n  wf-460 (旧: 28-1)   承認済み後のユーザー削除→承認履歴の表示確認\n  wf-470 (旧: 28-2)   承認済み後の組織削除→承認履歴の表示確認\n  wf-480 (旧: 28-3)   申請中に承認者ユーザーを削除\n  wf-490 (旧: 28-4)   申請中に承認者組織を削除\n  wf-500 (旧: 296)    ワークフロー「フローを一つ戻す」機能\n  wf-510 (旧: 36-1)   ユーザー申請者への通知確認\n  wf-520 (旧: 36-2)   組織申請者への通知確認\n  wf-530 (旧: 395-1)  申請時通知の件名・本文変更あり\n  wf-540 (旧: 395-2)  申請時通知の件名・本文変更なし\n  wf-550 (旧: 395-3)  否認時通知の件名・本文変更あり\n  wf-560 (旧: 395-4)  否認時通知の件名・本文変更なし\n  wf-570 (旧: 395-5)  完了時通知の件名・本文変更あり\n  wf-580 (旧: 395-6)  完了時通知の件名・本文変更なし\n  wf-590 (旧: 395-7)  取り下げ時通知の件名・本文変更あり\n  wf-600 (旧: 395-8)  取り下げ時通知の件名・本文変更なし\n\n━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n[0:00] wf-460 ── 承認済み後に承認者ユーザーを削除\n1. 承認者にユーザーをセットしてレコードを申請し、承認を完了させる\n2. 承認者として使用したユーザーを削除する\n3. レコード詳細の承認履歴を確認する\n4. ✅ エラーが発生しないこと\n5. ✅ 削除したユーザー名が承認履歴に表示されたままであること\n\n[0:04] wf-470 ── 承認済み後に承認者組織を削除\n1. 承認者に組織をセットしてレコードを申請し、承認を完了させる\n2. 承認者として使用した組織を削除する\n3. レコード詳細の承認履歴を確認する\n4. ✅ エラーが発生しないこと\n5. ✅ 削除した組織が「!削除された組織!(XX)」と表示されていること\n\
    \n[0:08] wf-480 ── 申請中に承認者ユーザーを削除\n1. 承認者にユーザーをセットしてレコードを申請する（承認は行わない）\n2. 承認者として設定したユーザーを削除する\n3. レコード一覧・詳細を確認する\n4. ✅ エラーが発生しないこと\n5. ✅ 削除したユーザー名が申請フローに表示されたままであること\n\n[0:12] wf-490 ── 申請中に承認者組織を削除\n1. 承認者に組織をセットしてレコードを申請する（承認は行わない）\n2. 承認者として設定した組織を削除する\n3. レコード一覧・詳細を確認する\n4. ✅ エラーが発生しないこと\n5. ✅ 削除した組織が「!削除された組織!(XX)」と表示されていること\n\n[0:16] wf-500 ── ワークフロー「フローを一つ戻す」機能\n1. 複数ステップのワークフロー申請を行い、一部のステップが承認された状態にする\n2. 「フローを一つ戻す」ボタンをクリックして前のステップに戻す\n3. ✅ エラーなく前のステップに戻り、承認者が再度承認できる状態になること\n\n[0:20] wf-510 ── ユーザー申請者への通知確認\n1. ユーザーを申請者としてワークフロー申請を実施する\n2. メール受信を確認する\n3. ✅ 申請者に設定したユーザーに通知メールが届くこと\n\n[0:23] wf-520 ── 組織申請者への通知確認\n1. 組織を申請者としてワークフロー申請を実施する\n2. メール受信を確認する\n3. ✅ 申請者に設定した組織に紐づくユーザー全員に通知が届くこと\n\n[0:26] wf-530 ── 申請時通知・件名と本文カスタマイズあり\n1. ワークフロー設定で申請時の通知件名・本文を有効にして独自文面を入力し保存する\n2. レコードを申請し、メール受信を確認する\n3. ✅ カスタマイズした件名・本文で通知メールが届くこと\n\n[0:29] wf-540 ── 申請時通知・件名と本文カスタマイズなし\n1. 申請時の通知件名・本文カスタマイズを無効にした状態でレコードを申請する\n2. ✅ デフォルトの件名・本文で通知メールが届くこと\n\n[0:32] wf-550 ── 否認時通知・件名と本文カスタマイズあり\n1. ワークフロー設定で否認時の通知件名・本文を有効にして独自文面を入力し保存する\n\
    2. レコードを申請して否認し、メール受信を確認する\n3. ✅ カスタマイズした件名・本文で否認通知メールが届くこと\n\n[0:35] wf-560 ── 否認時通知・件名と本文カスタマイズなし\n1. 否認時の通知件名・本文カスタマイズを無効にした状態で否認操作を行う\n2. ✅ デフォルトの件名・本文で否認通知メールが届くこと\n\n[0:38] wf-570 ── 完了時通知・件名と本文カスタマイズあり\n1. 完了時の通知件名・本文を有効にして独自文面を入力し保存する\n2. レコードを申請して承認完了し、メール受信を確認する\n3. ✅ カスタマイズした件名・本文で完了通知メールが届くこと\n\n[0:41] wf-580 ── 完了時通知・件名と本文カスタマイズなし\n1. 完了時の通知件名・本文カスタマイズを無効にした状態で承認完了する\n2. ✅ デフォルトの件名・本文で完了通知メールが届くこと\n\n[0:44] wf-590 ── 取り下げ時通知・件名と本文カスタマイズあり\n1. 取り下げ時の通知件名・本文を有効にして独自文面を入力し保存する\n2. レコードを申請して取り下げし、メール受信を確認する\n3. ✅ カスタマイズした件名・本文で取り下げ通知メールが届くこと\n\n[0:47] wf-600 ── 取り下げ時通知・件名と本文カスタマイズなし\n1. 取り下げ時の通知件名・本文カスタマイズを無効にした状態で取り下げ操作を行う\n2. ✅ デフォルトの件名・本文で取り下げ通知メールが届くこと"
