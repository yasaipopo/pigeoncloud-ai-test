  detailed_flow: "【WF03 テストフロー】この動画で確認するテスト番号:\n  wf-310 (旧: 111-16)  一括取り下げ — 複数件・コメントなし\n  wf-320 (旧: 11-1)   ワークフロー有効化と保存\n  wf-330 (旧: 11-2)   申請→承認フロー（ユーザーA→B）\n  wf-340 (旧: 11-3)   多段承認フロー（A→B→C）\n  wf-350 (旧: 11-4)   否認→再申請フロー\n  wf-360 (旧: 11-5)   組織承認（1人/全員）\n  wf-370 (旧: 11-6)   承認者はデータ編集可能設定\n  wf-380 (旧: 11-7)   再申請可能設定\n  wf-390 (旧: 11-8)   フロー固定ON→フロー設計ボタン表示\n  wf-400 (旧: 11-9)   否認→再編集→再申請→承認の完全フロー\n  wf-410 (旧: 166)    自分自身を承認者にしてもエラーなし\n  wf-420 (旧: 21-1)   承認者はデータ編集可能設定の保存確認\n  wf-430 (旧: 21-2)   再申請可能設定の保存確認\n  wf-440 (旧: 21-3)   フロー固定設定でテンプレート追加・ステップ追加・保存\n  wf-450 (旧: 21-4)   申請取り下げ\n\n━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n[共通セットアップ]\n1. テスト専用テーブル（文字列フィールド1つ）を新規作成する\n\n[0:00] wf-310 ── 一括取り下げ：複数件・コメントなし\n1. 申請中のレコードを複数件選択し、「一括取り下げ」をクリックする\n2. コメント欄を空欄のまま確定する\n3. ✅ エラーなく取り下げが完了すること\n\n[0:03] wf-320 ── ワークフロー有効化と保存\n1. テーブル設定のワークフロータブを開き、ワークフロートグルをONにする\n2. ✅ オプション設定エリアが展開されること\n3. 設定を保存し、再度ワークフロータブを開く\n4. ✅ ワークフロートグルがONのまま保持されていること\n\n[0:06] wf-330 ── 申請→承認フロー\n\
    1. ワークフローON・フロー固定OFFの状態でレコードを新規作成し、承認フローを設定して申請する\n2. 承認者でレコード詳細を開き、「承認」ボタンをクリックしてコメントを入力する\n3. ✅ 承認が完了し、コメントがレコード詳細に表示されること\n\n[0:09] wf-340 ── 多段承認フロー（A申請→B承認→C最終承認）\n1. 承認フローをA→B→C（多段）で設定してレコードを申請する\n2. ユーザーBでログインして承認し、次にユーザーCでログインして最終承認する\n3. ✅ 多段承認フローがエラーなく完了し、ステータスが「承認済み」になること\n\n[0:12] wf-350 ── 否認→再申請フロー\n1. レコードを申請し、承認者が否認してコメントを入力する\n2. レコード詳細で否認コメントが表示されていることを確認する\n3. レコード編集画面を開き「申請」ボタンが表示されていることを確認する\n4. ✅ 否認後も再申請ボタンが表示され、再申請できること\n\n[0:15] wf-360 ── 組織承認（1人/全員）\n1. 組織を承認者に設定してレコードを申請する\n2. 組織メンバーの1人が承認して完了するパターン、または全員が承認するパターンを実施する\n3. ✅ 設定した条件通りに承認が完了すること\n\n[0:18] wf-370 ── 承認者はデータ編集可能設定\n1. ワークフロー設定で「承認者はデータ編集可能」をONにして保存する\n2. 再度設定画面を開き設定が保持されていることを確認する\n3. ✅ 「承認者はデータ編集可能」がチェック済みの状態で保存されていること\n\n[0:21] wf-380 ── 再申請可能設定\n1. ワークフロー設定で「再申請可能」をONにして保存する\n2. 再度設定画面を開き設定が保持されていることを確認する\n3. ✅ 「再申請可能」がチェック済みの状態で保存されていること\n\n[0:24] wf-390 ── フロー固定ON→フロー設計ボタン表示\n1. ワークフロー設定で「フローを固定する」をONにする\n2. ✅ 「フロー設計」ボタンが表示されること\n3. フロー設計ボタンをクリックしてモーダルを開く\n4. ✅ 「承認フローの設計」モーダルが開き、テンプレート追加ボタンが表示されること\n\
    5. モーダルを閉じてフロー固定をOFFに戻し、保存する\n\n[0:28] wf-400 ── 否認→再編集→再申請→承認の完全フロー\n1. レコードを申請し、承認者が否認する\n2. 申請者がレコード編集画面で内容を修正し、再申請する\n3. 承認者が再申請を承認する\n4. ✅ 否認→再編集→再申請→承認の完全フローが完了し、コメントが表示されること\n\n[0:33] wf-410 ── 自分自身を承認者にしてもエラーなし\n1. ワークフロー設定でフロー固定をOFFにして保存する\n2. 自分（管理者）を承認者に設定してレコードを申請する\n3. 自分で承認操作を実行する\n4. ✅ エラーなく承認が完了し、コメントがレコード詳細に表示されること\n\n[0:38] wf-420 ── 承認者はデータ編集可能設定の保存確認\n1. ワークフロー設定で「承認者はデータ編集可能」をONにして保存する\n2. 再度ワークフロータブを開く\n3. ✅ 「承認者はデータ編集可能」がチェック済みで保存されていること\n\n[0:41] wf-430 ── 再申請可能設定の保存確認\n1. ワークフロー設定で「再申請可能」をONにして保存する\n2. 再度ワークフロータブを開く\n3. ✅ 「再申請可能」がチェック済みで保存されていること\n\n[0:44] wf-440 ── フロー固定設定でテンプレート追加・ステップ追加・保存\n1. ワークフロー設定で「フローを固定する」をONにし、フロー設計ボタンをクリックする\n2. 「テンプレートの追加」をクリックし、テンプレート名「基本承認フロー」を入力する\n3. 「+」ボタンでステップを1つ追加し、承認者タイプ「ユーザー」が設定されることを確認する\n4. 「完了」をクリックして設定を保存する\n5. 再度ワークフロータブを開く\n6. ✅ 「フローを固定する」がONのまま保存されていること\n7. ✅ フロー設計モーダルに作成したテンプレートが表示されること\n\n[0:49] wf-450 ── 申請取り下げ\n1. レコードを新規作成して申請する\n2. レコード詳細画面で「申請取り下げ」ボタンをクリックし、確認ダイアログで「取り下げ」をクリックする\n3. ✅ 申請が取り下げされ、エラーが発生しないこと"
