  movie: WF06
  detailed_flow: "【WF06 テストフロー】この動画で確認するテスト番号:\n  wf-760 (旧: 68-7)   組織(役職)・全員承認→コメント一覧確認\n  wf-770 (旧: 68-8)   組織(役職)・全員でうち1名が否認→コメント確認\n  wf-780 (旧: 278)    【バグ修正】画像ルックアップコピーがあるとレコード登録不可\n  wf-790 (旧: 333)    【機能改善】承認者ユーザー選択に名前検索機能追加\n  wf-800 (旧: 363)    【機能改善】ワークフロー状態の表示条件でチラつき修正\n  wf-810 (旧: 382)    【機能改善】ワークフロー通知メールのOFF機能\n  wf-820 (旧: 394)    【バグ修正】自分のメイン組織の承認者が誤ったユーザーになる\n  wf-830 (旧: 397)    【バグ修正】子テーブルの表示条件が独立していない\n  wf-840 (旧: 409)    【有償対応】内部統制用CSVダウンロード\n  wf-850 (旧: 418)    【有償対応】承認完了後でも変更可能\n  wf-860 (旧: 431)    【有償対応】申請画面での承認ルート固定以降の追加・編集\n  wf-870 (旧: 434)    【有償対応】申請部署の選択機能\n  wf-880 (旧: 435)    【バグ修正】「承認後も編集可能」チェック後に画面が操作不能\n  wf-890 (旧: 446)    【バグ修正】申請ボタン押下でローディングのまま\n  wf-900 (旧: 455)    【バグ修正】ワークフローCSVインポートの文字化け\n\n━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n[0:00] wf-760 ── 組織(役職)・全員承認→各コメント確認\n1. 承認者タイプ「組織(役職)」・全員承認設定で申請し、コメントを入力する\n2. 指定組織・役職の全ユーザーがそれぞれコメントを入力して「承認」をクリックする\n3. ✅ エラーなく処理が完了し、各ユーザーのコメントがレコード詳細に表示されること\n\n[0:04] wf-770 ── 組織(役職)・全員承認でうち1名が否認\n\
    1. 全員承認設定で申請し、1名がコメントを入力して「否認」をクリックする\n2. ✅ 否認が完了し、入力したコメントがレコード詳細に表示されること\n\n[0:08] wf-780 ── 画像ルックアップのコピーがある場合のレコード登録（バグ修正確認）\n1. 画像フィールドのルックアップコピーが設定されたテーブルでレコードを新規作成する\n2. レコードを保存する\n3. ✅ レコードが正常に登録できること（以前はルックアップコピーがあると登録不可だった）\n\n[0:12] wf-790 ── 承認者ユーザー選択の名前検索（機能改善確認）\n1. ワークフロー申請モーダルで承認者の「ユーザー」選択を開く\n2. 名前の一部を入力してユーザーを検索する\n3. ✅ 名前検索でユーザーが絞り込まれて表示されること\n\n[0:16] wf-800 ── ワークフロー状態の表示条件でのチラつき（機能改善確認）\n1. 「ワークフロー」「が次と一致」「申請中（要確認）」で表示条件を設定したフィールドを含むレコードの編集画面を開く\n2. ✅ 対象フィールドが一瞬表示されて消えるチラつきが発生しないこと\n\n[0:20] wf-810 ── ワークフロー通知メールのOFF設定（機能改善確認）\n1. ワークフロー設定で通知メールのOFF設定を確認する\n2. OFFにして保存し、申請→承認操作を実施する\n3. ✅ 通知メールOFF設定が機能し、メールが送信されないこと\n\n[0:24] wf-820 ── 自分のメイン組織の承認者が誤ったユーザーになる（バグ修正確認）\n1. 承認者に「自分のメイン組織の部長」を設定してレコードを申請する\n2. 承認者として設定された組織・役職を確認する\n3. ✅ 申請者のメイン組織の部長が正しく承認者として設定されること\n\n[0:28] wf-830 ── 子テーブルの表示条件が独立していない（バグ修正確認）\n1. 子テーブルを2行追加し、それぞれの「申請種別」を異なる値に設定する\n2. 1行目の「申請種別」が条件①③の場合のみ表示される項目の表示状態を確認する\n3. ✅ 2行目の「申請種別」の変更が1行目の表示条件に影響しないこと\n\n[0:32] wf-840 ── 内部統制用CSVダウンロード（有償対応確認）\n\
    1. テーブル一覧画面またはワークフロー管理画面から内部統制用CSVダウンロードを実行する\n2. ✅ エラーなくCSVがダウンロードできること\n\n[0:36] wf-850 ── 承認完了後でも変更可能（有償対応確認）\n1. ワークフロー承認が完了したレコードを開き、フィールドの編集を試みる\n2. ✅ 承認完了後もレコードを変更できること\n\n[0:40] wf-860 ── 申請画面での承認ルート固定以降の追加・編集（有償対応確認）\n1. フロー固定の承認ルートがあるレコードの申請モーダルを開く\n2. 固定ルート以降に追加承認者を設定・編集・削除する\n3. ✅ 固定ルート以降での追加・編集・削除がエラーなく操作できること\n\n[0:44] wf-870 ── 申請部署の選択機能（有償対応確認）\n1. 複数の組織に所属するユーザーでレコードを申請する\n2. 申請画面で申請部署（組織）を選択するUIが表示されることを確認する\n3. ✅ 申請部署の選択肢が表示され、選択した組織で申請が処理されること\n\n[0:48] wf-880 ── 承認後も編集可能チェック後に画面が操作不能（バグ修正確認）\n1. ワークフロー設定で「承認後も編集可能」にチェックを入れる\n2. ユーザーを選択する画面に遷移する\n3. ✅ 画面が薄暗くなったり操作不能になる現象が発生しないこと\n\n[0:52] wf-890 ── 申請ボタン押下でローディングのまま（バグ修正確認）\n1. 対象テーブルのレコードで申請ボタンをクリックする\n2. ✅ 申請モーダルが正常に表示され、ローディングのまま固まらないこと\n\n[0:56] wf-900 ── ワークフローCSVダウンロードの文字化け（バグ修正確認）\n1. ワークフロー設定画面からCSVダウンロードを実行する\n2. ダウンロードしたCSVをテキストエディタで開く\n3. ✅ CSV内の文字が文字化けしていないこと"
