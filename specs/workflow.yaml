    1. beforeAll: debug APIでALLテストテーブルを作成し、tableIdを取得する
    2. テーブル設定 `/admin/dataset/edit/{tableId}` のワークフロータブを開く
    3. 「ワークフロー」チェックボックスをONにする
    4. 「引き上げ承認機能」チェックボックスをONにする
    5. テスト用ユーザーAを `/api/admin/debug/create-user` で作成する
    6. 承認フロー: ユーザーA → 組織(1人の承認が必要) でワークフロー申請を作成する
    7. 組織メンバーでログインし、レコード詳細画面 `/admin/dataset__{tableId}/view/{recordId}` を開く
    8. 「引き上げ承認」ボタンが表示されていないことを `expect(page.locator('button:has-text("引き上げ承認")')).not.toBeVisible()` で確認する
  old_case_no: 106-01
