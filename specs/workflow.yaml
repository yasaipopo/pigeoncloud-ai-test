- case_no: WF-BASIC
  feature: ワークフロー基本フロー
  category: 動画単位
  description: |
    ①ワークフローを新規作成する
    ②フロー設定（承認者・承認段階）を行う
    ③テストレコードを作成し申請する
    ④承認者でログインして申請内容を確認・承認する
    ⑤否認テストを実行する
    ⑥再申請テストを実行する
    ⑦最終承認まで通す
    ⑧ワークフロー表示条件が正しく動作することを確認
    ⑨ワークフローフォームの入力項目を確認
    ⑩インポート/エクスポート機能を確認
    ⑪ワークフロー全般の動作を確認
  expected: |
    ワークフローの作成・申請・承認・否認・再申請・表示条件・フォーム・インポート/エクスポートが全て正常に動作すること
