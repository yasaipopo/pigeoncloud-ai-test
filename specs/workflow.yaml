- case_no: 111-01
  sheet: B
  feature: ワークフロー
  category: ''
  description: |-
    ①ワークフロー申請を実施
    ②該当のテーブル一覧より、①の申請を1つチェックし「一括承認」をクリック
  expected: |-
    一括承認
    ・1つ選択
  movie: WF02
  detailed_flow: |
    1. beforeAll: debug APIでALLテストテーブルを作成し、tableIdを取得する
    2. テーブル設定でワークフローをONにし、ユーザーA → ユーザーB のフローを設定する
    3. テーブル一覧 `/admin/dataset__{tableId}` で新規レコードを追加し、ワークフロー申請を行う
    4. 申請レコードのチェックボックスを1つ選択する
    5. 一覧ヘッダーの「一括承認」ボタン `button:has-text("一括承認")` をクリックする
    6. 承認確認モーダルが表示されることを確認し、「承認」をクリックする
    7. 成功メッセージが表示され、WFステータスが「承認済み」に変わることを確認する
- case_no: 111-02
  sheet: B
  feature: ワークフロー
  category: |-
    一括承認
    ・複数選択
  description: |-
    ①ワークフロー申請を実施
    ②該当のテーブル一覧より、①の申請を複数チェックし「一括承認」をクリック
  expected: エラーなく処理が完了すること。
  movie: WF02
  detailed_flow: |
    1. beforeAll: debug APIでALLテストテーブルを作成し、tableIdを取得する
    2. テーブル設定でワークフローをONにする
    3. 複数のレコードを追加し、それぞれワークフロー申請を行う
    4. 複数のレコードのチェックボックスをすべて選択する
    5. 「一括承認」ボタンをクリックする
    6. 承認確認モーダルで「承認」をクリックする
    7. 選択した複数レコードすべてのWFステータスが「承認済み」に変わることを確認する
