  detailed_flow: "【WF07 テストフロー】この動画で確認するテスト番号:\n  wf-910 (旧: 457)    同一承認者スキップ機能\n  wf-920 (旧: 463)    通知文の変数から固定テキスト項目を除外\n  wf-930 (旧: 464)    閲覧権限に承認者条件を追加\n  wf-940 (旧: 469)    承認者の複数設定（AND/OR）\n  wf-950 (旧: 480)    否認・取り下げ後にテンプレート切り替え\n  wf-960 (旧: 484)    行の色設定でワークフローステータスが誤判定\n  wf-970 (旧: 506)    デフォルト値設定でルックアップが反映されない\n  wf-980 (旧: 510)    承認者の移動機能\n  wf-990 (旧: 512)    必須条件のワークフロー申請状態設定が機能しない\n  wf-1000 (旧: 513)   フロー固定時に追加した承認者を固定承認者の間に移動\n  wf-1010 (旧: 574)   無効ユーザーにすると承認履歴から氏名が消える\n  wf-1020 (旧: 582)   他テーブル参照で値の絞り込みが機能しない\n  wf-1030 (旧: 600)   組織条件付きワークフローのCSVインポートでチェックが外れる\n  wf-1040 (旧: 613)   テーブル名が長い場合のサイドメニューバッジ非表示\n  wf-1050 (旧: 621)   ワークフローテンプレートで正しいテンプレートが表示されない\n\n━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n[0:00] wf-910 ── 同一承認者スキップ機能\n1. 「同一承認者の承認スキップ」をONにしたワークフローで、同じユーザーが連続する承認フローを設定して申請する\n2. ✅ 同一ユーザーが続くステップが自動でスキップされ、承認が進むこと\n\n[0:04] wf-920 ── 通知文の変数選択肢に固定テキスト項目が含まれる（バグ修正確認）\n1. ワークフロー通知設定の件名・本文に変数（{}）を挿入する際のドロップダウンを確認する\n2. ✅ 固定テキスト項目が変数選択肢に含まれないこと\n3. ✅\
    \ 項目値が空の場合、通知文に{項目名}ではなく空欄が表示されること\n\n[0:08] wf-930 ── 閲覧権限に承認者条件追加（機能改善確認）\n1. ワークフロー設定の閲覧権限設定で「承認者が次と一致」条件を設定する\n2. 申請後、承認者としてのみ設定されたユーザーでレコードを開く\n3. ✅ 承認者として設定されたユーザーがレコードを閲覧できること\n\n[0:12] wf-940 ── 承認者の複数設定（AND/OR）\n1. 同一ステップに複数の承認者をAND条件・OR条件でそれぞれ設定して申請する\n2. AND条件（全員承認が必要）とOR条件（いずれか承認）の動作を確認する\n3. ✅ AND/OR条件に従って承認フローが正しく動作すること\n\n[0:16] wf-950 ── 否認・取り下げ後にテンプレートが正しく切り替わる（バグ修正確認）\n1. ワークフロー申請中のレコードを否認または取り下げる\n2. 再編集画面で申請モーダルを開く\n3. ✅ 否認・取り下げ後の再編集時に正しいテンプレートが表示されること\n\n[0:20] wf-960 ── 行の色設定でワークフローステータスが誤判定（バグ修正確認）\n1. 「ワークフローが申請中（要確認）または否認の場合にセルを赤色にする」ビューを設定する\n2. レコードを承認済みにした後、テーブル一覧で色を確認する\n3. ✅ 承認済みのレコードが赤色にならないこと\n\n[0:24] wf-970 ── デフォルト値設定でルックアップが反映されない（バグ修正確認）\n1. 他テーブル参照項目にデフォルト値（ログインユーザー）を設定し、ルックアップが設定されたテーブルでレコードを新規作成する\n2. ✅ レコード作成時にデフォルト値からルックアップが正しく反映されること\n\n[0:28] wf-980 ── 承認者の移動機能\n1. 申請モーダルで複数の承認者が設定された状態で、承認者の順序を入れ替える（ドラッグ等）\n2. ✅ 承認者の順序が変更でき、エラーが発生しないこと\n\n[0:32] wf-990 ── 必須条件のワークフロー申請状態設定が機能しない（バグ修正確認）\n1. 「ワークフローの申請状態が○○の場合は必須」と設定したフィールドを持つレコードを申請しようとする\n\
    2. 申請状態が条件に合致するときに、該当フィールドを空欄で申請を試みる\n3. ✅ 必須バリデーションが正しく動作し、空欄では申請できないこと\n\n[0:36] wf-1000 ── フロー固定時に追加した承認者を固定承認者の間に移動\n1. 「フローの固定時に承認者を追加できる」ONの状態で申請モーダルを開き、固定ルートの間に追加承認者を設定する\n2. 追加した承認者を固定承認者の間に移動する\n3. ✅ 追加した承認者が固定承認者の間に移動できること\n\n[0:40] wf-1010 ── 無効ユーザーにすると承認履歴から氏名が消える（バグ修正確認）\n1. 承認者として設定したユーザーが承認した後、そのユーザーを無効ユーザーに変更する\n2. レコード詳細の承認履歴を確認する\n3. ✅ 無効ユーザーにしても承認履歴に承認者の氏名が表示されること\n\n[0:44] wf-1020 ── 他テーブル参照で値の絞り込みが機能しない（バグ修正確認）\n1. 「他の項目で値の絞り込みを行う」が設定されたユーザーテーブル参照フィールドを持つレコード作成画面を開く\n2. 絞り込み条件となる項目（部署）を選択し、絞り込み後のフィールド（申請者）の選択肢を確認する\n3. ✅ 指定した部署でユーザーが正しく絞り込まれて表示されること\n\n[0:48] wf-1030 ── 組織条件付きワークフローCSVインポートでチェックが外れる（バグ修正確認）\n1. 「組織に対する条件：一人の承認が必要」にチェックが入ったワークフロー設定をCSVエクスポートする\n2. エクスポートしたCSVをインポートする\n3. ✅ インポート後も「一人の承認が必要」のチェックが正しく保持されていること\n\n[0:52] wf-1040 ── テーブル名が長い場合のサイドメニューバッジ非表示（バグ修正確認）\n1. テーブル名が長くてサイドメニューで末尾が「…」になる状態を作り、ワークフロー申請中レコードを作成する\n2. サイドメニューを確認する\n3. ✅ テーブル名が省略されていてもワークフローの赤バッジが表示されること\n\n[0:56] wf-1050 ── ワークフローテンプレートで正しいテンプレートが表示されない（バグ修正確認）\n1. 複数条件付きテンプレートが設定されたテーブルでレコードを新規作成する（下書き保存なし）\n\
    2. 申請モーダルで表示されるテンプレートを確認する\n3. ✅ 下書き保存なしでも条件に合った正しいテンプレートが表示されること"
