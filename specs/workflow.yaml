    2. 承認コメント入力欄にコメントを入力して確定する\n3. ✅ エラーなく承認が完了し、コメントがレコード詳細に表示されること\n\n[0:09] wf-190 ── 一括承認：複数件・コメントなし\n1. 複数件を一括承認する際、コメント欄を空欄のまま確定する\n2. ✅ エラーなく承認が完了すること\n\n[0:12] wf-200 ── 一括削除：1件（下書き/取り下げ済みレコード）\n1. 下書きまたは申請取り下げ済みのレコードを1件選択し、「一括削除」をクリックする\n2. ✅ エラーなく削除が完了し、一覧から消えること\n\n[0:15] wf-210 ── 一括削除：複数件\n1. 下書き/取り下げ済みレコードを複数件選択し、「一括削除」をクリックする\n2. ✅ エラーなく全件が削除されること\n\n[0:18] wf-220 ── 一括削除：複数件・コメントあり\n1. 複数件を一括削除する際、コメント欄にコメントを入力して確定する\n2. ✅ エラーなく削除が完了すること\n\n[0:21] wf-230 ── 一括削除：複数件・コメントなし\n1. 複数件を一括削除する際、コメント欄を空欄のまま確定する\n2. ✅ エラーなく削除が完了すること\n\n[0:24] wf-240 ── 一括否認：1件\n1. 申請中のレコードを1件選択し、「一括否認」をクリックする\n2. ✅ エラーなく否認が完了し、ステータスが「否認」になること\n\n[0:27] wf-250 ── 一括否認：複数件\n1. 申請中のレコードを複数件選択し、「一括否認」をクリックする\n2. ✅ エラーなく全件の否認が完了すること\n\n[0:30] wf-260 ── 一括否認：複数件・コメントあり\n1. 複数件を一括否認する際、コメントを入力して確定する\n2. ✅ エラーなく否認が完了し、コメントがレコード詳細に表示されること\n\n[0:33] wf-270 ── 一括否認：複数件・コメントなし\n1. 複数件を一括否認する際、コメント欄を空欄のまま確定する\n2. ✅ エラーなく否認が完了すること\n\n[0:36] wf-280 ── 一括取り下げ：1件\n1. 申請中のレコードを1件選択し、「一括取り下げ」をクリックする\n2. ✅ エラーなく取り下げが完了し、ステータスが「取り下げ」になること\n\
