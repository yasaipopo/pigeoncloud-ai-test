  expected: 条件追加ボタンが表示され、フィールドと条件値を設定できること。
  movie: WF05
  detailed_flow: "【WF05 テストフロー】この動画で確認するテスト番号:\n  wf-610 (旧: 396-1)  ステップに条件追加（フィールド値で発動制御）\n  wf-620 (旧: 396-2)  テンプレートに適用条件追加（フロー分岐）\n  wf-630 (旧: 397-1)  承認者タイプ「項目（ユーザーフィールド）」\n  wf-640 (旧: 397-2)  AND/OR欄でも承認者タイプ「項目」を指定\n  wf-650 (旧: 398-1)  同一ステップに複数承認者追加\n  wf-660 (旧: 398-2)  AND/OR結合条件の切り替え\n  wf-670 (旧: 399-1)  複数テンプレートに異なるフロー設定\n  wf-680 (旧: 399-2)  承認完了後の権限グループ設定UI\n  wf-690 (旧: 64-1)   申請取り下げ時の通知確認\n  wf-700 (旧: 68-1)   組織(役職)・1人の承認で申請→承認\n  wf-710 (旧: 68-2)   組織(役職)・1人の承認で申請→否認\n  wf-720 (旧: 68-3)   組織(役職)・全員の承認で申請→承認\n  wf-730 (旧: 68-4)   組織(役職)・全員の承認で申請→否認\n  wf-740 (旧: 68-5)   申請コメント入力→承認→コメント確認\n  wf-750 (旧: 68-6)   申請コメント入力→否認→コメント確認\n\n━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n[0:00] wf-610 ── ステップに条件追加\n1. ワークフロー設定のフロー設計モーダルを開き、承認ステップの「条件追加」ボタンをクリックする\n2. フィールドと条件値を設定する\n3. ✅ 条件追加ボタンが表示され、フィールドと条件値を設定できること\n\n[0:04] wf-620 ── テンプレートに適用条件追加\n1. フロー設計モーダルでテンプレート自体の「条件追加」ボタンをクリックする\n2. フィールドと条件値を設定する\n3. ✅ テンプレート条件として「条件追加」ボタンが表示され、フィールドと条件値を設定できること\n\n[0:08] wf-630 ──\
    \ 承認者タイプ「項目」を選択\n1. フロー設計モーダルで承認者タイプのラジオボタンから「項目」を選択する\n2. ユーザーフィールドを選択するドロップダウンが表示されることを確認する\n3. ✅ 承認者タイプに「項目」が選択でき、ユーザーフィールドのドロップダウンが表示されること\n\n[0:11] wf-640 ── AND/OR欄でも承認者タイプ「項目」を指定\n1. 「同承認フロー内で追加」ボタンをクリックして2人目の承認者設定を追加する\n2. AND/OR条件の承認者タイプとして「項目」を選択し、ユーザーフィールドを指定する\n3. ✅ AND/OR条件の承認者タイプとして「項目」が選択でき、ユーザーフィールドが指定できること\n\n[0:14] wf-650 ── 同一ステップに複数承認者追加\n1. 「同承認フロー内で同時に承認するユーザー/組織を追加」ボタンをクリックする\n2. 2人目の承認者を追加し、AND/OR選択ドロップダウンが表示されることを確認する\n3. ✅ 追加後に2つ目の承認者設定フォームとAND/OR選択が表示されること\n\n[0:17] wf-660 ── AND/OR結合条件の切り替え\n1. 複数承認者が設定された状態でAND/OR選択ドロップダウンを操作する\n2. 「AND」（全員承認）と「OR」（いずれか承認）を切り替える\n3. ✅ AND/OR選択ドロップダウンで「AND」「OR」が選択できること\n\n[0:20] wf-670 ── 複数テンプレートに異なるフロー設定\n1. フロー設計モーダルでテンプレートを2つ以上追加する\n2. それぞれのテンプレートに異なる承認者・ステップを設定して保存する\n3. ✅ テンプレートを複数追加でき、各テンプレートに独立したフロー設定が保存されること\n\n[0:24] wf-680 ── 承認完了後の権限グループ設定UI\n1. ワークフロー設定画面を開き、「承認後もデータを編集できる権限グループ」設定を確認する\n2. ✅ 当該設定UIが存在し、権限グループを選択できること\n\n[0:27] wf-690 ── 申請取り下げ時の通知確認\n1. レコードを申請し、コメントを入力して申請取り下げを実行する\n2. メール受信を確認する\n3. ✅ ワークフロー設定者への通知メールが届き、コメントが含まれていること\n\
    \n[0:31] wf-700 ── 組織(役職)・1人の承認で申請→承認\n1. 承認者タイプ「組織(役職)」・条件「一人の承認が必要」を設定し、組織と役職を選択して申請する\n2. 指定した組織・役職に一致するユーザーでログインし、コメントを入力して「承認」をクリックする\n3. ✅ エラーなく承認が完了し、コメントが確認できること\n\n[0:35] wf-710 ── 組織(役職)・1人の承認で申請→否認\n1. 同じ設定で申請し、コメントを入力して「否認」をクリックする\n2. ✅ エラーなく否認が完了し、コメントが確認できること\n\n[0:39] wf-720 ── 組織(役職)・全員の承認で申請→承認\n1. 承認者タイプ「組織(役職)」・条件「全員の承認が必要」を設定し申請する\n2. 指定組織・役職の全ユーザーがコメントを入力して「承認」をクリックする\n3. ✅ 全員承認が完了しエラーが発生しないこと、コメントが確認できること\n\n[0:43] wf-730 ── 組織(役職)・全員の承認で申請→否認\n1. 全員承認設定で申請し、一名がコメントを入力して「否認」をクリックする\n2. ✅ 否認が完了しエラーが発生しないこと、コメントが確認できること\n\n[0:47] wf-740 ── 申請コメント入力→承認→コメント確認\n1. レコード追加画面で申請コメントを入力し「申請」をクリックする\n2. 承認者でログインして「承認」をクリックし、承認コメントを入力する\n3. ✅ 申請コメントと承認コメントの両方がレコード詳細に表示されること\n\n[0:51] wf-750 ── 申請コメント入力→否認→コメント確認\n1. 申請コメントを入力して申請し、承認者が否認コメントを入力して「否認」をクリックする\n2. ✅ 申請コメントと否認コメントの両方がレコード詳細に表示されること"
