    ※「引き上げ承認」ボタンが表示されないこと。'
  movie: WF01
  detailed_flow: "【WF01 テストフロー】この動画で確認するテスト番号:\n  wf-010 (旧: 106-01)  引き上げ承認 — ユーザーA→組織(1人) NG\n  wf-020 (旧: 106-02)  引き上げ承認 — ユーザーA→組織(全員) NG\n  wf-030 (旧: 106-03)  引き上げ承認 — ユーザーA→ユーザーB OK\n  wf-040 (旧: 106-04)  引き上げ承認 — 組織(1人)→ユーザーA OK\n  wf-050 (旧: 106-05)  引き上げ承認 — 組織(1人)→組織(1人) NG\n  wf-060 (旧: 106-06)  引き上げ承認 — 組織(1人)→組織(全員) NG\n  wf-070 (旧: 106-07)  引き上げ承認 — 組織(全員)→ユーザーA OK\n  wf-080 (旧: 106-08)  引き上げ承認 — 組織(全員)→組織(1人) NG\n  wf-090 (旧: 106-09)  引き上げ承認 — 組織(全員)→組織(全員) NG\n  wf-100 (旧: 106-10)  引き上げ承認 — A→B→C、B段で引き上げ OK\n  wf-110 (旧: 106-11)  引き上げ承認 — A→B→C、C段で引き上げ OK\n  wf-120 (旧: 106-12)  引き上げ承認 — 組織(1人)→A→B、A段で引き上げ OK\n  wf-130 (旧: 106-13)  引き上げ承認 — 組織(1人)→A→B、B段で引き上げ OK\n  wf-140 (旧: 106-14)  引き上げ承認 — 組織(全員)→A→B、A段で引き上げ OK\n  wf-150 (旧: 106-15)  引き上げ承認 — 組織(全員)→A→B、B段で引き上げ OK\n\n━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n[共通セットアップ]\n1. テスト専用テーブルを新規作成し、ワークフロー設定で「引き上げ承認機能」をONにして保存する\n2. テスト用ユーザーA・B・Cを作成する\n\n[0:00] wf-010 ── 引き上げ承認：ユーザーA→組織(1人の承認が必要)\n1. ユーザーAでレコードを新規作成し、承認フロー「ユーザーA→組織(1人)」で申請する\n\
    2. 組織の1名でレコード詳細を開く\n3. ✅ 「引き上げ承認」ボタンが表示されないこと（組織ステップでは引き上げ不可）\n\n[0:03] wf-020 ── 引き上げ承認：ユーザーA→組織(全員の承認が必要)\n1. 承認フロー「ユーザーA→組織(全員)」で申請する\n2. 組織メンバーでレコード詳細を開く\n3. ✅ 「引き上げ承認」ボタンが表示されないこと\n\n[0:06] wf-030 ── 引き上げ承認：ユーザーA→ユーザーB\n1. 承認フロー「ユーザーA→ユーザーB」で申請する\n2. ユーザーBでレコード詳細を開く\n3. ✅ 「引き上げ承認」ボタンが表示されること（ユーザー同士のステップは引き上げ可能）\n\n[0:09] wf-040 ── 引き上げ承認：組織(1人)→ユーザーA\n1. 承認フロー「組織(1人)→ユーザーA」で申請し、組織メンバーが1名承認する\n2. ユーザーAでレコード詳細を開く\n3. ✅ 「引き上げ承認」ボタンが表示されること\n\n[0:12] wf-050 ── 引き上げ承認：組織(1人)→組織(1人)\n1. 承認フロー「組織(1人)→組織(1人)」で申請し、第1ステップを完了する\n2. 第2ステップの組織メンバーでレコード詳細を開く\n3. ✅ 「引き上げ承認」ボタンが表示されないこと\n\n[0:15] wf-060 ── 引き上げ承認：組織(1人)→組織(全員)\n1. 承認フロー「組織(1人)→組織(全員)」で申請し、第1ステップを完了する\n2. 第2ステップの組織メンバーでレコード詳細を開く\n3. ✅ 「引き上げ承認」ボタンが表示されないこと\n\n[0:18] wf-070 ── 引き上げ承認：組織(全員)→ユーザーA\n1. 承認フロー「組織(全員)→ユーザーA」で申請し、組織全員が承認する\n2. ユーザーAでレコード詳細を開く\n3. ✅ 「引き上げ承認」ボタンが表示されること\n\n[0:21] wf-080 ── 引き上げ承認：組織(全員)→組織(1人)\n1. 承認フロー「組織(全員)→組織(1人)」で申請し、第1ステップを完了する\n2. 第2ステップの組織メンバーでレコード詳細を開く\n3. ✅ 「引き上げ承認」ボタンが表示されないこと\n\n[0:24] wf-090\
    \ ── 引き上げ承認：組織(全員)→組織(全員)\n1. 承認フロー「組織(全員)→組織(全員)」で申請し、第1ステップを完了する\n2. 第2ステップの組織メンバーでレコード詳細を開く\n3. ✅ 「引き上げ承認」ボタンが表示されないこと\n\n[0:27] wf-100 ── 引き上げ承認：A→B→C、Bで引き上げ\n1. 承認フロー「A→B→C（全員ユーザー）」で申請する\n2. ユーザーBでレコード詳細を開く\n3. ✅ 「引き上げ承認」ボタンが表示されること（Bが残りをスキップして最終承認まで引き上げられる）\n\n[0:30] wf-110 ── 引き上げ承認：A→B→C、Cで引き上げ\n1. 承認フロー「A→B→C」でAが申請し、Bが通常承認した後、Cでレコード詳細を開く\n2. ✅ 「引き上げ承認」ボタンが表示されること\n\n[0:33] wf-120 ── 引き上げ承認：組織(1人)→A→B、Aで引き上げ\n1. 承認フロー「組織(1人)→A→B」で申請し、組織が1名承認する\n2. ユーザーAでレコード詳細を開く\n3. ✅ 「引き上げ承認」ボタンが表示されること\n\n[0:36] wf-130 ── 引き上げ承認：組織(1人)→A→B、Bで引き上げ\n1. 承認フロー「組織(1人)→A→B」で申請し、組織+Aが順に承認する\n2. ユーザーBでレコード詳細を開く\n3. ✅ 「引き上げ承認」ボタンが表示されること\n\n[0:39] wf-140 ── 引き上げ承認：組織(全員)→A→B、Aで引き上げ\n1. 承認フロー「組織(全員)→A→B」で申請し、組織全員が承認する\n2. ユーザーAでレコード詳細を開く\n3. ✅ 「引き上げ承認」ボタンが表示されること\n\n[0:42] wf-150 ── 引き上げ承認：組織(全員)→A→B、Bで引き上げ\n1. 承認フロー「組織(全員)→A→B」で申請し、組織全員+Aが承認する\n2. ユーザーBでレコード詳細を開く\n3. ✅ 「引き上げ承認」ボタンが表示されること"
