  sheet: A
  feature: レコード一覧
  category: コメント表示
  description: 一覧にコメントアイコン追加（マウスオーバーで件数と最新投稿時間表示)
  expected: マウスオーバー時に件数と最新投稿時間が表示されること。
- case_no: 167-1
  sheet: A
  feature: レコード
  category: チェックボックス
  description: ①レコード一覧のレコードの左端にあるチェックボックスをクリックする。
  expected: チェックボックスにチェックが入り、「一括削除」ボタンなども連動して表示されることを確認する。
