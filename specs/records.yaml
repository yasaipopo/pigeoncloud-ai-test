- case_no: 180-1
  sheet: B
  feature: 一括編集
  category: 権限のあるデータのみ一括編集
  description: '①メニューより一括編集を選択

    ②該当の複数項目について、一括編集を実施し保存する'
  expected: '・権限のあるデータのみ一括編集可

    ・更新通知は行われない

    ・編集中でロックされているデータも強制的に上書きされる => (出来ないでOK)

    ・元には戻せない

    ・フィルタが適用されているデータのみ更新される'
- case_no: 180-2
  sheet: B
  feature: 一括編集
  category: 権限のないデータが含まれる場合は一括編集されない
  description: "①メニューより一括編集を選択\r\n②該当の複数項目について、一括編集を実施し保存する"
  expected: 権限がないデータが含まれていると一括編集自体がされないこと。
- case_no: 180-3
  sheet: B
  feature: 一括編集
  category: 編集中でロックされているデータも強制的に上書き
  description: "①メニューより一括編集を選択\r\n②該当の複数項目について、一括編集を実施し保存する"
  expected: 編集中でロックされているデータも強制的に上書きされること
- case_no: 180-4
  sheet: B
  feature: 一括編集
  category: フィルタをかけているパターン
  description: '①メニューより一括編集を選択

    ②フィルタされたレコードを全選択する

    ③該当の複数の項目について、一括編集を実施し保存する'
  expected: フィルタをかけているデータのみ一括編集がかかること。
