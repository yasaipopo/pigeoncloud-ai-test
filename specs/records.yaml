- case_no: 143-01
  status: partial
  steps: '1. beforeAll: create-all-type-table API呼び出し

    2. beforeAll: create-all-type-data API呼び出し (count:3, pattern:''fixed'')

    3. テーブルIDをAPIステータスから取得

    4. テーブル一覧（/admin/dataset__{tableId}）に遷移

    5. レコード行の存在確認（table tbody tr）

    6. 最初のレコード行をクリックして詳細画面に遷移

    7. 詳細画面が表示されることを確認

    8. スクリーンショット保存

    9. afterAll: delete-all-type-tables API呼び出し

    '
  assertions: '- expect(pageText).not.toContain(''Internal Server Error'')

