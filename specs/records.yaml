- case_no: 35-1
  sheet: B
  feature: 関連レコード一覧
  category: 対象テーブル削除
  description: '①テスト用にテーブルを新規作成する。

    ②①で作成したテーブルを「関連レコード一覧」にて対象テーブルとして設定を行う。

    ③①のテーブルを削除する。'
  expected: 「参照されているため削除できません」とエラーとなり削除できないこと。
