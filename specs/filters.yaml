group: フィルタ
spec_file: tests/filters.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: FILTER-FULL
  feature: フィルタ・検索・ビュー総合
  category: 動画単位
  description: |
    ①フィルタを作成・保存する
    ②デフォルトフィルタ設定（2つ設定時に1つのみ有効）を確認する
    ③簡易検索（虫眼鏡）で1文字入力時に即座に検索されないことを確認
    ④計算項目・他テーブル参照での検索が正しく動作することを確認
    ⑤半角/全角どちらでも検索できることを確認
    ⑥フィルタ保存状態で一括編集がフィルタ対象のみに適用されることを確認
    ⑦ユーザー管理テーブルの「組織」項目でソートが正しく動作することを確認
    ⑧ビュー編集後にフィルタモードに勝手に切り替わらないことを確認
    ⑨高度なフィルタ設定後のページ遷移が正常に動作することを確認
    ⑩ダッシュボードでフィルタ権限「自分のみ表示」がマスター権限で表示されることを確認
  expected: |
    フィルタ・デフォルトフィルタ・検索・ソート・ビュー・一括編集が全て正常に動作すること
  includes:
  - FILTER-BULK
  - FILTER-DEFAULT
  - FILTER-MISC
  - FILTER-SEARCH
  - FILTER-SORT
  - FILTER-VIEW
  - '234'
  - '244'
  - '245'
  - '246'
  - '247'
  - '248'
  - '385'
actual_steps:
- case_no: '234'
  status: partial
  steps: '1. beforeAll: create-all-type-table API呼び出し

    2. beforeAll: create-all-type-data API呼び出し (count:3, pattern:''fixed'')

    3. テーブルIDをAPIステータスから取得して保存

    4. テーブル一覧ページ（/admin/dataset__{tableId}）に遷移

    5. 「フィルタ」ボタン（button:has-text("フィルタ")）または「絞り込み」ボタンの存在確認

    6. スクリーンショット保存（reports/agent-1/screenshots/234-filter.png）

    7. afterAll: delete-all-type-tables API呼び出し

    '
  assertions: '- expect(page.locator(''.navbar'')).toBeVisible()

    - フィルタボタンが存在すれば toBeVisible()（条件付き）

    '
  gaps: '⚠️ YAMLには「フィルタタイプ・権限動作確認」の詳細手順が記載されているが、spec.jsはフィルタボタンの存在確認のみ

    ⚠️ フィルタを実際に設定・適用して絞り込まれた結果を確認するステップなし

    ⚠️ 権限によるフィルタ動作の違いを確認していない

    ⚠️ フィルタボタンが存在しない場合でもパスする（条件付きアサーション）

    '
- case_no: '244'
  status: partial
  steps: '1. テーブル一覧ページに遷移

    2. 「高度な検索」ボタン（button:has-text("高度な検索")）または「詳細検索」ボタンの存在確認

    3. 存在する場合はクリック

    4. スクリーンショット保存（reports/agent-1/screenshots/244-advanced-search.png）

    '
  assertions: '- expect(page.locator(''.navbar'')).toBeVisible()

    - 高度な検索ボタンが存在すれば toBeVisible()（条件付き）

    '
  gaps: '⚠️ YAMLには参考URLのみで詳細手順が記載されていないが、spec.jsも高度な検索UIの確認・操作を全く行っていない

    ⚠️ 高度な検索の条件設定・適用・結果確認なし

    ⚠️ ボタンが存在しない場合でもパスする（条件付きアサーション）

    '
- case_no: '245'
  status: implemented
  steps: '1. ALLテストテーブルのレコード一覧ページに遷移

    2. 「フィルタ」ボタンをクリック

    3. フィルタ設定UIが表示されることを確認

    4. 条件を追加（フィールド選択・値入力）

    5. フィルタを適用

    6. レコード一覧が絞り込まれることを確認

    '
  assertions: '- フィルタボタンが存在すること

    - フィルタ設定UIが表示されること

    - エラーなく動作すること

    '
- case_no: '246'
  status: implemented
  steps: '1. フィルタ設定UIを開く

    2. フィルタ名入力フィールドが存在することを確認

    3. 保存ボタンが存在することを確認

    '
  assertions: '- フィルタ名入力またはフィルタ保存UIが存在すること

    '
- case_no: '247'
  status: implemented
  steps: '1. 保存済みフィルタ一覧が表示されること

    2. 削除ボタンが存在することを確認

    '
  assertions: '- フィルタ管理UIが存在すること

    '
- case_no: '248'
  status: implemented
  steps: '1. ALLテストテーブルのレコード一覧ページに遷移

    2. 「高度な検索」または「詳細検索」ボタンをクリック

    3. 高度な検索UIが表示されることを確認

    4. 複数の条件フォームが追加できることを確認

    5. AND/OR切り替えUIが存在することを確認

    '
  assertions: '- 高度な検索UIが表示されること

    - 複数条件の追加が可能であること

    - エラーなく動作すること

    '
