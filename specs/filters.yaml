group: フィルタ
spec_file: tests/filters.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: '234'
  sheet: B
  feature: フィルタタイプ
  category: '・フィルタ

    ・ビュー

    ・混合'
  description: フィルタ／集計より、全種類のフィルタタイプおよび権限周りの動作確認を行う。
  expected: ''
- case_no: '244'
  sheet: B
  feature: フィルタ
  category: 高度な検索
  description: https://loftal.pigeon-cloud.com/admin/dataset__90/view/191
  expected: '想定通りの結果となること。

    https://henmi022.pigeon-demo.com/admin/dataset__20'
- case_no: '245'
  sheet: B
  feature: フィルタ
  category: フィルタ作成・適用
  description: フィルタを新規作成し、フィールド値による絞り込み条件を設定して適用できること。フィルタ適用後にレコードが絞り込まれること。
  expected: フィルタ作成UIが表示され、条件を設定して保存・適用できること。
- case_no: '246'
  sheet: B
  feature: フィルタ
  category: フィルタ保存・更新
  description: 作成したフィルタに名前を付けて保存し、次回アクセス時に保存済みフィルタとして選択できること。
  expected: フィルタを保存でき、保存済みフィルタ一覧に表示されること。
- case_no: '247'
  sheet: B
  feature: フィルタ
  category: フィルタ削除
  description: 保存したフィルタを削除できること。削除後は一覧から消えること。
  expected: フィルタ削除後に一覧から消えること。
- case_no: '248'
  sheet: B
  feature: フィルタ
  category: 高度な検索・複合条件
  description: 高度な検索機能で複数条件を組み合わせた検索ができること。AND/OR条件の切り替えが可能であること。
  expected: 高度な検索UIが表示され、複数条件を設定して検索を実行できること。
- case_no: '385'
  sheet: B
  feature: ''
  description: '検索において、半角と全角が識別されてしまうのですが、

    検索ワードをどちらで入れてもヒットするようにしていただきたいです。


    （例）現状、タンクとﾀﾝｸでは別物と認識されてしまう


    ※全角半角が混ざったワードにはHITすることは難しい旨お伝え済み'
  expected: エラーなく正常に動作すること。(検索において、半角と全角が識別されてしまうのですが、 検索ワードをどちらで入れてもヒットするようにしていただきたいです。  （例）現状、タンクとﾀﾝｸでは別物と認識されてしまう  ※全角半角が混ざった)
- case_no: FILTER-BULK
  feature: フィルタ一括編集
  category: フィルタ適用時の一括編集
  description: |
    ①フィルタを保存した状態で一括編集を実行する
    ②フィルタ対象のレコードのみに編集が適用されることを確認（#634 機能改善確認）
    ③親テーブルで子テーブルの項目A AND 項目Bで絞り込んだ時、同一レコードのA・Bで判定されることを確認（#624 機能改善確認）
  expected: |
    フィルタ適用時の一括編集と子テーブル絞り込みが正しく動作すること
  includes:
  - '634'
- case_no: FILTER-DEFAULT
  feature: デフォルトフィルタ
  category: フィルタのデフォルト設定
  description: |
    ①2つのフィルタに対して「全てのユーザーのデフォルトにする」にチェックし、1つのみ有効になることを確認（#332 バグ修正確認）
    ②テーブルを開いたとき、デフォルト設定されたフィルタが正しく表示されることを確認（#335 バグ修正確認）
    ③ダッシュボードでフィルタ権限「自分のみ表示」がマスター権限では表示されることを確認（#266 機能改善確認）
  expected: |
    フィルタのデフォルト設定が正しく動作し、権限に応じた表示が行われること
  includes:
  - '266'
  - '332'
  - '335'
- case_no: FILTER-MISC
  feature: フィルタ全般
  category: フィルタの各種動作
  description: |
    ①高度な機能を使ってフィルタを設定する
    ②フィルタ表示後にページ遷移が正常に動作することを確認（#771 バグ修正確認）
  expected: |
    高度なフィルタ使用後のページ遷移が正常なこと
  includes:
  - '624'
- case_no: FILTER-SEARCH
  feature: 簡易検索
  category: 簡易検索・項目検索の動作
  description: |
    ①テーブル一覧の項目名横の虫眼鏡から検索を行う
    ②1文字入力時点で即座に検索が実行されず、入力確定後に検索されることを確認（#287 バグ修正確認）
    ③計算項目（DATE_FORMAT等）の値でも検索・絞り込みが正しく動作することを確認（#301 バグ修正確認）
    ④他テーブル参照で「計算項目の検索」ができない事象が修正されていることを確認（#354 バグ修正確認）
    ⑤英数字の半角/全角どちらで検索してもヒットすることを確認（#412 機能改善確認）
    ⑥ひらがな・全角カタカナ・半角カタカナどれで検索しても同じ結果が表示されることを確認（#413 バグ修正確認）
    ⑦虫眼鏡検索後にフィルタボタンが正常に反応することを確認（#461 バグ修正確認）
    ⑧計算項目の値を絞り込みや項目検索で正しく検索できることを確認（#535 バグ修正確認）
  expected: |
    簡易検索・項目検索が正しく動作し、全角半角変換・カタカナ変換・計算項目検索に対応していること
  includes:
  - '287'
  - '301'
  - '354'
  - '412'
  - '413'
  - '461'
  - '500'
  - '535'
  - '771'
- case_no: FILTER-SORT
  feature: フィルタ並び替え
  category: フィルタの並び替え
  description: |
    ①ユーザー管理テーブルで「組織」項目のヘッダーをクリックする
    ②組織でソートが正しく動作することを確認（#344 バグ修正確認）
    ③他テーブル参照（複数値許可）項目がビューの並び順選択肢に表示されないことを確認（#445 機能改善確認）
    ④権限設定内の登録ユーザーの並び替えが正しく反映されることを確認（#280 機能改善確認）
  expected: |
    並び替え機能が正しく動作し、ソート不可項目が適切に制御されること
  includes:
  - '280'
  - '344'
- case_no: FILTER-VIEW
  feature: ビュー表示
  category: ビュー編集後のフィルタ表示
  description: |
    ①ビューを編集して「表示」ボタンを押す
    ②表示がカスタムになった後、フィルタモードに勝手に切り替わらないことを確認（#334 バグ修正確認）
  expected: |
    ビュー編集後にフィルタモードに不正に切り替わらないこと
  includes:
  - '334'
  - '445'
actual_steps:
- case_no: '234'
  status: partial
  steps: '1. beforeAll: create-all-type-table API呼び出し

    2. beforeAll: create-all-type-data API呼び出し (count:3, pattern:''fixed'')

    3. テーブルIDをAPIステータスから取得して保存

    4. テーブル一覧ページ（/admin/dataset__{tableId}）に遷移

    5. 「フィルタ」ボタン（button:has-text("フィルタ")）または「絞り込み」ボタンの存在確認

    6. スクリーンショット保存（reports/agent-1/screenshots/234-filter.png）

    7. afterAll: delete-all-type-tables API呼び出し

    '
  assertions: '- expect(page.locator(''.navbar'')).toBeVisible()

    - フィルタボタンが存在すれば toBeVisible()（条件付き）

    '
  gaps: '⚠️ YAMLには「フィルタタイプ・権限動作確認」の詳細手順が記載されているが、spec.jsはフィルタボタンの存在確認のみ

    ⚠️ フィルタを実際に設定・適用して絞り込まれた結果を確認するステップなし

    ⚠️ 権限によるフィルタ動作の違いを確認していない

    ⚠️ フィルタボタンが存在しない場合でもパスする（条件付きアサーション）

    '
- case_no: '244'
  status: partial
  steps: '1. テーブル一覧ページに遷移

    2. 「高度な検索」ボタン（button:has-text("高度な検索")）または「詳細検索」ボタンの存在確認

    3. 存在する場合はクリック

    4. スクリーンショット保存（reports/agent-1/screenshots/244-advanced-search.png）

    '
  assertions: '- expect(page.locator(''.navbar'')).toBeVisible()

    - 高度な検索ボタンが存在すれば toBeVisible()（条件付き）

    '
  gaps: '⚠️ YAMLには参考URLのみで詳細手順が記載されていないが、spec.jsも高度な検索UIの確認・操作を全く行っていない

    ⚠️ 高度な検索の条件設定・適用・結果確認なし

    ⚠️ ボタンが存在しない場合でもパスする（条件付きアサーション）

    '
- case_no: '245'
  status: implemented
  steps: '1. ALLテストテーブルのレコード一覧ページに遷移

    2. 「フィルタ」ボタンをクリック

    3. フィルタ設定UIが表示されることを確認

    4. 条件を追加（フィールド選択・値入力）

    5. フィルタを適用

    6. レコード一覧が絞り込まれることを確認

    '
  assertions: '- フィルタボタンが存在すること

    - フィルタ設定UIが表示されること

    - エラーなく動作すること

    '
- case_no: '246'
  status: implemented
  steps: '1. フィルタ設定UIを開く

    2. フィルタ名入力フィールドが存在することを確認

    3. 保存ボタンが存在することを確認

    '
  assertions: '- フィルタ名入力またはフィルタ保存UIが存在すること

    '
- case_no: '247'
  status: implemented
  steps: '1. 保存済みフィルタ一覧が表示されること

    2. 削除ボタンが存在することを確認

    '
  assertions: '- フィルタ管理UIが存在すること

    '
- case_no: '248'
  status: implemented
  steps: '1. ALLテストテーブルのレコード一覧ページに遷移

    2. 「高度な検索」または「詳細検索」ボタンをクリック

    3. 高度な検索UIが表示されることを確認

    4. 複数の条件フォームが追加できることを確認

    5. AND/OR切り替えUIが存在することを確認

    '
  assertions: '- 高度な検索UIが表示されること

    - 複数条件の追加が可能であること

    - エラーなく動作すること

    '
