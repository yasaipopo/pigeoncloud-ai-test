- case_no: '332'
  sheet: B
  feature: 文字列
  description: |-
    ①【バグ修正確認】2つのフィルタに対して、。
    ②「全てのユーザーのデフォルトにする」にチェックができてしまう。
    ③対象のテーブル名・・・ID146：テスト。
  expected: バグが修正され、正常に動作すること。(2つのフィルタに対して、 「全てのユーザーのデフォルトにする」にチェックができてしまう。   対象のテーブル名・・・ID146：テスト)
  movie: FL02
  detailed_flow: |
