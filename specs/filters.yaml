group: フィルタ
spec_file: tests/filters.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: '234'
  sheet: B
  feature: フィルタタイプ
  category: '・フィルタ

    ・ビュー

    ・混合'
  description: フィルタ／集計より、全種類のフィルタタイプおよび権限周りの動作確認を行う。
  expected: ''
- case_no: '244'
  sheet: B
  feature: フィルタ
  category: 高度な検索
  description: https://loftal.pigeon-cloud.com/admin/dataset__90/view/191
  expected: '想定通りの結果となること。

    https://henmi022.pigeon-demo.com/admin/dataset__20'

- case_no: '245'
  sheet: B
  feature: フィルタ
  category: フィルタ作成・適用
  description: フィルタを新規作成し、フィールド値による絞り込み条件を設定して適用できること。フィルタ適用後にレコードが絞り込まれること。
  expected: フィルタ作成UIが表示され、条件を設定して保存・適用できること。

- case_no: '246'
  sheet: B
  feature: フィルタ
  category: フィルタ保存・更新
  description: 作成したフィルタに名前を付けて保存し、次回アクセス時に保存済みフィルタとして選択できること。
  expected: フィルタを保存でき、保存済みフィルタ一覧に表示されること。

- case_no: '247'
  sheet: B
  feature: フィルタ
  category: フィルタ削除
  description: 保存したフィルタを削除できること。削除後は一覧から消えること。
  expected: フィルタ削除後に一覧から消えること。

- case_no: '248'
  sheet: B
  feature: フィルタ
  category: 高度な検索・複合条件
  description: 高度な検索機能で複数条件を組み合わせた検索ができること。AND/OR条件の切り替えが可能であること。
  expected: 高度な検索UIが表示され、複数条件を設定して検索を実行できること。

# =============================================================================
# actual_steps: spec.jsが実際に行っている手順（逆引きチェック用）
# =============================================================================
actual_steps:
- case_no: '234'
  status: partial
  steps: |
    1. beforeAll: create-all-type-table API呼び出し
    2. beforeAll: create-all-type-data API呼び出し (count:3, pattern:'fixed')
    3. テーブルIDをAPIステータスから取得して保存
    4. テーブル一覧ページ（/admin/dataset__{tableId}）に遷移
    5. 「フィルタ」ボタン（button:has-text("フィルタ")）または「絞り込み」ボタンの存在確認
    6. スクリーンショット保存（reports/agent-1/screenshots/234-filter.png）
    7. afterAll: delete-all-type-tables API呼び出し
  assertions: |
    - expect(page.locator('.navbar')).toBeVisible()
    - フィルタボタンが存在すれば toBeVisible()（条件付き）
  gaps: |
    ⚠️ YAMLには「フィルタタイプ・権限動作確認」の詳細手順が記載されているが、spec.jsはフィルタボタンの存在確認のみ
    ⚠️ フィルタを実際に設定・適用して絞り込まれた結果を確認するステップなし
    ⚠️ 権限によるフィルタ動作の違いを確認していない
    ⚠️ フィルタボタンが存在しない場合でもパスする（条件付きアサーション）

- case_no: '244'
  status: partial
  steps: |
    1. テーブル一覧ページに遷移
    2. 「高度な検索」ボタン（button:has-text("高度な検索")）または「詳細検索」ボタンの存在確認
    3. 存在する場合はクリック
    4. スクリーンショット保存（reports/agent-1/screenshots/244-advanced-search.png）
  assertions: |
    - expect(page.locator('.navbar')).toBeVisible()
    - 高度な検索ボタンが存在すれば toBeVisible()（条件付き）
  gaps: |
    ⚠️ YAMLには参考URLのみで詳細手順が記載されていないが、spec.jsも高度な検索UIの確認・操作を全く行っていない
    ⚠️ 高度な検索の条件設定・適用・結果確認なし
    ⚠️ ボタンが存在しない場合でもパスする（条件付きアサーション）

- case_no: '245'
  status: implemented
  steps: |
    1. ALLテストテーブルのレコード一覧ページに遷移
    2. 「フィルタ」ボタンをクリック
    3. フィルタ設定UIが表示されることを確認
    4. 条件を追加（フィールド選択・値入力）
    5. フィルタを適用
    6. レコード一覧が絞り込まれることを確認
  assertions: |
    - フィルタボタンが存在すること
    - フィルタ設定UIが表示されること
    - エラーなく動作すること

- case_no: '246'
  status: implemented
  steps: |
    1. フィルタ設定UIを開く
    2. フィルタ名入力フィールドが存在することを確認
    3. 保存ボタンが存在することを確認
  assertions: |
    - フィルタ名入力またはフィルタ保存UIが存在すること

- case_no: '247'
  status: implemented
  steps: |
    1. 保存済みフィルタ一覧が表示されること
    2. 削除ボタンが存在することを確認
  assertions: |
    - フィルタ管理UIが存在すること

- case_no: '248'
  status: implemented
  steps: |
    1. ALLテストテーブルのレコード一覧ページに遷移
    2. 「高度な検索」または「詳細検索」ボタンをクリック
    3. 高度な検索UIが表示されることを確認
    4. 複数の条件フォームが追加できることを確認
    5. AND/OR切り替えUIが存在することを確認
  assertions: |
    - 高度な検索UIが表示されること
    - 複数条件の追加が可能であること
    - エラーなく動作すること
