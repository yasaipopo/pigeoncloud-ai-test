- case_no: '266'
  sheet: B
  feature: 文字列
  description: ①【機能改善確認】ダッシュボードにて表示中のテーブルで、【自分のみ表示】のフィルタ権限に対し、マスター権限では見られるようにアップデートしていただきたいです。
  expected: 機能改善が正しく反映されていること。(ダッシュボードにて表示中のテーブルで、【自分のみ表示】のフィルタ権限に対し、マスター権限では見られるようにアップデートしていただきたいです。)
  movie: FL02
  detailed_flow: |
    # マスター権限ユーザーで「自分のみ表示」フィルタが設定されたテーブルのレコードを閲覧できることを確認
    1. マスターユーザー（admin）でログイン
    2. テーブルID取得: `const tableId = await getAllTypeTableId(page)`
    3. テーブルのフィルタ設定ページへ: `await page.goto(BASE_URL + '/admin/dataset__' + tableId + '/setting/filter')` または設定メニューから「権限設定」
    4. フィルタ権限として「自分のみ表示」が設定可能なフィルタが存在するか確認
    5. ALLテストテーブルのレコード一覧へ: `await page.goto(BASE_URL + '/admin/dataset__' + tableId)`
    6. Angularロード待機
    7. マスターユーザーとして「自分のみ表示」条件でもレコードが表示されることを確認
    8. レコード一覧にデータが表示されること: `await expect(page.locator('table tbody tr')).not.toHaveCount(0)`
    # Assert
    - マスターユーザーで「自分のみ表示」フィルタ設定のテーブルでもレコードが表示されること
    - エラーが出ないこと（Internal Server Error を含まない）

- case_no: '280'
  sheet: B
  feature: 文字列
  description: |-
    ①【機能改善確認】権限設定内にある登録ユーザーの並び替えが反映されないため、修正希望です。
    ②8月のアップデートにて修正予定とお伝えしております。
  expected: 機能改善が正しく反映されていること。(権限設定内にある登録ユーザーの並び替えが反映されないため、修正希望です。 8月のアップデートにて修正予定とお伝えしております。)
  movie: FL02
  detailed_flow: |
    # 権限設定内ユーザー並び替えの確認
    1. ユーザーメニューから「権限設定」を選択（または /admin/grant にアクセス）
    2. 権限設定ページが表示されることを確認: `await expect(page.locator('.navbar')).toBeVisible()`
    3. ユーザー一覧が表示されていることを確認
    4. ドラッグ&ドロップで並び替えを試みる（または並び替えUIが存在することを確認）
    5. 並び替えボタン/UIが存在する場合: 2番目のユーザーを1番目に移動
    6. 保存ボタンをクリック: `await page.locator('button:has-text("保存"), button:has-text("更新")').click()`
    7. ページをリロードして並び順が保持されていることを確認
    # Assert
    - 並び替え後の順序がリロード後も保持されること
    - エラーが出ないこと

- case_no: '287'
  sheet: B
  feature: 文字列
  description: ①【バグ修正確認】テーブル画面の項目名横の検索マークを押し、「11」月と入れたいところを、「1」まで入力したところで検索が行われてしまうため、修正希望。
  expected: バグが修正され、正常に動作すること。(テーブル画面の項目名横の検索マークを押し、「11」月と入れたいところを、「1」まで入力したところで検索が行われてしまうため、修正希望。)
  movie: FL03
  detailed_flow: |
    # 項目名横の虫眼鏡検索での入力遅延確認
    1. テーブルID取得: `const tableId = await getAllTypeTableId(page)`
    2. レコード一覧へ遷移: `await page.goto(BASE_URL + '/admin/dataset__' + tableId)`
    3. Angularロード待機
    4. テーブルヘッダーの虫眼鏡アイコンを探す: `await page.locator('th .fa-search, th [class*="search-icon"]').first()`
    5. 虫眼鏡アイコンをクリック: ヘッダー列（例: 数値_整数）の虫眼鏡をクリック
    6. 入力フィールドが表示されることを確認
    7. 「1」を入力して0.5秒以内に検索が走らないことを確認（入力中は検索実行されないこと）
    8. 「11」まで入力: `await page.keyboard.type('11', { delay: 100 })`
    9. 入力完了後（デバウンス後）に検索が実行されることを確認
    10. 「11」月に相当するデータが検索されることを確認（早期実行されていないこと）
    # Assert
    - 「1」入力時点で検索が実行されないこと（入力中はデバウンス待機）
    - 「11」入力完了後に正しく検索が実行されること
    - 検索結果が表示されること（エラーなし）

