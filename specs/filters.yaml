- case_no: '234'
  sheet: B
  feature: フィルタタイプ
  category: |-
    ・フィルタ
    ・ビュー
    ・混合
  description: ①フィルタ／集計より、全種類のフィルタタイプおよび権限周りの動作確認を行う。
  expected: ・フィルタ設定画面が表示され、フィルタタイプを選択できることが正常に動作すること。
  movie: FL01
  detailed_flow: |
    # 前提: ALLテストテーブル(getAllTypeTableId)のIDを使用
    1. テーブルID取得: `const tableId = await getAllTypeTableId(page)`
    2. レコード一覧へ遷移: `await page.goto(BASE_URL + '/admin/dataset__' + tableId)`
    3. Angularロード待機: `await waitForAngular(page)`
    4. フィルタボタン（絞り込みボタン）の存在確認: `await expect(page.locator('.fa-search').locator('..')).toBeVisible()`
    5. フィルタボタンをクリック: `await page.locator('button:has(.fa-search)').click()`
    6. フィルタモーダルが表示されるのを待機: `await page.waitForSelector('pfc-filter, .filter-modal, [class*="filter-panel"]', { timeout: 10000 })`
    7. フィルタタイプの選択肢（テキスト一致・数値範囲・日付範囲・セレクト一致等）が表示されることを確認
    8. フィールドの選択ドロップダウンが存在することを確認: `await expect(page.locator('select[name*="field"], .field-select')).toHaveCount({ minimum: 1 })`
    9. 各フィルタタイプ（「と一致」「を含む」「より大きい」等）の選択肢が存在することを確認
    # Assert
    - `.navbar` が表示されていること
    - フィルタ設定UIが表示されること
    - エラーが出ないこと（Internal Server Errorを含まない）

