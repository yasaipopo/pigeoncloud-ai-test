    # 項目名横の虫眼鏡検索での入力遅延確認
    1. テーブルID取得: `const tableId = await getAllTypeTableId(page)`
    2. レコード一覧へ遷移: `await page.goto(BASE_URL + '/admin/dataset__' + tableId)`
    3. Angularロード待機
    4. テーブルヘッダーの虫眼鏡アイコンを探す: `await page.locator('th .fa-search, th [class*="search-icon"]').first()`
    5. 虫眼鏡アイコンをクリック: ヘッダー列（例: 数値_整数）の虫眼鏡をクリック
    6. 入力フィールドが表示されることを確認
    7. 「1」を入力して0.5秒以内に検索が走らないことを確認（入力中は検索実行されないこと）
    8. 「11」まで入力: `await page.keyboard.type('11', { delay: 100 })`
    9. 入力完了後（デバウンス後）に検索が実行されることを確認
    10. 「11」月に相当するデータが検索されることを確認（早期実行されていないこと）
    # Assert
    - 「1」入力時点で検索が実行されないこと（入力中はデバウンス待機）
    - 「11」入力完了後に正しく検索が実行されること
    - 検索結果が表示されること（エラーなし）
