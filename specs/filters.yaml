  movie: FL04
  detailed_flow: |-
    【FL04 テストフロー】この動画で確認するテスト番号:
      fil-230 (旧: 624)  子テーブルの複数項目AND条件で親レコードが正しく絞り込まれること
      fil-240 (旧: 634)  フィルタ未保存（表示のみ）状態でも一括編集が絞り込み対象に適用されること
      fil-250 (旧: 771)  高度な機能（変数設定）のフィルタを再度開いても変数部分が消えないこと

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] fil-230 ── 子テーブルの複数項目AND条件で親レコードが正しく絞り込まれること
    1. createTestEnv で専用テスト環境（ALLテストテーブル付き）を作成してログイン
    2. ALLテストテーブルのレコード一覧画面を開く
    3. フィルタボタンをクリックしてパネルを開く
    4.「条件を追加」を2回クリックして2つの条件行を追加する
    5. フィールド選択ドロップダウンで子テーブル関連フィールド（「::」や「関連」を含む名称）を確認してログ出力する
    6. ✅ 条件行（.condition-drag-item）が2つ以上追加されていること
    7. ✅ 画面内に「AND」「すべて」または「全ての条件」のテキストが表示されること（AND条件UI）
    8. ✅ ページにエラーがないこと

    [0:15] fil-240 ── フィルタ未保存（表示のみ）でも一括編集が絞り込み対象に適用されること
    1. ALLテストテーブルのレコード一覧画面を開く
    2. フィルタボタンをクリックしてパネルを開く
    3.「条件を追加」をクリックして条件行を追加する
    4.「表示」ボタン（保存せず表示のみ）をクリックしてフィルタを適用する
    5. フィルタ適用後に「一括編集」ボタンをメニュー内で探してログ出力する
    6. ✅ ページにエラーがないこと

    [0:30] fil-250 ── 高度な機能（変数設定）のフィルタを再度開いても変数部分が消えないこと
    1. ALLテストテーブルのレコード一覧画面を開く
    2. フィルタボタンをクリックしてパネルを開く
    3.「高度な機能（変数設定）」をクリックしてONにする
    4.「条件を追加」をクリックして条件行を追加する
    5. 変数入力フィールド（input[placeholder*="変数"]）の表示有無をログ出力する
    6.「保存して表示」ボタンが表示される場合はフィルタ名入力欄に名前を入れる
    7. Escapeキーでフィルタパネルを閉じる
    8. フィルタボタンを再クリックしてパネルを再度開く
    9. ✅「フィルタ / 集計」パネルが再表示されること
    10. ✅ ページにエラーがないこと
