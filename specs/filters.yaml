- case_no: '245'
  sheet: B
  feature: フィルタ
  category: フィルタ作成・適用
  description: |-
    ①フィルタを新規作成し、フィールド値による絞り込み条件を設定して適用できること。
    ②フィルタ適用後にレコードが絞り込まれること。
  expected: フィルタ作成UIが表示され、条件を設定して保存・適用できること。
  movie: FL01
  detailed_flow: |
    # 前提: ALLテストテーブル + レコード3件以上あること
    1. テーブルID取得: `const tableId = await getAllTypeTableId(page)`
    2. レコード一覧へ遷移: `await page.goto(BASE_URL + '/admin/dataset__' + tableId)`
    3. Angularロード待機: `await waitForAngular(page)`
    4. 適用前のレコード件数を記録: `const beforeCount = await page.locator('table tbody tr').count()`
    5. 絞り込みボタン（虫眼鏡）をクリック: `await page.locator('button:has(.fa-search)').click()`
    6. フィルタパネルが表示されるのを待機: `await page.waitForSelector('.filter-panel, pfc-filter, [class*="search-panel"]', { timeout: 10000 })`
    7. フィールド選択ドロップダウンで「テキスト」フィールドを選択
    8. 条件種別で「を含む」を選択
    9. 検索値に固定値（例: "fixed_text"）を入力
    10. 「適用」または「検索」ボタンをクリック: `await page.locator('button:has-text("適用"), button:has-text("検索")').first().click()`
    11. Angularロード待機
    12. レコード件数が変化したことを確認（またはフィルタ状態が表示されること）
    13. フィルタ状態バッジ/表示が画面に現れることを確認
    # Assert
    - フィルタ設定UIが表示されること
    - 条件を設定して適用できること
    - フィルタが適用されたことが視覚的に確認できること（件数変化またはフィルタ状態表示）

- case_no: '246'
  sheet: B
  feature: フィルタ
  category: フィルタ保存・更新
  description: ①作成したフィルタに名前を付けて保存し、次回アクセス時に保存済みフィルタとして選択できること。
  expected: フィルタを保存でき、保存済みフィルタ一覧に表示されること。
  movie: FL01
  detailed_flow: |
    # 前提: ALLテストテーブルを使用
    1. テーブルID取得: `const tableId = await getAllTypeTableId(page)`
    2. レコード一覧へ遷移: `await page.goto(BASE_URL + '/admin/dataset__' + tableId)`
    3. Angularロード待機: `await waitForAngular(page)`
    4. 絞り込みボタン（虫眼鏡）をクリック: `await page.locator('button:has(.fa-search)').click()`
    5. フィルタパネルが表示されるのを待機
    6. フィールド・条件・値を設定（テキストフィールドで「を含む」条件）
    7. フィルタ名入力フィールドを探す: `await page.locator('input[placeholder*="フィルタ名"], input[name*="filter_name"]')`
    8. フィルタ名を入力: `await page.fill('input[placeholder*="フィルタ名"]', 'テスト用フィルタ_246')`
    9. 「保存」ボタンをクリック: `await page.locator('button:has-text("保存")').click()`
    10. 保存成功を確認（アラートまたはフィルタ名がプルダウンに表示）
    11. ページをリロード: `await page.reload()`
    12. Angularロード待機
    13. カスタムフィルタプルダウン（custom-filter-pulldown）に「テスト用フィルタ_246」が表示されることを確認
    # Assert
    - フィルタが保存できること
    - 保存後のフィルタ一覧に保存したフィルタ名が表示されること

- case_no: '247'
  sheet: B
  feature: フィルタ
  category: フィルタ削除
  description: |-
    ①保存したフィルタを削除できること。
    ②削除後は一覧から消えること。
  expected: フィルタ削除後に一覧から消えること。
  movie: FL01
  detailed_flow: |
    # 前提: 事前にフィルタを保存しておく（case_no 246 のフローで作成）
    1. テーブルID取得: `const tableId = await getAllTypeTableId(page)`
    2. レコード一覧へ遷移: `await page.goto(BASE_URL + '/admin/dataset__' + tableId)`
    3. Angularロード待機
    4. カスタムフィルタプルダウンを開く: `await page.locator('custom-filter-pulldown button').first().click()`
    5. フィルタ一覧が表示されることを確認
    6. 削除対象フィルタの削除ボタン（ゴミ箱アイコン）を探す: `await page.locator('[class*="filter-delete"], button:has(.fa-trash)').first()`
    7. 削除ボタンをクリック
    8. 確認ダイアログが表示される場合は「はい」をクリック: `await page.locator('button:has-text("はい"), button:has-text("削除")').click()`
    9. フィルタ一覧から削除されたフィルタが消えることを確認
    10. もしくはフィルタ設定一覧ページ（テーブル設定→フィルタ設定）でフィルタが消えていることを確認
    # Assert
    - 削除操作後にフィルタ一覧から対象フィルタが消えること
    - エラーが出ないこと

- case_no: '248'
  sheet: B
  feature: フィルタ
  category: 高度な検索・複合条件
  description: |-
    ①高度な検索機能で複数条件を組み合わせた検索ができること。
    ②AND/OR条件の切り替えが可能であること。
  expected: 高度な検索UIが表示され、複数条件を設定して検索を実行できること。
  movie: FL01
  detailed_flow: |
    # 前提: ALLテストテーブル + レコード3件以上
    1. テーブルID取得: `const tableId = await getAllTypeTableId(page)`
    2. レコード一覧へ遷移: `await page.goto(BASE_URL + '/admin/dataset__' + tableId)`
    3. Angularロード待機
    4. 絞り込みボタン（虫眼鏡）をクリック: `await page.locator('button:has(.fa-search)').click()`
    5. フィルタパネルが表示されるのを待機
    6. 「高度な機能」リンク/ボタンをクリック
    7. AND/OR切り替えボタンが表示されることを確認: `await expect(page.locator('button:has-text("AND"), button:has-text("OR"), text=AND, text=OR')).toBeVisible()`
    8. 条件1: テキストフィールドを選択し「を含む」で値を設定
