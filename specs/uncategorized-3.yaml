- case_no: '678'
  feature: チャートプレビュー・期間切り替えエラーなし
  description: |-
    ①チャートを作成し、プレビュー画面を開く
    ②≪（前へ）ボタンをクリックする
    ③エラーが発生せず、期間テキストが更新されることを確認
    ④≫（次へ）ボタンをクリックする
    ⑤エラーが発生せず、期間テキストが更新されることを確認
  expected: チャートプレビュー画面のページ移動ボタン（≪≫）を押してもエラーが発生しないこと
  movie: U301
  target_spec: chart-calendar
  detailed_flow: |-
    1. debug APIでALLテストテーブルIDを取得: GET /api/admin/debug/status
    2. テーブル一覧画面へ遷移: /admin/dataset__{tableId}
    3. 歯車ボタン（#table-setting-btn）→「チャート設定」をクリックしてチャートを作成する
    4. チャートプレビュー画面（/admin/dataset__{tableId}/chart/{chartId}/preview または /admin/charts/{chartId}）へ遷移
    5. 期間テキスト（.chart-period, [data-testid="chart-period"]）の現在のテキストを取得する
    6. 「≪」（前へ）ボタン（button:has-text("≪"), button[aria-label="前へ"]）をクリックする
    7. waitForAngular()後、期間テキストが変わっていることをexpect()で確認し、「Internal Server Error」がないことを確認
    8. 「≫」（次へ）ボタン（button:has-text("≫"), button[aria-label="次へ"]）をクリックする
    9. waitForAngular()後、同様にエラーなしを確認する
