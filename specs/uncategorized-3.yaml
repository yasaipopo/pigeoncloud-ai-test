- case_no: '687'
  feature: CSV
  description: |
    ①テーブル設定で「IDを表示」を無効にする
    ②「CSVアップロードの主キー設定」をID以外の項目に変更する
    ③CSVダウンロードしてID列を削除した状態でアップロードする
    ④主キー項目の値が既存レコードと一致する場合、重複エラーではなく更新処理が行われることを確認する
  expected: |
    主キー設定をID以外に変更してCSVアップロードした際、同じ主キーの既存レコードが更新され、重複エラーが発生しないこと
  movie: U301
  detailed_flow: |-
    1. debug APIでALLテストテーブルIDを取得し、テストレコードを作成する
    2. テーブル設定→基本設定タブで「IDを表示」を無効にし保存する
    3. テーブル設定→追加オプションタブで「CSVアップロードの主キー設定」をID以外のフィールド（例: 文字列フィールド）に変更して保存する
    4. テーブル一覧（/admin/dataset__{tableId}）からCSVダウンロードを実行する
    5. ダウンロードしたCSVのID列を削除し、主キーフィールドに既存レコードと同じ値を入れてアップロードする（page.setInputFiles('input[type=file]', csvPath)）
    6. /admin/csv（CSV UP/DL履歴）に遷移し、エラーなく「更新」として処理されたことをexpect(bodyText).not.toContain('エラー')で確認する
    7. テーブル一覧でレコードが更新されていることを確認する（重複エラーが出ていないこと）
- case_no: '688'
  feature: CSVアップロード・空欄削除/{NOCHANGE}保持
  description: |-
    ①CSVアップロードで値が空欄のセルをアップロードする
    ②該当フィールドの値が削除される（空になる）ことを確認
    ③CSVに{NOCHANGE}と入力したセルは元の値が保持されることを確認
    ④通常の値が入ったセルは正しく更新されることを確認
  expected: CSVアップロードで空欄は値削除、{NOCHANGE}は値保持として動作すること
  movie: U301
  target_spec: csv-export
  detailed_flow: |-
    1. debug APIでALLテストテーブルIDとテストデータを作成する
    2. テーブル一覧（/admin/dataset__{tableId}）からCSVダウンロードし、レコードIDと既存値を確認する
    3. CSVを編集し、特定フィールドを空欄にした行・{NOCHANGE}にした行・新しい値にした行を用意してアップロードする
    4. /admin/csv（CSV UP/DL履歴）に遷移し、エラーなく処理されたことを確認する
    5. テーブル一覧でレコード詳細（/admin/dataset__{tableId}/view/{recordId}）を開く
    6. 空欄でアップロードした行のフィールドが空になっていることをexpect(value).toBe('')で確認する
    7. {NOCHANGE}でアップロードした行のフィールドが元の値のままであることをexpect(value).toBe(originalValue)で確認する
    8. 通常値でアップロードした行のフィールドが新しい値に更新されていることを確認する
