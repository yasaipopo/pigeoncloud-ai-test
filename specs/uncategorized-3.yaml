    ①日時項目で「複数の値の登録を許可する」を有効にする
    ②種類を「日付のみ」に設定し、表示フォーマットを「Y-m-d」に設定する
    ③レコードに日時データを登録する
    ④レコード一覧・詳細画面で日時が「2026-02-04」形式で表示されることを確認する（「2026年02月04日」ではないこと）
  expected: |
    複数値許可の日時項目で設定した表示フォーマット（Y-m-d等）が正しく反映されること
  movie: U308
  detailed_flow: |-
    1. debug APIでALLテストテーブルIDを取得: GET /api/admin/debug/status → dataset.id を確認
    2. テーブル設定→フィールド設定で日時フィールドを選択またはダブルクリックして編集画面を開く
    3. 「複数の値の登録を許可する」チェックボックスをONにする
    4. 種類を「日付のみ」に変更する
    5. 表示フォーマットのドロップダウンで「Y-m-d」を選択する
    6. 保存ボタンをクリックしてフィールド設定を保存する
    7. レコード作成画面を開き、日時フィールドに「2026-02-04」を入力してレコードを保存する
    8. テーブル一覧画面（/admin/dataset__{tableId}）へ戻る
    9. waitForAngular()でAngularの描画完了を待機する
    10. 一覧画面の日時フィールドが「2026-02-04」形式で表示されていることを確認: expect(cellText).toMatch(/\d{4}-\d{2}-\d{2}/)
    11. 「2026年02月04日」形式で表示されていないことを確認: expect(cellText).not.toMatch(/\d{4}年\d{2}月\d{2}日/)
    12. レコード詳細画面でも同様に「Y-m-d」形式で表示されることを確認
    13. ページ内にInternal Server Errorが含まれないことを確認: expect(await page.textContent('body')).not.toContain('Internal Server Error')
