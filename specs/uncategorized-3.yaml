- case_no: '682'
  feature: CSV
  description: |
    ①親子テーブルで「CSVダウンロード/アップロードに子テーブルも含める」を有効にする
    ②子テーブルの必須項目を空欄にしたCSVをアップロードする
    ③エラーメッセージが表示されることを確認する（空欄で更新されずエラーも出ない状態ではないこと）
    ④子テーブルのIDを誤入力したCSVをアップロードし、エラーが表示されることを確認する
    ⑤子テーブルのみ新規作成するCSVをアップロードし、完了ポップアップに「1件のデータを更新」と表示されることを確認する
  expected: |
    子テーブルCSVアップロードで必須項目空欄時・ID誤入力時にエラーが表示され、新規作成時に正しい件数がポップアップに表示されること
  movie: U301
  detailed_flow: |-
    1. debug APIでALLテストテーブルIDを取得し、子テーブルを持つ親テーブルを用意する
    2. テーブル設定画面→「追加オプション」タブで「CSVダウンロード/アップロードに子テーブルも含める」を有効にして保存する
    3. テーブル一覧（/admin/dataset__{tableId}）からCSVダウンロードを実行してCSVを取得する
    4. 取得したCSVの子テーブル必須項目列を空欄にしてアップロードする（page.setInputFiles('input[type=file]', csvPath)）
    5. /admin/csv（CSV UP/DL履歴）に遷移し、エラーメッセージが表示されていることをexpect(bodyText).toContain('エラー')で確認する
    6. 子テーブルのID列に存在しないIDを入れたCSVをアップロードし、同様にエラーが表示されることを確認する
    7. 子テーブルのIDを空（新規作成）にしたCSVをアップロードし、完了ポップアップに「1件のデータを更新」と表示されることをexpect().toContain()で確認する
- case_no: '683'
  feature: 他テーブル参照・並び替え順序
  description: |-
    ①他テーブル参照フィールドを含むテーブル一覧画面を開く
    ②他テーブル参照フィールドの列ヘッダーをクリックして並び替える
    ③数値が正しい順序で並んでいることを確認（例: 1001, 1002, ..., 1015, 1016の順）
    ④降順にも切り替えて正しく並ぶことを確認
  expected: 他テーブル参照フィールドの並び替えが数値順で正しく動作すること
  movie: U301
  target_spec: fields
  detailed_flow: |-
    1. debug APIでALLテストテーブルIDを取得: GET /api/admin/debug/status
    2. テーブル一覧画面（/admin/dataset__{tableId}）へ遷移する
    3. waitForAngular()でAngularの描画完了を待機する
    4. 他テーブル参照フィールドの列ヘッダー（th:has-text("他テーブル参照"), [data-field-type="lookup"]）をクリックして昇順ソートを実行する
    5. 一覧の最初の行と最後の行の他テーブル参照フィールド値を取得し、昇順になっていることをexpect(firstVal).toBeLessThanOrEqual(lastVal)で確認する
    6. 同じ列ヘッダーを再度クリックして降順ソートに切り替える
    7. 最初の行と最後の行の値を再取得し、降順になっていることを確認する
