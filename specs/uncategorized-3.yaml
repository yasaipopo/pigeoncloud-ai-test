group: 未分類 Part3
spec_file: tests/uncategorized-3.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: '674'
  feature: CSV DL
  description: |-
    ①Yes/Noフィールドを含むテーブルでCSVダウンロードを実行する
    ②特定のビューのフィルタを適用した状態でCSVダウンロードする
    ③Yes/Noフィールドの値が正しく出力されていることを確認する
    ④ラベルが空白の場合でも値が正しくダウンロードされることを確認する
  expected: Yes/Noフィールドのラベルが空白でもCSVダウンロード時にフィルタ反映の値が正しく出力されること
  movie: U301
  detailed_flow: |-
    1. debug APIでALLテストテーブルIDを取得: GET /api/admin/debug/status
    2. ALLテストテーブル一覧ページへ遷移: /admin/dataset__{tableId}
    3. フィルタボタン（button.btn-outline-secondary:has(.fa-filter) または [data-testid="filter-btn"]）をクリックしてフィルタを適用する
    4. CSVダウンロードボタン（button:has-text("CSV"), .dropdown-item:has-text("CSVダウンロード")）をクリックする
    5. ダウンロードされたCSVファイルをfs.readFileSyncで読み込む
    6. Yes/Noフィールドの列にyes/noまたは1/0などの値が含まれていることをexpect(csvText).toMatch()で確認する
    7. ラベルが空白のYes/Noフィールドがある場合も値が空でないことを確認する
- case_no: '675'
  feature: レコード操作
  description: |
    ①関連レコード一覧が表示されたレコード詳細画面を開く
    ②関連レコードの削除ボタンをクリックする
    ③「本当に削除してもよろしいですか？」ダイアログが表示されることを確認する
    ④「削除する」をクリックする
    ⑤ダイアログが自動で閉じ、削除後の画面が表示されることを確認する
    ⑥削除したレコードが一覧から消えていることを確認する
  expected: |
    関連レコード削除時、確認ダイアログで「削除する」を押すとダイアログが閉じ、削除後の画面が正常に表示されること
  movie: U301
  detailed_flow: |-
    1. debug APIでALLテストテーブルIDを取得し、子テーブルとなるテーブルも用意する
    2. 親テーブルのレコード詳細画面へ遷移: /admin/dataset__{tableId}/view/{recordId}
    3. 関連レコード一覧セクション（.related-record-list, [data-testid="related-records"]）が表示されていることをexpect().toBeVisible()で確認
    4. 関連レコードの削除ボタン（button:has-text("削除"), .btn-danger:has(.fa-trash)）をクリックする
    5. 確認ダイアログ（.modal.show）が表示されることをexpect(page.locator('.modal.show')).toBeVisible()で確認
    6. ダイアログ内の「削除する」ボタン（button:has-text("削除する")）をクリックする
    7. ダイアログが閉じること（.modal.show が非表示になること）をexpect().not.toBeVisible()で確認
    8. 削除したレコードが関連レコード一覧から消えていることを確認する
