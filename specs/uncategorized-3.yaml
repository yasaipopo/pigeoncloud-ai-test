    7. 「はい」ボタンをクリックし、レコード詳細で計算値が更新されていることをexpect(newValue).not.toBe(originalValue)で確認する
    8. 別のレコードで同じ操作を行い「いいえ」をクリックし、元の値が保持されていることを確認する
