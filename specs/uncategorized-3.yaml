- case_no: '700'
  feature: 計算項目
  description: |
    ①計算値の自動更新がOFFの計算項目があるテーブルを用意する
    ②レコードを編集して計算項目の値が変わる操作を行う
    ③「計算値の自動更新がOFFの項目の値を上書きしますか？」ポップアップが表示されることを確認する
    ④「はい」を押した場合、計算値が上書きされることを確認する
    ⑤「いいえ」を押した場合、元の値が保持されることを確認する
  expected: |
    自動更新OFF計算項目の値変更時にポップアップが表示され、「はい」で上書き・「いいえ」で元の値保持が正しく動作すること
  movie: U302
  detailed_flow: |-
    1. debug APIでALLテストテーブルIDを取得し、計算項目フィールドで「計算値の自動更新」をOFFに設定して保存する
    2. テストレコードを作成し（POST /api/admin/debug/create-all-type-data）、計算項目の初期値を記録する
    3. レコード編集画面（/admin/dataset__{tableId}/edit/{recordId}）へ遷移する
