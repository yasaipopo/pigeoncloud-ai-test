group: 公開フォーム・公開メールリンク
spec_file: tests/public-form.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: '135'
  sheet: B
  feature: 公開フォーム
  category: 公開フォームをメール配信
  description: |-
    ①・登録されてるユーザーのメールアドレス宛てに回答用URLを送信。
    ②URLは個別で、回答はユーザーに紐づく。
    ③（配信メールアドレスのテーブルがユーザーではない場合は、作成者はゲストです）
    ・回答は一人一回のみ。
    ④・送信前に「送信してよろしですか？」のポップアップ表示。
  expected: ・公開フォーム設定画面が表示され、メール配信設定ができること
  movie: PF01
  detailed_flow: |
    【前提】ALLテストテーブル（dataset__XXX）が作成済みであること

    1. テーブル設定（その他タブ）を開く
       - page.goto(BASE_URL + '/admin/dataset/edit/' + tableId)
       - page.getByRole('tab', { name: /その他/ }).click()
       - waitForAngular(page)

    2. 「公開フォームをONにする」設定を確認・ONにする
       - expect(page.locator('label:has-text("公開フォームをONにする")')).toBeVisible()
       - スイッチが OFF の場合: page.locator('.form-group.row.admin-forms:has-text("公開フォームをONにする") .switch-handle').click()
       - waitForTimeout(3000) ← 自動保存待機

    3. テーブル一覧ページのドロップダウンメニューを確認
       - page.goto(BASE_URL + '/admin/dataset__' + tableId)
       - waitForAngular(page)
       - ドロップダウントグルボタン（button.btn-sm.btn-outline-primary.dropdown-toggle）をクリック

    4. 「公開フォームをメール配信」メニューの存在確認
       - expect(page.locator('.dropdown-menu a:has-text("公開フォームをメール配信")')).toBeVisible()
         または
       - expect(page.locator('.dropdown-menu a:has-text("公開フォームリンク")')).toBeVisible()

    5. メール配信メニューをクリックし、設定モーダルが表示されることを確認
       - page.locator('.dropdown-menu a:has-text("公開フォームをメール配信")').click()
       - expect(page.locator('.modal.show .modal-title:has-text("公開フォームメールテンプレート作成"), .modal.show')).toBeVisible()

    【confirm】
    - expect(「公開フォームをONにする」スイッチが表示されること).toBe(true)
    - expect(「公開フォームをメール配信」または「公開フォームリンク」メニューが存在すること)

- case_no: '170'
  sheet: B
  feature: 公開フォーム
  category: 公開フォームURL
  description: |-
    ①公開フォームURLが変更されたことを確認。
    ②＜変更内容＞。
    ③・URLのアドレス長。
  expected: ・公開フォームURLのアドレス長が適切であることが正常に動作すること。
  movie: PF01
  detailed_flow: |
    【前提】ALLテストテーブルで公開フォームをONにした状態

    1. 公開フォームをON（enablePublicForm helper関数を使用）
       - page.goto(BASE_URL + '/admin/dataset/edit/' + tableId)
       - 「その他」タブをクリック
       - 公開フォームスイッチをONにする（未ONの場合）

    2. テーブル一覧ページのドロップダウンから「公開フォームリンク」を開く
       - page.goto(BASE_URL + '/admin/dataset__' + tableId)
       - button.btn-sm.btn-outline-primary.dropdown-toggle をクリック
       - page.locator('.dropdown-menu a:has-text("公開フォームリンク")').click()

    3. 公開フォームURLを取得する
       - const urlInput = page.locator('.modal.show input[readonly]').first()
       - const publicFormUrl = await urlInput.inputValue()

    4. URLの形式・長さを検証する
       - expect(publicFormUrl.length).toBeGreaterThan(20)
         ← ハッシュトークンを含む適切な長さ（例: https://xxx.pigeon-demo.com/api/public/f/dataset__N/abc123/N）
       - expect(publicFormUrl).toContain('http')
       - expect(publicFormUrl).toMatch(/\/api\/public\/f\//)
         ← URLに /api/public/f/ パスが含まれること

    5. モーダルを閉じる
       - page.keyboard.press('Escape') または 閉じるボタンクリック

    【confirm】
    - expect(publicFormUrl.length > 20): URLが適切な長さ（ハッシュトークン付き）であること
    - expect(publicFormUrl).toContain('/api/public/f/') または '/public/'

- case_no: '358'
  sheet: B
  feature: 文字列
  description: |-
    ①公開フォームで、子テーブル内でルックアップのコピーが出来ない。
    ②（動画参照）
    プログラムを選択したら、確認事項が子コピーされるようにしたいです。
    ③動画前半、問題なし（Pigeon内）
    ④動画後半、確認事項が表示されない（公開フォーム）
    ⑤対象テーブル：
    「2. 活動計画書」
    https://n2wzgyultj.pigeon-cloud.com/admin/datas。
  expected: エラーなく正常に動作すること。(公開フォームで、子テーブル内でルックアップのコピーが出来ない。（動画参照） プログラムを選択したら、確認事項が子コピーされるようにしたいです。   動画前半、問題なし（Pigeon内）。 動画後半、確)
  movie: PF01
  detailed_flow: |
    【前提】ALLテストテーブルに子テーブル・ルックアップフィールドが設定済みであること

    1. 公開フォームをON（enablePublicForm関数）
       - page.goto(BASE_URL + '/admin/dataset/edit/' + tableId)
       - 「その他」タブでスイッチをON

    2. 公開フォームURLを取得する
       - page.goto(BASE_URL + '/admin/dataset__' + tableId)
       - ドロップダウンから「公開フォームリンク」をクリック
       - const publicFormUrl = await page.locator('.modal.show input[readonly]').first().inputValue()
       - モーダルを閉じる（Escキー）

    3. 公開フォームを開く（ログアウト不要: URLに直接アクセス）
       - page.goto(publicFormUrl)
       - waitForTimeout(3000)

    4. フォームが正常に表示されることを確認
       - const bodyText = await page.innerText('body')
       - expect(bodyText).not.toContain('Internal Server Error')
       - expect(bodyText).not.toContain('404')

    5. フォームフィールドが存在することを確認
       - const fieldCount = await page.locator('input, select, textarea, .form-control').count()
       - expect(fieldCount).toBeGreaterThan(0)

    6. 子テーブルセクションの存在を確認
       - const childCount = await page.locator('.child-table, .related-records, [class*="child"]').count()
       - console.log('子テーブルセクション数: ' + childCount)
       - ルックアップ参照フィールド（選択肢）が表示されていることを確認
       - ALLテストテーブルには参照フィールドがあるため、参照系inputの存在確認

    【confirm】
    - expect(bodyText).not.toContain('Internal Server Error')
    - expect(fieldCount).toBeGreaterThan(0)  ← 公開フォームにフィールドが存在すること

- case_no: '359'
  sheet: B
  feature: 文字列
  description: |-
    ①【機能改善確認】列を複数にしていると、公開フォームで項目が収まらない場合があります。
    ②（添付参照）

    特定のテーブルというわけではなく、全体的にそうなのですが、例えば以下の公開フォームです。
    ③公開フォーム：
    https://n2wzgyultj.pigeon-cloud.com/api/public/f/dataset__8/dcb37a781b/28。
  expected: 機能改善が正しく反映されていること。(列を複数にしていると、公開フォームで項目が収まらない場合があります。 （添付参照）  特定のテーブルというわけではなく、全体的にそうなのですが、例えば以下の公開フォームです。  公開フォーム： htt)
  movie: PF01
  detailed_flow: |
    【前提】ALLテストテーブルで公開フォームをON

    1. 公開フォームURLを取得する（enablePublicForm + ドロップダウン操作）
       - page.goto(BASE_URL + '/admin/dataset/edit/' + tableId)
       - 「その他」タブでスイッチをON
       - page.goto(BASE_URL + '/admin/dataset__' + tableId)
       - ドロップダウン「公開フォームリンク」→ input[readonly] からURL取得

    2. デスクトップ幅で公開フォームを開く
       - await page.setViewportSize({ width: 1280, height: 800 })
       - await page.goto(publicFormUrl)
       - waitForTimeout(3000)

    3. フォームが正常に表示されることを確認
       - expect(bodyText).not.toContain('Internal Server Error')

    4. フィールドがはみ出していないことを確認
       - const overflowCheck = await page.evaluate(() => {
           const body = document.body;
           const bodyWidth = body.clientWidth;
           const fields = document.querySelectorAll('.form-group, .form-field, .form-control');
           let overflowed = 0;
           for (const field of fields) {
             const rect = field.getBoundingClientRect();
             if (rect.right > bodyWidth + 10) overflowed++;
           }
           return { total: fields.length, overflowed };
         })
       - expect(overflowCheck.overflowed).toBeLessThanOrEqual(overflowCheck.total / 2)
         ← 大半のフィールドが画面内に収まっていること

    【confirm】
    - expect(bodyText).not.toContain('Internal Server Error')
    - expect(overflowCheck.overflowed <= overflowCheck.total / 2): フィールドが画面内に収まること

- case_no: '499'
  sheet: B
  feature: 文字列
  description: |-
    ①【バグ修正確認】子テーブルがビューで非表示に設定していても表示されてしまうため、表示されないようにしたい。
    ②以下で表示されてしまっている。
    ③・通常の編集画面、作成画面
    ・埋め込みフォーム
    ・公開フォーム。
  expected: バグが修正され、正常に動作すること。(子テーブルがビューで非表示に設定していても表示されてしまうため、表示されないようにしたい。 以下で表示されてしまっている。 ・通常の編集画面、作成画面 ・埋め込みフォーム ・公開フォーム)
  movie: PF01
  detailed_flow: |
    【前提】ALLテストテーブルで公開フォームをON

    1. 公開フォームURLを取得する
       - enablePublicForm(page, tableId) でON確認
       - ドロップダウン「公開フォームリンク」からURL取得

    2. 公開フォームを開く
       - page.goto(publicFormUrl)
       - waitForTimeout(3000)
       - expect(bodyText).not.toContain('Internal Server Error')

    3. フォームの表示フィールドを確認する
       - const formFields = page.locator('input, select, textarea, .form-control')
       - const fieldCount = await formFields.count()
       - console.log('公開フォームフィールド数: ' + fieldCount)

    4. 子テーブルセクションのカウントを確認する
       - const childSections = page.locator('.child-table, .related-records, [class*="child-table"]')
       - const childCount = await childSections.count()
       - console.log('子テーブルセクション数: ' + childCount)
       ← ビューで非表示設定した子テーブルが公開フォームに表示されないことを確認
       ← 現状の実装ではカウントをログ出力し、500エラーが出ないことを主な確認とする

    5. 通常の作成画面でも同様に確認
       - page.goto(BASE_URL + '/admin/dataset__' + tableId + '/add')
       - waitForAngular(page)
       - expect(page.locator('.navbar')).toBeVisible()

    【confirm】
    - expect(bodyText).not.toContain('Internal Server Error')
    - expect(fieldCount).toBeGreaterThan(0): 公開フォームにフィールドが存在すること

- case_no: '547'
  sheet: B
  feature: 追加実装
  description: |-
    ①【機能改善確認】ワンネットシステム株式会社。
    ②DB: lete47hsig。
    ③以下お客様のサイトにテストで埋め込みフォームを使っていますが、。
    ④フッターまでの空白（送信ボタンとお問合せ窓口の間）を狭めることはできますか？。
    ⑤（デフォルトでもう少し狭められるなら確かに見た目的に狭めたいです。）
    ⑥<a href="https://1ns.co.jp/contact" target="_blank">http。
  expected: '機能改善が正しく反映されていること。(ワンネットシステム株式会社 DB: lete47hsig  以下お客様のサイトにテストで埋め込みフォームを使っていますが、 フッターまでの空白（送信ボタンとお問合せ窓口の間）を狭めることはできますか？)'
  movie: PF01
  detailed_flow: |
    【前提】ALLテストテーブルで公開フォームをON

    1. 公開フォームURLを取得する（埋め込みフォームリンクも確認）
       - enablePublicForm(page, tableId) でON
       - ドロップダウンで「埋め込みフォーム」または「公開フォームリンク」をクリック
       - モーダル内の input[readonly] または textarea[readonly] からURL/iframeタグを取得
       - iframeタグの場合は src="..." を抽出してURLを取得

    2. 公開フォームをデスクトップ幅で開く
       - page.setViewportSize({ width: 1280, height: 800 })
       - page.goto(publicFormUrl)
       - waitForTimeout(3000)
       - expect(bodyText).not.toContain('Internal Server Error')

    3. 送信ボタンの存在を確認する
       - const submitBtn = page.locator('button[type="submit"], button:has-text("送信"), button:has-text("登録")').first()
       - expect(submitBtn).toBeVisible()

    4. 送信ボタン下の余白を測定する
       - const spacing = await page.evaluate(() => {
           const submitBtn = document.querySelector('button[type="submit"], button.btn-primary');
           if (!submitBtn) return null;
           const btnRect = submitBtn.getBoundingClientRect();
           const bodyHeight = document.body.scrollHeight;
           return { btnBottom: btnRect.bottom, bodyHeight, gap: bodyHeight - btnRect.bottom };
         })
       - expect(spacing.gap).toBeLessThan(500)
         ← 送信ボタンとフッター間の空白が500px未満であること（過剰な空白がないこと）

    【confirm】
    - expect(submitBtn).toBeVisible(): 送信ボタンが表示されること
    - expect(spacing.gap < 500): 送信ボタン下の余白が適切に抑えられていること

- case_no: '660'
  sheet: B
  feature: 追加実装
  description: |-
    ①【機能改善確認】公開フォームリンク先の画面をスマホから見たとき、。
    ②通常のテーブル（添付画像）のように、スマホの画面サイズにぴったりおさまるようなデザインにしていただけますでしょうか。
  expected: 機能改善が正しく反映されていること。(公開フォームリンク先の画面をスマホから見たとき、 通常のテーブル（添付画像）のように、スマホの画面サイズにぴったりおさまるようなデザインにしていただけますでしょうか。)
  movie: PF01
  detailed_flow: |
    【前提】ALLテストテーブルで公開フォームをON

    1. 公開フォームURLを取得する
       - enablePublicForm(page, tableId) でON
       - ドロップダウン「公開フォームリンク」からURL取得

    2. スマホサイズ（375x812）で公開フォームを開く
       - await page.setViewportSize({ width: 375, height: 812 })
       - await page.goto(publicFormUrl)
       - waitForTimeout(3000)
       - expect(bodyText).not.toContain('Internal Server Error')

    3. 水平スクロールが発生しないことを確認する
       - const overflowCheck = await page.evaluate(() => ({
           scrollWidth: document.body.scrollWidth,
           clientWidth: document.body.clientWidth,
           hasHorizontalScroll: document.body.scrollWidth > document.body.clientWidth + 20
         }))
       - expect(overflowCheck.hasHorizontalScroll).toBe(false)
         ← 横スクロールが不要＝スマホ幅に収まっていること

    4. フォームフィールドが表示されることを確認する
       - const fieldCount = await page.locator('input, select, textarea, .form-control').count()
       - expect(fieldCount).toBeGreaterThan(0)

    5. ビューポートを元に戻す
       - await page.setViewportSize({ width: 1280, height: 800 })

    【confirm】
    - expect(overflowCheck.hasHorizontalScroll).toBe(false): 横スクロール不要（スマホ幅に収まる）
    - expect(fieldCount).toBeGreaterThan(0): フォームが表示されること

- case_no: '533'
  sheet: B
  feature: 公開フォーム
  description: |-
    ①公開フォームにファイル添付フィールドを含むテーブルを設定する
    ②ログアウトした状態で公開フォームURLを開く
    ③ファイルを添付してフォームを送信する
    ④テーブルに添付ファイルが正しく反映されていることを確認する
  expected: 未ログイン状態の公開フォームからファイル添付して送信した場合、テーブルに添付ファイルが反映されること
  movie: UC07
  detailed_flow: |
    【前提】ALLテストテーブルにファイルフィールド（input[type="file"]）が存在し、公開フォームがONであること

    1. 公開フォームをONにし、URLを取得する（adminでログイン済み状態）
       - enablePublicForm(page, tableId) でON
       - ドロップダウン「公開フォームリンク」→ モーダルのinput[readonly]からURL取得
       - モーダルを閉じる（Escキー）

    2. 未ログイン（新規コンテキスト）で公開フォームを開く
       - const newContext = await page.context().browser().newContext()
         ← storageStateなし = 未ログイン状態
       - const newPage = await newContext.newPage()
       - await newPage.goto(publicFormUrl)
       - waitForTimeout(3000)

    3. フォームが正常に表示されることを確認する
       - expect(bodyText).not.toContain('Internal Server Error')
       - expect(bodyText).not.toContain('404')

    4. ファイル添付フィールドの存在を確認し、ファイルを添付する
       - const fileInput = newPage.locator('input[type="file"]').first()
       - expect(await fileInput.count()).toBeGreaterThan(0)
       - await fileInput.setInputFiles('/app/test_files/ok.png')
       - await newPage.evaluate(() => {
           document.querySelector('input[type="file"]').dispatchEvent(new Event('change', { bubbles: true }))
         })
         ← Angular の change イベントを手動ディスパッチ（Laddaボタン対策）
       - waitForTimeout(2000)

    5. 送信ボタンの存在を確認する
       - const submitBtn = newPage.locator('button[type="submit"], button:has-text("送信"), button:has-text("登録")').first()
       - expect(submitBtn).toBeVisible()

    6. フォームを送信して結果を確認する（任意: テストデータが揃う場合）
       - 必須フィールドに値を入力後、submitBtnをクリック
       - 送信完了メッセージまたはリダイレクトを確認

    7. 後処理
       - await newContext.close()

    【confirm】
    - expect(bodyText).not.toContain('Internal Server Error'): 未ログインでも公開フォームが表示されること
    - expect(fileInput.count() > 0): ファイル添付フィールドが存在すること
    - expect(submitBtn).toBeVisible(): 送信ボタンが表示されること

- case_no: '812'
  sheet: B
  feature: 公開フォーム
  description: |-
    ①公開フォームリンクのURLにパラメータを付与する（例: ?項目名=AAAA）
    ②そのURLで公開フォームを開く
    ③対象フィールドに指定した値が初期値として入力されていることを確認する
    ④文字列(一行)、文章(複数行)、選択肢(単一)、選択肢(複数)、他テーブル参照で動作することを確認する
    ⑤複数選択の場合はカンマ区切り（項目名=AAA,BBB,CCC）で複数値が設定されることを確認する
  expected: 公開フォームURLにパラメータを付与して開くと、対応するフィールドに値が初期設定されること
  movie: UC22
  detailed_flow: |
    【前提】ALLテストテーブルに「テキスト」フィールドが存在し、公開フォームがONであること

    1. 公開フォームをONにし、ベースURLを取得する
       - enablePublicForm(page, tableId) でON
       - ドロップダウン「公開フォームリンク」→ input[readonly] からURL取得
       - const publicFormUrl = await urlInput.inputValue()
       - モーダルを閉じる（Escキー）

    2. URLにフィールド名パラメータを付与する
       - const separator = publicFormUrl.includes('?') ? '&' : '?'
       - const paramUrl = publicFormUrl + separator + encodeURIComponent('テキスト') + '=' + encodeURIComponent('テスト初期値812')
         ← ALLテストテーブルには「テキスト」フィールドが存在する

    3. 新規コンテキストでパラメータ付きURLを開く
       - const newContext = await page.context().browser().newContext()
       - const newPage = await newContext.newPage()
       - await newPage.goto(paramUrl)
       - waitForTimeout(3000)

    4. フォームが正常に表示されることを確認する
       - expect(bodyText).not.toContain('Internal Server Error')
       - expect(bodyText).not.toContain('404')

    5. パラメータで指定した値が初期値として入力されていることを確認する
       - const hasPrefilledValue = await newPage.evaluate(() => {
           const inputs = document.querySelectorAll('input[type="text"], textarea');
           for (const input of inputs) {
             if (input.value && input.value.includes('テスト初期値812')) return true;
           }
           return false;
         })
       - expect(hasPrefilledValue).toBe(true)
         ← URLパラメータの値がフィールドに初期設定されていること

    6. フォームフィールド数を確認する
       - const fieldCount = await newPage.locator('input[type="text"], textarea, input:not([type="hidden"]):not([type="file"])').count()
       - expect(fieldCount).toBeGreaterThan(0)

    7. 後処理
       - await newContext.close()

    【confirm】
    - expect(bodyText).not.toContain('Internal Server Error'): パラメータ付きURLでもフォームが表示されること
    - expect(hasPrefilledValue).toBe(true): URLパラメータが初期値として反映されること
    - expect(fieldCount).toBeGreaterThan(0): フォームにフィールドが存在すること

- case_no: '838'
  sheet: B
  feature: 公開フォーム
  description: |-
    ①公開フォームを含むテーブルを設定する
    ②公開フォームURLを開く
    ③各フィールドの表示が左に寄っていない（正しいレイアウトで表示されている）ことを確認する
    ④「活動名」「申請受付対象月」「活動内容」等のフィールドが見切れていないことを確認する
  expected: 公開フォームで各フィールドの表示が左寄りにならず、正しいレイアウトで表示されること
  movie: UC23
  detailed_flow: |
    【前提】ALLテストテーブルで公開フォームをON

    1. 公開フォームをONにし、URLを取得する
       - enablePublicForm(page, tableId) でON
       - ドロップダウン「公開フォームリンク」→ input[readonly] からURL取得
       - モーダルを閉じる（Escキー）

    2. デスクトップ幅（1280x800）で公開フォームを開く
       - await page.setViewportSize({ width: 1280, height: 800 })
       - await page.goto(publicFormUrl)
       - waitForTimeout(3000)
       - expect(bodyText).not.toContain('Internal Server Error')

    3. フィールドのレイアウトを確認する（左寄りでないこと）
       - const layoutCheck = await page.evaluate(() => {
           const fields = document.querySelectorAll('.form-group, .form-field, [class*="field-row"], .form-control');
           let leftAligned = 0;
           let total = 0;
           for (const field of fields) {
             const rect = field.getBoundingClientRect();
             if (rect.width > 0 && rect.height > 0) {
               total++;
               if (rect.left < 10) leftAligned++;  // 左端（10px未満）にあるものを「左寄り」と判定
             }
           }
           return { total, leftAligned };
         })
       - expect(layoutCheck.total).toBeGreaterThan(0)

    4. フィールドが見切れていないことを確認する
       - const clippedCheck = await page.evaluate(() => {
           const fields = document.querySelectorAll('input, select, textarea, .form-control');
           let clipped = 0;
           const viewportWidth = window.innerWidth;
           for (const field of fields) {
             const rect = field.getBoundingClientRect();
             if (rect.width > 0 && rect.right > viewportWidth) clipped++;
           }
           return { clipped, total: fields.length };
         })
       - expect(clippedCheck.clipped).toBeLessThanOrEqual(clippedCheck.total / 4)
         ← 見切れているフィールドが全体の1/4以下であること

    【confirm】
    - expect(layoutCheck.total).toBeGreaterThan(0): 公開フォームにフィールドが存在すること
    - expect(clippedCheck.clipped <= clippedCheck.total / 4): 大多数のフィールドが見切れていないこと

