group: 公開フォーム・公開メールリンク
spec_file: tests/public-form.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: '135'
  sheet: B
  feature: 公開フォーム
  category: 公開フォームをメール配信
  description: '・登録されてるユーザーのメールアドレス宛てに回答用URLを送信。

    　URLは個別で、回答はユーザーに紐づく。（配信メールアドレスのテーブルがユーザーではない場合は、作成者はゲストです）

    ・回答は一人一回のみ。

    ・送信前に「送信してよろしですか？」のポップアップ表示'
  expected: 左記が全て想定通りの動作となっていること。
- case_no: '170'
  sheet: B
  feature: 公開フォーム
  category: 公開フォームURL
  description: '公開フォームURLが変更されたことを確認。


    ＜変更内容＞

    ・URLのアドレス長'
  expected: ''
- case_no: '358'
  sheet: B
  feature: ''
  description: '公開フォームで、子テーブル内でルックアップのコピーが出来ない。（動画参照）

    プログラムを選択したら、確認事項が子コピーされるようにしたいです。



    動画前半、問題なし（Pigeon内）。

    動画後半、確認事項が表示されない（公開フォーム）。




    対象テーブル：

    「2. 活動計画書」

    https://n2wzgyultj.pigeon-cloud.com/admin/datas'
  expected: エラーなく正常に動作すること。(公開フォームで、子テーブル内でルックアップのコピーが出来ない。（動画参照） プログラムを選択したら、確認事項が子コピーされるようにしたいです。   動画前半、問題なし（Pigeon内）。 動画後半、確)
- case_no: PF-EMBED
  feature: 埋め込みフォーム
  category: 埋め込みフォームの表示
  description: |
    ①埋め込みフォームをWebページに設置する
    ②フッターまでの余白が適切であることを確認（#547 機能改善確認）
  expected: |
    埋め込みフォームの余白が適切に表示されること
  includes:
  - '547'
- case_no: PF-LAYOUT
  feature: 公開フォームレイアウト
  category: 公開フォームのレイアウト
  description: |
    ①列を複数に設定した公開フォームを表示する
    ②全項目が収まり、はみ出さないことを確認（#359 機能改善確認）
  expected: |
    公開フォームの複数列レイアウトが正しく表示されること
  includes:
  - '359'
- case_no: PF-RESPONSIVE
  feature: 公開フォームレスポンシブ
  category: 公開フォームのスマホ表示
  description: |
    ①公開フォームのリンクをスマートフォンから開く
    ②画面サイズにぴったり収まるレスポンシブデザインで表示されることを確認（#660 機能改善確認）
  expected: |
    公開フォームがスマートフォンでレスポンシブ表示されること
  includes:
  - '660'
- case_no: PF-VIEW
  feature: 公開フォームビュー
  category: 公開フォームのビュー設定
  description: |
    ①ビューで子テーブルを非表示に設定する
    ②公開フォームおよび通常の編集/作成画面で子テーブルが非表示であることを確認（#499 バグ修正確認）
  expected: |
    ビューの非表示設定が公開フォームにも反映されること
  includes:
  - '499'
actual_steps:
- case_no: '135'
  status: partial
  steps: '1. beforeAll: create-all-type-table API呼び出し

    2. beforeAll: create-all-type-data API呼び出し (count:3, pattern:''fixed'')

    3. beforeAll: create-user API呼び出し

    4. beforeAll: テーブルIDをサイドバーのリンクから取得

    5. /admin/dataset__{tableId}/publicform に遷移

    6. ページURLをconsole.log出力

    7. publicformページが admin URLを含むことを確認（緩い確認）

    8. スクリーンショット保存（reports/agent-1/screenshots/135-publicform-mail.png）

    9. 「公開フォーム」見出しまたはメール関連要素の存在確認（条件付き）

    10. afterAll: delete-all-type-tables API呼び出し

    '
  assertions: '- 「公開フォーム」見出しが存在すれば toBeVisible()（条件付き）

    - 存在しない場合はannotationを追加してパス

    '
  gaps: '⚠️ YAMLでは「登録ユーザーのメールアドレス宛に個別URLを送信」「回答は一人一回のみ」「送信前に確認ポップアップ」の検証が期待されるが全く実装されていない

    ⚠️ メール配信の実際の動作確認なし（メール送信・受信の確認不要としても、UI操作確認もない）

    ⚠️ 公開フォームの設定操作（メール配信設定・送信先選択等）なし

    ⚠️ 確認ポップアップの表示確認なし

    ⚠️ 「一人一回のみ」制限の検証なし

    ⚠️ ページへのアクセス確認のみで、機能の動作を全く検証していない

    '
- case_no: '170'
  status: partial
  steps: '1. /admin/dataset__{tableId}/publicform に遷移

    2. 現在のページURLをconsole.log出力

    3. スクリーンショット保存（reports/agent-1/screenshots/170-publicform-url.png）

    4. URLを含む要素（input[readonly][value*="pigeon"]など）を探す

    5. 存在すれば URLの長さが0より大きいことを確認

    6. 存在しなければ annotation を追加してパス

    '
  assertions: '- if (urlTextCount > 0) { expect(urlValue.length).toBeGreaterThan(0) }

    - 存在しない場合は annotation のみ（アサートなし）

    '
  gaps: '⚠️ YAMLでは「公開フォームURLのアドレス長が適切であること（以前より短い/長い形式への変更確認）」が期待されるが、URL長さが0より大きいかしか確認していない

    ⚠️ 以前のURLとの比較・変更確認なし

    ⚠️ URLの形式・文字数の具体的な基準値がない

    ⚠️ 公開フォームURLの要素が存在しない場合（UIの変更等）でもパスする

    '
