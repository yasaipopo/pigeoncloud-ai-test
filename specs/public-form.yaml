# movie: UC07 (pf-080 を1動画で確認)
# ──────────────────────────────────────────────
- case_no: pf-080
  sheet: B
  feature: 公開フォーム
  description: |-
    ①公開フォームにファイル添付フィールドを含むテーブルを設定する
    ②ログアウトした状態で公開フォームURLを開く
    ③ファイルを添付してフォームを送信する
  expected: 未ログイン状態の公開フォームからファイル添付して送信した場合、テーブルに添付ファイルが反映されること
  movie: UC07
  detailed_flow: |
    【UC07 テストフロー】この動画で確認するテスト番号:
      [0:05] pf-080         (旧: 533)     公開フォームファイル添付

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:05] pf-080 ── 未ログイン状態で公開フォームにファイル添付送信
    1. 公開フォームをONにし、URLを取得する
    2. 未ログインコンテキストで公開フォームを開く
    3. ✅ フォームがエラーなく表示されること
    4. ファイル添付フィールドの存在を確認
    5. ✅ ファイル添付フィールドが存在すること
    6. ✅ 送信ボタンが表示されること
  old_case_no: '533'

