- case_no: pf-080
  sheet: B
  feature: 公開フォーム
  description: |-
    ①公開フォームにファイル添付フィールドを含むテーブルを設定する
    ②ログアウトした状態で公開フォームURLを開く
    ③ファイルを添付してフォームを送信する
    ④テーブルに添付ファイルが正しく反映されていることを確認する
  expected: 未ログイン状態の公開フォームからファイル添付して送信した場合、テーブルに添付ファイルが反映されること
  movie: UC07
  detailed_flow: |-
    【UC07 テストフロー】この動画で確認するテスト番号:
      pf-080         (旧: 533)     公開フォーム

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    【前提】ALLテストテーブルにファイルフィールド（input[type="file"]）が存在し、公開フォームがONであること

    1. 公開フォームをONにし、URLを取得する（adminでログイン済み状態）
       - enablePublicForm(page, tableId) でON
       - ドロップダウン「公開フォームリンク」→ モーダルのinput[readonly]からURL取得
       - モーダルを閉じる（Escキー）

    2. 未ログイン（新規コンテキスト）で公開フォームを開く
       - const newContext = await page.context().browser().newContext()
         ← storageStateなし = 未ログイン状態
       - const newPage = await newContext.newPage()
       - await newPage.goto(publicFormUrl)
       - waitForTimeout(3000)

    3. フォームが正常に表示されることを確認する
       - expect(bodyText).not.toContain('Internal Server Error')
       - expect(bodyText).not.toContain('404')

    4. ファイル添付フィールドの存在を確認し、ファイルを添付する
       - const fileInput = newPage.locator('input[type="file"]').first()
       - expect(await fileInput.count()).toBeGreaterThan(0)
       - await fileInput.setInputFiles('/app/test_files/ok.png')
       - await newPage.evaluate(() => {
           document.querySelector('input[type="file"]').dispatchEvent(new Event('change', { bubbles: true }))
         })
         ← Angular の change イベントを手動ディスパッチ（Laddaボタン対策）
       - waitForTimeout(2000)

    5. 送信ボタンの存在を確認する
       - const submitBtn = newPage.locator('button[type="submit"], button:has-text("送信"), button:has-text("登録")').first()
       - expect(submitBtn).toBeVisible()

    6. フォームを送信して結果を確認する（任意: テストデータが揃う場合）
       - 必須フィールドに値を入力後、submitBtnをクリック
       - 送信完了メッセージまたはリダイレクトを確認

    7. 後処理
       - await newContext.close()

    【confirm】
    - expect(bodyText).not.toContain('Internal Server Error'): 未ログインでも公開フォームが表示されること
    - expect(fileInput.count() > 0): ファイル添付フィールドが存在すること
    - expect(submitBtn).toBeVisible(): 送信ボタンが表示されること
  old_case_no: '533'
- case_no: pf-090
  sheet: B
  feature: 公開フォーム
  description: |-
    ①公開フォームリンクのURLにパラメータを付与する（例: ?項目名=AAAA）
    ②そのURLで公開フォームを開く
    ③対象フィールドに指定した値が初期値として入力されていることを確認する
    ④文字列(一行)、文章(複数行)、選択肢(単一)、選択肢(複数)、他テーブル参照で動作することを確認する
    ⑤複数選択の場合はカンマ区切り（項目名=AAA,BBB,CCC）で複数値が設定されることを確認する
  expected: 公開フォームURLにパラメータを付与して開くと、対応するフィールドに値が初期設定されること
  movie: UC22
  detailed_flow: |-
    【UC22 テストフロー】この動画で確認するテスト番号:
      pf-090         (旧: 812)     公開フォーム

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    【前提】ALLテストテーブルに「テキスト」フィールドが存在し、公開フォームがONであること

    1. 公開フォームをONにし、ベースURLを取得する
       - enablePublicForm(page, tableId) でON
       - ドロップダウン「公開フォームリンク」→ input[readonly] からURL取得
       - const publicFormUrl = await urlInput.inputValue()
       - モーダルを閉じる（Escキー）

    2. URLにフィールド名パラメータを付与する
       - const separator = publicFormUrl.includes('?') ? '&' : '?'
       - const paramUrl = publicFormUrl + separator + encodeURIComponent('テキスト') + '=' + encodeURIComponent('テスト初期値812')
         ← ALLテストテーブルには「テキスト」フィールドが存在する

    3. 新規コンテキストでパラメータ付きURLを開く
       - const newContext = await page.context().browser().newContext()
       - const newPage = await newContext.newPage()
       - await newPage.goto(paramUrl)
       - waitForTimeout(3000)

    4. フォームが正常に表示されることを確認する
       - expect(bodyText).not.toContain('Internal Server Error')
       - expect(bodyText).not.toContain('404')

    5. パラメータで指定した値が初期値として入力されていることを確認する
       - const hasPrefilledValue = await newPage.evaluate(() => {
           const inputs = document.querySelectorAll('input[type="text"], textarea');
           for (const input of inputs) {
             if (input.value && input.value.includes('テスト初期値812')) return true;
           }
           return false;
         })
       - expect(hasPrefilledValue).toBe(true)
         ← URLパラメータの値がフィールドに初期設定されていること

    6. フォームフィールド数を確認する
       - const fieldCount = await newPage.locator('input[type="text"], textarea, input:not([type="hidden"]):not([type="file"])').count()
       - expect(fieldCount).toBeGreaterThan(0)

    7. 後処理
       - await newContext.close()

    【confirm】
    - expect(bodyText).not.toContain('Internal Server Error'): パラメータ付きURLでもフォームが表示されること
    - expect(hasPrefilledValue).toBe(true): URLパラメータが初期値として反映されること
    - expect(fieldCount).toBeGreaterThan(0): フォームにフィールドが存在すること
  old_case_no: '812'
- case_no: pf-100
  sheet: B
  feature: 公開フォーム
  description: |-
    ①公開フォームを含むテーブルを設定する
    ②公開フォームURLを開く
    ③各フィールドの表示が左に寄っていない（正しいレイアウトで表示されている）ことを確認する
    ④「活動名」「申請受付対象月」「活動内容」等のフィールドが見切れていないことを確認する
  expected: 公開フォームで各フィールドの表示が左寄りにならず、正しいレイアウトで表示されること
  movie: UC23
  detailed_flow: |-
    【UC23 テストフロー】この動画で確認するテスト番号:
      pf-100         (旧: 838)     公開フォーム

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    【前提】ALLテストテーブルで公開フォームをON

    1. 公開フォームをONにし、URLを取得する
       - enablePublicForm(page, tableId) でON
       - ドロップダウン「公開フォームリンク」→ input[readonly] からURL取得
       - モーダルを閉じる（Escキー）

    2. デスクトップ幅（1280x800）で公開フォームを開く
       - await page.setViewportSize({ width: 1280, height: 800 })
       - await page.goto(publicFormUrl)
       - waitForTimeout(3000)
       - expect(bodyText).not.toContain('Internal Server Error')

    3. フィールドのレイアウトを確認する（左寄りでないこと）
       - const layoutCheck = await page.evaluate(() => {
           const fields = document.querySelectorAll('.form-group, .form-field, [class*="field-row"], .form-control');
           let leftAligned = 0;
           let total = 0;
           for (const field of fields) {
             const rect = field.getBoundingClientRect();
             if (rect.width > 0 && rect.height > 0) {
               total++;
               if (rect.left < 10) leftAligned++;  // 左端（10px未満）にあるものを「左寄り」と判定
             }
           }
           return { total, leftAligned };
         })
       - expect(layoutCheck.total).toBeGreaterThan(0)

    4. フィールドが見切れていないことを確認する
       - const clippedCheck = await page.evaluate(() => {
           const fields = document.querySelectorAll('input, select, textarea, .form-control');
           let clipped = 0;
           const viewportWidth = window.innerWidth;
           for (const field of fields) {
             const rect = field.getBoundingClientRect();
             if (rect.width > 0 && rect.right > viewportWidth) clipped++;
           }
           return { clipped, total: fields.length };
         })
       - expect(clippedCheck.clipped).toBeLessThanOrEqual(clippedCheck.total / 4)
         ← 見切れているフィールドが全体の1/4以下であること

    【confirm】
    - expect(layoutCheck.total).toBeGreaterThan(0): 公開フォームにフィールドが存在すること
    - expect(clippedCheck.clipped <= clippedCheck.total / 4): 大多数のフィールドが見切れていないこと
  old_case_no: '838'
