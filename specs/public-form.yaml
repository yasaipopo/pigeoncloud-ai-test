- case_no: pf-090
  sheet: B
  feature: 公開フォーム
  description: |-
    ①公開フォームリンクのURLにパラメータを付与して初期値が設定されることを確認する
  expected: 公開フォームURLにパラメータを付与して開くと、対応するフィールドに値が初期設定されること
  movie: UC22
  detailed_flow: |
    【UC22 テストフロー】この動画で確認するテスト番号:
      [0:01] pf-090         (旧: 812)     URLパラメータ初期値

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:01] pf-090 ── 公開フォームURLパラメータで初期値設定
    1. 公開フォームをONにし、ベースURLを取得
    2. URLにフィールド名パラメータを付与
    3. 新規コンテキストでパラメータ付きURLを開く
    4. ✅ フォームがエラーなく表示されること
    5. ✅ パラメータの値が初期値として設定されていること
  old_case_no: '812'

