# ──────────────────────────────────────────────
# movie: PF01 (pf-010〜pf-070 を1動画で確認)
# ──────────────────────────────────────────────
- case_no: pf-010
  sheet: B
  feature: 公開フォーム
  category: 公開フォームをメール配信
  description: |-
    ①・登録されてるユーザーのメールアドレス宛てに回答用URLを送信。
    ②URLは個別で、回答はユーザーに紐づく。
    ④・送信前に「送信してよろしですか？」のポップアップ表示。
  expected: ・公開フォーム設定画面が表示され、メール配信設定ができること
  movie: PF01
  detailed_flow: |
    【PF01 テストフロー】この動画で確認するテスト番号:
      [0:05] pf-010         (旧: 135)     公開フォームメール配信設定
      [0:16] pf-020         (旧: 170)     公開フォームURL確認
      [0:28] pf-030         (旧: 358)     子テーブルルックアップコピー
      [0:41] pf-040         (旧: 359)     複数列レイアウト
      [0:53] pf-050         (旧: 499)     非表示子テーブル
      [1:06] pf-060         (旧: 547)     埋め込みフォーム空白
      [1:19] pf-070         (旧: 660)     スマホレイアウト

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:05] pf-010 ── 公開フォーム設定画面・メール配信設定
    1. テーブル設定（その他タブ）で「公開フォームをONにする」を確認
    2. ✅ 公開フォーム設定UIが表示されること
    3. テーブル一覧のドロップダウンで「公開フォームをメール配信」メニューを確認
    4. ✅ メール配信メニューが表示されること

    [0:16] pf-020 ── 公開フォームURLの確認
    5. 公開フォームリンクからURLを取得
    6. ✅ URLが存在し長さが0より大きいこと

    [0:28] pf-030 ── 子テーブルルックアップコピーが動作すること
    7. 公開フォームを開く
    8. ✅ フォームがエラーなく表示されること

    [0:41] pf-040 ── 複数列レイアウトでも項目が収まること
    9. 公開フォームを開く
    10. ✅ フィールドが見切れず表示されること

    [0:53] pf-050 ── ビュー非表示の子テーブルが公開フォームに表示されないこと
    11. テーブル設定でビュー非表示を確認
    12. ✅ 公開フォームで非表示設定が反映されること

    [1:06] pf-060 ── 埋め込みフォームの送信ボタン下空白
    13. 公開フォームを確認
    14. ✅ ページがエラーなく表示されること

    [1:19] pf-070 ── スマホサイズでのレイアウト確認
    15. スマホビューポートで公開フォームを開く
    16. ✅ スマホサイズでもフォームが正しく表示されること
  old_case_no: '135'
- case_no: pf-020
  sheet: B
  feature: 公開フォーム
  category: 公開フォームURL
  description: |-
    ①公開フォームURLが変更されたことを確認。
    ②＜変更内容＞。
    ③・URLのアドレス長。
  expected: ・公開フォームURLのアドレス長が適切であることが正常に動作すること。
  movie: PF01
  detailed_flow: 'PF01テストフロー参照（pf-010のdetailed_flowと同一）'
  old_case_no: '170'
