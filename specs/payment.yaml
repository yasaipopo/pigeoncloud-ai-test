    ## 注意
    - 実際の Stripe 課金テストは sandbox 環境でのみ実施
    - 本番環境では即時反映されるため、テスト後に元の値に戻すこと
    - `stripePaymentUpdateRequest` コントローラーが `stripe-payment-update` API を処理する
    - 「即時適用」は PHP 側で `stripePaymentUpdateRequest` が Stripe API を直接更新（翌月ではなく即時）
