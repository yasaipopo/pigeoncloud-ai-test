    # 573: 決済の即時反映（ユーザー数変更）

    ## 前提
    - 契約済み環境（Stripe クレジット払い、is_update=true）が必要
    - 現在のユーザー数（max_user）が既知（例: 5ユーザー契約中）

    ## 操作手順

    ### ③ バリデーション確認（現在のユーザー数以下に変更）
    1. `page.goto(BASE_URL + '/admin/dataset/payment/pay')` でアクセス
    2. `page.waitForSelector('#user_input', { timeout: 15000 })` 待機
    3. 現在の max_user より小さい値（例: 3）を入力
       ```javascript
       await page.fill('#user_input', '3');
       await page.dispatchEvent('#user_input', 'input');
       ```
    4. バリデーションエラーが表示されること（5未満は無効）
       ```javascript
       await expect(page.locator('.text-danger:has-text("ユーザー数は5~3000の範囲で選択して下さい")')).toBeVisible({ timeout: 5000 });
       ```
    5. 「契約更新を行う」ボタンが表示されないこと（is_valid_num=false）
       ```javascript
       await expect(page.locator('button:has-text("契約更新を行う")')).not.toBeVisible();
       ```

    ### ① ユーザー数を増やした場合の料金反映確認
    6. ユーザー数に現在より多い値（例: 10）を入力
       ```javascript
       await page.fill('#user_input', '10');
       await page.dispatchEvent('#user_input', 'input');
       ```
    7. お支払い金額が更新されること（#price_calc の値が変わる）
       ```javascript
       const priceText = await page.locator('#price_calc').textContent();
       expect(parseInt(priceText.replace(/,/g, ''))).toBeGreaterThan(0);
       ```
    8. 「契約更新を行う」ボタンが表示されること（is_valid_num=true）
       ```javascript
       await expect(page.locator('button:has-text("契約更新を行う")')).toBeVisible({ timeout: 5000 });
       ```

    ### ② 即時反映の確認（Stripe更新API呼び出し）
    9. 「契約更新を行う」ボタンをクリック → 確認モーダルが表示される
       ```javascript
       await page.click('button:has-text("契約更新を行う")');
       // confirm-modal の表示を待機
       await expect(page.locator('.modal.show, .modal-dialog')).toBeVisible({ timeout: 5000 });
       ```
    10. 確認モーダルの「契約更新を行う」ボタンをクリック
        ```javascript
        await page.click('.modal.show button:has-text("契約更新を行う"), .modal button[class*="btn-success"]');
        ```
    11. 成功メッセージが表示されること
        ```javascript
        await expect(page.locator('.toast-success, [class*="toastr"]:has-text("契約更新依頼を送信しました")')).toBeVisible({ timeout: 15000 });
        // または updated_status='update_success' によるメッセージ
        await expect(page.locator('text=プランの変更リクエストが完了しました')).toBeVisible({ timeout: 15000 });
        ```

    ## 確認事項（expect）
    - バリデーション: 5未満は `.text-danger` エラー表示
    - 有効なユーザー数の場合: `#price_calc` に料金が表示される
    - 更新API `/api/admin/stripe-payment-update` が呼ばれ成功すること
      - レスポンス: `{ result: 'success' }` または `updated_status: 'update_success'`

    ## 注意
    - 実際の Stripe 課金テストは sandbox 環境でのみ実施
    - 本番環境では即時反映されるため、テスト後に元の値に戻すこと
    - `stripePaymentUpdateRequest` コントローラーが `stripe-payment-update` API を処理する
    - 「即時適用」は PHP 側で `stripePaymentUpdateRequest` が Stripe API を直接更新（翌月ではなく即時）
  old_case_no: '573'
