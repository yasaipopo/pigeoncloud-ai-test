- case_no: PAY-01
  feature: 支払い
  description: ①支払いページが表示されること
  expected: |
    支払いページが表示されること
  movie: PM01
  detailed_flow: |
    # PAY-01: 支払いページが表示されること

    ## 前提
    - ログイン済み（admin権限）
    - テスト環境はトライアル状態（isTrial() == true）

    ## 操作手順
    1. `page.goto(BASE_URL + '/admin/payment')` でアクセス
    2. Angular が読み込まれるまで待機: `page.waitForSelector('.plan-header', { timeout: 15000 })`
       - もしリダイレクトされた場合は router navigate で `/admin/dataset/payment/pay` にアクセス

    ## 確認事項（expect）
    - `.plan-header` または `h1:has-text("利用料金のお支払い")` が表示されていること
      ```javascript
      await expect(page.locator('h1.plan-header, .plan-header').first()).toBeVisible({ timeout: 15000 });
      ```
    - ページタイトルが "PigeonCloud" であること（Internal Server Error が出ていないこと）
      ```javascript
      const bodyText = await page.innerText('body');
      expect(bodyText).not.toContain('Internal Server Error');
      ```

    ## 注意
    - `/admin/payment` は Angular SPA のルート。PHP には届かないため `/admin/dataset/payment/pay` が正確なパス
    - トライアル環境ではページが表示されるが「有料プラン契約」のフォームが表示される（is_update=false）

