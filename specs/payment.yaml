    # 715: カードブランド表示

    ## 前提
    - クレジットカード登録済みの契約環境（is_update=true かつ stripe_credit_card['last4'] が存在する）
    - テスト環境ではトライアルのため、APIモックまたはカード登録済み環境が必要

    ## 操作手順
    1. `page.goto(BASE_URL + '/admin/dataset/payment/pay')` でアクセス
    2. `page.waitForSelector('.plan-card', { timeout: 15000 })` 待機
    3. カード情報エリアが表示されているか確認

    ## テスト環境での検証方法（カード未登録環境）
    1. `/api/admin/stripe-card-check` APIのレスポンスを確認
       ```javascript
       const cardData = await page.evaluate(async () => {
         const res = await fetch('/api/admin/stripe-card-check', {
           credentials: 'include',
           headers: { 'X-Requested-With': 'XMLHttpRequest' }
         });
         return res.json();
       });
       ```
    2. カードが登録されている場合（`card.last4` が存在する）
       - 支払いページに「登録カード」エリアが表示される
       - カード番号末尾4桁が表示されること: `.td:has-text("xxxx")` または `td:has-text("xxxx")`
       - 有効期限が表示されること

    ## 確認事項（expect）
    - カード情報が存在する場合、「登録カード」テーブルが表示されること
      ```javascript
      // カード情報が存在する場合
      if (cardData.card && cardData.card.last4) {
        await expect(page.locator('h5:has-text("登録カード")')).toBeVisible({ timeout: 10000 });
        await expect(page.locator('td').filter({ hasText: /xxxx/ })).toBeVisible();
        // ブランド情報（brand フィールド）が表示されること
        const brandText = cardData.card.brand;
        if (brandText) {
          // HTMLテンプレートにbrand表示がある場合（UC16機能追加後）
          await expect(page.locator(`td:has-text("${brandText}")`)).toBeVisible();
        }
      } else {
        // カード未登録の場合は「登録カード」エリアが非表示
        await expect(page.locator('h5:has-text("登録カード")')).not.toBeVisible();
      }
      ```

    ## 注意
    - `stripe_credit_card['brand']` は Stripe API の card オブジェクトから取得（visa, mastercard, amex 等）
    - 現在の payment-page.component.html には `brand` フィールドの直接表示はない可能性がある
    - ケース715の要件（カードブランドアイコン+名前表示）が未実装の場合は product-bugs.md に記録
