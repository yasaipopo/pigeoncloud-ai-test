- case_no: PAY-03
  feature: 支払い
  description: ①Stripe checkoutの関連iframeが存在すること
  expected: |
    Stripe checkoutの関連iframeが存在すること
  movie: PM01
  detailed_flow: |
    # PAY-03: Stripe checkoutの関連iframeが存在すること

    ## 前提
    - PAY-02 と同じページ（続けてテスト可）

    ## 操作手順
    1. `page.goto(BASE_URL + '/admin/dataset/payment/pay')` でアクセス
    2. `page.waitForSelector('.plan-card', { timeout: 15000 })` で読み込み待機
    3. Stripe.js/Checkout.js の読み込みを待機: `page.waitForTimeout(3000)`

    ## 確認事項（expect）
    - Stripe の checkout.js スクリプトが読み込まれていること（head または body に script タグが存在する）
      ```javascript
      const stripeScripts = await page.evaluate(() => {
        const scripts = Array.from(document.querySelectorAll('script'));
        return scripts.filter(s => s.src.includes('stripe')).map(s => s.src);
      });
      expect(stripeScripts.length).toBeGreaterThan(0);
      ```
    - Stripe v3 スクリプトが含まれること
      ```javascript
      expect(stripeScripts.some(src => src.includes('js.stripe.com/v3'))).toBe(true);
      ```
    - Checkout.js スクリプトが含まれること（または checkout.stripe.com のスクリプト）
      ```javascript
      expect(stripeScripts.some(src => src.includes('checkout.stripe.com') || src.includes('js.stripe.com/v3'))).toBe(true);
      ```

    ## 補足
    - loadStripeJs() メソッドが `https://js.stripe.com/v3/` と `https://checkout.stripe.com/checkout.js` を動的に読み込む
    - stripe-js / stripe-checkout の id を持つ script タグが DOM に存在することを確認

- case_no: PAY-04
  feature: 支払い
  description: ①テストカードでStripe支払いフォームに入力できること（Checkoutモーダル）
  expected: |
    テストカードでStripe支払いフォームに入力できること（Checkoutモーダル）
  movie: PM01
  detailed_flow: |
    # PAY-04: テストカードでStripe支払いフォームに入力できること（Checkoutモーダル）

    ## 前提
    - トライアル環境（is_update=false）でテスト
    - 利用規約に同意した状態でクレジットカード支払いを選択済み

    ## 操作手順
    1. `page.goto(BASE_URL + '/admin/dataset/payment/pay')` でアクセス
    2. `page.waitForSelector('.plan-card', { timeout: 15000 })` 待機
    3. 利用規約チェックボックスにチェック（初回は未チェック）
       ```javascript
       await page.click('#aggrement_checkbox');
       ```
    4. 「クレジットカード支払い」ラジオを選択
       ```javascript
       await page.click('#pay_as_stripe');
       ```
    5. 「クレジットカード支払いに進む」ボタンをクリック
       ```javascript
       await page.click('button:has-text("クレジットカード支払いに進む")');
       ```
    6. Stripe Checkout モーダルが開くのを待機
       ```javascript
       await page.waitForSelector('iframe[name*="stripe"], iframe[src*="stripe"], .stripe-checkout iframe', { timeout: 10000 });
       ```

    ## 確認事項（expect）
    - Stripe Checkout モーダルの iframe が表示されること
      ```javascript
      const stripeFrame = page.frameLocator('iframe[src*="checkout.stripe.com"], iframe[name*="stripe"]').first();
      await expect(stripeFrame.locator('input[name="cardnumber"], input[placeholder*="card"], input[autocomplete="cc-number"]').first()).toBeVisible({ timeout: 15000 });
      ```
    - カード番号入力欄にテストカード番号を入力できること
      ```javascript
      await stripeFrame.locator('input[name="cardnumber"]').fill('4242424242424242');
      ```

    ## 注意
    - Stripe Checkout モーダルは iframe で表示される。frameLocator を使用すること
    - テストカード番号: 4242 4242 4242 4242 (Stripe テスト用)
    - 実際の決済は行わない（入力できることのみ確認）
    - makePayment() が stripePaymentHandler.open() を呼ぶ。stripePaymentHandler が初期化されていない場合はエラートースト表示

- case_no: PAY-05
  feature: 支払い
  description: ①ユーザー数の範囲外入力でバリデーションエラーが表示されること
  expected: |
    ユーザー数の範囲外入力でバリデーションエラーが表示されること
  movie: PM01
  detailed_flow: |
    # PAY-05: ユーザー数の範囲外入力でバリデーションエラーが表示されること

    ## 前提
    - PAY-02 と同じページ

    ## 操作手順（下限テスト: 4ユーザー）
    1. `page.goto(BASE_URL + '/admin/dataset/payment/pay')` でアクセス
    2. `page.waitForSelector('#user_input', { timeout: 15000 })` 待機
    3. ユーザー数に 4 を入力（5未満は無効）
       ```javascript
       await page.fill('#user_input', '4');
       await page.dispatchEvent('#user_input', 'input');
       ```
    4. バリデーションエラーが表示されることを確認
       ```javascript
       await expect(page.locator('.text-danger:has-text("ユーザー数は5~3000の範囲で選択して下さい")')).toBeVisible({ timeout: 5000 });
       ```

    ## 操作手順（上限テスト: 3001ユーザー）
    5. ユーザー数に 3001 を入力（3000超は無効）
       ```javascript
       await page.fill('#user_input', '3001');
       await page.dispatchEvent('#user_input', 'input');
       ```
    6. バリデーションエラーが表示されることを確認
       ```javascript
       await expect(page.locator('.text-danger:has-text("ユーザー数は5~3000の範囲で選択して下さい")')).toBeVisible({ timeout: 5000 });
       ```

    ## 操作手順（正常値に戻す）
    7. ユーザー数に 5 を入力してエラーが消えることを確認
       ```javascript
       await page.fill('#user_input', '5');
       await page.dispatchEvent('#user_input', 'input');
       await expect(page.locator('.text-danger:has-text("ユーザー数は5~3000の範囲で選択して下さい")')).not.toBeVisible({ timeout: 3000 });
       ```

    ## 確認事項（expect）
    - `is_valid_num = false` のとき `.text-danger` テキスト「※ユーザー数は5~3000の範囲で選択して下さい。」が表示される
    - セレクター: `.text-danger` または `div.text-danger.mt-2`
    - Angular [(ngModel)] バインディングの `onQuantityChange()` が呼ばれてバリデーション実行

    ## 注意
    - Angular Reactive Forms でなく ngModel バインディングのため、`fill()` 後に `input` イベントのディスパッチが必要

- case_no: PAY-06
  feature: 支払い
  description: ①支払い履歴APIエンドポイントが存在すること
  expected: |
    支払い履歴APIエンドポイントが存在すること
  movie: PM01
  detailed_flow: |
    # PAY-06: 支払い履歴APIエンドポイントが存在すること

    ## 前提
    - ログイン済み（admin権限）

    ## 操作手順
    1. `page.goto(BASE_URL + '/admin/dashboard')` でダッシュボードに移動（cookieを有効にする）
    2. API エンドポイントへの GET リクエストを実行してステータスコードを確認
       ```javascript
       const response = await page.evaluate(async () => {
         const res = await fetch('/api/admin/showPaymentPage', {
           method: 'GET',
           credentials: 'include',
           headers: { 'X-Requested-With': 'XMLHttpRequest' }
         });
         return { status: res.status, body: await res.text() };
       });
       ```

    ## 確認事項（expect）
    - `/api/admin/showPaymentPage` エンドポイントが 200 を返すこと
      ```javascript
      expect(response.status).toBe(200);
      ```
    - レスポンスに `result: success` が含まれること（404 や 500 でないこと）
      ```javascript
      expect(response.body).toContain('success');
      ```
    - 補足: `download-stripe-invoice` エンドポイントのルートが存在することも確認可能
      ```javascript
      // ルーティング定義として /api/admin/download-stripe-invoice/{id} が存在する
      // 実際のinvoice IDがない場合は 404 が返るが、エンドポイント自体は存在する（500でない）
      const dlResponse = await page.evaluate(async () => {
        const res = await fetch('/api/admin/download-stripe-invoice/999', {
          credentials: 'include',
          headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });
        return res.status;
      });
      expect(dlResponse).not.toBe(500);
      ```

- case_no: '715'
  sheet: B
  feature: カードブランド表示
  description: |-
    ①支払い設定ページを開く
    ②クレジットカード情報表示エリアを確認する
    ③カードブランド（Visa、MasterCard等）のアイコンと名前が表示されていることを確認する
    ④ブランド表示がカード情報更新ボタンの上に正しく配置されていることを確認する
  expected: 支払いページでクレジットカードのブランド（アイコン+名前）が正しく表示されること
  movie: UC16
  detailed_flow: |
    # 715: カードブランド表示

    ## 前提
    - クレジットカード登録済みの契約環境（is_update=true かつ stripe_credit_card['last4'] が存在する）
    - テスト環境ではトライアルのため、APIモックまたはカード登録済み環境が必要

    ## 操作手順
    1. `page.goto(BASE_URL + '/admin/dataset/payment/pay')` でアクセス
    2. `page.waitForSelector('.plan-card', { timeout: 15000 })` 待機
    3. カード情報エリアが表示されているか確認

    ## テスト環境での検証方法（カード未登録環境）
    1. `/api/admin/stripe-card-check` APIのレスポンスを確認
       ```javascript
       const cardData = await page.evaluate(async () => {
         const res = await fetch('/api/admin/stripe-card-check', {
           credentials: 'include',
           headers: { 'X-Requested-With': 'XMLHttpRequest' }
         });
         return res.json();
       });
       ```
    2. カードが登録されている場合（`card.last4` が存在する）
       - 支払いページに「登録カード」エリアが表示される
       - カード番号末尾4桁が表示されること: `.td:has-text("xxxx")` または `td:has-text("xxxx")`
       - 有効期限が表示されること

    ## 確認事項（expect）
    - カード情報が存在する場合、「登録カード」テーブルが表示されること
      ```javascript
      // カード情報が存在する場合
      if (cardData.card && cardData.card.last4) {
        await expect(page.locator('h5:has-text("登録カード")')).toBeVisible({ timeout: 10000 });
        await expect(page.locator('td').filter({ hasText: /xxxx/ })).toBeVisible();
        // ブランド情報（brand フィールド）が表示されること
        const brandText = cardData.card.brand;
        if (brandText) {
          // HTMLテンプレートにbrand表示がある場合（UC16機能追加後）
          await expect(page.locator(`td:has-text("${brandText}")`)).toBeVisible();
        }
      } else {
        // カード未登録の場合は「登録カード」エリアが非表示
        await expect(page.locator('h5:has-text("登録カード")')).not.toBeVisible();
      }
      ```

    ## 注意
    - `stripe_credit_card['brand']` は Stripe API の card オブジェクトから取得（visa, mastercard, amex 等）
    - 現在の payment-page.component.html には `brand` フィールドの直接表示はない可能性がある
    - ケース715の要件（カードブランドアイコン+名前表示）が未実装の場合は product-bugs.md に記録

- case_no: '355'
  sheet: B
  feature: 領収書ダウンロード
  description: |-
    ①契約済みのdemo環境にログインする
    ②「請求情報」メニューが表示されることを確認する
    ③請求情報画面から領収書ダウンロードを実行する
    ④ダウンロードされたPDFに全項目が正しく印字されていることを確認する
  expected: 契約済み環境で請求情報メニューが表示され、領収書がダウンロードでき、全項目が印字されていること
  movie: UC03
  detailed_flow: |
    # 355: 領収書ダウンロード

    ## 前提
    - 契約済み環境（isTrial() == false、payment_method == 'credit'）が必要
    - テスト環境はトライアルのため、本番環境 (ai-test.pigeon-cloud.com) またはクレジット契約済みのステージング環境が対象

    ## 操作手順

    ### ① 請求情報メニューの確認
    1. ログイン後、ヘッダーのユーザーメニューをクリック
       ```javascript
       await page.click('button.dropdown-toggle, [data-toggle="dropdown"]');
       // または直接メニューボタンを探す
       await page.click('li.nav-item.dropdown button');
       ```
    2. 「請求情報」メニュー項目が表示されることを確認
       ```javascript
       await expect(page.locator('a:has-text("請求情報")')).toBeVisible({ timeout: 5000 });
       ```
    3. 「請求情報」をクリックして請求情報ページに移動
       ```javascript
       await page.click('a:has-text("請求情報")');
       await page.waitForURL(/admin_invoices/, { timeout: 15000 });
       ```

    ### ② 請求情報画面の確認
    4. `page.goto(BASE_URL + '/admin/dataset/admin_invoices')` で直接アクセスも可能
    5. テーブルに請求レコードが一覧表示されていること
       ```javascript
       await page.waitForSelector('table', { timeout: 15000 });
       await expect(page.locator('table tbody tr').first()).toBeVisible();
       ```
    6. レコードをクリックして詳細画面を開く
       ```javascript
       await page.click('table tbody tr:first-child a, table tbody tr:first-child td:first-child');
       ```

    ### ③ 領収書ダウンロードボタンの確認
    7. 詳細画面（view）で「領収書ダウンロード」ボタンが表示されること
       ```javascript
       await expect(page.locator('button:has-text("領収書ダウンロード")')).toBeVisible({ timeout: 10000 });
       ```
    8. ステータスが 'paid' のレコードのみボタンが表示される（`*ngIf="data.raw_data.status =='paid'"` 条件）

    ## 確認事項（expect）
    - 契約済み環境では「請求情報」メニューが表示されること
      - 表示条件: `_share.isMasterUser() || _share.common_grant.invoice` かつ `!_share.isTrial()` かつ `payment_method=='credit'`
    - 「領収書ダウンロード」ボタンが status='paid' のレコードで表示されること
    - 「請求書ダウンロード」ボタンが全レコードで表示されること
    - ダウンロード API `GET /api/admin/download-stripe-invoice/{id}?type=receipt` が 200 を返すこと
      ```javascript
      const dlCheck = await page.evaluate(async (invoiceId) => {
        const res = await fetch(`/api/admin/download-stripe-invoice/${invoiceId}`, {
          credentials: 'include',
          headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });
        const data = await res.json();
        return { status: res.status, result: data.status };
      }, recordId);
      expect(dlCheck.status).toBe(200);
      expect(dlCheck.result).toBe('success');
      ```

    ## 注意
    - テスト環境（トライアル）では「請求情報」メニューが表示されない。本番または契約済み環境でテスト
    - 実際のPDFダウンロード内容の確認（印字項目）は自動テストでは困難。ボタン表示とAPIレスポンスの確認を中心とする

- case_no: '573'
  sheet: B
  feature: 決済の即時反映（ユーザー数変更）
  description: |-
    ①決済設定でユーザー数を増やす
    ②決済完了後、即時に登録可能ユーザー数が反映されることを確認する
    ③現在のユーザー数以下に変更した場合にエラーが表示されることを確認する
    ④増やした場合は即時反映され、追加ユーザーが作成可能なことを確認する
  expected: 決済後のユーザー数変更が即時反映され、制限以下への変更時にはエラーが表示されること
  movie: UC09
  detailed_flow: |
    # 573: 決済の即時反映（ユーザー数変更）

    ## 前提
    - 契約済み環境（Stripe クレジット払い、is_update=true）が必要
    - 現在のユーザー数（max_user）が既知（例: 5ユーザー契約中）

    ## 操作手順

    ### ③ バリデーション確認（現在のユーザー数以下に変更）
    1. `page.goto(BASE_URL + '/admin/dataset/payment/pay')` でアクセス
    2. `page.waitForSelector('#user_input', { timeout: 15000 })` 待機
    3. 現在の max_user より小さい値（例: 3）を入力
       ```javascript
       await page.fill('#user_input', '3');
       await page.dispatchEvent('#user_input', 'input');
       ```
    4. バリデーションエラーが表示されること（5未満は無効）
       ```javascript
       await expect(page.locator('.text-danger:has-text("ユーザー数は5~3000の範囲で選択して下さい")')).toBeVisible({ timeout: 5000 });
       ```
    5. 「契約更新を行う」ボタンが表示されないこと（is_valid_num=false）
       ```javascript
       await expect(page.locator('button:has-text("契約更新を行う")')).not.toBeVisible();
       ```

    ### ① ユーザー数を増やした場合の料金反映確認
    6. ユーザー数に現在より多い値（例: 10）を入力
       ```javascript
       await page.fill('#user_input', '10');
       await page.dispatchEvent('#user_input', 'input');
       ```
    7. お支払い金額が更新されること（#price_calc の値が変わる）
       ```javascript
       const priceText = await page.locator('#price_calc').textContent();
       expect(parseInt(priceText.replace(/,/g, ''))).toBeGreaterThan(0);
       ```
    8. 「契約更新を行う」ボタンが表示されること（is_valid_num=true）
       ```javascript
       await expect(page.locator('button:has-text("契約更新を行う")')).toBeVisible({ timeout: 5000 });
       ```

    ### ② 即時反映の確認（Stripe更新API呼び出し）
