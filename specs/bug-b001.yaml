group: バグ修正・個別検証
spec_file: tests/bug-b001.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: bug-b001
  sheet: B
  feature: レコード追加 (Excelインポート)
  category: レイアウト
  description: |-
    列が多いExcel(CSV)ファイルをアップロードし、データプレビューのCSSレイアウトを確認する。
    プレビューテーブルの幅が親要素を超えていないか、または水平スクロールが適切に機能しているかを検証する。
  expected: プレビューテーブルが親要素（モーダル）を突き抜けておらず、適切にスクロールまたはリサイズされていること。
  detailed_flow: |-
    【B001 テストフロー】
      bug-b001: Excelインポートプレビューのレイアウト検証

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    1. テーブル管理一覧（/admin/dataset）を開く
    2. ハンバーガーメニュー（☰）をクリック → 「エクセルから追加」を選択する
    3. ✅ Excelインポートモーダルが表示されること
    4. 50列のデータを持つCSVファイルをアップロードする
    5. ✅ データプレビューテーブルが表示されること
    6. ✅ プレビューテーブルの幅がモーダル幅を超えていないこと（または親要素でスクロール可能であること）
    7. ✅ 50列目の項目名が正しく読み込まれていること
    8. スクリーンショットを撮影してレイアウトを確認する
