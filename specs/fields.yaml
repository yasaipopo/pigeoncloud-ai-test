- case_no: 108-1
  sheet: A
  feature: ファイル
  category: zipダウンロード
  description: |-
    ①該当のテーブル一覧を開く。
    ②レコード追加を行い、ファイルの項目に複数ファイルをアップロードする
    ③テーブル一覧を開き、ファイルの項目の「ZIP」アイコンをクリックする。
  expected: ZIPファイルがダウンロードされ、且つZIP解凍したファイルが問題なく開けること。
  movie: FD02
  detailed_flow: |
    1. /admin/dataset__{{tableId}} のテーブル一覧を開く
    2. 「追加」ボタンをクリックしてレコード追加画面を開く
    3. ファイルフィールドの `input[type=file]` に複数ファイル（例: `/app/test_files/ok.png` と `/app/test_files/donmai.png`）をアップロードする
    4. 「保存する」ボタンをクリックしてレコードを保存する
    5. 一覧画面に戻り、作成したレコードのファイルフィールドに「ZIP」アイコン（`.zip-download` または ZIPボタン）が表示されることを確認する
    6. ZIPアイコンをクリックしてダウンロードが開始されることを確認する
    7. ダウンロードイベントが発生することを確認する（`page.waitForEvent('download')`）
- case_no: 113-01
  sheet: A
  feature: レイアウト(2-4列)
