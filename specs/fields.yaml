- case_no: 101-1
  status: partial
  steps: '1. beforeAll: createAllTypeTable API呼び出し（既存チェックあり）

    2. ALLテストテーブルのIDをAPIステータスから取得

    3. フィールド設定ページ（/admin/dataset/edit/{tableId}）に遷移

    4. 「項目を追加する」ボタンの存在確認（条件付き）

    5. afterAll: deleteAllTypeTables API呼び出し

    '
  assertions: '- expect(pageText).not.toContain(''Internal Server Error'')

    - expect(pageText).not.toContain(''404'')

    - 「項目を追加する」ボタンが存在すれば toBeVisible()（条件付き）

    '
  gaps: '⚠️ YAMLには「デフォルト現在日時セット」のチェックを入れてフィールドを追加し、レコード追加画面で現在日時が自動入力されることの確認が期待されるが、フィールド設定ページの表示確認のみ

    ⚠️ フィールドの実際の追加操作なし

    ⚠️ レコード追加画面での自動入力確認なし

