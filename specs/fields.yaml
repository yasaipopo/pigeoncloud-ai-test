- case_no: fld-010
  sheet: A
  feature: 日時
  category: |-
    現在時刻を設定【新規追加】
    （種類：日時）
  description: |-
    ①テーブル管理より、該当のテーブルを選択。
    ②項目追加より「日時」を選択。
    ③「項目名」入力後、種類「日時」を選択。
    ④ 「デフォルトで現在日時(時刻)をセット」のONにチェックを入れる。
    ⑤「表示フォーマットを指定する」にチェックを入れ、「Y-m-d H:i:s:s」を入力後、「追加する」ボタンをクリック。
    ⑥該当のテーブルを選択し、レコード追加画面を表示。
    ⑦③の入力項目に現在日時が自動で入力されていることを確認。
    ⑧レコード追加画面を保存し、該当のテーブルのレコード一覧を表示。
  expected: |-
    ・⑤完了後、エラーなく、設定保存が完了すること。
    ・該当レコード一覧にて該当項目に現在日時が「YYYY-MM-DD HH:MM:SS」で表示されていること。
  movie: FD01
  detailed_flow: |-
    【FD01 テストフロー】この動画で確認するテスト番号:
      fld-010        (旧: 101-1)   日時
      fld-020        (旧: 101-2)   日時
      fld-030        (旧: 101-3)   日時
      fld-040        (旧: 101-4)   日時
      fld-050        (旧: 101-5)   日時
      fld-060        (旧: 101-6)   日時
      fld-070        (旧: 101-7)   日時
      fld-080        (旧: 101-8)   日時

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    1. /admin/dataset/edit/{tableId} に遷移してフィールド設定ページを開く
    2. `button:has-text("項目を追加する")` をクリックしてフィールド追加ダイアログを開く
    3. 「日時」フィールドタイプをクリックしてモーダルを表示する
    4. 「項目名」に「テスト101-1」を入力する（selector: `input[name="field_name"]` または 項目名入力欄）
    5. 「種類」ドロップダウンで「日時」を選択する
    6. 「デフォルトで現在日時(時刻)をセット」のチェックをONにする
    7. 「表示フォーマットを指定する」にチェックを入れ、「Y-m-d H:i:s」を入力する
    8. 「追加する」ボタンをクリックして保存する
    9. 保存完了後、 `/admin/dataset__{tableId}/add` のレコード追加画面に遷移する
    10. 追加した日時フィールドに現在日時が自動入力されていることを確認する（`expect(field).not.toBeEmpty()`）
    11. 「保存する」ボタンをクリックしてレコードを保存する
    12. レコード一覧画面でフィールドの値が正しい形式で表示されていることを確認する
  old_case_no: 101-1
