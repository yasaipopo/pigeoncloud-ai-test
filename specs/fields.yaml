group: フィールド追加・各フィールドタイプ
spec_file: tests/fields.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: 101-1
  sheet: A
  feature: 日時
  category: '現在時刻を設定【新規追加】

    （種類：日時）'
  description: '①テーブル管理より、該当のテーブルを選択。

    ②項目追加より「日時」を選択。

    ③「項目名」入力後、種類「日時」を選択。

    ④ 「デフォルトで現在日時(時刻)をセット」のONにチェックを入れる。

    ⑤「表示フォーマットを指定する」にチェックを入れ、「Y-m-d H:i:s:s」を入力後、「追加する」ボタンをクリック。

    ⑥該当のテーブルを選択し、レコード追加画面を表示。

    ⑦③の入力項目に現在日時が自動で入力されていることを確認。

    ⑧レコード追加画面を保存し、該当のテーブルのレコード一覧を表示。'
  expected: '・⑤完了後、エラーなく、設定保存が完了すること。

    ・該当レコード一覧にて該当項目に現在日時が「YYYY-MM-DD HH:MM:SS」で表示されていること。'
