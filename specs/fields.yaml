cases:
- case_no: FIELD-TEXT-NUM
  feature: テキスト・数値・日時系フィールド総合
  category: 動画単位
  description: |
    ①テキスト項目を作成し、入力・保存・表示を確認する
    ②文章(複数行)項目で改行を含むデータを登録し、一覧・詳細で改行が正しく表示されることを確認
    ③リッチテキスト項目でHTMLタグが一覧画面に表示されないことを確認
    ④数値項目の各種設定（桁区切り・小数点・マイナス）を確認する
    ⑤日時項目で一括編集時に2つ以上の日時項目を連続手入力し、値が正しく反映されることを確認
    ⑥計算項目（SUM・DATE_ADD・nextWeekDay・IF等）の動作を確認する
    ⑦計算項目でDATE_ADD引数に数式を使用してもエラーにならないことを確認
    ⑧日付項目の条件計算（21日以降なら翌月20日等）が正しく動作することを確認
  expected: |
    テキスト・リッチテキスト・数値・日時・計算の各フィールドが正常に動作すること
  includes:
