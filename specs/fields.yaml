- case_no: FIELD-SELECT-REF
  feature: 選択・参照系フィールド総合
  category: 動画単位
  description: |
    ①選択肢項目（単一・複数）を作成し、選択・保存・表示を確認する
    ②選択肢(複数)でフォーム表示時に「不明のエラー」ダイアログが表示されないことを確認
    ③他テーブル参照項目で参照先の値が正しく表示されることを確認
    ④ルックアップ項目の条件付き必須表示で赤い※印が正しく表示されることを確認
    ⑤他テーブル参照で「複数の値の登録を許可する」有効時の動作を確認
    ⑥添付ファイル項目を含むレコードを複製し、ファイルがコピーされることを確認
    ⑦画像項目でサイズ・画素数情報が表示されることを確認
    ⑧フィールド全般の各種設定・バグ修正確認
  expected: |
    選択肢・他テーブル参照・ルックアップ・添付ファイル・画像・フィールド全般が正常に動作すること
