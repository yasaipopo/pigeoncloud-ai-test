- case_no: cl-090
  sheet: B
  feature: 文字列
  description: |-
    ①値が複数あると絞り込みができないです。
    ②何か方法はありますでしょうか？


    以下、先方コメント
    ・担当者として複数人が選択されている場合、抽出機能が働きません。
    ③OR選択で選ぶことが出来ますか？


    ・上記と同じかもしれませんが、担当者として複数人が選択されている場合、担当者のデータ項目でグラフが作成できません。
    ④各担当者の業務量把握が主目的でもありますので、どのように設定すべきかご教。
  expected: エラーなく正常に動作すること。(値が複数あると絞り込みができないです。何か方法はありますでしょうか？   以下、先方コメント ・担当者として複数人が選択されている場合、抽出機能が働きません。OR選択で選ぶことが出来ますか？   ・上)
  movie: CL03
  detailed_flow: |-
    【CL03 テストフロー】この動画で確認するテスト番号:
      cl-090         (旧: 297)     文字列
      cl-100         (旧: 356)     文字列
      cl-110         (旧: 426)     文字列
      cl-120         (旧: 472)     文字列
      cl-130         (旧: 597)     追加実装
      cl-140         (旧: 629)     追加実装
      cl-150         (旧: 653)     追加実装

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    # 依頼内容
    チェックボックス・複数選択フィールドで複数値が設定されているレコードに対して
    フィルタ（絞り込み）でOR条件選択が機能することを確認

    # 事前準備
    1. ALLテストテーブルにチェックボックス（複数選択可）フィールドが存在することを確認
    2. 複数のチェックボックス値が設定されたレコードが存在することを確認（fixed dataで準備済み）

    # 操作手順
    1. ALLテストテーブル一覧（/admin/dataset__{tableId}）に遷移
    2. フィルタ条件を追加するUIを開く（フィルタボタンまたは「絞り込み」ボタンをクリック）
    3. 「チェックボックス」フィールドを選択
    4. 条件タイプで「OR」または「次のいずれかを含む」を選択
    5. 複数の選択肢（例: 「チェックA」と「チェックB」）を選択
    6. フィルタを適用する
    7. 結果一覧を確認

    # 確認項目（expect）
    - フィルタ適用後、エラーが発生しないこと（Internal Server Errorが表示されないこと）
    - 選択した値のいずれかを持つレコードが表示されること（OR条件で絞り込まれること）
    - 複数の値を持つレコードも正しく表示されること
    - フィルタUI でOR条件選択ができること（選択肢が複数選べるUI が存在すること）

    # セレクタ情報
    - テーブル一覧: /admin/dataset__{tableId}
    - フィルタボタン: button:has-text("絞り込み") または .filter-btn
    - フィルタ条件追加: フィルタモーダル内の条件追加UI
  old_case_no: '297'
