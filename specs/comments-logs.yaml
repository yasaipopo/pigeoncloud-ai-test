- case_no: cl-010
  sheet: A
  feature: ログ管理
  category: '-'
  description: ①左ペインより「ログ」⇒「ログ」を選択する。
  expected: 各ユーザー毎の操作ログの確認ができること。
  movie: CL01
  detailed_flow: |-
    【CL01 テストフロー】この動画で確認するテスト番号:
      cl-010         (旧: 13-1)    ログ管理
      cl-020         (旧: 13-2)    ログ管理
      cl-070         (旧: 196)     ログ

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    # 操作手順
    1. ログイン済み状態でダッシュボードを開く（BASE_URL + '/admin/dashboard'）
    2. 左サイドバーの「ログ」カテゴリ配下の「ログ」リンク（href="/admin/logs"）をクリック
    3. URL が /admin/logs に遷移したことを確認
    4. ページロード完了を待つ（.navbar 表示待機）

    # 確認項目（expect）
    - URL が /admin/logs を含むこと
    - ページタイトルが「ログ一覧」を含むこと
    - テーブルが表示されていること（table 要素が存在する）
    - テーブルのヘッダーに「ユーザー」「アクション」「テーブル」「データのID」「IPアドレス」「日時」が含まれること
    - テーブルの行データが1件以上表示されていること（ログが存在する）
    - 各行の「ユーザー」列にユーザー名が表示されていること（例: 「マスターユーザー」）
    - 各行の「アクション」列にアクション名（例: 「ログイン」「作成」「更新」「削除」）が表示されていること

    # セレクタ情報
    - ログページリンク: a[href="/admin/logs"]
    - テーブル: table（ヘッダーセル th を持つ）
    - ヘッダーセル: th
  old_case_no: 13-1
