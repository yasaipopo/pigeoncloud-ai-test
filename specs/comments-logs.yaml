- case_no: 69-3
  sheet: A
  feature: コメントメンション
  category: 存在しないユーザーでメンション
  description: |-
    ①該当のテーブルのコメント欄を開く
    ②@ユーザー名で実在しないユーザー指定をして、コメントし保存。
  expected: 誰にもメンションされず、コメント保存されること。
  movie: CL02
  detailed_flow: |
    # 操作手順
    1. レコード詳細ページに遷移（/admin/dataset__{tableId}/view/{recordId}）
    2. aside-menuを表示：document.querySelector('.app').classList.remove('aside-menu-hidden')
    3. #comment をクリックしてフォーカス
    4. 「存在しないユーザーテスト @存在しないユーザーXYZ99999」をキーボード入力
       （オートコンプリートが表示されないことを確認してからそのまま入力を続ける）
    5. 「送信」ボタン（button.ladda-button.btn-primary）をクリック
    6. 3秒待機後、asideのコメント履歴を確認

    # 確認項目（expect）
    - aside 内に送信したコメントテキスト「存在しないユーザーテスト」が表示されていること
    - コメントが保存されること（エラーが発生しないこと）
    - 通知ログ（/admin/notification_log）に新規エントリが作成されないこと
      （存在しないユーザーへの通知は発生しない）
    - @存在しないユーザーXYZ99999 がリンクや特殊な表示にならず、プレーンテキストとして保存されること

    # セレクタ情報
    - コメント入力: #comment（contenteditable DIV）
    - 送信ボタン: button.btn.btn-sm.btn-primary.ladda-button
    - コメント履歴: aside
- case_no: 69-4
  sheet: A
  feature: コメントメンション
  category: 組織へのメンション
  description: |-
    ①該当のテーブルのコメント欄を開く
    ②@組織名を指定して、コメントし保存。
  expected: メンション指定された組織内のメンバーに対し、コメント通知が届いていること。
  movie: CL02
  detailed_flow: |
    # 事前準備
    1. ALLテストテーブルに組織「組織1」が存在することを確認（debug/statusまたはUIで確認）
    2. 「組織1」に少なくとも1名のユーザーが所属していることを確認
    3. テスト用ユーザーを作成して組織1に所属させる（必要に応じて）

    # 操作手順
    1. レコード詳細ページに遷移（/admin/dataset__{tableId}/view/{recordId}）
    2. aside-menuを表示：document.querySelector('.app').classList.remove('aside-menu-hidden')
    3. #comment をクリックしてフォーカス
    4. 「組織メンションテスト @組織1」をキーボード入力
       （オートコンプリートが表示された場合は「組織1」をEnterで選択）
    5. 「送信」ボタン（button.ladda-button.btn-primary）をクリック
    6. 3秒待機後、asideのコメント履歴を確認
    7. 通知ログ（/admin/notification_log）に遷移して確認

    # 確認項目（expect）
    - aside 内に送信したコメントテキスト「組織メンションテスト」が表示されていること
    - コメントが正常に保存されること
    - 通知ログ（/admin/notification_log）に組織1のメンバー宛の通知エントリが作成されること
      （「送信先」列に組織1のメンバーのメールアドレスが表示される）

    # セレクタ情報
    - コメント入力: #comment（contenteditable DIV）
    - 送信ボタン: button.btn.btn-sm.btn-primary.ladda-button
    - コメント履歴: aside
    - 通知ログページ: a[href="/admin/notification_log"]
- case_no: '196'
  sheet: B
  feature: ログ
  category: リクエストログ
  description: |-
    ①以下処理を行い、リクエストログを確認。
    ②テーブル削除、。
    ③複数データ削除。
    ④帳票出力など。
  expected: 処理ステータスが、正常終了していれば「成功」となること。
  movie: CL01
  detailed_flow: |
    # 事前準備
    1. ALLテストテーブルが存在し、レコードが3件以上あることを確認

    # 操作手順（リクエストログを発生させる処理を実行してからログ確認）
    1. CSVダウンロードを実行してリクエストを発生させる
       - ALLテストテーブル一覧（/admin/dataset__{tableId}）に遷移
       - 「帳票」ボタンまたはCSVダウンロードボタンをクリック
       - ダウンロード処理が開始されることを確認
    2. 複数レコードを選択して削除操作を実行
       - チェックボックスで複数行を選択
       - 「削除」ボタンをクリックして削除実行
    3. 左サイドバーの「ログ」→「リクエストログ」（a[href="/admin/job_logs"]）をクリック
    4. リクエストログページ（/admin/job_logs）のロード完了を待つ

    # 確認項目（expect）
    - URL が /admin/job_logs を含むこと
    - テーブルが表示されていること
    - テーブルのヘッダーに「ID」「リクエスト」「テーブル」「ステータス」「処理結果」「IPアドレス」が含まれること
    - 実行したCSV処理のログが「成功」ステータスで表示されていること
    - 「ステータス」列に「成功」が表示されているエントリが存在すること
    - 「失敗」のエントリは「処理結果」列にエラーメッセージが表示されていること

    # セレクタ情報
    - リクエストログリンク: a[href="/admin/job_logs"]
    - テーブル: table
    - ヘッダーセル: th
- case_no: '242'
  sheet: B
  feature: コメント
  category: ''
  description: ①「ログとコメントをまとめて表示する」が有効の時にメンションがでること
  expected: ・他テーブル参照の必須条件設定が機能すること
  movie: CL02
  detailed_flow: |
    # 事前準備
    1. ALLテストテーブルが存在することを確認

    # 操作手順
    1. テーブル設定ページ（/admin/dataset/edit/{tableId}）に遷移
    2. 「詳細・編集画面」タブをクリック
    3. 「ログとコメントをまとめて表示する」スイッチを ON にする
       - スイッチのセレクタ: label:has-text("ログとコメントをまとめて表示する") + div input[type="checkbox"]
       - またはDOMから直接操作: JavaScriptで対象inputを checked=true に設定してchangeイベント発火
    4. 「更新」ボタン（button.btn.btn-primary.btn-ladda）をクリックして保存
    5. レコード詳細ページに遷移（/admin/dataset__{tableId}/view/{recordId}）
    6. aside-menuを表示：document.querySelector('.app').classList.remove('aside-menu-hidden')
    7. #comment をクリックしてフォーカス
    8. 「@マスターユーザー」をキーボード入力
    9. 「送信」ボタンをクリック
    10. 2秒待機

    # 確認項目（expect）
    - aside 内のタイムラインに「ログ」と「コメント」が混在して時系列表示されること
      （更新履歴エントリとコメントが同一ビューに表示される）
    - コメントと共にメンション（@マスターユーザー）が正しく保存・表示されること
    - aside 内のコメントに「マスターユーザー」が表示されること

    # セレクタ情報
    - テーブル設定ページ: /admin/dataset/edit/{tableId}
    - 詳細・編集画面タブ: tab:has-text("詳細・編集画面")
    - ログとコメントをまとめて表示スイッチ: .form-group:has-text("ログとコメントをまとめて表示する") input[type="checkbox"]
    - 更新ボタン: button.btn.btn-primary（テキスト「更新」）
    - コメント入力: #comment
    - 送信ボタン: button.btn.btn-sm.btn-primary.ladda-button
- case_no: '297'
  sheet: B
  feature: 文字列
  description: |-
    ①値が複数あると絞り込みができないです。
    ②何か方法はありますでしょうか？


    以下、先方コメント
    ・担当者として複数人が選択されている場合、抽出機能が働きません。
    ③OR選択で選ぶことが出来ますか？


    ・上記と同じかもしれませんが、担当者として複数人が選択されている場合、担当者のデータ項目でグラフが作成できません。
    ④各担当者の業務量把握が主目的でもありますので、どのように設定すべきかご教。
  expected: エラーなく正常に動作すること。(値が複数あると絞り込みができないです。何か方法はありますでしょうか？   以下、先方コメント ・担当者として複数人が選択されている場合、抽出機能が働きません。OR選択で選ぶことが出来ますか？   ・上)
  movie: CL03
  detailed_flow: |
    # 依頼内容
    チェックボックス・複数選択フィールドで複数値が設定されているレコードに対して
    フィルタ（絞り込み）でOR条件選択が機能することを確認

    # 事前準備
    1. ALLテストテーブルにチェックボックス（複数選択可）フィールドが存在することを確認
    2. 複数のチェックボックス値が設定されたレコードが存在することを確認（fixed dataで準備済み）

    # 操作手順
    1. ALLテストテーブル一覧（/admin/dataset__{tableId}）に遷移
    2. フィルタ条件を追加するUIを開く（フィルタボタンまたは「絞り込み」ボタンをクリック）
    3. 「チェックボックス」フィールドを選択
    4. 条件タイプで「OR」または「次のいずれかを含む」を選択
    5. 複数の選択肢（例: 「チェックA」と「チェックB」）を選択
    6. フィルタを適用する
    7. 結果一覧を確認

    # 確認項目（expect）
    - フィルタ適用後、エラーが発生しないこと（Internal Server Errorが表示されないこと）
    - 選択した値のいずれかを持つレコードが表示されること（OR条件で絞り込まれること）
    - 複数の値を持つレコードも正しく表示されること
    - フィルタUI でOR条件選択ができること（選択肢が複数選べるUI が存在すること）

    # セレクタ情報
    - テーブル一覧: /admin/dataset__{tableId}
    - フィルタボタン: button:has-text("絞り込み") または .filter-btn
    - フィルタ条件追加: フィルタモーダル内の条件追加UI
- case_no: '356'
  sheet: B
  feature: 文字列
  description: |-
    ①【機能改善確認】レコードのコメントが入力されると通知が行くよう設定した場合（添付画像3枚目）、。
    ②右上のベルマーク（通知マーク）から通知をクリックすると（添付画像2枚目）、。
    ③添付画像1枚目のような画像になるのが現状の仕様かと思うのですが、。
    ④これを、通知をクリックしたらコメントが来たレコードに遷移させるように修正希望です。
  expected: 機能改善が正しく反映されていること。(レコードのコメントが入力されると通知が行くよう設定した場合（添付画像3枚目）、 右上のベルマーク（通知マーク）から通知をクリックすると（添付画像2枚目）、 添付画像1枚目のような画像になるのが現状の�し)
  movie: CL03
  detailed_flow: |
    # 機能改善内容
    コメント通知のベルアイコンをクリックした際に、該当レコードの詳細ページに直接遷移する機能

    # 事前準備
    1. ALLテストテーブルが存在することを確認
    2. 別ユーザー（テスト用ユーザー2）を作成（POST /api/admin/debug/create-user）
    3. テスト用ユーザー2でレコードにコメントを投稿する

    # 操作手順
    1. マスターユーザーでログイン
    2. レコード詳細ページ（/admin/dataset__{tableId}/view/{recordId}）に遷移
    3. aside-menuを表示してコメントを入力・送信
       - #comment に「通知テストコメント @マスターユーザー」を入力
       - 送信ボタン（button.ladda-button.btn-primary）をクリック
    4. 2秒待機
    5. ヘッダーの通知ベルアイコン（#bell-notify-icon-link）をクリック
    6. 通知ドロップダウンが表示されることを確認
    7. ドロップダウン内のコメント通知項目をクリック

    # 確認項目（expect）
    - 通知ベルアイコンにバッジ（未読通知数）が表示されること
    - 通知ドロップダウンが表示されること
    - 通知をクリックすると、コメントが投稿されたレコードの詳細ページ（/view/{id}）に遷移すること
      （以前の仕様では一覧ページや別のページに遷移していたが、改善後は詳細ページに直接遷移する）
    - 遷移先URLに /view/{recordId} が含まれること

    # セレクタ情報
    - 通知ベル: #bell-notify-icon-link
    - 通知ドロップダウン: #bell-notify-icon-link + .dropdown-menu
    - 通知項目: .dropdown-menu .dropdown-item または .notification-item
- case_no: '426'
  sheet: B
