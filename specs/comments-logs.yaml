# ──────────────────────────────────────────────
# movie: CL02 (cl-030〜cl-060, cl-080 を1動画で確認)
# ──────────────────────────────────────────────
- case_no: cl-030
  sheet: A
  feature: コメントメンション
  category: 1ユーザーへのメンション
  description: |-
    ①該当のテーブルのコメント欄を開く
    ②@ユーザー名で1ユーザー指定をして、コメントし保存。
  expected: メンション指定されたユーザーに対し、コメント通知が届いていること。
  movie: CL02
  detailed_flow: |
    【CL02 テストフロー】この動画で確認するテスト番号:
      cl-030         (旧: 69-1)    1ユーザーへのメンション
      cl-040         (旧: 69-2)    複数ユーザーへのメンション
      cl-050         (旧: 69-3)    存在しないユーザーでメンション
      cl-060         (旧: 69-4)    組織へのメンション
      cl-080         (旧: 242)     ログとコメントまとめ表示時のメンション

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] cl-030 ── 1ユーザーへのメンション
    1. レコード詳細ページに遷移し、コメントパネルを開く
    2. 「テストコメント @マスターユーザー」と入力して送信
    3. ✅ aside内にコメントが表示され「マスターユーザー」名が含まれること
    4. ✅ コメント本文に「テストコメント」が含まれること

    cl-040 ── 複数ユーザーへのメンション
    5. レコード詳細ページでコメントパネルを開く
    6. 「複数メンションテスト @マスターユーザー @マスターユーザー」と入力して送信
    7. ✅ コメント本文に「複数メンションテスト」が表示されること

    cl-050 ── 存在しないユーザーでメンション
    8. レコード詳細ページでコメントパネルを開く
    9. 「存在しないユーザーテスト @存在しないユーザーXYZ99999」と入力して送信
    10. ✅ コメント本文に「存在しないユーザーテスト」が表示されること（エラーなく保存）

    cl-060 ── 組織へのメンション
    11. レコード詳細ページでコメントパネルを開く
    12. 「組織メンションテスト @組織1」と入力して送信
    13. ✅ コメント本文に「組織メンションテスト」が表示されること

    cl-080 ── ログとコメントまとめ表示時のメンション
    14. テーブル設定で「ログとコメントをまとめて表示する」をONにして保存
    15. レコード詳細ページでコメントパネルを開く
    16. 「@マスターユーザー」と入力して送信
    17. ✅ コメントが正常に表示されること
  old_case_no: 69-1
- case_no: cl-040
  sheet: A
  feature: コメントメンション
  category: 複数ユーザーへのメンション
  description: |-
    ①該当のテーブルのコメント欄を開く
    ②@ユーザー名で複数のユーザー指定をして、コメントし保存。
  expected: メンション指定されたユーザーに対し、コメント通知が届いていること。
  movie: CL02
  detailed_flow: 'CL02テストフロー参照（cl-030のdetailed_flowと同一）'
  old_case_no: 69-2
- case_no: cl-050
  sheet: A
  feature: コメントメンション
  category: 存在しないユーザーでメンション
  description: |-
    ①該当のテーブルのコメント欄を開く
    ②@ユーザー名で実在しないユーザー指定をして、コメントし保存。
  expected: 誰にもメンションされず、コメント保存されること。
  movie: CL02
  detailed_flow: 'CL02テストフロー参照（cl-030のdetailed_flowと同一）'
  old_case_no: 69-3
- case_no: cl-060
  sheet: A
  feature: コメントメンション
  category: 組織へのメンション
  description: |-
    ①該当のテーブルのコメント欄を開く
    ②@組織名を指定して、コメントし保存。
  expected: メンション指定された組織内のメンバーに対し、コメント通知が届いていること。
  movie: CL02
  detailed_flow: 'CL02テストフロー参照（cl-030のdetailed_flowと同一）'
  old_case_no: 69-4
- case_no: cl-080
  sheet: B
  feature: コメント
  category: ''
  description: ①「ログとコメントをまとめて表示する」が有効の時にメンションがでること
  expected: ・他テーブル参照の必須条件設定が機能すること
  movie: CL02
  detailed_flow: 'CL02テストフロー参照（cl-030のdetailed_flowと同一）'
  old_case_no: '242'

# ──────────────────────────────────────────────
# movie: CL03 (cl-090〜cl-160 を1動画で確認)
# ──────────────────────────────────────────────
- case_no: cl-090
  sheet: B
  feature: 文字列
  description: |-
    ①値が複数あると絞り込みができないです。
    ②何か方法はありますでしょうか？
    ③OR選択で選ぶことが出来ますか？
    ④各担当者の業務量把握が主目的でもありますので、どのように設定すべきかご教。
  expected: エラーなく正常に動作すること。
  movie: CL03
  detailed_flow: |
    【CL03 テストフロー】この動画で確認するテスト番号:
      cl-090         (旧: 297)     OR絞り込み
      cl-100         (旧: 356)     通知→レコード遷移
      cl-110         (旧: 426)     年度絞り込み表示
      cl-120         (旧: 472)     コメント改行
      cl-130         (旧: 597)     無効ユーザーのコメント名
      cl-160         (旧: 570)     組織メンション重複通知
      cl-140         (旧: 629)     改行メール通知
      cl-150         (旧: 653)     組織メンションキャンセル

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] cl-090 ── 複数値フィールドでOR絞り込みが動作すること
    1. ALLテストテーブル一覧に遷移
    2. フィルタボタンをクリック
    3. ✅ エラーが発生せずフィルタUIが表示されること

    cl-100 ── 通知クリックでレコード詳細に遷移すること
    4. /admin/notifications に遷移
    5. ✅ ページがエラーなく表示されること
    6. 通知があればクリックして遷移先を確認

    cl-110 ── 年度絞り込みの表示が正しいこと
    7. ALLテストテーブル一覧でフィルタを開く
    8. ✅ エラーなくページが表示されること

    cl-120 ── コメント改行が正しく反映されること
    9. レコード詳細ページのコメント欄に改行付きテキストを入力
    10. ✅ 入力欄のHTMLに改行（<br>または<div>）が含まれること
    11. 送信ボタンをクリック

    cl-130 ── ユーザー無効化後もコメント履歴にユーザー名が表示されること
    12. レコード詳細ページのコメントブロックを確認
    13. ✅ コメントブロックにテキストが表示されていること

    cl-160 ── 組織メンション時に複数役職ユーザーへの通知が重複しないこと
    14. レコード詳細ページのコメント欄で「@」入力
    15. コメントを送信
    16. ✅ コメントが正常に保存されていること

    cl-140 ── コメント改行がメール通知で{line_break}にならないこと
    17. レコード詳細ページのコメント入力欄を確認
    18. ✅ エラーなくページが表示されること

    cl-150 ── 組織メンションキャンセル後にメッセージが出続けないこと
    19. コメント欄で「@」入力後にEscapeでキャンセル
    20. ✅ エラーなくページが表示されること
  old_case_no: '297'
- case_no: cl-100
  sheet: B
  feature: 文字列
  description: |-
    ①【機能改善確認】レコードのコメントが入力されると通知が行くよう設定した場合、
    ②通知をクリックしたらコメントが来たレコードに遷移させるように修正希望です。
  expected: 機能改善が正しく反映されていること。
  movie: CL03
  detailed_flow: 'CL03テストフロー参照（cl-090のdetailed_flowと同一）'
  old_case_no: '356'
- case_no: cl-110
  sheet: B
  feature: 文字列
  description: |-
    ①【バグ修正確認】年度開始日を設定することで、年度の絞り込みが可能になりましたが、
    ②「今年度」で検索すると「今年」と表示される。修正希望です。
  expected: バグが修正され、正常に動作すること。
  movie: CL03
  detailed_flow: 'CL03テストフロー参照（cl-090のdetailed_flowと同一）'
  old_case_no: '426'
- case_no: cl-120
  sheet: B
  feature: 文字列
  description: ①【機能改善確認】レコードのコメント機能でコメントを入力する際、改行が反映されないのですが、こちら改行も反映できるようにしていただけますでしょうか。
  expected: 機能改善が正しく反映されていること。
  movie: CL03
  detailed_flow: 'CL03テストフロー参照（cl-090のdetailed_flowと同一）'
  old_case_no: '472'
- case_no: cl-130
  sheet: B
  feature: 追加実装
  description: |-
    ①【バグ修正確認】ユーザーを無効にしたとき、及び削除した時、コメント履歴から名前が消えないようにしていただけますでしょうか。
  expected: バグが修正され、正常に動作すること。
  movie: CL03
  detailed_flow: 'CL03テストフロー参照（cl-090のdetailed_flowと同一）'
  old_case_no: '597'
- case_no: cl-140
  sheet: B
  feature: 追加実装
  description: |-
    ①【バグ修正確認】コメント追加時にメール通知がされるよう通知設定をしているとき、
    コメントの中に改行を使用すると、改行部分が{line_break}となってしまう。修正希望。
  expected: バグが修正され、正常に動作すること。
  movie: CL03
  detailed_flow: 'CL03テストフロー参照（cl-090のdetailed_flowと同一）'
  old_case_no: '629'
- case_no: cl-150
  sheet: B
  feature: 追加実装
  description: |-
    ①【機能改善確認】組織メンションのキャンセル後にメッセージが出続けないようにしてほしい。
  expected: 機能改善が正しく反映されていること。
  movie: CL03
  detailed_flow: 'CL03テストフロー参照（cl-090のdetailed_flowと同一）'
  old_case_no: '653'

