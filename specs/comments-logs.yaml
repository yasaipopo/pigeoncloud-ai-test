actual_steps:
- case_no: 13-1
  status: passed
  steps: |
    1. ログイン
    2. /admin/logs に遷移
  assertions: |
    - URLが /admin/logs を含む
    - table[mat-table] が表示されている
    - ページテキストに 'ユーザー', 'アクション', '日時' を含む
  gaps: |
    - 仕様「各ユーザー毎の操作ログの確認」→ テーブルの存在確認のみ。実際のログデータ内容は未確認
- case_no: 13-2
  status: passed
  steps: |
    1. ログイン
    2. /admin/csv に遷移
  assertions: |
    - URLが /admin/csv を含む
    - ページテキストに 'CSV UP/DL履歴' を含む
    - table[mat-table] が表示されている
  gaps: |
    - 実際の履歴データが表示されているかどうかは未確認（テーブルの存在確認のみ）
- case_no: '196'
  status: passed
  steps: |
    1. ログイン
    2. /admin/job_logs に遷移
  assertions: |
    - URLが /admin/job_logs を含む
    - table[mat-table] が表示されている
    - ページテキストに 'リクエストログ', 'ステータス' を含む
  gaps: |
    ⚠️ 大きな欠落: YAMLでは「テーブル削除・複数データ削除・帳票出力などを実際に行ってからログ確認」が仕様。
    spec.jsでは操作を一切行わずページ表示確認のみ。ログに「成功」ステータスが表示されることを確認していない。
- case_no: 69-1
  status: passed
  steps: |
    1. ログイン
    2. debug APIでALLテストテーブル作成・データ3件投入（beforeAll）
    3. debug APIでテストユーザー作成（失敗しても継続）
    4. レコード詳細ページ（/view/ID）へ遷移
    5. CSS操作でコメントパネルを強制表示（aside-menu-hidden クラスを削除）
    6. #comment をクリック
    7. 'テストコメント @マスターユーザー' とキーボード入力
    8. Escape キーを押す（オートコンプリートを閉じる）
    9. button.btn-sm.btn-primary.pull-right をクリック（送信）
    10. 5秒待機
  assertions: |
    - aside 内のテキストに 'マスターユーザー' を含む（送信者名の確認のみ）
  gaps: |
    ⚠️ メンション通知がメンション先ユーザーに届いたことを確認していない
    ⚠️ オートコンプリートでユーザーを「選択」せず、Escapeで閉じているため実際のメンションリンクが生成されていない可能性がある
    （テキストとして @マスターユーザー が保存されるだけで、メンション機能が動いていない可能性）
- case_no: 69-2
  status: passed
  steps: |
    1. ログイン → レコード詳細へ遷移 → コメントパネルを強制表示
    2. '複数メンションテスト @マスターユーザー @マスターユーザー' とキーボード入力（同じユーザーを2回）
    3. 送信・5秒待機
  assertions: |
    - aside に 'マスターユーザー' を含む
  gaps: |
    ⚠️ 「複数のユーザー」を指定するはずが、同じユーザーを2回入力している（別ユーザーへの複数メンションになっていない）
    ⚠️ オートコンプリート選択なし → 実際のメンション機能が動いていない可能性
    ⚠️ 各メンション先に通知が届いたことを確認していない
- case_no: 69-3
  status: passed
  steps: |
    1. ログイン → レコード詳細へ遷移 → コメントパネルを強制表示
    2. '存在しないユーザーテスト @存在しないユーザーXYZ99999' とキーボード入力
    3. 送信・5秒待機
  assertions: |
    - aside に '存在しないユーザーテスト'（コメントテキスト）を含む
  gaps: |
    ⚠️ 「誰にもメンションされない」ことの確認なし（通知が飛ばないことを検証していない）
    コメントが保存されたことのみ確認。YAMLの expected「誰にもメンションされず」の部分が未テスト
- case_no: 69-4
  status: passed
  steps: |
    1. ログイン → レコード詳細へ遷移 → コメントパネルを強制表示
    2. '組織メンションテスト @組織1' とキーボード入力
    3. 送信・5秒待機
  assertions: |
    - aside に '組織メンションテスト' を含む（コメントテキストの確認のみ）
  gaps: |
    ⚠️ 組織内メンバーへの通知確認なし
    ⚠️ オートコンプリートで組織を選択していないため、実際の組織メンション機能が動いていない可能性
- case_no: '242'
  status: passed
  steps: |
    1. ログイン
    2. テーブル設定ページ（/admin/dataset/edit/ID）へ遷移
    3. 「詳細・編集画面」タブをクリック（try/catchで失敗しても継続）
    4. 「ログとコメントをまとめて表示する」スイッチをDOM操作でONにする
    5. 保存ボタンをクリック
    6. レコード詳細ページへ遷移 → コメントパネルを強制表示
    7. '@マスターユーザー' とキーボード入力
    8. 送信・5秒待機
  assertions: |
    - commentDiv（#comment）のテキストに '@' を含む（入力確認）
    - aside に 'マスターユーザー' を含む
  gaps: |
    ⚠️ 「ログとコメントがまとめて表示される」こと自体の確認なし（ログエントリとコメントが同一ビューに混在することを検証していない）
    ⚠️ メンション機能の動作確認が「入力欄に@が入っているか」だけ（送信後のメンション処理結果は未確認）
