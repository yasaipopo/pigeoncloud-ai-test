- case_no: cl-030
  sheet: A
  feature: コメントメンション
  category: 1ユーザーへのメンション
  description: |-
    ①該当のテーブルのコメント欄を開く
    ②@ユーザー名で1ユーザー指定をして、コメントし保存。
  expected: メンション指定されたユーザーに対し、コメント通知が届いていること。
  movie: CL02
  detailed_flow: |-
    【CL02 テストフロー】この動画で確認するテスト番号:
      cl-030         (旧: 69-1)    コメントメンション
      cl-040         (旧: 69-2)    コメントメンション
      cl-050         (旧: 69-3)    コメントメンション
      cl-060         (旧: 69-4)    コメントメンション
      cl-080         (旧: 242)     コメント

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    # 事前準備
    1. ALLテストテーブルが存在することを確認（getAllTypeTableId で取得）
    2. テスト用ユーザー2を作成（POST /api/admin/debug/create-user → id, email を取得）
    3. レコードが3件存在することを確認（create-all-type-data count:3 pattern:fixed）

    # 操作手順
    1. ログイン済み状態でALLテストテーブル一覧ページに遷移（/admin/dataset__{tableId}）
    2. 一覧の最初のレコードの詳細リンク（a[href*="/view/"]）をクリック
    3. 詳細ページ（/admin/dataset__{tableId}/view/{recordId}）のロード完了を待つ
    4. aside-menuを表示：document.querySelector('.app').classList.remove('aside-menu-hidden')
    5. #comment（contenteditable DIV）が表示されるまで待機
    6. #comment をクリックしてフォーカス
    7. 「テストメンション @マスターユーザー」をキーボード入力（page.keyboard.type）
    8. オートコンプリートが表示された場合は1件目をクリックまたはEnterで選択
    9. 「送信」ボタン（button.ladda-button.btn-primary）をクリック
    10. 2秒待機後、asideのコメント履歴を確認

    # 確認項目（expect）
    - aside 内に送信したコメントテキストが表示されていること
    - aside 内に「マスターユーザー」の名前が表示されていること（送信者名）
    - コメント送信後にエラーが表示されないこと
    - 通知確認: ヘッダーのベルアイコンに通知バッジが表示されること（または通知ログ /admin/notification_log に新規エントリが追加されること）

    # セレクタ情報
    - aside表示: document.querySelector('.app').classList.remove('aside-menu-hidden')
    - コメント入力: #comment（contenteditable DIV）
    - 送信ボタン: button.btn.btn-sm.btn-primary.ladda-button
    - コメント履歴エリア: aside
    - 通知ベル: #bell-notify-icon-link
  old_case_no: 69-1
