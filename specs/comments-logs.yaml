- case_no: cl-010
  sheet: A
  feature: ログ管理
  category: '-'
  description: ①左ペインより「ログ」⇒「ログ」を選択する。
  expected: 各ユーザー毎の操作ログの確認ができること。
  movie: CL01
  detailed_flow: |
    【CL01 テストフロー】この動画で確認するテスト番号:
      cl-010         (旧: 13-1)    ログ一覧
      cl-020         (旧: 13-2)    CSV UP/DL履歴
      cl-070         (旧: 196)     リクエストログ

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] cl-010 ── ログ一覧が表示されること
    1. ログイン後、/admin/logs に遷移
    2. ✅ URLが /admin/logs を含むこと
    3. ✅ ページにテーブルが表示され「ユーザー」「アクション」「テーブル」「日時」のヘッダーが存在すること

    cl-020 ── CSV UP/DL履歴が表示されること
    4. /admin/csv に遷移
    5. ✅ URLが /admin/csv を含むこと
    6. ✅ ページに「CSV UP/DL履歴」「ファイル名」「タイプ」「処理」のテキストが存在すること

    cl-070 ── リクエストログが表示されること
    7. /admin/job_logs に遷移
    8. ✅ URLが /admin/job_logs を含むこと
    9. ✅ ページに「リクエストログ」「リクエスト」「ステータス」「処理結果」のテキストが存在すること
  old_case_no: 13-1
