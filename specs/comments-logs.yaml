- case_no: cl-160
  sheet: B
  feature: コメントメンション
  description: |-
    ①組織に所属するユーザーAに複数の役職を設定する（例: 部長、マネージャー）
    ②別ユーザーでコメント欄に「@組織名」でメンションを送信する
    ③ユーザーAに届く通知が1件であることを確認する（複数役職があっても重複しないこと）
  expected: 組織メンション時に複数役職を兼任するユーザーへの通知が重複しないこと（1件のみ届くこと）
  movie: UC09
  detailed_flow: |-
    【UC09 テストフロー】この動画で確認するテスト番号:
      cl-160         (旧: 570)     コメントメンション

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    # バグ内容
    組織に所属するユーザーが複数の役職（組織内の役割）を持つ場合、
    @組織メンションで通知が役職の数だけ重複して届いてしまう

    # 事前準備
    1. テスト用ユーザーを作成（POST /api/admin/debug/create-user）
    2. 作成したユーザーが所属する組織「組織1」を確認
    3. そのユーザーに複数の役職が設定されていることを確認（ユーザー設定で2つ以上の役割）
       - ユーザー管理ページ（/admin/users/{userId}/edit）で役職を追加
    4. 通知ログページ（/admin/notification_log）の既存エントリ数を記録

    # 操作手順
    1. マスターユーザーでレコード詳細ページ（/admin/dataset__{tableId}/view/{recordId}）に遷移
    2. aside-menuを表示：document.querySelector('.app').classList.remove('aside-menu-hidden')
    3. #comment をクリックしてフォーカス
    4. 「@組織1」をキーボード入力してオートコンプリートから「組織1」を選択（または直接入力）
    5. 確認メッセージが表示された場合は「OK」をクリック
    6. 「送信」ボタン（button.ladda-button.btn-primary）をクリック
    7. 3秒待機
    8. 通知ログページ（/admin/notification_log）に遷移して確認

    # 確認項目（expect）
    - コメントが正常に送信されること
    - 通知ログページで、複数役職を持つテスト用ユーザー宛の通知が1件のみ作成されること
      （役職の数だけ重複して通知されないこと）
    - 通知ログの「送信先」列でテスト用ユーザーのメールアドレスが1件のみ表示されること

    # セレクタ情報
    - コメント入力: #comment（contenteditable DIV）
    - 送信ボタン: button.btn.btn-sm.btn-primary.ladda-button
    - 通知ログ: /admin/notification_log
    - 通知ログのテーブル: table（ヘッダー: ID, テーブル, channel, 送信先, 件名, ステータス, エラー内容, 作成日時）
  old_case_no: '570'
actual_steps:
