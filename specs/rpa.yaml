- case_no: rpa-010
  feature: RPA
  description: ①コネクト管理画面が正常に表示されること
  expected: |
    エラーなくページが正常に表示されること
  movie: RA01
  detailed_flow: |
    【RA01 テストフロー】この動画で確認するテスト番号:
      [0:01] rpa-010        (旧: RPA-01)  コネクト管理画面表示
      [0:04] rpa-020        (旧: RPA-02)  コネクト新規作成
      [0:05] rpa-030        (旧: RPA-03)  フロー編集画面表示
      [0:06] rpa-040        (旧: RPA-04)  テーブルヘッダー確認
      [0:07] rpa-050        (旧: RPA-05)  今月使用量表示
      [0:08] rpa-060        (旧: RPA-06)  実行ログ遷移

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:01] rpa-010 ── コネクト管理画面が正常に表示されること
    1. /admin/rpa に遷移
    2. ✅ URLが /admin/rpa を含むこと
    3. ✅ 新規追加ボタン（fa-plus）と「今月使用量」が表示されること

    [0:04] rpa-020 ── 新しいコネクトを作成できること
    4. 新規追加ボタンをクリック → 編集画面に遷移
    5. フロー名を入力し、テーブルを選択して「作成」をクリック
    6. ✅ /admin/rpa/edit/{id} に遷移しエラーがないこと

    [0:05] rpa-030 ── フロー編集画面が表示されること
    7. 新規追加ボタンをクリック → 編集画面に遷移
    8. ✅ フロー名入力・テーブル選択フィールドが存在すること
    9. ✅ フロー編集エリアまたはガイドテキストが表示されること

    [0:06] rpa-040 ── コネクト一覧のテーブルヘッダーが正しいこと
    10. /admin/rpa に遷移
    11. ✅ テーブルヘッダーにID・テーブル・コネクト名・ステータスが存在すること

    [0:07] rpa-050 ── 今月使用量が表示されること
    12. /admin/rpa に遷移
    13. ✅ 「今月使用量」カードが表示され「STEP」テキストが含まれること

    [0:08] rpa-060 ── コネクト実行ログページへ遷移できること
    14. /admin/rpa_executes に遷移
    15. ✅ URLが /admin/rpa_executes を含みエラーがないこと
  old_case_no: RPA-01
