# ──────────────────────────────────────────────
# movie: UC10 (rpa-070, rpa-080 を1動画で確認)
# ──────────────────────────────────────────────
- case_no: rpa-070
  sheet: B
  feature: コネクト
  description: |-
    ①コネクトでトリガー「WF完了」を設定し、コピー先テーブルに重複禁止フィールドを設定する
    ②WFの承認を完了させる
    ③重複データの場合、適切なエラーメッセージが表示されることを確認する
  expected: コネクトのWF完了トリガーでコピー先の重複禁止エラー時に適切なエラーメッセージが表示され、画面が固まらないこと
  movie: UC10
  detailed_flow: |
    【UC10 テストフロー】この動画で確認するテスト番号:
      [0:00] rpa-070        (旧: 603)     WF完了トリガー重複エラー
      [0:00] rpa-080        (旧: 609)     FTP連携エラー通知

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] rpa-070 ── WF完了トリガーで重複禁止エラー時のメッセージ確認
    1. /admin/rpa に遷移
    2. ✅ ページがエラーなく表示されること
    3. コネクト設定・トリガー設定を確認

    [0:00] rpa-080 ── FTP処理失敗時のエラー通知確認
    4. /admin/rpa に遷移
    5. ✅ ページがエラーなく表示されること
  old_case_no: '603'
- case_no: rpa-080
  sheet: B
  feature: FTP連携
  description: |-
    ①FTP連携を設定し、実行する
    ②FTP処理で「失敗」または「一部成功」が発生した場合のエラー通知を確認する
  expected: FTP処理の失敗・一部成功時にどのテーブルのエラーかが通知に含まれること
  movie: UC10
  detailed_flow: 'UC10テストフロー参照（rpa-070のdetailed_flowと同一）'
  old_case_no: '609'

