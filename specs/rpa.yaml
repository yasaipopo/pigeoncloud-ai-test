- case_no: rpa-070
  sheet: B
  feature: コネクト
  description: |-
    ①コネクトでトリガー「WF完了」を設定し、コピー先テーブルに重複禁止フィールドを設定する
    ②WFの承認を完了させる
    ③重複データの場合、適切なエラーメッセージが表示されることを確認する（[object object]が表示されないこと）
    ④画面がローディングのまま固まらないことを確認する
  expected: コネクトのWF完了トリガーでコピー先の重複禁止エラー時に適切なエラーメッセージが表示され、画面が固まらないこと
  movie: UC10
  detailed_flow: |-
    【UC10 テストフロー】この動画で確認するテスト番号:
      rpa-070        (旧: 603)     コネクト
      rpa-080        (旧: 609)     FTP連携

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    1. コピー元テーブルと「重複禁止」フィールドを持つコピー先テーブルを事前に作成する
    2. コピー元テーブルにワークフロー（WF）を設定する
    3. /admin/rpa へ遷移し、新規コネクトを作成
    4. トリガーを「WF完了」に設定し、コピー元テーブルとWFを選択
    5. アクションを「レコードコピー」に設定し、コピー先テーブルを選択
    6. フィールドマッピングを設定して保存
    7. コピー元テーブルにレコードを追加し、WFの承認フローを完了させる（初回）
    8. 同じデータで再度レコードを追加し、WFの承認フローを完了させる（重複ケース）
    9. /admin/rpa_executes でコネクト実行ログを確認
    10. エラーメッセージに「[object object]」が含まれていないことを確認
    11. エラーが表示された場合も画面がローディングのまま固まっていないことを確認
    【expect】
    - コネクト実行ログにエラーが記録されている
    - エラーメッセージに「[object object]」が含まれない（適切な日本語メッセージが表示される）
    - コネクト実行ログページが正常にロードされる（ローディングスピナーが消えている）
    - 重複禁止エラーを示す適切なメッセージ（例: 「重複しています」「すでに登録されています」等）が表示される
  old_case_no: '603'
