  movie: UC10
  detailed_flow: UC10テストフロー参照（rpa-070 のdetailed_flowと同一）
  old_case_no: '609'
- case_no: rpa-090
  sheet: B
  feature: RPA実行履歴
  description: |-
    ①RPA実行画面を開く
    ②RPAを設定・実行する
    ③RPA実行履歴画面（/admin/rpa_executes）で実行結果が正しく表示されることを確認する
  expected: RPA実行後、実行履歴画面に実行結果が正しく記録・表示されること
  movie: UC13
  detailed_flow: |-
    【UC13 テストフロー】この動画で確認するテスト番号:
      rpa-090        (旧: 672)     RPA実行履歴

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    1. beforeAll でコネクト（RPA）を1件作成しておく（テーブル追加画面でシンプルなコネクトを作成）
    2. /admin/rpa へ遷移し、作成済みのコネクトを手動実行する（「実行」ボタンをクリック）
       ※ 手動実行ボタンが存在する場合。もしくはトリガーイベントを発火させてコネクトを動かす
    3. /admin/rpa_executes へ遷移（コネクト実行ログ一覧）
    4. 実行ログが1件以上表示されることを確認
    5. 実行ログのレコードに以下が表示されることを確認:
       - ID（数値）
       - コネクト名
       - ステータス（「完了」「失敗」「処理中」等）
       - 実行ステップ数（数値）
       - 開始日時（日時形式）
       - 終了日時（日時形式）
    6. 詳細ボタンをクリックして詳細画面を開き、実行ステップの詳細が確認できることを確認
    【expect】
    - /admin/rpa_executes のテーブルに実行ログが1件以上存在する
    - 各カラム（ID/コネクト/ステータス/実行ステップ数/開始日時/終了日時）に値が入っている
    - ステータスが「完了」または「失敗」等の適切な値になっている
    - 開始日時・終了日時が正しい日時フォーマット（YYYY-MM-DD HH:mm:ss）で表示されている
  old_case_no: '672'
- case_no: rpa-100
  sheet: B
  feature: RPAビュー・編集
  description: |-
    ①RPAビュー画面（/admin/rpa/view/）を開く
    ②RPA設定が正しく表示されることを確認する
    ③RPA編集画面（/admin/rpa/edit/）を開く
    ④設定を変更して保存する
    ⑤変更内容が正しく反映されていることを確認する
  expected: RPAのビュー表示と編集・保存が正常に動作すること
  movie: UC20
  detailed_flow: |-
    【UC20 テストフロー】この動画で確認するテスト番号:
      rpa-100        (旧: 789)     RPAビュー・編集

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    1. beforeAll でコネクトを1件作成しておき、そのIDを取得する（例: rpaId）
    2. /admin/rpa/view/{rpaId} へ遷移（ビュー画面）
    3. ビュー画面でコネクトの設定情報（コネクト名、テーブル名、トリガー、ステータス等）が表示されることを確認
    4. 500エラーが表示されないことを確認
    5. 「編集」ボタンをクリック、または /admin/rpa/edit/{rpaId} へ遷移（編集画面）
    6. 編集フォームが表示されることを確認
    7. コネクト名を変更する（例: 元の名前 + "（更新済）"）
    8. 「保存」ボタンをクリック
    9. 保存後、ビュー画面またはコネクト一覧にリダイレクトされることを確認
    10. 変更後のコネクト名が画面に表示されていることを確認
    【expect】
    - /admin/rpa/view/{rpaId} が正常に表示される（500エラーなし）
    - ビュー画面にコネクト名・テーブル名等の設定情報が表示される
    - /admin/rpa/edit/{rpaId} が正常に表示される（500エラーなし）
    - 編集保存後、変更したコネクト名が反映されている
    - 保存完了メッセージまたは一覧へのリダイレクトが発生する
  old_case_no: '789'
