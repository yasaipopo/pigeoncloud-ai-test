# ──────────────────────────────────────────────
# movie: UC21 (dash-070 を1動画で確認)
# ──────────────────────────────────────────────
- case_no: dash-070
  sheet: B
  feature: ダッシュボード集計
  description: |-
    ①ダッシュボードに集計ウィジェットを配置する
    ②ダッシュボード上で集計結果の並び替えボタンを確認する
    ③並び替えボタンをクリックする
    ④集計結果が正しく並び替えられることを確認する
  expected: ダッシュボードに配置した集計結果の並び替えが正常に動作すること
  movie: UC21
  detailed_flow: |
    【UC21 テストフロー】この動画で確認するテスト番号:
      dash-070       (旧: 806)     ダッシュボード集計ウィジェット並び替え

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] dash-070 ── ダッシュボード集計ウィジェット並び替え
    1. ダッシュボード画面を開く
    2. 「ウィジェットを追加」ボタンをクリック
    3. ビュー追加ダイアログでALLテストテーブルを選択し、表示タイプ「集計」を選択
    4. 送信してウィジェットを追加
    5. ✅ ダッシュボード上に集計ウィジェットが表示されること
    6. ✅ 集計結果テーブルのヘッダーに並び替えボタンがあること
    7. 並び替えボタンをクリック
    8. ✅ エラーなく並び替えが動作すること（ページが正常であること）
  old_case_no: '806'
