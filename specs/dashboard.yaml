# ──────────────────────────────────────────────
- case_no: dash-010
  feature: ダッシュボード
  description: ①ダッシュボード画面が正常に表示されること
  expected: |
    エラーなくページが正常に表示されること
  movie: DB01
  detailed_flow: |
    【DB01 テストフロー】この動画で確認するテスト番号:
      dash-010       (旧: DB-01)   ダッシュボード画面表示
      dash-020       (旧: DB-02)   タブ作成
      dash-030       (旧: DB-03)   ビューコンテンツ追加
      dash-040       (旧: DB-04)   掲示板コンテンツ追加
      dash-050       (旧: DB-05)   タブ削除
      dash-060       (旧: DB-06)   デフォルトダッシュボード

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] dash-010 ── ダッシュボード画面が正常に表示されること
    1. ログイン後、ダッシュボード画面に遷移する
    2. ✅ ページ上部のナビゲーションメニューが表示されていること
    3. ✅ 「HOME」タブが表示されていること
    4. ✅ ダッシュボード画面に遷移していること

    [0:13] dash-020 ── 新しいダッシュボードタブを作成できること
    5. タブ一覧右側の「+」ボタンをクリック
    6. ダッシュボード作成ダイアログで名前を入力して送信
    7. ✅ 新しいタブがタブ一覧に表示されること

    [0:18] dash-030 ── ダッシュボードにビューコンテンツを追加できること
    8. 作成したタブを選択
    9. 「ウィジェットを追加」ボタンをクリック
    10. ビュー追加ダイアログでALLテストテーブルを選択し「詳細設定」→「保存」
    11. ✅ エラーメッセージが表示されないこと

    [0:21] dash-040 ── ダッシュボードに掲示板コンテンツを追加できること
    12. 作成したタブの▼メニューを開く
    13. 「掲示板を追加」をクリック
    14. ✅ エラーなくページが正常に表示されていること

    [0:25] dash-050 ── ダッシュボードタブを削除できること
    15. 作成したタブの▼メニューから「削除」をクリック
    16. 確認ダイアログで「はい」をクリック
    17. ✅ 作成したタブが消えていること
    18. ✅ 「HOME」タブが表示されていること

    [0:27] dash-060 ── デフォルトダッシュボード（HOMEタブ）が表示されること
    19. ダッシュボード画面を開く
    20. ✅ 「HOME」タブが表示・選択されていること
    21. ✅ 「HOME」タブの内容に「掲示板」が表示されていること
    22. 「HOME」タブの▼メニューを開く
    23. ✅ 「削除」メニューが存在しないこと（HOMEは削除不可）
  old_case_no: DB-01
