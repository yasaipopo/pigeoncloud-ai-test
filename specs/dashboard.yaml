# ──────────────────────────────────────────────
# movie: DB01 (dash-010〜dash-060 を1動画で確認)
# ──────────────────────────────────────────────
- case_no: dash-010
  feature: ダッシュボード
  description: ①ダッシュボード画面が正常に表示されること
  expected: |
    エラーなくページが正常に表示されること
  movie: DB01
  detailed_flow: |
    【DB01 テストフロー】この動画で確認するテスト番号:
      dash-010       (旧: DB-01)   ダッシュボード画面表示
      dash-020       (旧: DB-02)   タブ作成
      dash-030       (旧: DB-03)   ビューコンテンツ追加
      dash-040       (旧: DB-04)   掲示板コンテンツ追加
      dash-050       (旧: DB-05)   タブ削除
      dash-060       (旧: DB-06)   デフォルトダッシュボード

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] dash-010 ── ダッシュボード画面が正常に表示されること
    1. ログイン後、ダッシュボード（/admin/dashboard）に遷移する
    2. ✅ .navbar が表示されていること
    3. ✅ HOMEタブ（[role=tab] "HOME"）が表示されていること
    4. ✅ URLが /admin/dashboard を含むこと

    dash-020 ── 新しいダッシュボードタブを作成できること
    5. 「+」ボタン（dashboard-tab-add-btn）をクリック
    6. ダッシュボード作成モーダルで名前を入力して送信
    7. ✅ 新しいタブがタブリストに表示されること

    dash-030 ── ダッシュボードにビューコンテンツを追加できること
    8. 作成したタブを選択
    9. 「ウィジェットを追加」ボタンをクリック
    10. ビューダイアログでALLテストテーブルを選択し「詳細設定」→「保存」
    11. ✅ エラー（.alert-danger）が表示されないこと

    dash-040 ── ダッシュボードに掲示板コンテンツを追加できること
    12. 作成したタブの▼メニューを開く
    13. 「掲示板を追加」をクリック
    14. ✅ エラーが表示されず、.navbar が表示されたままであること

    dash-050 ── ダッシュボードタブを削除できること
    15. 作成したタブの▼メニューから「削除」をクリック
    16. 確認モーダルで「はい」をクリック
    17. ✅ 作成したタブが消えていること
    18. ✅ HOMEタブが表示されていること

    dash-060 ── デフォルトダッシュボード（HOMEタブ）が表示されること
    19. ダッシュボード（/admin/dashboard）を開く
    20. ✅ HOMEタブが表示・選択されていること
    21. ✅ HOMEタブパネルに「掲示板」が表示されていること
    22. HOMEタブの▼メニューを開く
    23. ✅ 「削除」メニューが存在しないこと（HOMEは削除不可）
  old_case_no: DB-01
