group: ユーザー管理・権限設定・組織・役職・グループ
spec_file: tests/users-permissions.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: 165-1
  sheet: A
  feature: グループ編集
  category: 行をコピーする
  description: |-
    ①テスト用のテーブルを新規作成（項目は全種類追加）
    ②①で作成したテーブルのレコードの全てのカラムにデータ入力し保存する
    ③①のレコード一覧を開き「編集モード」をクリックする
    ④上記②で作成したレコード上で右クリックし「行をコピーする」を選択
    ⑤「保存」をクリックする
    ⑥④でコピーしたレコードの「編集」アイコンをクリックする。
  expected: |-
    ・「行をコピーする」でコピーしたレコードがコピー元のレコードとカラムの内容まで一致していること。

    ・自動採番の項目の採番が新規採番となっていること。
  movie: UP04
  detailed_flow: |
    1. /admin/admin にアクセスしてユーザー管理画面を開く
    2. テスト用テーブルを新規作成する（/admin/dataset/edit/new）
    3. 全種類のフィールドを追加して保存する
    4. 作成したテーブルのレコード一覧（/admin/dataset__{id}）を開く
    5. 新規レコードを作成し全カラムにデータを入力して保存する
    6. レコード一覧を開き「編集モード」ボタン（button:has-text('編集モード')）をクリックする
    7. 対象レコード上で右クリックし「行をコピーする」を選択する
    8. 「保存」ボタンをクリックする
    9. コピーされたレコードの「編集」アイコンをクリックする
    10. 全カラムの内容がコピー元と一致することを確認する（各フィールド値をexpectで検証）
    11. 自動採番項目が新規採番（コピー元と異なる値）になっていることを確認する
- case_no: 165-2
  sheet: A
  feature: グループ編集
  category: 行を削除する
  description: |-
    ①該当テーブルのレコード一覧を開く
    ②「編集モード」をクリック
    ③削除したいレコード上で右クリックし、「行を削除する」を選択
    ④「保存」をクリックする
  expected: エラー発生することなく、該当のレコードが削除され保存されること。
  movie: UP04
  detailed_flow: |
    1. /admin/admin にアクセスしてユーザー管理画面を開く
    2. テスト用テーブルのレコード一覧（/admin/dataset__{id}）を開く
    3. 「編集モード」ボタン（button:has-text('編集モード')）をクリックする
    4. 削除したいレコード上で右クリックし「行を削除する」を選択する
    5. 「保存」ボタンをクリックする
    6. エラーが発生しないことを確認する（.alert-danger が0件）
    7. 削除したレコードが一覧に存在しないことを確認する
- case_no: 26-1
  sheet: A
  feature: アクセス
  category: ログイン経由のアクセス
  description: |-
    ①pigeonクラウドのサイトからはログアウトする。
    ②「https://demo-cw.pigeon-demo.com/admin/dataset/edit/45」へアクセスする。
    ③ログイン画面が表示されるので、ログインを行う。
  expected: ログイン後、エラーなく「https://demo-cw.pigeon-demo.com/admin/dataset/edit/45」へ直接アクセスすること。
  movie: UP03
  detailed_flow: |
    1. 現在のセッションからログアウトする（.nav-link.avatar クリック→ドロップダウンメニュー→「ログアウト」）
    2. ログアウト後、/admin/login 画面にリダイレクトされたことを確認する
    3. ブラウザで直接 {TEST_BASE_URL}/admin/dataset__{id}/view/{record_id} にアクセスする
    4. ログイン画面（/admin/login）にリダイレクトされることを確認する
    5. ログインフォームに有効な認証情報（#id, #password）を入力してログインボタン（button[type=submit].btn-primary）をクリックする
    6. ログイン後、最初にアクセスしようとした URL にリダイレクトされることを確認する（エラーなく表示される）
- case_no: 29-1
  sheet: A
  feature: ユーザー
  category: 削除
  description: |-
    ①テスト用に新規に「ユーザー」を作成する。(「組織」設定は行う)
    ②①で作成した「ユーザー」を削除する。
  expected: 他機能に影響なく且つエラー等発生しないこと。
  movie: UP01
  detailed_flow: |
    1. /api/admin/debug/create-user API（POST）でテスト用ユーザーを作成する
    2. /admin/admin にアクセスしてユーザー管理一覧を表示する
    3. 作成したテストユーザーのメールアドレスで行を特定する
    4. 対象ユーザー行の削除アイコン（.fa-trash, button:has-text('削除')）をクリックする
    5. 確認ダイアログが表示された場合は「OK」をクリックする
    6. エラーが発生しないことを確認する（.alert-danger が0件）
    7. 削除したユーザーが一覧に存在しないことを確認する
    8. 他機能に影響がないことを確認する（/admin/dashboard にアクセスしてエラーなし）
- case_no: 2-10
  sheet: A
  feature: ユーザー管理
  category: '-'
  description: ①ユーザータイプが「ユーザー」のユーザーを有効にする。
  expected: |-
    ・エラーなくユーザーの有効化が行えること。
    ・有効にしたユーザーが利用可となること。
  movie: UP01
  detailed_flow: |
    1. /api/admin/debug/create-user API（POST）でテスト用「ユーザー」タイプのユーザーを作成し無効化しておく
    2. /admin/admin にアクセスしてユーザー管理一覧を表示する
    3. 無効化したテストユーザーの行を特定し、編集アイコン（.fa-edit, [href*='/admin/admin/edit/']）をクリックする
    4. ユーザー編集画面で「状態」フィールドを「有効」に変更する（select[name='status'] または .status-toggle をクリック）
    5. 「更新」ボタン（button:has-text('更新') または button[type=submit]）をクリックして保存する
    6. エラーが発生しないことを確認する
    7. 有効にしたユーザーでログイン試行し、ダッシュボードにアクセスできることを確認する
- case_no: 2-1
  sheet: A
  feature: ユーザー管理
  category: '-'
  description: |-
    ①ユーザータイプが「マスター」のユーザー追加を行う。
    ②※入力内容は全項目入力。
  expected: エラーなくユーザー追加が行えること。
  movie: UP01
  detailed_flow: |
    1. /admin/admin にアクセスしてユーザー管理一覧を表示する
    2. 「＋」追加ボタン（button.btn-outline-primary:first-child または .fa-plus を含むボタン）をクリックする
    3. ユーザー追加フォームで以下の全項目を入力する：
       - ユーザータイプ: 「マスター」（select[name='type'] で 'master' を選択）
       - 名前（input[name='name'] または #name）
       - メールアドレス（input[type='email'] または #email）
       - パスワード（input[type='password']）
       - 組織（組織選択フィールド）
       - アイコン画像（input[type='file']）
    4. 「登録」または「保存」ボタン（button[type=submit]）をクリックする
    5. エラーが発生しないことを確認する（.alert-danger が0件）
    6. 追加したユーザーが一覧に表示されることを確認する
