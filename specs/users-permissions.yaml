- case_no: 155-1
  sheet: B
  feature: グループ
  category: グループ権限設定（無し）
  description: '①メニューより、テーブル管理を選択。

    ②グループ設定しているテーブルの「編集」アイコンをクリック。

    ③グループ権限設定の「無し」を選択し「更新」をクリック。

    ④ユーザーテーブルで、一般ユーザーがユーザー情報の閲覧権限がない設定になっている場合にも、メニューに「ユーザー情報」が出てしまっているので削除希望。（#277 機能改善確認）

    ⑤・権限設定によって編集不可項目を設定すると表示されなくなる（#304 バグ修正確認）

    ⑥権限１：マスターユーザーに、テーブル項目設定とテーブル管理者を設定（#340 バグ修正確認）

    ⑦ユーザータイプ：ユーザーでも、請求情報にアクセスできる権限設定を実装希望です。（#416 機能改善確認）

    ⑧【高度な設定】項目権限設定 もログ出力対象とする（#451 機能改善確認）

    ⑨（フォームを送る前は閲覧できていました。）（#454 バグ修正確認）

    ⑩#1(添付をご確認いただければと思います。)（#492 バグ修正確認）

    ⑪#2(添付をご確認いただければと思います。)（#496 バグ修正確認）

    ⑫・権限設定の反映タイミングがおかしい（#559 バグ修正確認）

    '
  expected: 'グループ権限設定が設定されていないこと。

    #277の修正確認含む、#304の修正確認含む、#340の修正確認含む、#416の修正確認含む、#451の修正確認含む、#454の修正確認含む、#492の修正確認含む、#496の修正確認含む、#559の修正確認含む

    '
  includes:
  - '277'
  - '304'
  - '340'
  - '416'
  - '451'
  - '454'
  - '492'
  - '496'
  - '559'
