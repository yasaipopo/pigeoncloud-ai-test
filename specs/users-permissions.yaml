- case_no: 2-1
  status: partial
  steps: '1. beforeEach: login()でログイン、closeTemplateModal()でモーダルを閉じる

    2. debugApiPost(page, ''/create-user'') でテストユーザー作成

    3. /admin/user に遷移

    4. メールアドレスでユーザー行を特定

    5. 編集リンクをクリック（条件付き）

    6. 全フィールドに値を入力（名前・部署・役職・権限など）

    7. 保存ボタンをクリック

    8. エラー要素（.alert-danger）が0件であることを確認

    '
  assertions: '- expect(errorCount).toBe(0)

    '
  gaps: '⚠️ YAMLには「マスターユーザーを全項目入力して追加できること」が期待されるが、実際はcreate-user APIで作成後に編集している（新規追加のUI操作ではない）

    ⚠️ 追加したユーザーが一覧に表示されることの確認なし

    ⚠️ ユーザー行が存在しない場合でもパスする（条件付き操作）

