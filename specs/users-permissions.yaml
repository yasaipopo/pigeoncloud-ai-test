- case_no: 155-3
  sheet: B
  feature: グループ
  category: グループ権限設定（詳細設定）
  description: '①メニューより、テーブル管理を選択。

    ②グループ設定しているテーブルの「編集」アイコンをクリック。

    ③グループ権限設定の「詳細設定」をクリック。

    ④テーブル権限設定の「＋追加する」をクリック。

    ⑤権限グループを以下の通り設定する。

    　　・該当のユーザー（マスターユーザーではない1名）

    　　・該当の組織

    ⑥権限を以下の通り設定

    　　・テーブル項目設定：チェックする

    　　・テーブル管理者：チェックしない

    ⑦「更新」ボタンをクリック。

    ⑧⑤に該当するユーザーでログインし、該当テーブルを操作。

    ⑨⑤に該当しないユーザーでログインし、該当テーブルを操作。'
  expected: 'グループ内に設定したテーブルに対して⑤に該当するユーザーが項目設定可、権限設定不可であること。


    グループ内に設定したテーブルに対して⑤に該当しないユーザーが項目設定不可、権限設定不可であること。'
