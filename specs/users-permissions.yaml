- case_no: 30-1
  sheet: A
  feature: 組織
  category: 削除
  description: |-
    ①新規に「組織」を作成する。
    ②ユーザーを新規に作成し、①で作成した「組織」を指定し登録する。
    ③①で作成した「組織」を削除する。
  expected: |-
    他機能に影響なく且つエラー等発生しないこと。
    作成したユーザーの組織が空欄となっていること。
  movie: UP03
  detailed_flow: |
    1. /admin/organization にアクセスして組織管理画面を開く
    2. 「＋」追加ボタンをクリックして新規組織を作成する（組織名を入力して「登録」）
    3. /api/admin/debug/create-user API（POST）でテスト用ユーザーを作成し、作成した組織を紐付ける
    4. /admin/organization で作成した組織を選択し、削除アイコン（.fa-trash）をクリックする
    5. 確認ダイアログで「OK」をクリックして削除する
    6. エラーが発生しないことを確認する（.alert-danger が0件）
    7. /admin/admin でテストユーザーの編集画面を開き、組織フィールドが空欄になっていることを確認する
