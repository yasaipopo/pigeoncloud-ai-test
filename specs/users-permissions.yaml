    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] up-830 ── 機能確認 - フォルダ内テーブル作成権限設定
    1. グループ管理画面（/admin/group）を開く
    2. フォルダへのアクセス権限設定でグループに特定フォルダのみアクセス許可を設定する
    3. アクセス権のあるユーザーでログインして該当フォルダでテーブル作成を試みる
    4. ✅ 許可フォルダ内でのみテーブル作成ができること
    5. アクセス権のないユーザーで同フォルダでのテーブル作成を試みる
    6. ✅ アクセス権のないユーザーはテーブル作成できないこと

    [0:15] up-840 ── バグ確認 - ユーザーテーブルからのルックアップ
    1. ユーザーテーブルを参照する他テーブル参照項目にルックアップを設定する
    2. そのテーブルでレコードを選択してルックアップ動作を確認する
    3. ✅ ルックアップが正しく機能すること（ユーザーの名前などがコピーされること）

    [0:25] up-850 ── 機能確認 - 権限変更のログ記録
    1. テーブルの権限設定を変更して保存する
    2. ログ画面を開く
    3. ✅ テーブル権限変更のログが記録されていること

    [0:33] up-860 ── 機能確認 - マスターユーザーによるロック解除
    1. テストユーザーを複数回ログイン失敗させてアカウントをロックする
    2. マスターユーザーでユーザー管理画面を開く
    3. ロックされたユーザーの行でロック解除ボタンをクリックする
    4. ✅ ロックが解除されること
    5. ✅ 解除後にそのユーザーでログインできること

    [0:45] up-870 ── 機能確認 - ユーザータイプでの請求情報アクセス権限
    1. 権限設定画面で「ユーザー」タイプのユーザーに請求情報へのアクセス権限を付与する
    2. そのユーザーでログインして請求情報ページにアクセスする
    3. ✅ 権限付与されたユーザーが請求情報を閲覧できること

    [0:55] up-880 ── 機能確認 - 子テーブルのデフォルト表示
    1. 親テーブルのレコード新規作成画面を開く
    2. ✅ 子テーブルが画面にデフォルトで表示されていること（設定した件数分）

    [1:03] up-890 ── バグ確認 - スマートフォンからの小数点入力
    1. スマートフォン（またはモバイルUA）でログインして数値項目のあるレコード編集画面を開く
    2. 「小数」形式の数値項目に小数点を入力する
    3. ✅ 小数点が入力できること（数値のみのキーボードに制限されないこと）

    [1:13] up-900 ── バグ確認 - ユーザー管理参照の複数ルックアップ
    1. ユーザー管理テーブルの「氏名」を参照する他テーブル参照項目に複数のルックアップを設定する
    2. そのテーブルでレコードを選択する
    3. ✅ 設定した複数ルックアップが全て正しく機能すること

    [1:23] up-910 ── バグ確認 - 他テーブル参照一覧用表示項目
    1. 他テーブル参照の一覧用表示項目が設定済みのテーブルのレコード一覧を開く
    2. ✅ 一覧用表示項目がカンマ区切りで正しく表示されること（空白にならないこと）

    [1:32] up-920 ── 機能確認 - 項目権限設定のログ出力
    1. テーブル設定の高度な設定で項目権限設定を変更する
    2. ログ画面を開く
    3. ✅ 項目権限設定の変更がログに記録されていること

    [1:40] up-930 ── バグ確認 - 公開フォーム送信後の閲覧権限
    1. 「全員編集可能」に設定されたテーブルへの公開フォームを用意する
    2. 公開フォームからレコードを送信する
    3. そのテーブルをログインユーザーで閲覧する
    4. ✅ フォーム送信後もテーブルが正常に閲覧できること（「閲覧権限がありません」エラーが出ないこと）

    [1:50] up-940 ── バグ確認 - 値の重複禁止と削除済みレコードの再登録
    1. ユーザー管理テーブルの「値の重複を禁止する」設定のある項目でレコードを作成する
    2. そのレコードを削除する
    3. 削除したレコードと同じ値で新規レコードを追加する
    4. ✅ 削除済みレコードの値が再登録できること

    [2:02] up-950 ── バグ確認 - 権限設定した非表示項目の表示
    1. 子テーブルに特定項目を非表示に権限設定する
    2. 親テーブルのレコード詳細で子テーブルの表示を確認する
    3. ✅ 権限設定した非表示項目が親テーブルのレコード詳細でも表示されないこと

    [2:12] up-960 ── バグ確認 - 権限設定ユーザーのレコード複製
    1. 編集権限はあるが一部操作制限がある「ユーザー」タイプでログインして対象テーブルを開く
    2. レコードの複製を実行する
    3. ✅ 「編集権限が無い」エラーが出ずに複製できること

    [2:22] up-970 ── バグ確認 - SUMIF/COUNTIFの計算エラー
    1. SUMIF・COUNTIFを使った計算項目を持つテーブルのレコード詳細画面を開く
    2. ✅ 「ブラウザ更新してください」エラーが表示されないこと
    3. ✅ SUMIF・COUNTIFの計算結果が正しく表示されること
