    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] up-980 ── 機能確認 - マスターユーザーのUP/DL履歴確認
    1. マスターユーザー（admin）でCSVアップロード履歴ページ（/admin/csv）を開く
    2. ✅ 全ユーザーのアップロード/ダウンロード履歴一覧が表示されること
    3. 「ユーザー」タイプでログインして同ページを開く
    4. ✅ 自分の履歴のみが表示されること（他ユーザーの履歴が非表示）

    [0:00] up-990 ── バグ確認 - ユーザー管理参照の複数ルックアップ（複数項目）
    1. ユーザー管理テーブルを参照する項目に複数のルックアップを設定する
    2. テーブルでレコードを選択してルックアップ動作を確認する
    3. ✅ 設定した複数のルックアップが全て動作すること

    [0:00] up-1000 ── バグ確認 - 権限設定の反映タイミング
    1. テーブルの権限設定画面で権限グループにユーザー・組織を追加する
    2. 「送信」ボタンをクリックしてから「更新」ボタンをクリックする
    3. ✅ 「更新」ボタンクリック時に権限が反映されること（「送信」直後には反映されないこと）

    [0:00] up-1010 ── 機能確認 - QRコード型2要素認証
    1. システム設定でQRコード（authenticator）型2要素認証を有効にする
    2. ユーザーでログインして認証アプリのQRコード設定を行う
    3. ✅ 認証アプリのOTPコードで2要素認証が完了してログインできること

    [0:45] up-1020 ── バグ確認 - ユーザーテーブルからのルックアップ（重複確認）
    1. ユーザーテーブルから他テーブル参照でルックアップを設定する
    2. そのテーブルのレコードでルックアップ動作を確認する
    3. ✅ ルックアップが正しく機能すること

    [0:55] up-1030 ── 機能確認 - ログイン画面パスワードリセットの初期有効化
    1. テスト環境の新規作成直後にログインページを開く
    2. ✅ ログインページに「パスワードをリセットする」リンクが初回から表示されていること

    [0:00] up-1040 ── 機能確認 - ユーザー管理一覧での役職表示
    1. ユーザー管理画面（/admin/admin）のユーザー一覧を開く
    2. ✅ 各ユーザーの行に「組織：役職」の形式で役職が表示されていること

    [1:13] up-1050 ── 機能確認 - 同時ログイン上限超過時のマスターログイン
    1. 同時ログイン数が上限に達する状態を作る
    2. マスターユーザー（admin.id=1）でログインする
    3. ✅ マスターユーザーは上限を超えてもログインできること
    4. ✅ ログイン後はユーザー管理（管理モード）のみ操作できること
    5. 一般ユーザーを強制ログアウトさせてから通常操作に戻ることを確認する
    6. ✅ 強制ログアウト後にマスターユーザーが通常モードに戻ること
