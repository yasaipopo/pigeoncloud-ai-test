cases:
- case_no: up-010
  sheet: A
  feature: グループ編集
  category: 行をコピーする
  description: |-
    ①テスト用のテーブルを新規作成（項目は全種類追加）
    ②①で作成したテーブルのレコードの全てのカラムにデータ入力し保存する
    ③①のレコード一覧を開き「編集モード」をクリックする
    ④上記②で作成したレコード上で右クリックし「行をコピーする」を選択
    ⑤「保存」をクリックする
    ⑥④でコピーしたレコードの「編集」アイコンをクリックする。
  expected: |-
    ・「行をコピーする」でコピーしたレコードがコピー元のレコードとカラムの内容まで一致していること。

    ・自動採番の項目の採番が新規採番となっていること。
  movie: UP04
  detailed_flow: |-
    【UP04 テストフロー】この動画で確認するテスト番号:
      [0:00] up-010         (旧: 165-1)   グループ編集 - 行をコピーする
      [0:00] up-020         (旧: 165-2)   グループ編集 - 行を削除する

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] up-010 ── 行をコピーする
    1. テスト用テーブルを新規作成し、全種類のフィールドを追加して保存する
    2. レコードを1件作成し、全カラムにデータを入力して保存する
    3. レコード一覧で「編集モード」ボタンをクリックする
    4. データを入力したレコード行の上で右クリックし「行をコピーする」を選択する
    5. 「保存」ボタンをクリックする
    6. コピーされたレコードの詳細画面を開く
    7. ✅ 全カラムの内容がコピー元レコードと一致すること
    8. ✅ 自動採番項目の値が新規採番（コピー元と異なる値）になっていること

    [0:00] up-020 ── 行を削除する
    1. レコード一覧で「編集モード」ボタンをクリックする
    2. 削除対象のレコード行の上で右クリックし「行を削除する」を選択する
    3. 「保存」ボタンをクリックする
    4. ✅ エラーが発生しないこと
    5. ✅ 削除したレコードが一覧から消えていること
  old_case_no: 165-1
