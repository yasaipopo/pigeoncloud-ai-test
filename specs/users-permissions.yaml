      [0:01] up-040         (旧: 29-1)    ユーザー削除
      [0:02] up-050         (旧: 2-10)    ユーザー有効化（ユーザータイプ）
      [0:06] up-060         (旧: 2-1)     マスターユーザー追加（全項目）
      [0:06] up-070         (旧: 2-2)     ユーザー追加（全項目）
      [0:01] up-080         (旧: 2-3)     マスターユーザー追加（必須項目のみ）
      [0:01] up-090         (旧: 2-4)     ユーザー追加（必須項目のみ）
      [0:01] up-100         (旧: 2-5)     組織設定
      [0:02] up-110         (旧: 2-6)     アイコン画像設定
      [0:01] up-120         (旧: 2-7)     マスターユーザー無効化
      [0:01] up-130         (旧: 2-8)     ユーザー無効化
      [0:01] up-140         (旧: 2-9)     マスターユーザー有効化
      [0:00] up-160         (旧: 39-1)    必須項目未入力エラー（異常系）

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:01] up-040 ── ユーザー削除
    1. ユーザー管理画面（/admin/admin）を開く
    2. テスト用ユーザーの行を探し、削除アイコンをクリックする
    3. 確認ダイアログで「OK」をクリックする
    4. ✅ エラーが発生しないこと
    5. ✅ 削除したユーザーが一覧から消えていること

    [0:02] up-050 ── ユーザー有効化（ユーザータイプ）
    1. テスト用「ユーザー」タイプのユーザーを無効状態で用意する
    2. そのユーザーの編集画面を開き「状態」を「有効」に変更して更新する
    3. ✅ エラーが発生しないこと
    4. ✅ 有効化したユーザーでログインできること

    [0:06] up-060 ── マスターユーザー追加（全項目入力）
    1. ユーザー管理画面でユーザー追加ボタンをクリックする
    2. 名前・メールアドレス・パスワード・組織・役職など全項目を入力し、ユーザータイプ「マスター」を選択する
    3. 「登録」ボタンをクリックする
    4. ✅ エラーが発生しないこと
    5. ✅ 追加したユーザーが一覧に表示されること

    [0:06] up-070 ── ユーザー追加（全項目入力）
    1. ユーザー管理画面でユーザー追加ボタンをクリックする
    2. 全項目を入力し、ユーザータイプ「ユーザー」を選択する
    3. 「登録」ボタンをクリックする
    4. ✅ エラーが発生しないこと
    5. ✅ 追加したユーザーが一覧に表示されること

    [0:01] up-080 ── マスターユーザー追加（必須項目のみ）
    1. ユーザー管理画面でユーザー追加ボタンをクリックする
    2. 名前・メールアドレス・パスワードのみ入力し、ユーザータイプ「マスター」を選択する
    3. 「登録」ボタンをクリックする
    4. ✅ エラーが発生しないこと

    [0:01] up-090 ── ユーザー追加（必須項目のみ）
    1. ユーザー管理画面でユーザー追加ボタンをクリックする
    2. 必須項目のみ入力し、ユーザータイプ「ユーザー」を選択する
    3. 「登録」ボタンをクリックする
    4. ✅ エラーが発生しないこと

    [0:01] up-100 ── 組織設定
    1. up-060または up-070 で作成したユーザーの編集画面を開く
    2. 組織フィールドに組織を設定して「更新」ボタンをクリックする
    3. ✅ 組織の設定がエラーなく保存されること

    [0:02] up-110 ── アイコン画像設定
    1. 作成済みユーザーの編集画面を開く
    2. アイコン画像をアップロードして「更新」ボタンをクリックする
    3. ✅ アイコン画像の設定がエラーなく保存されること

    [0:01] up-120 ── マスターユーザー無効化
    1. テスト用マスターユーザーの編集画面を開く
    2. 「状態」を「無効」に変更して「更新」ボタンをクリックする
    3. ✅ エラーが発生しないこと
    4. ✅ 無効化したユーザーでログインできないこと

    [0:01] up-130 ── ユーザー無効化
    1. テスト用「ユーザー」タイプのユーザーの編集画面を開く
    2. 「状態」を「無効」に変更して「更新」ボタンをクリックする
    3. ✅ エラーが発生しないこと
    4. ✅ 無効化したユーザーでログインできないこと

    [0:01] up-140 ── マスターユーザー有効化
    1. 無効状態のマスターユーザーの編集画面を開く
    2. 「状態」を「有効」に変更して「更新」ボタンをクリックする
    3. ✅ エラーが発生しないこと
    4. ✅ 有効化したユーザーでログインできること

    [0:00] up-160 ── 必須項目未入力エラー（異常系）
    1. ユーザー管理画面でユーザー追加ボタンをクリックする
    2. 何も入力せずに「登録」ボタンをクリックする
    3. ✅ 必須項目未入力のエラーメッセージが表示されること
