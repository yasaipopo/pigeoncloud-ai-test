- case_no: up-030
  sheet: A
  feature: アクセス
  category: ログイン経由のアクセス
  description: |-
    ①pigeonクラウドのサイトからはログアウトする。
    ②「https://demo-cw.pigeon-demo.com/admin/dataset/edit/45」へアクセスする。
    ③ログイン画面が表示されるので、ログインを行う。
  expected: ログイン後、エラーなく「https://demo-cw.pigeon-demo.com/admin/dataset/edit/45」へ直接アクセスすること。
  movie: UP03
  detailed_flow: |-
    【UP03 テストフロー】この動画で確認するテスト番号:
      [0:11] up-030         (旧: 26-1)    ログイン経由のアクセス
      [0:00] up-150         (旧: 30-1)    組織削除

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:11] up-030 ── ログイン経由のアクセス
    1. 現在ログイン中のセッションからアバターアイコン → 「ログアウト」をクリックしてログアウトする
    2. ✅ ログインページ（/admin/login）にリダイレクトされること
    3. ブラウザのアドレスバーで直接テスト対象ページのURLにアクセスする
    4. ✅ ログインページにリダイレクトされること（未ログイン状態のアクセス制御が機能している）
    5. ログインフォームに正しい ID・パスワードを入力してログインする
    6. ✅ ログイン後、最初にアクセスしようとしたページにリダイレクトされること

    [0:00] up-150 ── 組織削除
    1. 組織管理画面（/admin/organization）を開く
    2. テスト用の組織を新規作成する
    3. そのユーザーを新規作成し、作成した組織を指定して登録する
    4. 作成した組織の削除ボタンをクリックして削除する
    5. ✅ エラーが発生しないこと
    6. ✅ 削除した組織を設定していたユーザーの組織欄が空欄になっていること
  old_case_no: 26-1
