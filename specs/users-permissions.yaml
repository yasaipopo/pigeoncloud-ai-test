    ⑧⑤に該当するユーザーでログインし、該当テーブルを操作。

    ⑨⑤に該当しないユーザーでログインし、該当テーブルを操作。'
  expected: 'グループ内に設定したテーブルに対して⑤に該当するユーザーが項目設定可、権限設定不可であること。


    グループ内に設定したテーブルに対して⑤に該当しないユーザーが項目設定不可、権限設定不可であること。'
