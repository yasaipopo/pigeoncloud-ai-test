    5. .overSetting .fa-gear（歯車アイコン）をクリック
    6. .settingModal .modal-content が表示されることを確認
    7. input[type="text"][name="label"]（項目名入力欄）が表示されることを確認
    8. .modal-header に「画像」が含まれることを確認
    9. button:has-text("キャンセル") をクリックしてモーダルを閉じる
  old_case_no: 48-1
