- case_no: 48-1
  feature: フィールド設定
  description: ①画像フィールド設定ページが正常に表示されること
  expected: |
    エラーなくページが正常に表示されること
  movie: F201
  detailed_flow: |
    1. /admin/dataset/edit/{ALLテストテーブルID} を開く
    2. Angular初期化（body[data-ng-ready="true"]）を待つ
    3. .pc-field-block のリストが表示されることを確認
    4. .pc-field-block の中から「画像」テキストを含む要素をホバー
    5. .overSetting .fa-gear（歯車アイコン）をクリック
    6. .settingModal .modal-content が表示されることを確認
    7. input[type="text"][name="label"]（項目名入力欄）が表示されることを確認
    8. .modal-header に「画像」が含まれることを確認
    9. button:has-text("キャンセル") をクリックしてモーダルを閉じる

