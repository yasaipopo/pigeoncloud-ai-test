- case_no: '145-01'
  sheet: A
  feature: フィールド設定
  description: |-
    ①ALLテストテーブルの一覧画面を開く
    ②文字列(一行)フィールドの設定画面を開く
    ③「一覧表示文字数」に5を設定して保存する
    ④一覧画面に戻り、文字列(一行)列の表示を確認する
    ⑤5文字を超えるデータが「...」で省略表示されていることを確認する
    ⑥フィールド設定で「一覧表示文字数」を空（無制限）に戻して保存する
    ⑦一覧画面で省略なしの全文表示に戻ることを確認する
  expected: 一覧表示文字数を設定した場合、設定文字数を超える部分が「...」で省略表示されること。設定解除で全文表示に戻ること
  movie: UC01
  detailed_flow: |
    1. beforeAll: `getAllTypeTableId(page)` でALLテストテーブルID取得 → tableIdを取得する
    2. `await page.goto(BASE_URL + "/admin/login")` でログイン画面に遷移し、admin/パスワードでログインする
    3. `await page.goto(BASE_URL + "/admin/dataset__" + tableId)` → waitForAngular(page)
    4. `await page.goto(BASE_URL + "/admin/dataset__{tableId}/setting")` → waitForAngular(page)
    5. 「一覧表示文字数」に5を設定して保存する: `await page.locator('button:has-text("保存"), button:has-text("更新")').first().click()` → 保存完了を待機
    6. 一覧画面に戻り、文字列(一行)列の表示を確認する: 対象要素を `expect(page.locator("..."))` で検証する
    7. 5文字を超えるデータが「...」で省略表示されていることを確認する: `await expect(page.locator("...")).toBeVisible()` で「5文字を超えるデータが「...」で省略を」の表示を確認
    8. フィールド設定で「一覧表示文字数」を空（無制限）に戻して保存する: `await page.locator('button:has-text("保存"), button:has-text("更新")').first().click()` → 保存完了を待機
    9. 一覧画面で省略なしの全文表示に戻ることを確認する: 対象要素を `expect(page.locator("..."))` で検証する
    10. 最終確認: `一覧表示文字数を設定した場合、設定文字数を超える部分が「...」で省略表示されること。設定解除で全文表示に戻ること` → `expect()` アサーションで検証する

- case_no: '128'
  sheet: B
  feature: 追加オプション→その他
  description: |-
    ①テーブル管理を開く。
    ②該当テーブルを選択し、編集アイコンをクリックする。
    ③「追加オプション」の「埋め込みフォームをONにする」の「有効」にチェックを入れる。
    ④上記設定したテーブルを開き、メニューより「埋め込みフォームのURL」を選択し、該当のソースをコピーする。
    ⑤④でコピーしたソースをHTMLファイルへ反映。
    ⑥⑤で作成したファイルを開き、データ登録が可能な事を確認する。
  expected: HTMLファイルから、問題なく該当データベースへの「登録」が実施可能なこと。
  movie: UC01
  detailed_flow: |
    1. beforeAll: `getAllTypeTableId(page)` でALLテストテーブルID取得 → tableIdを取得する
    2. `await page.goto(BASE_URL + "/admin/login")` でログイン画面に遷移し、admin/パスワードでログインする
    3. `await page.goto(BASE_URL + "/admin/table_manage")` → waitForAngular(page)
    4. 該当テーブルを選択し、編集アイコンをクリックする: `await page.locator('.edit-icon, button:has-text("編集"), [title="編集"]').first().click()` → waitForAngular(page)
    5. 「追加オプション」の「埋め込みフォームをONにする」の「有効」にチェックを入れる: 対象チェックボックスを `await page.locator('input[type="checkbox"]').check()` で有効にする
    6. 上記設定したテーブルを開き、メニューより「埋め込みフォームのURL」を選択し、該当のソースをコピーする: 対象のセレクト/プルダウンを特定し `selectOption()` または `.click()` で選択する
    7. でコピーしたソースをHTMLファイルへ反映
    8. で作成したファイルを開き、データ登録が可能な事を確認する: 対象要素を `expect(page.locator("..."))` で検証する
    9. 最終確認: `HTMLファイルから、問題なく該当データベースへの「登録」が実施可能なこと。` → `expect()` アサーションで検証する

