    ④そのまま削除を実行する
    ⑤表示条件設定画面を開き、「!!存在しない項目!!」と表示されていることを確認
  expected: フィールド削除時に表示条件の紐づけ警告がモーダルに表示され、削除後は「!!存在しない項目!!」と表示されること
  movie: UC01
  target_spec: fields
  detailed_flow: |
    1. beforeAll: `getAllTypeTableId(page)` でALLテストテーブルID取得 → tableIdを取得する
    2. `await page.goto(BASE_URL + "/admin/login")` でログイン画面に遷移し、admin/パスワードでログインする
    3. テーブル設定画面でフィールドを追加し、別のフィールドの表示条件設定にそのフィールドを紐づける
    4. 紐づけたフィールドを削除しようとする
    5. 削除確認モーダルに「表示条件設定に紐づけられている」旨が表示されることを確認: `await expect(page.locator("...")).toBeVisible()` で「削除確認モーダルに「表示条件設定に紐づけられている」旨がを確認」の表示を確認
    6. そのまま削除を実行する
    7. 表示条件設定画面を開き、「!!存在しない項目!!」と表示されていることを確認: `await expect(page.locator("...")).toBeVisible()` で「表示条件設定画面を開き、「!!存在しない項目!!」とを確認」の表示を確認
    8. 最終確認: `フィールド削除時に表示条件の紐づけ警告がモーダルに表示され、削除後は「!!存在しない項目!!」と表示されること` → `expect()` アサーションで検証する

- case_no: '262'
  sheet: B
  feature: 権限設定
  description: |-
    ①テーブル権限設定画面を開く
    ②テスト用の権限グループに対して「テーブル権限設定」を行い保存する
    ③同じ権限グループに対して「【高度な設定】項目権限設定」を追加で設定し保存する
    ④テーブル権限設定画面を再度開き、先に設定した「テーブル権限設定」がリセットされていないことを確認する
    ⑤テーブル権限・項目権限の両方が正しく保存されていることを確認する
  expected: テーブル権限設定と項目権限設定を組み合わせて設定しても、先に設定した権限がリセットされないこと
  movie: UC01
  detailed_flow: |
    1. beforeAll: `getAllTypeTableId(page)` でALLテストテーブルID取得 → tableIdを取得する
    2. `await page.goto(BASE_URL + "/admin/login")` でログイン画面に遷移し、admin/パスワードでログインする
    3. `await page.goto(BASE_URL + "/admin/dataset__" + tableId + "/permission")` → waitForAngular(page)
    4. テスト用の権限グループに対して「テーブル権限設定」を行い保存する: `await page.locator('button:has-text("保存"), button:has-text("更新")').first().click()` → 保存完了を待機
    5. 同じ権限グループに対して「【高度な設定】項目権限設定」を追加で設定し保存する: `await page.locator('button:has-text("保存"), button:has-text("更新")').first().click()` → 保存完了を待機
    6. テーブル権限設定画面を再度開き、先に設定した「テーブル権限設定」がリセットされていないことを確認する: 対象要素を `expect(page.locator("..."))` で検証する
    7. テーブル権限・項目権限の両方が正しく保存されていることを確認する: ページをリロードまたは再遷移して `await expect(page.locator("...")).toHaveValue("期待値")` で確認
    8. 最終確認: `テーブル権限設定と項目権限設定を組み合わせて設定しても、先に設定した権限がリセットされないこと` → `expect()` アサーションで検証する

