base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: fld4-010
  feature: フィールド設定
  description: ①選択肢フィールドのインライン編集パネルで「表示条件」セクションが確認できること
  expected: |
    選択肢フィールドのインライン編集パネルで「表示条件」セクションが確認できること
  movie: F401
  detailed_flow: |-
    【F401 テストフロー】この動画で確認するテスト番号:
      fld4-010 (旧: 261-1)  選択肢フィールドの表示条件セクション確認
      fld4-020 (旧: 261-2)  Yes/Noフィールドのインライン編集パネル確認
      fld4-030 (旧: 261-3)  チェックボックスフィールドのインライン編集パネル確認
      fld4-040 (旧: 265-1)  テキストフィールド必須設定・空保存エラー確認
      fld4-050 (旧: 265-2)  テキスト/数値フィールドの重複チェック設定UI確認
      fld4-060 (旧: 267-1)  テキストフィールド初期値設定・新規レコード自動入力確認

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] fld4-010 ── 選択肢フィールドのインライン編集パネルで「表示条件」セクションが確認できること
    1. テーブル設定画面（/admin/dataset/edit/{tableId}）を開く
    2. フィールド一覧から「選択肢」（単一選択または複数選択）フィールド行の設定ボタンをクリックして編集モーダルを開く
    3. モーダルのタイトルに「選択肢(単一選択)」または「選択肢(複数選択)」が表示されていることを確認する
    4. 「追加オプション設定」ボタンをクリックして追加オプションセクションを展開する
    5. 「表示条件設定」ラベルと「条件追加」ボタンが表示されていることを確認する
    ✅ 編集モーダルのタイトルに「選択肢(単一選択)」または「選択肢(複数選択)」が含まれること
    ✅ 「表示条件設定」ラベルが表示されること
    ✅ 「条件追加」ボタンが表示されること

    [次] fld4-020 ── Yes/Noフィールドのインライン編集パネルが開けること
    F401テストフロー参照（fld4-010 のフローと同様。対象フィールド: Yes/No）
    ✅ Yes/Noフィールドの編集モーダルが開くこと
    ✅ 「追加オプション設定」セクションが展開できること
    ✅ 「表示条件設定」ラベルが表示されること

    [次] fld4-030 ── チェックボックスフィールドのインライン編集パネルが開けること
    F401テストフロー参照（fld4-010 のフローと同様。対象フィールド: チェックボックス）
    ✅ チェックボックスフィールドの編集モーダルが開くこと
    ✅ 「追加オプション設定」セクションが展開できること
    ✅ 「表示条件設定」ラベルが表示されること

    [次] fld4-040 ── テキストフィールドに必須設定後、空保存でエラーメッセージが表示されること
    1. テーブル設定画面でテキストフィールド行の設定ボタンをクリックして編集モーダルを開く
    2. 「必須」チェックボックスをONにして保存する
    3. レコード新規作成画面（/admin/dataset/{tableId}/add）を開く
    4. テキストフィールドを空のまま保存ボタンをクリックする
    ✅ エラーメッセージ（「必須」等）が表示されること
    ✅ レコードが保存されず画面にとどまること

    [次] fld4-050 ── テキスト/数値フィールドで重複チェック設定のUIが表示されること
    1. テーブル設定画面でテキストまたは数値フィールド行の設定ボタンをクリックして編集モーダルを開く
    2. 「追加オプション設定」ボタンをクリックして追加オプションセクションを展開する
    3. 重複チェック設定のUI（ラベルまたはチェックボックス）が表示されていることを確認する
    ✅ 「追加オプション設定」セクションが展開できること
    ✅ 重複チェック設定のUI要素が表示されること

    [次] fld4-060 ── テキストフィールドに初期値を設定すると新規レコード作成時に自動入力されること
    1. テーブル設定画面でテキストフィールド行の設定ボタンをクリックして編集モーダルを開く
    2. 「追加オプション設定」を展開し、初期値（デフォルト値）フィールドに任意のテキストを入力して保存する
    3. レコード新規作成画面（/admin/dataset/{tableId}/add）を開く
    4. テキストフィールドに設定した初期値が自動入力されていることを確認する
    ✅ 新規作成画面でテキストフィールドに初期値が自動入力されていること
    ✅ 入力された値が設定した初期値と一致すること
  old_case_no: 261-1
