cases:
- case_no: 261-1
  feature: フィールド設定
  description: ①選択肢フィールドのインライン編集パネルで「表示条件」セクションが確認できること
  expected: |
    選択肢フィールドのインライン編集パネルで「表示条件」セクションが確認できること
  movie: F401
  detailed_flow: |
    【前提】ALLテストテーブルが作成済みであること（getAllTypeTableId で取得）
    【URL】/admin/dataset/edit/{tableId}
    【手順】
    1. フィールド設定ページ（/admin/dataset/edit/{tableId}）に遷移する
    2. .overSetting ボタンを全件取得し、ラベルに「セレクト」「選択肢」を含むフィールド行を探してクリックする
       - セレクター: .overSetting（各フィールド行のオーバーレイボタン）
       - クリック後: モーダル（.modal.show）が表示される
    3. モーダルの h5 タグに「選択肢(単一選択)」または「選択肢(複数選択)」が表示されていることを確認する
       - セレクター: .modal.show h5
    4. 「追加オプション設定」ボタンをクリックして追加オプションセクションを展開する
       - セレクター: .modal.show button:has-text("追加オプション設定")
    5. 「表示条件設定」ラベルが表示されていることを確認する
       - セレクター: .modal.show:has-text("表示条件設定")
       - または: conditions-form コンポーネントが存在すること
    6. 「条件追加」ボタンが存在することを確認する
       - セレクター: .modal.show button:has-text("条件追加")
    【期待値アサーション】
    - expect(page.locator('.modal.show h5')).toContainText(['選択肢(単一選択)', '選択肢(複数選択)']) のいずれか
    - expect(page.locator('.modal.show').locator('text=表示条件設定')).toBeVisible()
    - expect(await page.locator('.modal.show button:has-text("条件追加")').count()).toBeGreaterThan(0)

