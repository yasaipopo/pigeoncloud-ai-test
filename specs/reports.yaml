  feature: 文字列
  description: |-
    ①【バグ修正確認】帳票出力後、添付のように＜p＞が反映されてしまっています。
    ②PDFでもExcelでも試しましたが、どちらも反映されてしまっています。
    ③対象テーブル：ES広場（社会貢献活動投稿フォーム）
    　　　　　　　（dataset__2162）

    レコードID：288　（一例）

    項目は、文章(複数行)でリッチテキストになっています。
  expected: バグが修正され、正常に動作すること。(帳票出力後、添付のように＜p＞が反映されてしまっています。 PDFでもExcelでも試しましたが、どちらも反映されてしまっています。   対象テーブル：ES広場（社会貢献活動投稿フォーム） 　　　　　)
