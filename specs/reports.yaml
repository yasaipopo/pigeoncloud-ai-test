- case_no: '264'
  sheet: B
  feature: 文字列
  description: |-
    ①【バグ修正確認】帳票のダウンロードをするとエラーになるそうで、コピー環境でも再現されました。
    ②こちら、原因は何か、ご確認いただいてもよいでしょうか。
    ③帳票雛形に間違いがあっても、データが反映されないだけで、帳票のダウンロード自体にエラーは発生しない仕様だったと思うので、何かしらのエラーでしょうか。
    ④対応: 子テーブル要素を取得するときのstartとendの位置関係によりエラーが出ていました。
    ⑤正確にはN22とK24の
    $START{新オリジナル卸委託管理.明細} AS 明細
    と
    $END{新オリジナル卸委託管理.明細}
    の位置関係で、STARTの方が右にあることが原因です。
    ⑥おそらく今回は
    A22とK24
    N22とX24
    のペアのつもりだったと思うのですが、システムでその認識ができ。
  expected: バグが修正され、正常に動作すること。(帳票のダウンロードをするとエラーになるそうで、コピー環境でも再現されました。こちら、原因は何か、ご確認いただいてもよいでしょうか。 帳票雛形に間違いがあっても、データが反映されないだけで、帳票のダウン)
  movie: RP02
  detailed_flow: |
    # バグ修正確認: $START/$END の位置関係が逆でもエラーにならないこと
    # 1. /admin/dataset__${tableId} に遷移（子テーブルフィールドを持つテーブル）
    # 2. waitForSelector('.navbar', { timeout: 30000 })
    # 3. 帳票テンプレートをアップロード（子テーブルの$START/$ENDの位置関係が
    #    意図的に不正なExcelファイル、または正常なExcel）
    # 4. レコード選択 → 帳票ダウンロード実行:
    #    const [download] = await Promise.all([
    #      page.waitForEvent('download'),
    #      page.locator('.dropdown-menu.show .dropdown-item').first().click()
    #    ])
    # 確認:
    #   - ダウンロードがエラーなく完了すること
    #   - {"result":"error"} のようなエラーJSONを含むレスポンスが返ってこないこと
    #   - 別タブや空白ページが開かないこと
    #   - エラートースト（.toast-error, .alert-danger）が表示されないこと

