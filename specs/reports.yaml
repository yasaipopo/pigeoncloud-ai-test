- case_no: '568'
  sheet: B
  feature: ''
  description: '### 要件名

    * 帳票に画像を指定できる


    ### 要件

    * 帳票を出力するためのexcelにて、画像型のフィールドを指定できる

    * 帳票出力時に、画像型のフィールドが指定されたセルに画像が埋め込まれる (excel、pdfのどちらも)

    * セルに埋め込まれた画像はセルの高さに対して100%になる (widthはauto)


    ### 参照

    * https://www.notio'
  expected: 'エラーなく正常に動作すること。(### 要件名 * 帳票に画像を指定できる  ### 要件 * 帳票を出力するためのexcelにて、画像型のフィールドを指定できる * 帳票出力時に、画像型のフィールドが指定されたセルに画像が埋め込ま)'
- case_no: RPT-CHILD
  feature: 帳票子テーブル
  category: 帳票での子テーブル出力
  description: |
    ①子テーブル情報を含む帳票を出力する
    ②子テーブルが空のレコードで$STARTおよび$ENDがそのまま表示されないことを確認（#729 バグ修正確認）
  expected: |
    子テーブルが空の場合でもテンプレートタグが正しく処理されること
  includes:
  - '729'
- case_no: RPT-FORMAT
  feature: 帳票フォーマット
  category: 帳票のExcel/JSON作成・数値形式
  description: |
    ①テーブル作成権限のあるユーザーでExcel/JSONからテーブル作成できることを確認（#272 機能改善確認）
    ②数値項目で「桁区切り表示しない」がONの場合、帳票出力でカンマが付かないことを確認（#601 機能改善確認）
  expected: |
    帳票のフォーマット設定が正しく反映されること
  includes:
  - '272'
  - '310'
  - '584'
  - '601'
- case_no: RPT-INDEX
  feature: 帳票連番
  category: 帳票の連番(INDEX)機能
  description: |
    ①帳票テンプレートに${関連レコード一覧名.INDEX}を設定する
    ②出力された帳票で関連レコードに連番が振られていることを確認（#579 機能改善確認）
  expected: |
    帳票で関連レコードのINDEX連番が正しく出力されること
  includes:
  - '579'
- case_no: RPT-PERMISSION
  feature: 帳票権限
  category: 帳票の権限設定
  description: |
    ①テーブル管理者（一般ユーザー）で帳票の登録・編集画面にアクセスする
    ②帳票の登録・編集が可能であることを確認（#530 機能改善確認）
  expected: |
    テーブル管理者権限で帳票の登録・編集が可能なこと
  includes:
  - '530'
