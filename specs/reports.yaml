group: 帳票
spec_file: tests/reports.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: RPT-FULL
  feature: 帳票機能総合
  category: 動画単位
  description: |
    ①帳票テンプレートを登録する
    ②帳票を出力し、フォーマット（数値桁区切り・連番・子テーブル情報等）を確認する
    ③テーブル作成権限ユーザーでExcel/JSONからテーブル作成できることを確認する
    ④テーブル管理者（一般ユーザー）で帳票の登録・編集が可能であることを確認する
    ⑤子テーブルが空のレコードで$START/$ENDがそのまま表示されないことを確認
    ⑥帳票ダウンロードの動作を確認する
    ⑦各種バグ修正確認
  expected: |
    帳票テンプレート・出力フォーマット・権限・子テーブル・ダウンロードが全て正常に動作すること
  includes:
  - RPT-CHILD
  - RPT-FORMAT
  - RPT-INDEX
  - RPT-PERMISSION
  - 56-1
  - 144-01
  - '198'
  - '205'
  - '206'
  - '207'
  - '208'
  - '216'
  - '230'
  - '236'
  - '253'
  - '568'
actual_steps:
- case_no: 144-01
  status: partial
  steps: '1. beforeAll: create-all-type-table API呼び出し

    2. beforeAll: create-all-type-data API呼び出し (count:3, pattern:''fixed'')

    3. テーブルIDをAPIステータスから取得

    4. 帳票設定ページ（/admin/dataset__{tableId}/report）に遷移

    5. ナビバーの表示確認

    6. ページURLが admin を含むことを確認

    7. スクリーンショット保存

    8. afterAll: delete-all-type-tables API呼び出し

    '
  assertions: '- await expect(page.locator(''.navbar'')).toBeVisible()

    - expect(pageUrl).toContain(''admin'')

    '
  gaps: '⚠️ YAMLには「帳票設定の追加・編集・削除」操作が期待されるが、ページの表示確認のみ

    ⚠️ 帳票テンプレートのアップロード操作なし

    ⚠️ 帳票設定の保存・確認なし

    '
