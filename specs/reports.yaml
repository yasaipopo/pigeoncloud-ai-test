- case_no: '253'
  status: skip
  steps: |
    test.skip('手動確認推奨')
  assertions: |
    なし
  gaps: |
    ⚠️ ファイル・画像項目を含む帳票のダウンロード確認は手動テストのみ

- case_no: 56-1
  status: partial
  steps: |
    1. 帳票設定ページに遷移
    2. ファイルアップロードボタンの存在確認
    3. 存在する場合は一時テキストファイルを作成して setInputFiles
    4. 送信ボタンをクリック
    5. エラーメッセージの存在確認（条件付き）
    6. 一時ファイルを削除
    7. スクリーンショット保存
  assertions: |
    - エラーメッセージが存在すれば toBeVisible()（条件付き）
  gaps: |
    ⚠️ エラーが表示されない場合でもパスする（条件付きアサーション）
    ⚠️ エラーメッセージの内容確認なし
    ⚠️ ファイルアップロードボタンが存在しない場合でもパスする
