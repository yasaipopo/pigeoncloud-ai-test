actual_steps:
- case_no: 144-01
  status: partial
  steps: '1. beforeAll: create-all-type-table API呼び出し

    2. beforeAll: create-all-type-data API呼び出し (count:3, pattern:''fixed'')

    3. テーブルIDをAPIステータスから取得

    4. 帳票設定ページ（/admin/dataset__{tableId}/report）に遷移

    5. ナビバーの表示確認

    6. ページURLが admin を含むことを確認

    7. スクリーンショット保存

    8. afterAll: delete-all-type-tables API呼び出し

    '
  assertions: '- await expect(page.locator(''.navbar'')).toBeVisible()

    - expect(pageUrl).toContain(''admin'')

    '
  gaps: '⚠️ YAMLには「帳票設定の追加・編集・削除」操作が期待されるが、ページの表示確認のみ

    ⚠️ 帳票テンプレートのアップロード操作なし

    ⚠️ 帳票設定の保存・確認なし

    '
