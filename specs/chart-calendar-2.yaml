- case_no: cc2-350
  feature: チャート・集計
  description: ①ワークフロー設定テーブルで集計フィルタにワークフロー条件を設定して保存できること
  expected: |
    ワークフロー設定テーブルで集計フィルタにワークフロー条件を設定して保存できること
  movie: C205
  detailed_flow: |-
    【C205 テストフロー】この動画で確認するテスト番号:
      cc2-350        (旧: 85-1)    ワークフロー設定テーブルで集計フィルタにワークフロー条件を設定して保存できること

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [cc2-350] ── ワークフロー設定テーブルで集計フィルタにワークフロー条件を設定して保存できること
    【前提】ALLテストテーブルが存在し、ワークフロー設定が有効になっていること（テーブル設定→ワークフロータブで有効化）。
    1. adminでログインし、ALLテストテーブル一覧ページに遷移する
    2. ドロップダウンメニューから「集計」を選択して集計モーダルを開く
    3. 絞り込みタブを開き、「条件を追加」をクリックして条件行を追加する
    4. フィールドセレクトでワークフロー関連フィールド（承認ステータス等）を選択して条件を設定する
    5. 設定タブに切り替え、集計名（例: テスト集計-85-1）を入力する
    6. 「保存して表示」をクリックして保存する
    ✅ ワークフロー関連フィールドが絞り込み条件として選択できること
    ✅ 保存後にエラーが表示されないこと
  old_case_no: 85-1
