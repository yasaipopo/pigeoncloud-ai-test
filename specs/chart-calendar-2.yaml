    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    【前提】ALLテストテーブルに10件以上データが存在すること。テストユーザー（ishikawa+N@loftal.jp）が1名以上作成済みであること。
    1. adminでログインし、ALLテストテーブル一覧ページ（/admin/dataset__{tableId}）に遷移する
    2. button.dropdown-toggle（帳票以外）をクリックしてドロップダウンを開く
    3. .dropdown-item:has-text("チャート") をクリックしてチャートモーダルを開く
    4. .modal.show または .charts-modal-dialog が表示されることを確認
    5. [role="tab"]:has-text("設定") をクリックして設定タブに切り替える
    6. input[name="grant"][value="public"] をクリックして「全員に表示」を選択する
    7. input[name="grant"][value="public"] が checked であることを確認（expect(radio).toBeChecked()）
    8. タイトル入力欄（.modal.show input.form-control）にチャート名（例: テストチャート-16-1-全員表示）を入力する
    9. button:has-text("保存して表示") をクリックして保存する
    10. body に "Internal Server Error" / "エラーが発生しました" が含まれないことを確認
    11. モーダルが閉じてテーブルビュー（.navbar 等）に戻ることを確認
    【assert】
    - input[name="grant"][value="public"] が toBeChecked()
    - body に "Internal Server Error" を含まない
    - .navbar が toBeVisible()
  old_case_no: 16-1
