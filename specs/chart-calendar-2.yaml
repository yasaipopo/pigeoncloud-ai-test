    [cc2-010] ── チャート設定「全員に表示」で他ユーザーからも集計結果が確認できること
    【前提】ALLテストテーブルに10件以上データが存在すること。テストユーザー（ishikawa+N@loftal.jp）が1名以上作成済みであること。
    1. adminでログインし、ALLテストテーブル一覧ページに遷移する
    2. ドロップダウンメニューから「チャート」を選択してチャートモーダルを開く
    3. 設定タブを開き、チャート名（例: テストチャート-全員表示）を入力する
    4. 表示権限で「全員に表示」を選択する
    5. 「保存して表示」をクリックして保存する
    6. テストユーザー（ishikawa+N）でログインし直し、同テーブルのチャート一覧を確認する
    ✅ 「全員に表示」権限のラジオボタンが選択状態になっていること
    ✅ 保存後にエラーが表示されないこと
    ✅ テストユーザーでもadminが作成したチャートが表示されること

