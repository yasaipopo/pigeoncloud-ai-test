- case_no: '261'
  feature: チャート・集計
  description: ①チャートのデフォルト設定「全てのユーザーのデフォルトにする」が正常に動作すること
  expected: |
    チャートのデフォルト設定「全てのユーザーのデフォルトにする」が正常に動作すること
  movie: C201
  detailed_flow: |
    【前提】ALLテストテーブルが存在すること。チャートのデフォルト設定タブはフィルタ/ビューモードの場合に表示される。
    1. adminでログインし、ALLテストテーブル一覧ページに遷移する
    2. button.dropdown-toggle（帳票以外）をクリックしてドロップダウンを開く
    3. .dropdown-item:has-text("チャート") をクリックしてチャートモーダルを開く
    4. .modal.show が表示されることを確認
    5. [role="tab"]:has-text("デフォルト設定") が存在する場合はクリックしてデフォルト設定タブに切り替える
    6. #check_default チェックボックスが表示されることを確認
    7. チェックボックスが disabled でない場合は check() でチェックを入れる
    8. #check_default が toBeChecked() であることを確認
    9. button:has-text("保存して表示") をクリックして保存する
    10. body に "Internal Server Error" が含まれないことを確認
    11. .navbar が toBeVisible() であることを確認
    【補足】デフォルト設定タブはチャートでは非表示の場合があるため、タブが存在しない場合はモーダルが正常表示されていることだけ確認する
    【assert】
    - #check_default が toBeChecked()（タブが存在する場合）
    - body に "Internal Server Error" を含まない

- case_no: 88-1
  feature: チャート・集計
  description: ①チャート設定「行に色を付ける」（条件1つ）が設定通りに色がつくこと
  expected: |
    チャート設定「行に色を付ける」（条件1つ）が設定通りに色がつくこと
  movie: C201
  detailed_flow: |
    【前提】ALLテストテーブルが存在すること。「行に色を付ける」タブはビュー（filter_type=view）の場合に表示される。
    1. adminでログインし、ALLテストテーブル一覧ページに遷移する
    2. button.dropdown-toggle（帳票以外）をクリックしてドロップダウンを開く
    3. .dropdown-item:has-text("チャート") をクリックしてチャートモーダルを開く
    4. .modal.show が表示されることを確認
    5. [role="tab"]:has-text("行に色を付ける") が存在する場合はクリックしてタブに切り替える
    6. button:has-text("条件・色を追加") をクリックして条件・色を1つ追加する
    7. .card 内に input[type="color"] が存在することを確認（カラーフィルタカードが1件追加された）
    8. input[type="color"] が toBeVisible() であることを確認
    9. button:has-text("保存して表示") をクリックして保存する
    10. body に "Internal Server Error" が含まれないことを確認
    【補足】「行に色を付ける」タブはビューの場合のみ表示。チャートモーダルで非表示の場合はモーダルの正常表示を確認する。
    【assert】
    - input[type="color"] が toBeVisible()（タブが存在する場合）
    - .card filter(has: input[type="color"]) の count が ≥ 1
    - body に "Internal Server Error" を含まない

