  description: ①集計フィルタの設定タブでタイトル入力・全員に表示・ダッシュボード表示にチェックして集計を保存できること
  expected: |
    集計フィルタの設定タブでタイトル入力・全員に表示・ダッシュボード表示にチェックして集計を保存できること
  movie: C204
  detailed_flow: |-
    【C204 テストフロー】この動画で確認するテスト番号:
      cc2-300        (旧: 120-02)  集計フィルタの設定タブでタイトル入力・全員に表示・ダッシュボード表示にチェックして集計を保存できること
      cc2-310        (旧: 120-03)  集計フィルタで他テーブルの項目を使用して集計結果を表示できること
      cc2-320        (旧: 120-04)  集計フィルタで他テーブルの項目を使用して保存し全員に表示されること
      cc2-330        (旧: 120-05)  集計フィルタで計算式を使って集計結果が表示されること
      cc2-340        (旧: 120-06)  集計フィルタで計算式を使った集計を保存し全員に表示されること

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [cc2-300] ── 集計フィルタの設定タブでタイトル入力・全員に表示にチェックして集計を保存できること
    【前提】ALLテストテーブルが存在し、10件以上データが入っていること。
    【注意】「ダッシュボードに表示」チェックボックスは現UIに存在しない（仕様変更済み）。「全員に表示」はラジオボタン。
    1. adminでログインし、ALLテストテーブル一覧ページに遷移する
    2. ドロップダウンメニューから「集計」を選択して集計モーダルを開く
    3. 設定タブを開き、集計名（例: テスト集計-120-02）を入力する
    4. 表示権限で「全員に表示」を選択する
    5. 「保存して表示」をクリックして保存する
    ✅ 「全員に表示」のラジオボタンが選択状態になっていること
    ✅ 保存後にエラーが表示されないこと
    ✅ 保存後にテーブル一覧ビューに戻ること

