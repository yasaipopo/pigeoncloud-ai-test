- case_no: 66-1
  feature: チャート・集計
  description: ①チャート絞り込みで条件「空ではない」を設定した場合に想定通りの集計結果が表示されること
  expected: ・チャート絞り込みで条件「空ではない」を設定した場合に正しい結果が表示されること
  movie: C201
  detailed_flow: |
    【前提】ALLテストテーブルが存在し、テキスト・数値等のフィールドにデータが入っていること。
    1. adminでログインし、ALLテストテーブル一覧ページに遷移する
    2. button.dropdown-toggle（帳票以外）をクリックしてドロップダウンを開く
    3. .dropdown-item:has-text("チャート") をクリックしてチャートモーダルを開く
    4. .modal.show が表示されることを確認
    5. [role="tab"]:has-text("絞り込み") をクリックして絞り込みタブに切り替える
    6. button:has-text("条件を追加") をクリックして条件行を追加する
    7. 条件行が追加されたことを確認（演算子selectが表示される）
    8. 演算子のselectで「空ではない」オプションを選択する（select option:has-text("空ではない")）
    9. 「表示」ボタン（button:has-text("表示")）をクリックしてプレビューを表示する
    10. body に "Internal Server Error" / "エラーが発生しました" が含まれないことを確認
    11. チャートプレビュー（canvas, cloud-charts, .chart-container）が表示されていることを確認
    【assert】
    - 条件行が1つ以上追加されている
    - body に "Internal Server Error" を含まない
    - canvas または cloud-charts が toBeVisible()（存在する場合）

