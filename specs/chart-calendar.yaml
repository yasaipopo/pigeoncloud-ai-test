- case_no: 105-01
  status: partial
  steps: '1. beforeAll: create-all-type-table API呼び出し

    2. beforeAll: create-all-type-data API呼び出し (count:3, pattern:''fixed'')

    3. navigateToAllTypeTable()でステータスAPIからテーブルIDを取得しレコード一覧に遷移

    4. 「集計」ボタン（button:has-text("集計")）の存在確認

    5. 存在する場合はクリックしてサイドパネルを開く

    6. スクリーンショット保存

    7. finally: delete-all-type-tables API呼び出し

    '
  assertions: '- ボタンが存在すればクリック成功確認（if (count > 0) の条件付き）

    - expect(page.locator(''.navbar'')).toBeVisible()

    - expect(pageText).not.toContain(''Internal Server Error'')

