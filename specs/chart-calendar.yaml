- case_no: 105-01
  sheet: A
  feature: チャート
  category: オプション->累積(時系列の場合)
  description: |-
    ①該当のテーブルを開く。
    ②メニューより「チャート追加」を選択。
    ③チャート設定タブを選択
    ④オプションの「累積(時系列の場合)」にチェックを入れ
    　「グラフ」を全種類選択
  expected: ・Webhook設定を1つ設定するとレコード作成時にWebhookへ通知が行われること
  movie: CC01
  detailed_flow: |
    1. /admin/dataset__{tableId} を開き、テーブル一覧が表示されることを確認する
    2. ツールバーの fa-bars メニューボタン（button.btn-sm.btn-outline-primary.dropdown-toggle）をクリックする
    3. ドロップダウンメニューから「チャート」をクリックする
    4. チャート設定モーダルが開くことを確認する（チャート設定のタブが表示される）
    5. 「チャート設定」タブをクリックする
    6. 「オプション」セクションにある「累積(時系列の場合)」チェックボックスにチェックを入れる
    7. 「グラフ」の種類選択で「棒グラフ」を選択し、チャートが表示されることを確認する
    8. 続いて「折れ線グラフ」「円グラフ」など他の種類も順に選択し、各グラフが表示されることを確認する
    9. 内部エラー（Internal Server Error）が発生しないことを確認する
