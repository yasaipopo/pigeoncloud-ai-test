- case_no: 118-01
  sheet: A
  feature: 集計
  category: フィルタ
  description: |-
    ①フィルタにて以下日付の検索が可能なこと。絞り込みで相対値設定し確認。

    去年、今年、来年、
    先月、今月、来月、
    先週、今週、来週、
    昨日、今日、明日
  expected: ・集計フィルタで日付の相対値（今日〜来年）検索が正常に動作すること
  movie: CC03
  detailed_flow: |
    1. /admin/dataset__{tableId} を開き、テーブル一覧が表示されることを確認する
    2. ツールバーの fa-bars メニューボタンをクリックし、「集計」を選択する
    3. 集計設定パネルが開くことを確認する（集計タブや絞り込みタブが表示される）
    4. 「絞り込み」タブをクリックする
    5. 「条件を追加」ボタンをクリックし、日付項目（例: 日付フィールド）を選択する
    6. 演算子として「が次と一致」を選択し、「相対値」チェックボックスをONにする
    7. 相対値ドロップダウンから「今日」を選択し、フィルタが適用されることを確認する
    8. 続けて「昨日」「明日」「今週」「先週」「来週」「今月」「先月」「来月」「今年」「去年」「来年」を順に選択し、それぞれ結果が表示されることを確認する
    9. 内部エラー（Internal Server Error）が発生しないことを確認する
- case_no: 151-1
  sheet: A
  feature: フィルタ（集計）
  category: 日時項目での相対値での絞り込み
  description: |-
    ①該当テーブルのレコード一覧を開く。
    （テーブル内には日時項目が設定されていること）
    ②メニューより「集計」を選択。
    ③「絞り込み」タブを選択し、絞り込みの「条件を追加」ボタンをクリック。
    ④絞り込みに用いる日時項目をリストより選択する。
    ⑤「が次と一致」を選択する。
    ⑥【相対値】にチェックを入れ、「今日」~「来年」までを順に設定していく。
  expected: ・集計の絞り込みで日時項目の相対値（今日〜来年）が正しく絞り込まれること
  movie: CC03
  detailed_flow: |
    1. /admin/dataset__{tableId} を開く（日時項目を持つALLテストテーブルを使用）
    2. ツールバーの fa-bars メニューボタンをクリックし、「集計」を選択する
    3. 集計設定パネルが開くことを確認する
    4. 「絞り込み」タブをクリックする
    5. 「条件を追加」ボタンをクリックし、日時項目（例: 日時フィールド）をドロップダウンから選択する
    6. 演算子として「が次と一致」を選択する
    7. 「相対値」チェックボックスをONにする
    8. 相対値ドロップダウンから「今日」を選択し、集計結果が表示されることを確認する
    9. 続けて「明日」「昨日」「今週」「来週」「先週」「今月」「来月」「先月」「今年」「来年」「去年」を順に選択し、各結果が正常に表示されることを確認する
    10. 内部エラー（Internal Server Error）が発生しないことを確認する
