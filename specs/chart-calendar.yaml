- case_no: cc-190
  sheet: B
  feature: 文字列
  description: |-
    ①【バグ修正確認】カレンダー表示で、時間が隠れてしまう。
    ②添付1枚目：隠れていない
    添付2枚目：隠れてしまう（表示文字数が多いと隠れてしまうようです。
    ③）

    時間表示のスペースは確保した上で、表示文字は左詰めで良いかと思います。
    ④対応: https://github.com/Loftal/pigeon_cloud/pull/267。
  expected: バグが修正され、正常に動作すること。(カレンダー表示で、時間が隠れてしまう。  添付1枚目：隠れていない 添付2枚目：隠れてしまう（表示文字数が多いと隠れてしまうようです。）  時間表示のスペースは確保した上で、表示文字は左詰めで良いかと)
  movie: CC08
  detailed_flow: |-
    【CC08 テストフロー】この動画で確認するテスト番号:
      cc-190         (旧: 248)     文字列
      cc-200         (旧: 256)     桁数(カンマ区切り)
      cc-210         (旧: 268)     文字列
