- case_no: CAL-FULL
  feature: カレンダー機能総合
  category: 動画単位
  description: |
    ①カレンダー表示をONにしたテーブルを表示する
    ②月表示に切り替え、イベントが正しく表示されることを確認
    ③週表示に切り替え、時間表示が隠れていないことを確認
    ④週表示でイベントのドラッグ移動がデータに反映されることを確認
    ⑤月表示でイベント数が多い日でも日付が消えないことを確認
    ⑥カレンダーがデフォルト表示のテーブルAからテーブルBに左メニューで遷移し、F5なしで表示されることを確認
    ⑦日・週・月の各ビューで切り替えが正常に動作することを確認
    ⑧「前へ」「次へ」「今日」ボタンでナビゲーションが正常に動作することを確認
  expected: |
    カレンダーの月/週/日表示・ナビゲーション・イベント表示・遷移が全て正常に動作すること
  includes:
  - CAL-DISPLAY
  - CAL-NAVIGATE
  - 105-01
  - 105-02
- case_no: AGG-FULL
  feature: 集計機能総合
  category: 動画単位
  description: |
    ①集計を表示し、各種集計タイプ（合計・平均・件数等）で結果を確認する
    ②クロス集計を実行し、他テーブル参照（複数値許可）でも正しく表示されることを確認
    ③集計フィルタで相対値「今年度」を設定し、年度開始月4月で正しい期間のデータが表示されることを確認
    ④「昨年度」「来年度」もそれぞれ正しい期間で表示されることを確認
    ⑤数値項目の桁区切り設定がONの場合、集計結果にもカンマが表示されることを確認
  expected: |
    集計の各種タイプ・クロス集計・フィルタ相対値・書式設定が全て正常に動作すること
  includes:
