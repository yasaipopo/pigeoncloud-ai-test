- case_no: cc-170
  sheet: B
  feature: カレンダー
  category: ビュー表示
  description: |-
    ①カレンダー表示の際に、FROM/TOを設定して複数日分の表示。
    ②FROM/TOで指定の項目を日付指定、時刻指定それぞれでを指定。
    ③ビューについて「月」「週」「日」の全てで確認する。
  expected: ・カレンダーFROM/TO設定で月/週/日ビューが正しく表示されること
  movie: CC07
  detailed_flow: |-
    【CC07 テストフロー】この動画で確認するテスト番号:
      cc-170         (旧: 214)     カレンダー
      cc-180         (旧: 215)     カレンダー

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    1. /admin/dataset__{tableId}/setting/calendar（またはテーブル設定のカレンダー設定タブ）を開く
    2. カレンダー設定で FROM フィールドに日付項目を設定し、TO フィールドに別の日付または日時項目を設定する
    3. 設定を保存する
    4. /admin/dataset__{tableId} を開き、カレンダービューを選択する
    5. カレンダーが月ビューで表示され、FROM〜TOの期間に対応するレコードが表示されることを確認する
    6. 「週」ビューに切り替え、複数日にまたがるイベントが正しく表示されることを確認する
    7. 「日」ビューに切り替え、時間軸でイベントが表示されることを確認する
    8. 内部エラー（Internal Server Error）が発生しないことを確認する
  old_case_no: '214'
