- case_no: cc-050
  sheet: A
  feature: 集計
  category: フィルタ
  description: |-
    ①フィルタにて以下日付の検索が可能なこと。絞り込みで相対値設定し確認。

    去年、今年、来年、
    先月、今月、来月、
    先週、今週、来週、
    昨日、今日、明日
  expected: ・集計フィルタで日付の相対値（今日〜来年）検索が正常に動作すること
  movie: CC03
  detailed_flow: |-
    【CC03 テストフロー】この動画で確認するテスト番号:
      cc-050 (旧: 118-01)  集計フィルタ日付相対値
      cc-060 (旧: 151-1)   フィルタ（集計）日時相対値
      cc-070 (旧: 15-1)    集計 全員に表示
      cc-080 (旧: 15-2)    集計 自分のみ表示
      cc-090 (旧: 23-1)    集計 ダッシュボードへのテーブル表示
      cc-100 (旧: 65-1)    集計 条件「空ではない」

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] cc-050 ── 集計フィルタ日付相対値（去年〜来年）
    1. テーブルのレコード一覧を開く
    2. ツールバーのハンバーガーメニューから「集計」を選択する
    3. 集計設定パネルの「絞り込み」タブをクリックする
    4. 「条件を追加」をクリックし、日付フィールドを選択する
    5. 演算子「が次と一致」を選び、「相対値」チェックボックスをONにする
    6. 相対値ドロップダウンを「今日」「昨日」「明日」「今週」「先週」「来週」「今月」「先月」「来月」「今年」「去年」「来年」と順に切り替える
    ✅ 各相対値を選択するたびに絞り込み結果が切り替わること
    ✅ エラーダイアログやInternal Server Error が表示されないこと
    ✅ 全12種類の相対値が選択肢に存在すること

    [続き] cc-060 ── 集計絞り込みで日時項目の相対値
    → cc-050 のフローに続けて日時項目でも同様の相対値が動作することを確認
    詳細は cc-060 のフローを参照

    [続き] cc-070 ── 集計「全員に表示」
    → 集計設定の「設定」タブで「全員に表示」を選択して保存後、別ユーザーから確認
    詳細は cc-070 のフローを参照

    [続き] cc-080 ── 集計「自分のみ表示」
    → 集計設定の「設定」タブで「自分のみ表示」を選択して保存後、別ユーザーから非表示を確認
    詳細は cc-080 のフローを参照

    [続き] cc-090 ── ダッシュボードへのテーブル表示
    → 集計設定の「設定」タブでタイトルを入力し「ダッシュボードに表示」をONにして保存
    詳細は cc-090 のフローを参照

    [続き] cc-100 ── 集計条件「空ではない」
    → 集計設定の「絞り込み」タブで条件「空ではない」を設定して「表示」をクリック
    詳細は cc-100 のフローを参照
  old_case_no: 118-01
