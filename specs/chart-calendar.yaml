- case_no: cc-110
  sheet: A
  feature: 集計
  category: |-
    絞り込み
    ・条件設定
    ・集計に対する絞り込み
    ・ソート順
  description: |-
    ①該当のテーブル一覧を開く
    ②集計を選択
    ③「絞り込み」タブをクリックし、【絞り込み】／【集計に対する絞り込み】／【ソート順】を設定し「保存する」をクリックする。
    「並び順」タブからソート設定
  expected: 設定通りの集計結果がカスタムフィルターへ保存されて且つ表示内容も申請中(要確認)の集計結果が表示できること。
  movie: CC05
  detailed_flow: |-
    【CC05 テストフロー】この動画で確認するテスト番号:
      cc-110 (旧: 85-2)  集計 絞り込み・集計に対する絞り込み・ソート

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] cc-110 ── 集計の絞り込み・集計値絞り込み・並び順を設定して保存
    1. テーブルのレコード一覧を開き、ハンバーガーメニューから「集計」を選択する
    2. 「絞り込み」タブをクリックし「条件を追加」で通常の絞り込み条件を1件設定する
    3. 「集計に対する絞り込み」セクションでも「条件を追加」をクリックして集計値への条件を設定する
    4. 「並び順」タブをクリックし、ソートするフィールドと昇順/降順を設定する
    5. 「保存する」ボタンをクリックする
    ✅ 保存後、絞り込み条件に合致するレコードのみで集計結果が表示されること
    ✅ 集計値への絞り込み（集計に対する絞り込み）が反映されていること
    ✅ 設定した並び順で集計結果がソートされていること
    ✅ Internal Server Error が表示されないこと
  old_case_no: 85-2
