- case_no: 151-1
  sheet: A
  feature: フィルタ（集計）
  category: 日時項目での相対値での絞り込み
  description: '①該当テーブルのレコード一覧を開く。

    （テーブル内には日時項目が設定されていること）

    ②メニューより「集計」を選択。

    ③「絞り込み」タブを選択し、絞り込みの「条件を追加」ボタンをクリック。

    ④絞り込みに用いる日時項目をリストより選択する。

    ⑤「が次と一致」を選択する。

    ⑥【相対値】にチェックを入れ、「今日」~「来年」までを順に設定していく。'
  expected: ⑥の絞り込みが想定通りの絞り込みとなること。
