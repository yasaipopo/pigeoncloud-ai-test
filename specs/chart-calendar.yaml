    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    1. /admin/dataset__{tableId} を開き、カレンダービューを選択する
    2. 日表示または週表示に切り替える（時間軸が表示されるビュー）
    3. テキストが長いレコードのイベント要素（.fc-event）をカレンダー上で確認する
