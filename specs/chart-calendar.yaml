  description: |-
    ①該当のテーブル一覧を開く。
    ②一連の「ビュー作成」設定を行い、「行に色を付ける」タブをクリック。
    ③「行に色を付ける」の全ての設定項目を行い「保存する」ボタンをクリック。
  expected: 保存された集計設定が、「行に色を付ける」で設定した設定通りの色がつくこと。
  movie: CC06
  detailed_flow: |-
    【CC06 テストフロー】この動画で確認するテスト番号:
      cc-120         (旧: 87-1)    集計
    ビュー作成
      cc-130         (旧: 87-2)    集計
    ビュー作成
      cc-140         (旧: 110-01)  集計
      cc-150         (旧: 110-02)  集計
      cc-160         (旧: 120-01)  フィルタ(集計)

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    1. /admin/dataset__{tableId} を開く
    2. ツールバーの fa-bars メニューボタンをクリックし、「ビュー作成」を選択する
