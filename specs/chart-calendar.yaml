base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: CHART-FULL
  feature: チャート機能総合
  category: 動画単位
  description: |
    ①テーブルを開きチャートを追加する
    ②チャート設定（期間単位・ラベル・並び順）を行う
    ③各種チャートタイプ（棒・折れ線・円）で表示を確認する
    ④フィルタ設定（合計・年度等）でグラフが正しく表示されることを確認
    ⑤累積表示オプションを有効にし、過去月データが横ばいで表示されることを確認
    ⑥データ項目・y軸での並び替え（昇順・降順）が機能することを確認
    ⑦ラベル「年度」表記・絞り込みの「今年度」「来年度」が存在することを確認
    ⑧チャート設定の「期間単位」に「全て」が含まれていないことを確認
    ⑨ダッシュボードのチャート・フィルタ配置変更が保持されることを確認
    ⑩閲覧権限ユーザーでダッシュボードの歯車マークが非表示であることを確認
  expected: |
    チャートの作成・設定・各種表示・フィルタ・ソート・ラベルが全て正常に動作すること
  includes:
  - CHART-SETTING
  - CHART-FILTER
  - CHART-CUMULATIVE
  - CHART-SORT
  - CHART-LABEL
