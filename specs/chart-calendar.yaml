  feature: チャート
  category: オプション->累積(時系列の場合)
  description: |-
    ①該当のテーブルを開く。
    ②メニューより「チャート追加」を選択。
    ③チャート設定タブを選択
    ④オプションの「累積(時系列の場合)」にチェックを入れ
    　「グラフ」を全種類選択
  expected: ・Webhook設定を1つ設定するとレコード作成時にWebhookへ通知が行われること
  movie: CC01
  detailed_flow: |-
    【CC01 テストフロー】この動画で確認するテスト番号:
      cc-010 (旧: 105-01)  チャート累積オプション
      cc-020 (旧: 105-02)  チャート過去分加算オプション

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] cc-010 ── チャート累積オプション + 全グラフ種類選択
    1. テーブルのレコード一覧を開く
    2. ツールバーのハンバーガーメニューを開き「チャート追加」を選択する
    3. チャート設定モーダルの「チャート設定」タブをクリックする
    4. 「オプション」セクションの「累積(時系列の場合)」にチェックを入れる
    5. グラフ種類を「棒グラフ」→「折れ線グラフ」→「円グラフ」と順に切り替える
    ✅ 各グラフ種類に切り替えるたびにチャートが描画されること
    ✅ 累積オプションが有効な状態でグラフが正常に表示されること
    ✅ Internal Server Error が表示されないこと

    [続き] cc-020 ── 過去分加算オプション
    → cc-010 のフローに続けて実施（同一モーダル内で設定変更）
    詳細は cc-010 のフロー参照
  old_case_no: 105-01
