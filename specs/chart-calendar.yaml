- case_no: cc-030
  sheet: A
  feature: カレンダー
  category: 週表示
  description: |-
    ①カレンダー表示をONにしている、テーブルを表示する。
    ②カレンダーのビューを週表示にする。
  expected: エラーなく週表示のビューとなること。
  movie: CC02
  detailed_flow: |-
    【CC02 テストフロー】この動画で確認するテスト番号:
      cc-030         (旧: 114-01)  カレンダー
      cc-040         (旧: 114-02)  カレンダー

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    1. カレンダー表示ONのフィルタを持つテーブル（ALLテストテーブル）のレコード一覧 /admin/dataset__{tableId} を開く
    2. フィルタ切り替えタブまたはビュー切り替えボタンで「カレンダー」ビューを選択する
    3. カレンダーが月ビューで表示されることを確認する（.fc-view または .calendar-container が表示される）
    4. カレンダーのビュー切り替えボタンから「週」をクリックする（button:has-text("週") または [data-view="week"]）
    5. 週表示のカレンダーが表示されることを確認する（.fc-timeGridWeek または週を示すヘッダーが表示される）
    6. 内部エラー（Internal Server Error）が発生しないことを確認する
  old_case_no: 114-01
