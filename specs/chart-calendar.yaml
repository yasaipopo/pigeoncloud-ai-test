- case_no: 85-2
  sheet: A
  feature: 集計
  category: |-
    絞り込み
    ・条件設定
    ・集計に対する絞り込み
    ・ソート順
  description: |-
    ①該当のテーブル一覧を開く
    ②集計を選択
    ③「絞り込み」タブをクリックし、【絞り込み】／【集計に対する絞り込み】／【ソート順】を設定し「保存する」をクリックする。
    「並び順」タブからソート設定
  expected: 設定通りの集計結果がカスタムフィルターへ保存されて且つ表示内容も申請中(要確認)の集計結果が表示できること。
  movie: CC05
  detailed_flow: |
    1. /admin/dataset__{tableId} を開く
    2. ツールバーの fa-bars メニューボタンをクリックし、「集計」を選択する
    3. 「絞り込み」タブをクリックする
    4. 「絞り込み」セクションで「条件を追加」をクリックし、任意のフィールドで条件を設定する
    5. 「集計に対する絞り込み」セクションでも条件を追加する（集計値への絞り込みが設定できることを確認）
    6. 「並び順」タブをクリックし、ソート対象フィールドと昇順/降順を設定する
    7. 「保存する」ボタンをクリックする
    8. 保存完了後、設定した条件で絞り込まれた集計結果が表示されることを確認する
    9. 内部エラー（Internal Server Error）が発生しないことを確認する
- case_no: 87-1
  sheet: A
