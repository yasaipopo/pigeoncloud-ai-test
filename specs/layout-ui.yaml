    ④＋ボタンが縦に延びていないことを確認する
  expected: 関連レコード一覧のページネーション付きレイアウトが崩れず、横一列で正しく表示されること
  movie: UC18
  detailed_flow:
    setup:
      - getAllTypeTableId でALLテストテーブルのIDを取得
      - ALLテスト_子テーブルが関連レコードとして設定されていること
      - テストレコードに関連レコードが複数件存在すること（ページネーションが発生するほど）
