- case_no: lui-220
  sheet: B
  feature: 文字列
  description: |-
    ①トライアル環境のダッシュボードの掲示板記載内容ですが、
    以下環境の掲示板記載内容に変更いただきたいです。
    ②（zendeskのフォームURL記載しました。
