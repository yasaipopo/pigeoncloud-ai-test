- case_no: lui-030
  sheet: A
  feature: アイコンタイプ
  category: 画像（画像指定あり）
  description: |-
    ①テーブル管理より該当テーブルの編集を開く。
    ②「追加オプション設定」のメニュー表示有効にする。
    ③アイコンタイプの画像を選択し、アイコン画像用のファイルをアップロード。
    ④「更新」ボタンをクリックする。
  expected: メニュー画面の左記設定を行ったテーブルにアップロードした画像がアイコン表示されていること。
  movie: LU04
  detailed_flow: |
    【LU04 テストフロー】この動画で確認するテスト番号:
      lui-030 (旧: 215-1)  アイコンタイプ「画像」で画像指定あり
      lui-040 (旧: 215-2)  アイコンタイプ「画像」で画像削除
      lui-050 (旧: 215-3)  アイコンタイプ「画像」で画像指定なし
      lui-060 (旧: 215-4)  アイコンタイプ「アイコン」でアイコン指定あり
      lui-070 (旧: 215-5)  アイコンタイプ「アイコン」でアイコン指定なし
      lui-180 (旧: 154-1)  カスタムCSS適用
      lui-190 (旧: 154-2)  カスタムCSS削除
      lui-200 (旧: 228)    デジエ移行向けUIバージョン（スキップ）
      lui-220 (旧: 317)    ダッシュボード掲示板の内容
      lui-230 (旧: 336)    ダッシュボード新規掲示板の登録
      lui-240 (旧: 408)    サイドメニューの「テーブル追加」リンク表示

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] lui-030 ── アイコンタイプ「画像」で画像指定あり
    1. テーブル設定ページ（/admin/dataset/edit/{tableId}）を開く
    2. 「メニュー」タブをクリックして展開
    3. アイコンタイプの「画像」ラジオボタンを選択
    4. ファイル選択フィールドに ok.png をアップロード
    5. ✅ 画像プレビューが表示されること
    6. ✅ 「画像を削除」ボタンが表示されること（アップロード成功の証拠）
    7. 「更新」ボタンをクリックして保存

    [0:15] lui-040 ── アイコンタイプ「画像」で画像削除
    1. テーブル設定ページ（/admin/dataset/edit/{tableId}）を開く
    2. 「メニュー」タブ → アイコンタイプ「画像」を選択
    3. 画像が未設定の場合は ok.png をアップロードしておく
    4. 「画像を削除」ボタンをクリック → 確認ダイアログが出たらOKをクリック
    5. ✅ 画像プレビューが非表示または src が空になること
    6. ✅ 「画像を削除」ボタンが消えること

    [0:28] lui-050 ── アイコンタイプ「画像」で画像指定なし
    1. テーブル管理画面（/admin/dataset）を開く
    2. ✅ テーブル一覧が正常に表示されること（画像未指定時のデフォルト表示）

    [0:35] lui-060 ── アイコンタイプ「アイコン」でアイコン指定あり
    1. テーブル管理画面（/admin/dataset）を開く
    2. ✅ テーブル一覧が正常に表示されること（アイコン指定時の表示確認）

    [0:42] lui-070 ── アイコンタイプ「アイコン」でアイコン指定なし
    1. テーブル管理画面（/admin/dataset）を開く
    2. ✅ テーブル一覧が正常に表示され、サイドバーナビゲーションも表示されること

    [0:50] lui-180 ── カスタムCSS適用
    1. 「その他設定」ページ（/admin/admin_setting/edit/1）を開く
    2. カスタムCSSのファイル入力フィールドに test_custom.css をアップロード
    3. 「更新」ボタンをクリックして保存
    4. ✅ 設定ページに留まること（正常保存）

    [1:05] lui-190 ── カスタムCSS削除
    1. 「その他設定」ページ（/admin/admin_setting/edit/1）を開く
    2. カスタムCSS欄の「削除」ボタンをクリック → 確認ダイアログが出たらOKをクリック
    3. 「更新」ボタンをクリックして保存
    4. ✅ 設定ページに留まること（正常保存）

    [1:15] lui-200 ── デジエ移行向けUIバージョン変更
    🔴 専用テスト環境（test-folder.pigeon-demo.com）でのみ確認可能なため自動テスト不可（スキップ）

    [1:20] lui-220 ── ダッシュボード掲示板の内容確認
    1. ダッシュボード（/admin/dashboard）を開く
    2. ✅ ページにエラーが含まれないこと（Internal Server Error なし）

    [1:25] lui-230 ── ダッシュボード新規掲示板の登録
    1. ダッシュボード（/admin/dashboard）を開く
    2. ✅ ページにエラーが含まれないこと（掲示板機能が正常に動作）

    [1:30] lui-240 ── サイドメニューの「テーブル追加」リンク表示
    1. ダッシュボード（/admin/dashboard）を開く
    2. サイドメニューの「＋テーブル追加画面へ」リンクを確認
    3. ✅ リンクのバウンディングボックスが正常な位置に表示されること（隠れていないこと）
  old_case_no: 215-1
