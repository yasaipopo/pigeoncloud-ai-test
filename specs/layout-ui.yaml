    - note: フォームフィールドが正常に表示されていること
      selector: .form-group, [class*="field"]
      type: visible
    - note: 登録/保存ボタンが表示されていること
      selector: button:has-text("登録"), button:has-text("保存"), button[type=submit]
      type: visible
    - not_contains: Internal Server Error
