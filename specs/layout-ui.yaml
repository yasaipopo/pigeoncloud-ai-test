      selector: body
    - evaluate: "const fields = document.querySelectorAll('.form-group, [class*=\"field\"\
        ]');\nreturn Array.from(fields).every(f => {\n  const rect = f.getBoundingClientRect();\n\
        \  return rect.width > 0;\n});\n"
      expected: true
      note: 全フォームフィールドのレイアウトが正常であること
