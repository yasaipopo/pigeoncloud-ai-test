- case_no: lui-010
  sheet: A
  feature: メニュー
  category: メニュー表示
  description: |-
    ①属性：ユーザータイプ（ユーザー）のユーザーでログイン
    ②画面右側のユーザーアイコンをクリック
  expected: |-
    ユーザーアイコンクリック後、メニュー一覧が表示されること。
    ユーザー情報と、ログアウトだけでOK
  movie: LU01
  detailed_flow: |
    【LU01 テストフロー】この動画で確認するテスト番号:
      lui-010 (旧: 100-1)   ユーザータイプ「ユーザー」でのメニュー表示
      lui-020 (旧: 127-01)  ショートカットキー（Ctrl+Space）

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] lui-010 ── ユーザータイプ「ユーザー」でのメニュー表示
    1. マスターユーザーでログインし、debug/create-user API でユーザータイプのテストユーザーを作成
    2. マスターをログアウトし、テストユーザーの ID / パスワードでログイン
    3. ダッシュボードが表示されたらヘッダー右端のユーザーアイコンをクリック
    4. ✅ ドロップダウンメニューが表示されること
    5. ✅ メニューに「ログアウト」が含まれること
    6. ✅ メニューに「管理」系の項目が含まれないこと（ユーザータイプのため管理者メニューは非表示）

    [0:10] lui-020 ── ショートカットキー（Ctrl+Space）
    🔴 Ctrl+Space テーブル検索はAngular実装でコメントアウト済みのため未テスト（スキップ）
  old_case_no: 100-1
