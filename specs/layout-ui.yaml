- case_no: 78-1
  sheet: A
  feature: ダッシュボード
  category: チャートの並び替え
  description: |-
    ①ダッシュボードを表示
    ②ダッシュボードに表示されたチャートをドラッグアンドドロップで並び替え
  expected: ドラングアンドドロップでチャートの並び替えが可能なこと。
  movie: LU03
  detailed_flow:
    setup:
      - ダッシュボードに複数チャートが存在すること
    steps:
      - url: /admin/dashboard
      - action: waitForAngular
      - action: waitForSelector
        selector: '.cdk-drag.dashboard-chart-box, .dashboard-chart-box'
        note: ダッシュボードのドラッグ可能なチャートボックスを確認
      - action: drag_and_drop
        source: '.cdk-drag.dashboard-chart-box:first-child'
        target: '.cdk-drag.dashboard-chart-box:last-child'
        note: 最初のチャートを最後の位置にドラッグアンドドロップ
      - action: waitForAngular
    assertions:
      - selector: '.cdk-drag.dashboard-chart-box, .dashboard-chart-box'
        type: visible
        note: ドラッグ後もチャートボックスが表示されている
      - selector: '.order_list.row'
        type: visible
        note: チャート一覧コンテナが正常に表示されている
    note: CDK DragDropによる並び替え操作。自動化困難な場合はスキップ対象

- case_no: 82-10
  sheet: A
  feature: ダッシュボード
  category: テーブル詳細・編集
  description: "① ユーザー種別：マスターのアカウントでログイン\r\n② ダッシュボードを開き、該当テーブルの「詳細・編集」ボタンをクリック。\n③ テーブルの詳細表示が可能であること。\n④ 「通知設定」が問題なくできること。"
  expected: ・マスターユーザーでダッシュボードからテーブルの通知設定が行えること
  movie: LU03
  detailed_flow:
    setup:
      - マスターユーザー（admin）でログイン
      - getAllTypeTableId でALLテストテーブルのIDを取得
    steps:
      - url: /admin/dashboard
      - action: waitForAngular
      - action: waitForSelector
        selector: '.cdk-drag.dashboard-chart-box, .dashboard-chart-box'
      - action: click
        selector: '.dashboard-chart-box a[href*="dataset"], .card-header a, button:has-text("詳細")'
        note: ダッシュボード上のテーブルカードの「詳細・編集」ボタンをクリック
      - action: waitForAngular
      - action: click
        selector: 'a[href*="notification"], button:has-text("通知設定"), a:has-text("通知設定")'
        note: 通知設定リンクをクリック
      - action: waitForAngular
    assertions:
      - selector: '.navbar, header.app-header'
        type: visible
        note: 500エラーなく通知設定ページが表示される
      - url_pattern: '/admin/notification'
        type: url_contains
        note: 通知設定ページに遷移していること
      - selector: 'body'
        not_contains: 'Internal Server Error'

- case_no: 82-1
