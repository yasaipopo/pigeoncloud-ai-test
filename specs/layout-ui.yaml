- case_no: UI-FULL
  feature: レイアウト・UI総合
  category: 動画単位
  description: |
    ①ダッシュボードのチャート並び替え・詳細編集ボタンの動作を確認する
    ②各ユーザータイプ（マスター・ユーザー）でのダッシュボード権限表示を確認する
    ③左メニューの表示（テーブルなし時のボタン表示含む）を確認する
    ④アイコンタイプ（画像アップロード・削除・FontAwesomeアイコン）を確認する
    ⑤ショートカットキー（Ctrl+Space等）の動作を確認する
    ⑥カスタムCSS（アップロード・削除・反映）を確認する
    ⑦ユーザーアイコンメニューの表示を確認する
  expected: |
    ダッシュボード・メニュー・アイコン・ショートカット・カスタムCSS・UIメニューが全て正常に動作すること
  includes:
  - UI-MENU
