group: レイアウト・メニュー・UI・ダッシュボード
spec_file: tests/layout-ui.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: 100-1
  sheet: A
  feature: メニュー
  category: メニュー表示
  description: |-
    ①属性：ユーザータイプ（ユーザー）のユーザーでログイン
    ②画面右側のユーザーアイコンをクリック
  expected: |-
    ユーザーアイコンクリック後、メニュー一覧が表示されること。
    ユーザー情報と、ログアウトだけでOK
  movie: LU01
  detailed_flow:
    setup:
      - テストユーザー（ユーザータイプ）を /admin/debug/create-user で作成し、ishikawa+N@loftal.jp / admin でログイン
    steps:
      - url: /admin/login
      - action: fill
        selector: '#id'
        value: '{{ TEST_EMAIL }}'
        note: テストユーザーのメールアドレスでログイン
      - action: fill
        selector: '#password'
        value: '{{ TEST_PASSWORD }}'
      - action: click
        selector: 'button[type=submit].btn-primary'
      - action: waitForSelector
        selector: '.navbar, header.app-header'
      - url: /admin/dashboard
      - action: waitForAngular
      - action: click
        selector: 'a.nav-link.nav-pill.avatar'
        note: ヘッダー右側のユーザーアイコン（fa-user）クリック
    assertions:
      - selector: '.dropdown-menu.show, ul.dropdown-menu[aria-expanded="true"]'
        type: visible
        note: ドロップダウンメニューが表示される
      - selector: '.dropdown-menu'
        text_contains: 'ログアウト'
        note: ログアウトリンクが含まれる
      - selector: '.dropdown-menu'
        not_contains: '管理'
        note: 管理者メニューが表示されていないこと（ユーザータイプのため）

- case_no: 127-01
  sheet: A
  feature: ショートカットキー
  category: テーブル検索(Ctrl+space)
  description: |-
    ①該当のテーブルのレコード一覧を表示
    ②Ctrl+spaceを押す。
  expected: ショートカット実行により、テーブル検索が行えること。
  movie: LU01
  detailed_flow:
    setup:
      - getAllTypeTableId でALLテストテーブルのIDを取得
    steps:
      - url: '/admin/dataset__{{ tableId }}'
        note: ALLテストテーブルのレコード一覧に遷移
      - action: waitForAngular
      - action: waitForSelector
        selector: '.navbar, header.app-header'
      - action: keyboard
        key: 'Control+Space'
        note: Ctrl+Spaceでテーブル検索を発動
    assertions:
      - selector: 'input#table_shortcut, input[placeholder*="テーブル名検索"]'
        type: visible
        note: テーブル検索入力フィールドが表示される
      - action: fill
        selector: 'input#table_shortcut'
        value: 'ALLテスト'
        note: テーブル名を入力して絞り込み
      - selector: '.nav-menus__item, .nav-menus__link'
        text_contains: 'ALLテスト'
        note: サイドメニューにALLテスト関連テーブルが表示される

- case_no: 215-1
  sheet: A
  feature: アイコンタイプ
  category: 画像（画像指定あり）
  description: |-
    ①テーブル管理より該当テーブルの編集を開く。
    ②「追加オプション設定」のメニュー表示有効にする。
    ③アイコンタイプの画像を選択し、アイコン画像用のファイルをアップロード。
    ④「更新」ボタンをクリックする。
  expected: メニュー画面の左記設定を行ったテーブルにアップロードした画像がアイコン表示されていること。
  movie: LU04
  detailed_flow:
    setup:
      - getAllTypeTableId でALLテストテーブルのIDを取得
    steps:
      - url: '/admin/dataset/edit/{{ tableId }}'
        note: テーブル設定ページに遷移
      - action: waitForAngular
      - action: click
        selector: 'text=追加オプション設定, .additional-options, [class*="additional"]'
        note: 「追加オプション設定」セクションを展開
      - action: waitForSelector
        selector: 'input[type="radio"][value="image"], label:has-text("画像")'
        note: アイコンタイプ選択ラジオボタン表示待ち
      - action: click
        selector: 'input[type="radio"][value="image"], label:has-text("画像")'
        note: アイコンタイプ「画像」を選択
      - action: setInputFiles
        selector: 'input[type="file"][name*="icon"], input[type="file"]'
        value: '/app/test_files/ok.png'
        note: アイコン画像をアップロード
      - action: click
        selector: 'button.ladda-button:has-text("更新"), button[type=submit]:has-text("更新")'
        note: 更新ボタンをクリック
      - action: waitForAngular
      - url: /admin/dashboard
        note: ダッシュボードまたはサイドメニューでアイコン表示確認
    assertions:
      - selector: '.nav-menus__link img, .nav-menus a img'
        type: visible
        note: サイドメニューの対象テーブル項目に画像アイコンが表示される

- case_no: 215-2
  sheet: A
  feature: アイコンタイプ
  category: 画像（削除）
  description: |-
    ①テーブル管理より該当テーブルの編集を開く。
    ②「追加オプション設定」のメニュー表示有効にする。
    ③アイコンタイプの画像を選択し、「画像を削除」ボタンをクリックする。
    ④「更新」ボタンをクリックする。
  expected: メニュー画面の左記設定を行ったテーブルのアイコン画像表示がブランク表示となっていること。
  movie: LU04
  detailed_flow:
    setup:
      - getAllTypeTableId でALLテストテーブルのIDを取得
      - 事前にアイコン画像が設定済みであること（215-1 の後に実行する想定）
    steps:
      - url: '/admin/dataset/edit/{{ tableId }}'
        note: テーブル設定ページに遷移
      - action: waitForAngular
      - action: click
        selector: 'text=追加オプション設定'
        note: 「追加オプション設定」セクションを展開
      - action: waitForSelector
        selector: 'button:has-text("画像を削除"), button:has-text("削除")'
      - action: click
        selector: 'button:has-text("画像を削除"), button:has-text("削除")'
        note: 「画像を削除」ボタンをクリック
      - action: click
        selector: 'button.ladda-button:has-text("更新"), button[type=submit]:has-text("更新")'
        note: 更新ボタンをクリック
      - action: waitForAngular
      - url: /admin/dashboard
    assertions:
      - selector: '.nav-menus__link img'
        type: not_visible
        note: サイドメニューの対象テーブル項目に画像アイコンが表示されないこと（ブランク）

