- case_no: lui-100
  sheet: A
  feature: ダッシュボード
  category: テーブル詳細・編集
  description: |-
    ① ユーザー種別：ユーザーのアカウントでログイン
    ② ダッシュボードを開き、該当テーブルの「詳細・編集」ボタンをクリック。
    ③ テーブルの詳細表示が可能であること。
    ④ 「CSVダウンロード」が問題なくできること。
  expected: ・ユーザータイプ「ユーザー」でダッシュボードからテーブル詳細・CSVダウンロードが行えること
  movie: LU02
  detailed_flow: |-
    【LU02 テストフロー】この動画で確認するテスト番号:
      lui-100       (旧:82-1      )  ダッシュボード
      lui-110       (旧:82-2      )  ダッシュボード
      lui-120       (旧:82-3      )  ダッシュボード
      lui-130       (旧:82-5      )  ダッシュボード
      lui-210       (旧:82-4      )  ダッシュボード

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━

    assertions:
    - note: 500エラーなくページが表示される
      selector: .navbar, header.app-header
      type: visible
    - not_contains: Internal Server Error
      note: CSV機能が正常に動作すること（ダウンロードダイアログまたはCSV履歴ページへの遷移）
      selector: body
    setup:
    - テストユーザー（ユーザータイプ）を /admin/debug/create-user で作成しログイン
    - getAllTypeTableId でALLテストテーブルのIDを取得
    steps:
    - url: /admin/dashboard
    - action: waitForAngular
    - action: waitForSelector
      selector: .cdk-drag.dashboard-chart-box, .dashboard-chart-box
    - action: click
      note: ダッシュボード上のテーブルカードの「詳細・編集」ボタンをクリック
      selector: .dashboard-chart-box a[href*="dataset"], .card-header a, button:has-text("詳細")
    - action: waitForAngular
    - action: click
      note: CSVダウンロードボタンをクリック
      selector: button:has-text("CSV"), a:has-text("CSVダウンロード"), .dropdown-item:has-text("CSV")
    - action: waitForAngular
  old_case_no: 82-1
