group: 未分類 Part2
spec_file: tests/uncategorized-2.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: '505'
  feature: ルックアップ
  description: |-
    ①テーブル一覧画面を開く
    ②ルックアップ項目を含むレコードを確認する
    ③ルックアップ値が正常に表示されることを確認する
  expected: ルックアップが正常に動作すること
  movie: U201
  detailed_flow: |-
    1. /admin/dataset__{tableId} にアクセスしてALLテストテーブル一覧を開く
    2. page.waitForSelector('.table-responsive') でテーブル読み込みを待機
    3. ルックアップフィールドの列セルを page.locator('td[data-field-type="lookup"]') で取得
    4. セル内テキストが空でないこと（「-」または実際の参照先テキスト）を確認
    5. bodyText に "Internal Server Error" が含まれないことを確認
- case_no: '506'
  feature: ワークフロー設定
  description: |-
    ①テーブル設定画面からワークフロー設定タブを開く
    ②ワークフロー設定の各項目が正常に表示されていることを確認する
    ③設定ページでエラーが発生しないことを確認する
  expected: ワークフロー設定画面がエラーなく正常に表示されること（#issue819）
  movie: U201
  detailed_flow: |-
    1. /admin/dataset__{tableId}/setting/workflow にアクセス
    2. page.waitForSelector('.navbar') でナビゲーション読み込みを待機
    3. page.locator('app-workflow-setting') または設定フォーム領域が表示されることを確認
    4. bodyText に "Internal Server Error" が含まれないことを確認
    5. ページに500エラー表示がないことを確認（page.locator('.error-page') が存在しないこと）
- case_no: '507'
  feature: テーブル一覧
  description: |-
    ①テーブル一覧画面を開く
    ②テーブル一覧のフィールドヘッダー行を確認する
    ③全フィールドのヘッダーが正しく表示されていることを確認する
  expected: テーブル一覧画面のフィールドヘッダーがエラーなく正常に表示されること（#issue791）
  movie: U201
  detailed_flow: |-
    1. /admin/dataset__{tableId} にアクセスしてALLテストテーブル一覧を開く
    2. page.waitForSelector('table thead tr') でヘッダー行の読み込みを待機
    3. page.locator('table thead th').count() でヘッダー列数が1以上であることを確認
    4. 各ヘッダーセルのテキストが空でないことを確認（page.locator('table thead th').nth(0).innerText() が空でない）
    5. bodyText に "Internal Server Error" または "undefined" が含まれないことを確認
- case_no: '508'
  feature: ルックアップ・関連レコード表示条件
  description: |-
    ①テーブルAに他テーブル参照フィールドを作成し、ルックアップを設定する
    ②ルックアップ先のフィールドが他テーブル参照である構成にする
    ③関連レコード一覧の「表示する条件」にそのルックアップフィールドを設定する
    ④テーブル一覧画面を開き、関連レコード一覧が正しくフィルタされて表示されることを確認
  expected: ルックアップが他テーブル参照の場合でも、関連レコード一覧の表示条件が正常に動作すること
  movie: U201
  target_spec: fields
  detailed_flow: |-
    1. /admin/dataset__{tableId} にアクセスしてALLテストテーブル一覧を開く
    2. page.waitForSelector('.table-responsive') でテーブル読み込みを待機
    3. 他テーブル参照フィールドを含む行のレコード詳細リンクをクリック
    4. 詳細画面で関連レコード一覧セクションが表示されることを確認（page.locator('.related-records') が存在する）
    5. 関連レコード一覧の件数が表示条件に基づいて絞り込まれていることを確認
    6. bodyText に "Internal Server Error" が含まれないことを確認
