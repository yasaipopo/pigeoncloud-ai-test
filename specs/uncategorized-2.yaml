- case_no: '520'
  feature: ワークフロー設定
  description: |-
    ①ワークフロー設定画面を開く
    ②AND/OR並行承認を設定する
    ③2人目以降の承認者に役職を指定する
    ④設定を保存する
    ⑤再度設定画面を開き、2人目以降の役職が正しく保存・表示されていることを確認する
  expected: ワークフローのAND/OR並行承認で2人目以降の役職選択が正しく保存・表示されること
  movie: U201
  detailed_flow: |-
    1. /admin/dataset__{tableId}/setting/workflow にアクセス
    2. page.waitForSelector('.navbar') でナビゲーション読み込みを待機
    3. 「並行承認（AND/OR）」設定を有効化するトグル/チェックボックスをクリック
    4. 承認者追加ボタン（「+ 承認者を追加」等）をクリックして2人目の承認者欄を表示
    5. 2人目の「役職」セレクトボックスから任意の役職を選択
    6. 保存ボタンをクリック
    7. ページをリロード（/admin/dataset__{tableId}/setting/workflow に再アクセス）
    8. 2人目の承認者の役職が保存した値で表示されていることを確認
- case_no: '521'
  feature: ワークフロー
  description: |
    ①ワークフローが設定されたテーブルで申請画面を開く
    ②「自身の組織」を選択した状態で、画面上部の「組織」を未選択のまま申請する
    ③バリデーションエラーが表示されることを確認する
    ④エラー表示後に画面上部の「組織」を正しく選択して再度申請する
    ⑤エラーが発生せず申請が完了することを確認する
  expected: |
    組織未選択時にバリデーションエラーが表示され、正しく選択後に再申請してもエラーが発生しないこと
  movie: U202
  detailed_flow: |-
    1. /admin/dataset__{tableId} にアクセスしてワークフロー設定済みテーブルを開く
    2. 新規レコードを作成するか既存レコードの詳細画面を開く
    3. 「申請」ボタンをクリックして申請モーダルを表示
    4. 承認者設定で「自身の組織」を選択した状態のまま「組織」を未選択にして申請ボタンをクリック
    5. バリデーションエラーメッセージが表示されることを確認（page.locator('.alert-danger, .error-message') が表示される）
    6. 「組織」セレクトボックスから有効な組織を選択して再度申請ボタンをクリック
    7. エラーが発生せず申請が完了することを確認（成功メッセージまたはステータス変更を確認）
- case_no: '522'
  feature: WF並行承認・同一承認者スキップ
  description: |-
    ①ワークフローを作成し、並行承認（AND/OR）を設定する
    ②同一承認者スキップを有効にする
    ③レコードを申請する
    ④テーブル一覧画面を開く
    ⑤エラーが発生せず一覧が正常に表示されることを確認
  expected: 並行承認AND/ORで同一承認者スキップ有効時にテーブル一覧がエラーなく表示されること
  movie: U202
  target_spec: workflow
  detailed_flow: |-
    1. /admin/dataset__{tableId}/setting/workflow にアクセス
    2. 「並行承認（AND/OR）」を有効化して複数承認者を設定
    3. 「同一承認者スキップ」トグルを有効にして保存
    4. /admin/dataset__{tableId} に戻りレコード詳細で申請ボタンをクリックして申請を実行
    5. 申請後に /admin/dataset__{tableId} の一覧画面を開く
    6. page.waitForSelector('.table-responsive') でテーブル読み込みを待機
    7. bodyText に "Internal Server Error" が含まれないことを確認
    8. 一覧が正常に表示されること（テーブル行が存在する）を確認
