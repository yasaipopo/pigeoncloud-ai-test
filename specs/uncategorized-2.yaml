- case_no: unc2-160
  feature: ワークフロー
  description: |
    ①ワークフローが設定されたテーブルで申請画面を開く
    ②「自身の組織」を選択した状態で、画面上部の「組織」を未選択のまま申請する
    ③バリデーションエラーが表示されることを確認する
    ④エラー表示後に画面上部の「組織」を正しく選択して再度申請する
    ⑤エラーが発生せず申請が完了することを確認する
  expected: |
    組織未選択時にバリデーションエラーが表示され、正しく選択後に再申請してもエラーが発生しないこと
  movie: U202
  detailed_flow: |-
    【U202 テストフロー】この動画で確認するテスト番号:
      unc2-160       (旧: 521)     ワークフロー
      unc2-170       (旧: 522)     WF並行承認・同一承認者スキップ
      unc2-180       (旧: 523)     ダッシュボード
      unc2-190       (旧: 528)     親子テーブル削除権限
      unc2-200       (旧: 529)     テーブル設定
