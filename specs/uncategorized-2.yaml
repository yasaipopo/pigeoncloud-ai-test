- case_no: '528'
  feature: 親子テーブル削除権限
  description: |-
    ①親テーブルと子テーブルの関係を設定する
    ②権限設定で親テーブルの削除権限を付与し、子テーブルの削除権限は付与しない
    ③該当ユーザーでログインする
    ④子テーブルのレコード詳細画面を開き、削除ボタンが非表示または無効であることを確認
    ⑤親テーブルのレコードは削除できることを確認
  expected: 親テーブル削除権限あり・子テーブル削除権限なしの場合に、子テーブルのレコード削除が禁止されること
  movie: U202
  target_spec: users-permissions
  detailed_flow: |-
    1. マスターユーザーで /admin/users にアクセスしテストユーザー（ishikawa+N@loftal.jp）を作成
    2. /admin/dataset__{parentTableId}/setting/permission にアクセスして権限設定を開く
    3. 作成したテストユーザーに「削除」権限を付与して保存
    4. 子テーブル(/admin/dataset__{childTableId}/setting/permission)の権限設定で削除権限を付与しない状態を確認
    5. テストユーザーでログインし直す
    6. /admin/dataset__{childTableId} の子テーブル一覧を開く
    7. レコード行の削除ボタンが非表示または disabled であることを確認（page.locator('.btn-delete').count() === 0 または disabled）
    8. /admin/dataset__{parentTableId} の親テーブルを開き削除ボタンが存在することを確認
