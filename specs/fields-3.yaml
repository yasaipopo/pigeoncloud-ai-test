cases:
- case_no: 19-1
  feature: フィールド設定
  description: ①日時フィールドのフィールド設定ページが正常に表示されること（種類変更確認用）
  expected: 'エラーなくページが正常に表示されること

    '
  movie: F301
  detailed_flow: '1. `/admin/dataset/edit/{tableId}` へアクセスし、フィールド設定ページを表示する

    2. Angular のロード完了（`body[data-ng-ready="true"]`）を待機する

    3. `.navbar` が表示されていることを確認する

    4. ページに "Internal Server Error" が含まれないことを確認する

    5. フィールドリスト（`.cdk-drag.field-drag`）が表示されていることを確認する

    6. 「日時」フィールド行（`.cdk-drag.field-drag:has-text("日時")`）をクリックして編集モーダルを開く

    7. 編集モーダル内に「種類」変更セレクト/ドロップダウンが表示されていることを確認する

    8. モーダルを閉じる（ESCキーまたは「キャンセル」ボタン）'
- case_no: 47-1
  feature: フィールド設定
  description: ①日時フィールドのフィールド設定ページが正常に表示されること（項目名未入力エラー確認用）
  expected: 'エラーなくページが正常に表示されること

    '
  movie: F301
  detailed_flow: '1. `/admin/dataset/edit/{tableId}` へアクセスし、フィールド設定ページを表示する

    2. 「項目を追加する」ボタン（`button:has-text("項目を追加する")`）をクリックする

    3. 追加タイプ選択モーダルで「日時」ボタンをクリックする

    4. 項目名入力欄（`.modal.show input`）を空のままにする

    5. 「追加する」ボタン（`.modal.show button:has-text("追加する")`）をクリックする

    6. エラーメッセージ（「項目名を入力してください」等）が表示されることを確認する

    7. ページに "Internal Server Error" が含まれないことを確認する'
