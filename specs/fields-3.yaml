- case_no: 77-1
  feature: フィールド設定
  description: ①計算フィールドのフィールド設定ページが正常に表示されること（IF関数設定用）
  expected: 'エラーなくページが正常に表示されること

    '
  movie: F303
  detailed_flow: '1. `/admin/dataset/edit/{tableId}` へアクセスし、フィールド設定ページを表示する

    2. 「項目を追加する」ボタン（`button:has-text("項目を追加する")`）をクリックする

    3. 追加タイプ選択モーダルで「計算」ボタンをクリックする

    4. 項目名入力欄に「テスト計算IF」と入力する

    5. 計算式入力欄（`textarea` または `input`）に `IF(数値_整数>0, "正", "負")` のようなIF関数を入力する

    6. 「追加する」ボタンをクリックして保存する

    7. ページに "Internal Server Error" が含まれないことを確認する

    8. フィールドリストに「テスト計算IF」が表示されていることを確認する'
