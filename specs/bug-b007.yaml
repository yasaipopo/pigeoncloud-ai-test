name: Slack報告バグ B007: kintone移行機能の網羅テスト
sheet: B
case_no: "B007"
feature: kintone移行
category: 管理機能
description: |
  kintone移行機能（テーブル作成時のインポート機能等）の正常系および異常系を検証する。
  kintoneアプリURLとAPIトークンを用いた移行プロセスの正常系、および「同一テーブル名」「項目並び順」「レコード移行」の各パターンを網羅する。
expected: |
  kintoneからの移行プロセスが正常に完了し、指定した設定（テーブル名、項目、レコード）が正しく反映されること。
detailed_flow: |
  【B007 テストフロー】この動画で確認するテスト番号:
    b007-010  kintone移行：アプリ一覧取得〜移行開始（正常系）
    b007-020  kintone移行：同一テーブル名バリデーション
    b007-030  kintone移行：レコード移行オプションの確認

  ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  [0:00] b007-010 ── kintone移行：アプリ一覧取得〜移行開始（正常系）
  1. テーブル管理（/admin/dataset）を開く
  2. 「テーブルを追加」ボタンをクリックする
  3. ✅ 「kintoneから乗り換え」または「kintone移行」の選択肢が表示されること（※UIによって異なるが、今回は直接URL遷移も検証）
  4. /admin/kintone-migration に遷移する
  5. ✅ 移行前の注意事項が表示されること
  6. 「上記の注意事項を確認し、同意します」にチェックを入れる
  7. 「同意して続ける」をクリックする
  8. サブドメイン、ログイン名、パスワードを入力する
  9. 「アプリ一覧を取得」をクリックする
  10. ✅ kintoneのアプリ一覧が表示されること（API mock）
  11. 対象のアプリを選択し、「次へ」をクリックする
  12. ✅ 移行設定画面（テーブル名、項目一覧）が表示されること
  13. 移行を開始し、完了画面が表示されることを確認する

  [1:00] b007-020 ── kintone移行：同一テーブル名バリデーション
  1. 既に存在するテーブル名と同じ名前を移行先テーブル名に指定する
  2. 移行を開始しようとする
  3. ✅ 「既に存在するテーブル名です」等のエラーメッセージが表示されること

  [1:30] b007-030 ── kintone移行：レコード移行オプションの確認
  1. 移行設定画面で「レコードも移行する」オプションをON/OFFできることを確認する
  2. 項目並び順がkintone側と一致していることを確認する（プレビュー等がある場合）
