- case_no: auth-110
  old_case_no: "267"
  sheet: B
  feature: 2段階認証
  category: メールアドレス形式チェック
  description: |
    ①ログインIDがメールアドレスでないユーザー（例: admin）でログインする
    ②2段階認証の設定画面を開く
    ③2段階認証を有効にしようとする
    ④メールアドレスでないためエラーが表示されることを確認する
  expected: ログインIDがメールアドレス形式でない場合、2段階認証の設定でエラーが表示されること
  movie: UC01
  detailed_flow: |
    【UC01: 2段階認証テスト】対象テスト: 267

    ▼ [0:00] 267 — メールアドレス形式でないIDの2段階認証エラー
    1. ログインIDが「admin」（メールアドレスでない）のユーザーでログイン
    2. アカウント設定画面（/admin/setting/account）を開く
    3. 「2段階認証」セクションを探す
    4. 2段階認証を有効にするトグルをクリック
    5. メールアドレス形式でないためエラーメッセージが表示されることを確認
       または 2段階認証セクションが非表示/無効であることを確認
    ✅ 期待: ログインIDがメールアドレス形式でない場合、2段階認証の設定でエラーが表示されること
