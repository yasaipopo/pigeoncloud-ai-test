group: 認証（ログイン・ログアウト・パスワード変更）
spec_file: tests/auth.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: 144-01
  sheet: A
  feature: 推奨ブラウザ
  category: 警告出力
  description: ①推奨ブラウザ以外で、PigeonCloudを開く。
  expected: 警告メッセージが出力されること
  movie: AT01
  detailed_flow: |
    1. UserAgentをFirefoxに偽装したブラウザコンテキストを作成する
       - userAgent: 'Mozilla/5.0 (Windows NT 10.0; rv:109.0) Gecko/20100101 Firefox/115.0'
    2. ログインページ（/admin/login）を開く
    3. ログインを実行する（admin/パスワード）
    4. ダッシュボード（/admin/dashboard）に遷移後、div.warning 要素が表示されることを確認
    5. 警告テキストに「推奨されているブラウザは Edge, chrome, safariの最新版」が含まれることを検証
    6. 確認元: full-layout.component.ts L94-100 / full-layout.component.html L237-241

- case_no: 1-1
  sheet: A
  feature: ログイン／ログアウト
  category: '-'
  description: ①ユーザータイプが「マスター」のユーザーでログイン、ログアウトを行う。
  expected: エラーなくログインログアウトが完了すること。
  movie: AT01
  detailed_flow: |
    1. ログインページ（/admin/login）を開く
    2. IDフィールド(#id)にマスターユーザーのメールアドレスを入力
    3. パスワードフィールド(#password)にパスワードを入力
    4. ログインボタン(button[type=submit].btn-primary)をクリック
    5. ダッシュボード（/admin/dashboard）に遷移することを確認
    6. .navbar が表示されていることを確認
    7. ユーザーアイコン→ログアウトメニューをクリック
    8. ログインページ（/admin/login）に戻ることを確認

- case_no: 1-2
  sheet: A
  feature: ログイン／ログアウト
  category: '-'
  description: ①ユーザータイプが「ユーザー」のユーザーでログイン、ログアウトを行う。
  expected: エラーなくログインログアウトが完了すること。
  movie: AT01
  detailed_flow: |
    1. debug/create-user APIでテストユーザーを作成する
    2. ログインページ（/admin/login）を開く
    3. 作成したテストユーザーのメールアドレスとパスワード(admin)を入力
    4. ログインボタンをクリック
    5. ダッシュボードに遷移することを確認（ユーザータイプ「ユーザー」でもログイン可能）
    6. .navbar が表示されていることを確認
    7. ログアウトを実行
    8. ログインページに戻ることを確認

- case_no: 38-1
  sheet: A
  feature: ログイン
  category: パスワード入力(異常系)
  description: ①ログイン画面にて、該当のユーザーで誤ったパスワードを入力すること。
  expected: ログインエラーが発生すること。
  movie: AT01
  detailed_flow: |
    1. ログインページ（/admin/login）を開く
    2. IDフィールドにマスターユーザーのメールアドレスを入力
    3. パスワードフィールドに誤ったパスワード（例: 'wrong_password_12345'）を入力
    4. ログインボタンをクリック
    5. URLがログインページのまま（/admin/loginまたは/admin/dashboard以外）であることを確認
    6. エラーメッセージ（トースト通知 .toast-error または画面内のエラーテキスト）が表示されることを確認
    7. エラーテキストに「IDまたはパスワードが正しくありません」が含まれることを検証

- case_no: 295
  sheet: A
  feature: パスワード変更
  category: パスワード変更
  description: |
    ①パスワード変更機能が正常に動作すること。
    ②新規ユーザー作成後、初回ログイン時にパスワード変更が強制されること。
  expected: パスワード変更機能が正常に動作すること
  movie: AT01
  detailed_flow: |
    1. マスターユーザーでログインする
    2. debug/settings APIで ignore_new_pw_input='false' に設定
    3. debug/create-user APIでテストユーザーを作成（レスポンスのidを取得）
    4. edit/admin/{id} APIで password_changed='false' に変更
    5. ユーザー一覧（/admin/admin）でテストユーザーが表示されていることを確認
    6. マスターユーザーをログアウト
    7. テストユーザーでログイン
    8. パスワード変更フォーム（#new_password, #confirm_new_password）が表示されることを確認
    9. 新パスワードを入力して「パスワード変更」ボタンをクリック
    10. ダッシュボードに遷移することを確認（パスワード変更成功）
    11. 確認元: login-base.component.ts L261 (!_user.password_changed && ignore_new_pw_input == 'false')

- case_no: '176'
  sheet: B
  feature: ログイン
  category: google　login
  description: "①Googleログイン機能が存在すること（専用テスト環境: demo-popo7）"
  expected: "Googleログインボタンが表示され、クリックでGoogle認証画面に遷移すること"
  movie: AT02
  detailed_flow: |
    1. Googleログインが有効な環境（demo-popo7.pigeon-demo.com）にアクセス
       ※テスト環境では実際のGoogleログインは実行できない（OAuth認証が必要）
    2. ログインページにGoogleログインボタンが表示されることを確認
    3. Googleログインボタンをクリック
    4. Google認証画面（accounts.google.com）にリダイレクトされることを確認
    5. 注意: 実際のGoogleアカウント認証はE2Eテストではスキップ（外部サービス依存）

- case_no: 212-1
  sheet: B
  feature: 同時ログインプラン
  category: 同時ログイン制御
  description: ①同時ログイン制御機能が設定人数まで動作すること
  expected: 同時ログイン制御機能が設定人数まで動作すること
  movie: AT02
  detailed_flow: |
    1. debug/settings APIで login_max_devices=2 に設定
    2. 1つ目のブラウザコンテキストでマスターユーザーでログイン → 成功
    3. 2つ目のブラウザコンテキストで同じユーザーでログイン → 成功（制限内）
    4. 3つ目のブラウザコンテキストで同じユーザーでログイン → 制限超過の動作を確認
       （エラーメッセージ or 最初のセッションが無効化される）
    5. テスト後: login_max_devices を元に戻す

- case_no: 212-2
  sheet: B
  feature: 同時ログインプラン
  category: 強制ログアウト
  description: ①マスターユーザーがユーザーを強制ログアウトできること
  expected: マスターユーザーにてユーザーの強制ログアウトが可能なこと
  movie: AT02
  detailed_flow: |
    1. テストユーザーを作成してログインさせる（別コンテキスト）
    2. マスターユーザーでログイン
    3. ユーザー管理画面（/admin/admin）を開く
    4. テストユーザーの行にある「強制ログアウト」ボタンをクリック
    5. POST /api/admin/force-logout API が呼ばれることを確認
    6. テストユーザーのコンテキストでページをリロード → ログインページにリダイレクトされることを確認

- case_no: 212-3
  sheet: B
  feature: 同時ログインプラン
  category: 自動ログアウト
  description: ①自動ログアウト時間を「60」と設定し、自動ログアウトが機能すること
  expected: 1時間後に自動ログアウトされること。
  movie: AT02
  detailed_flow: |
    1. debug/settings APIで auto_logout_hour=1 に設定
    2. マスターユーザーでログイン
    3. 自動ログアウト設定が反映されていることを確認
       （/admin/setting/account ページで「自動ログアウト時間」が「1」になっている等）
    4. 注意: 実際の1時間待機はE2Eテストでは不可能。設定のUI確認のみ
    5. テスト後: auto_logout_hour を元に戻す

- case_no: 212-4
  sheet: B
  feature: 同時ログインプラン
  category: 全端末ログアウト
  description: ①同一アカウントで複数端末でログインし、1つの端末からログアウトすると全端末ログアウトすること
  expected: 全端末ログアウトすること
  movie: AT02
  detailed_flow: |
    1. 1つ目のブラウザコンテキストでマスターユーザーでログイン
    2. 2つ目のブラウザコンテキストで同じユーザーでログイン
    3. 1つ目のコンテキストでログアウトを実行
    4. 2つ目のコンテキストでページをリロード
    5. 2つ目のコンテキストもログインページにリダイレクトされることを確認
       （全端末ログアウトが機能）

- case_no: 267
  sheet: B
  feature: 2段階認証
  category: メールアドレス形式チェック
  description: |
    ①ログインIDがメールアドレスでないユーザー（例: admin）でログインする
    ②2段階認証の設定画面を開く
    ③2段階認証を有効にしようとする
    ④メールアドレスでないためエラーが表示されることを確認する
  expected: ログインIDがメールアドレス形式でない場合、2段階認証の設定でエラーが表示されること
  movie: UC01
  detailed_flow: |
    1. ログインIDが「admin」（メールアドレスでない）のユーザーでログイン
    2. アカウント設定画面（/admin/setting/account）を開く
    3. 「2段階認証」セクションを探す
    4. 2段階認証を有効にするトグル/チェックボックスをクリック
    5. メールアドレス形式でないためエラーメッセージが表示されることを確認
    6. または、2段階認証セクションが非表示/無効であることを確認
    7. 確認元: login-base.component.ts の2FA設定ロジック
