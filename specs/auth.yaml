base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: auth-010
  old_case_no: "144-01"
  sheet: A
  feature: 推奨ブラウザ
  category: 警告出力
  description: ①推奨ブラウザ以外で、PigeonCloudを開く。
  expected: 警告メッセージが出力されること
  movie: AT01
  detailed_flow: |
    【AT01: 認証基本フロー】対象テスト: 144-01 / 1-1 / 1-2 / 38-1 / 295

    ▼ [0:00] 144-01 — 推奨ブラウザ以外での警告表示
    1. Firefox UA に偽装したブラウザコンテキストを作成
       userAgent: 'Mozilla/5.0 (Windows NT 10.0; rv:109.0) Gecko/20100101 Firefox/115.0'
    2. /admin/login を開く
    3. admin/パスワード でログイン実行
    4. ダッシュボードに遷移後 div.warning が表示されることを確認
    5. 警告テキストに「推奨されているブラウザは Edge, chrome, safariの最新版」が含まれることを検証
    ✅ 期待: 警告メッセージが出力されること

    ▼ [0:06] 1-1 — マスターユーザーでログイン／ログアウト
    1. /admin/login を開き admin/パスワードを入力してログイン
    2. ダッシュボード遷移・.navbar 表示を確認
    3. アバターアイコン → ログアウトメニューをクリック
    4. /admin/login に戻ることを確認
    ✅ 期待: エラーなくログイン・ログアウトが完了すること

    ▼ [0:19] 1-2 — ユーザータイプ「ユーザー」でログイン／ログアウト
    1. debug/create-user API でテストユーザーを作成
    2. ログインページでテストユーザーのID・パスワードを入力してログイン
    3. ダッシュボード遷移・.navbar 表示を確認
    4. ログアウト → /admin/login に戻ることを確認
    ✅ 期待: エラーなくログイン・ログアウトが完了すること

    ▼ [0:41] 38-1 — 誤ったパスワードでのログインエラー
    1. /admin/login で admin のメールアドレス + 誤パスワードを入力
    2. ログインボタンをクリック
    3. URL がログインページのままであることを確認
    4. エラーメッセージ（「IDまたはパスワードが正しくありません」）が表示されることを確認
    ✅ 期待: ログインエラーが発生すること

    ▼ [0:57] 295 — パスワード変更機能
    1. マスターユーザーでログイン
    2. debug/settings で ignore_new_pw_input=false に設定
    3. debug/create-user でテストユーザーを作成（password_changed=false）
    4. テストユーザーでログイン → パスワード変更フォームが表示されることを確認
    5. 新パスワードを入力して「パスワード変更」ボタンをクリック
    6. ダッシュボードに遷移することを確認（変更成功）
    ✅ 期待: パスワード変更機能が正常に動作すること

