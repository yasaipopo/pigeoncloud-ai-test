group: 認証（ログイン・ログアウト・パスワード変更）
spec_file: tests/auth.spec.js
base_url: '{{ TEST_BASE_URL }}'

# 採番ルール: {spec}-{3桁 10刻み} 例: auth-010, auth-020
# 途中挿入: auth-015 など空き番号。削除時は番号を詰めない。
# old_case_no: 旧シートの番号（参照用）

cases:

# ──────────────────────────────────────────────
# movie: AT01 (auth-010〜auth-050 を1動画で確認)
# ──────────────────────────────────────────────
- case_no: auth-010
  old_case_no: '144-01'
  sheet: A
  feature: 推奨ブラウザ
  movie: AT01
  description: ①推奨ブラウザ以外で、PigeonCloudを開く。
  expected: 警告メッセージが出力されること
  detailed_flow: |
    【AT01 テストフロー】この動画で確認するテスト番号:
      auth-010 (旧: 144-01)  推奨ブラウザ以外での警告表示
      auth-020 (旧: 1-1)     マスターユーザーでログイン/ログアウト
      auth-030 (旧: 1-2)     ユーザータイプ「ユーザー」でログイン/ログアウト
      auth-040 (旧: 38-1)    誤パスワードでのログインエラー
      auth-050 (旧: 295)     パスワード変更

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] auth-010 ── 推奨ブラウザ以外での警告表示
    1. Firefox UA を偽装したブラウザコンテキストを作成して /admin/login を開く
    2. admin / パスワード でログインしてダッシュボードに遷移
    3. ✅ div.warning が表示されること
    4. ✅ 「推奨されているブラウザは Edge, chrome, safariの最新版」が含まれること

    [0:06] auth-020 ── マスターユーザーでログイン/ログアウト
    1. /admin/login を開き admin / パスワードを入力してログイン
    2. ✅ ダッシュボードに遷移し .navbar が表示されること
    3. アバターアイコン → ログアウトメニューをクリック
    4. ✅ /admin/login に戻ること

    [0:19] auth-030 ── ユーザータイプ「ユーザー」でログイン/ログアウト
    1. マスターユーザーでログイン後、debug/create-user API でテストユーザーを作成
    2. マスターをログアウトし、テストユーザーの ID / パスワードでログイン
    3. ✅ ダッシュボードに遷移し .navbar が表示されること
    4. ログアウト → ✅ /admin/login に戻ること

    [0:41] auth-040 ── 誤パスワードでのログインエラー
    1. /admin/login で admin のメールアドレス + 誤パスワードを入力してログイン試行
    2. ✅ URL がログインページのままであること
    3. ✅ エラーメッセージに「IDまたはパスワードが正しくありません」が含まれること

    [0:57] auth-050 ── パスワード変更
    1. マスターユーザーでログイン、debug/settings で ignore_new_pw_input=false に設定
    2. debug/create-user でテストユーザーを作成（password_changed=false）
    3. テストユーザーでログイン
    4. ✅ パスワード変更フォームが表示されること
    5. 新パスワードを入力して変更ボタンをクリック
    6. ✅ ダッシュボードに遷移すること

- case_no: auth-020
  old_case_no: '1-1'
  sheet: A
  feature: ログイン／ログアウト
  movie: AT01
  description: ①ユーザータイプが「マスター」のユーザーでログイン、ログアウトを行う。
  expected: エラーなくログインログアウトが完了すること。
  detailed_flow: 'AT01テストフロー参照（auth-010のdetailed_flowと同一）'

- case_no: auth-030
  old_case_no: '1-2'
  sheet: A
  feature: ログイン／ログアウト
  movie: AT01
  description: ①ユーザータイプが「ユーザー」のユーザーでログイン、ログアウトを行う。
  expected: エラーなくログインログアウトが完了すること。
  detailed_flow: 'AT01テストフロー参照（auth-010のdetailed_flowと同一）'

- case_no: auth-040
  old_case_no: '38-1'
  sheet: A
  feature: ログイン
  movie: AT01
  description: ①ログイン画面にて、該当のユーザーで誤ったパスワードを入力すること。
  expected: ログインエラーが発生すること。
  detailed_flow: 'AT01テストフロー参照（auth-010のdetailed_flowと同一）'

- case_no: auth-050
  old_case_no: '295'
  sheet: A
  feature: パスワード変更
  movie: AT01
  description: ①パスワード変更機能が正常に動作すること。
  expected: パスワード変更機能が正常に動作すること
  detailed_flow: 'AT01テストフロー参照（auth-010のdetailed_flowと同一）'

# ──────────────────────────────────────────────
# movie: AT02 (auth-060〜auth-100 を1動画で確認)
# ──────────────────────────────────────────────
- case_no: auth-060
  old_case_no: '176'
  sheet: B
  feature: ログイン（Google）
  movie: AT02
  description: "①Googleログイン機能が存在すること（専用テスト環境: demo-popo7）"
  expected: "Googleログインボタンが表示され、クリックでGoogle認証画面に遷移すること"
  detailed_flow: |
    【AT02 テストフロー】この動画で確認するテスト番号:
      auth-060 (旧: 176)    Googleログイン機能
      auth-070 (旧: 212-1)  同時ログイン制御
      auth-080 (旧: 212-2)  強制ログアウト
      auth-090 (旧: 212-3)  自動ログアウト設定
      auth-100 (旧: 212-4)  全端末ログアウト

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] auth-060 ── Googleログイン機能確認
    1. Googleログインが有効な環境（demo-popo7.pigeon-demo.com）にアクセス
    2. ✅ ログインページにGoogleログインボタンが表示されること
    3. Googleログインボタンをクリック
    4. ✅ Google認証画面（accounts.google.com）にリダイレクトされること
       ※実際のGoogleアカウント認証はE2Eテストではスキップ

    [0:13] auth-070 ── 同時ログイン制御
    1. debug/settings で login_max_devices=2 に設定
    2. 1つ目のコンテキストでマスターユーザーでログイン → ✅ 成功
    3. 2つ目のコンテキストで同じユーザーでログイン → ✅ 成功（制限内）
    4. 3つ目のコンテキストでログイン → ✅ 制限超過の動作を確認
    5. テスト後: login_max_devices を元に戻す

    [0:66] auth-080 ── 強制ログアウト
    1. テストユーザーを作成して別コンテキストでログインさせる
    2. マスターユーザーでログインしてユーザー管理画面（/admin/admin）を開く
    3. テストユーザーの「強制ログアウト」ボタンをクリック
    4. ✅ テストユーザーのコンテキストでリロード → ログインページにリダイレクト

    [0:77] auth-090 ── 自動ログアウト設定
    1. debug/settings で auto_logout_hour=1 に設定してマスターユーザーでログイン
    2. ✅ /admin/setting/account で「自動ログアウト時間」が「1」になっていること
       ※実際の1時間待機はE2Eテストでは不可能。設定UI確認のみ
    3. テスト後: auto_logout_hour を元に戻す

    [0:84] auth-100 ── 全端末ログアウト
    1. 1つ目のコンテキストでマスターユーザーでログイン
    2. 2つ目のコンテキストで同じユーザーでログイン
    3. 1つ目のコンテキストでログアウト実行
    4. ✅ 2つ目のコンテキストでリロード → ログインページにリダイレクト

- case_no: auth-070
  old_case_no: '212-1'
  sheet: B
  feature: 同時ログインプラン
  movie: AT02
