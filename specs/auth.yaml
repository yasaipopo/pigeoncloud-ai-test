group: 認証（ログイン・ログアウト・パスワード変更）
spec_file: tests/auth.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: AUTH-FULL
  feature: 認証・ログイン総合
  category: 動画単位
  description: |
    ①マスターユーザーでログイン・ログアウトを行う
    ②通常ユーザーでログイン・ログアウトを行う
    ③誤ったパスワードでログインを試み、エラーメッセージを確認する
    ④推奨ブラウザ以外でのアクセスを確認する
    ⑤Googleログインの動作を確認する
    ⑥同時ログインプランの制限・自動ログアウト・セッション管理を確認する
    ⑦パスワード変更フローを確認する
  expected: |
    各ユーザータイプのログイン/ログアウト・エラー処理・Googleログイン・同時ログイン制限・パスワード変更が全て正常に動作すること
  includes:
  - 1-1
  - 1-2
  - 38-1
  - 144-01
  - '176'
  - 212-1
  - 212-2
  - 212-3
  - 212-4
  - '295'
actual_steps:
- case_no: 1-1
  status: passed
  steps: '1. /admin/login にアクセス

    2. #id に TEST_EMAIL を入力

    3. #password に TEST_PASSWORD を入力

    4. button[type=submit].btn-primary をクリック

    5. /admin/dashboard への遷移を確認

    6. テンプレートモーダルを閉じる（.modal.show があれば）

    7. /api/admin/logout をGET呼び出しでログアウト

    8. /admin/login へ遷移して確認

    '
  assertions: '- URLが /admin/dashboard を含む

    - .navbar が表示されている

    - ログアウト後URLが /admin/login を含む

    '
  gaps: なし
- case_no: 1-2
  status: passed（ユーザー作成失敗時はskip）
  steps: '1. マスターユーザーでログイン

    2. /api/admin/debug/create-user APIでテストユーザーを自動生成（メール・パスワードは自動）

    3. マスターユーザーをログアウト

    4. 生成したユーザーのメール・パスワードでログイン

    5. /admin/dashboard への遷移を確認

    6. ログアウト・/admin/login 遷移確認

    '
  assertions: '- URLが /admin/dashboard を含む

    - .navbar が表示されている

    - ログアウト後URLが /admin/login を含む

    '
  gaps: '- ユーザー作成失敗（上限など）の場合は test.skip になる。本来は必ず実行されるべきテスト

    - ユーザー削除（teardown）が存在しないため、繰り返し実行でユーザー数が増加し続ける

    '
- case_no: 38-1
  status: passed
  steps: '1. /admin/login にアクセス

    2. #id に TEST_EMAIL を入力

    3. #password に ''wrong_password_12345''（固定値）を入力

    4. button[type=submit].btn-primary をクリック

    '
  assertions: '- URLが /admin/login を含む（ログインページに留まる）

    - .toast-message が表示される

    - .toast-message が ''IDまたはパスワードが正しくありません'' を含む

    '
  gaps: なし
- case_no: 144-01
  status: passed
  steps: '1. Firefox の UserAgent でブラウザコンテキストを新規作成

    2. /admin/login にアクセスしてログイン

    3. /admin/dashboard 遷移後 3秒待機

    '
  assertions: '- .warning が表示される

    - .warning が ''推奨されているブラウザ'' を含む

    '
  gaps: なし
- case_no: '176'
  status: skip
  steps: なし（skip）
  assertions: なし
  gaps: '- Google OAuthフローが必要なため自動化困難としてskip

    - YAMLには手順・期待値が記載されているが未テスト

    '
