- case_no: auth-060
  old_case_no: '176'
  sheet: B
  feature: ログイン（Google）
  movie: AT02
  description: '①Googleログイン機能が存在すること（専用テスト環境: demo-popo7）'
  expected: Googleログインボタンが表示され、クリックでGoogle認証画面に遷移すること
  detailed_flow: |
    【AT02 テストフロー】この動画で確認するテスト番号:
      auth-050       (旧: 295)        パスワード未変更ユーザーにパスワード変更フォームが表示されること
      auth-060       (旧: 176)        パスワードを変更してダッシュボードに遷移できること
      auth-070       (旧: 212-1)      パスワードの目アイコンで表示/非表示を切り替えられること

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    auth-050 ── パスワード未変更ユーザーにパスワード変更フォームが表示されること
    50-1. テストユーザーを作成（パスワード未変更状態にする）
    50-2. テストユーザーでログイン
    50-3. ✅ パスワード変更フォームが表示されること
    50-4. ✅ 「新しいパスワード」入力欄が表示されていること
    50-5. ✅ 「パスワード確認」入力欄が表示されていること
    50-6. ✅ 「パスワード変更」ボタンが表示されていること

    auth-060 ── パスワードを変更してダッシュボードに遷移できること
    60-1. パスワード変更フォームで新しいパスワードを入力
    60-2. パスワード確認欄に同じパスワードを入力（60-1で実施済み）
    60-3. 「パスワード変更」ボタンをクリック
    60-4. ✅ ダッシュボード画面に遷移していること
    60-4a. ✅ ダッシュボード画面のパンくずに「ダッシュボード」が表示されていること
    60-4b. ✅ サイドバーが表示されていること

    auth-070 ── パスワードの目アイコンで表示/非表示を切り替えられること
    70-1. ログイン画面を開く
    70-2. パスワード欄に文字を入力
    70-3. ✅ パスワード欄が非表示（●●●）の状態であること
    70-4. 目アイコンをクリック
    70-5. ✅ パスワード欄が表示状態（平文）になっていること
    70-6. もう一度目アイコンをクリック
    70-7. ✅ パスワード欄が非表示（●●●）に戻ること
