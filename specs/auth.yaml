  detailed_flow: 'AT02テストフロー参照（auth-060のdetailed_flowと同一）'

# ──────────────────────────────────────────────
# movie: UC01 (auth-110 を1動画で確認)
# ──────────────────────────────────────────────
- case_no: auth-110
  old_case_no: '267'
  sheet: B
  feature: 2段階認証
  movie: UC01
  description: |
    ①ログインIDがメールアドレスでないユーザー（例: admin）でログインする
    ②2段階認証の設定でエラーが表示されることを確認する
  expected: ログインIDがメールアドレス形式でない場合、2段階認証の設定でエラーが表示されること
  detailed_flow: |
    【UC01 テストフロー】この動画で確認するテスト番号:
      auth-110 (旧: 267)  2段階認証 メールアドレス形式チェック

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    [0:00] auth-110 ── 2段階認証でメールアドレス形式でないIDのエラー確認
    1. ログインID「admin」（メールアドレスでない）のユーザーでログイン
    2. アカウント設定画面（/admin/setting/account）を開く
    3. 「2段階認証」セクションの有効化トグルをクリック
    4. ✅ エラーメッセージが表示されること
       または ✅ 2段階認証セクションが非表示/無効であること
