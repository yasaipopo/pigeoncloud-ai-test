- case_no: auth-060
  old_case_no: "176"
  sheet: B
  feature: ログイン
  category: google　login
  description: "①Googleログイン機能が存在すること（専用テスト環境: demo-popo7）"
  expected: "Googleログインボタンが表示され、クリックでGoogle認証画面に遷移すること"
  movie: AT02
  detailed_flow: |
    【AT02: 拡張ログイン機能フロー】対象テスト: 176 / 212-1 / 212-2 / 212-3 / 212-4

    ▼ [0:00] 176 — Googleログイン機能確認
    1. Googleログインが有効な環境（demo-popo7.pigeon-demo.com）にアクセス
       ※実際のGoogleログインは実行不可（OAuth認証が必要）
    2. ログインページにGoogleログインボタンが表示されることを確認
    3. Googleログインボタンをクリック
    4. Google認証画面（accounts.google.com）にリダイレクトされることを確認
    ✅ 期待: Googleログインボタンが表示され、クリックでGoogle認証画面に遷移すること

    ▼ [0:13] 212-1 — 同時ログイン制御
    ▼ [0:66] 212-2 — 強制ログアウト
    ▼ [0:77] 212-3 — 自動ログアウト設定
    ▼ [0:84] 212-4 — 全端末ログアウト

- case_no: auth-070
  old_case_no: "212-1"
  sheet: B
  feature: 同時ログインプラン
  category: 同時ログイン制御
  description: ①同時ログイン制御機能が設定人数まで動作すること
  expected: 同時ログイン制御機能が設定人数まで動作すること
  movie: AT02
  detailed_flow: |
    【AT02: 拡張ログイン機能フロー】対象テスト: 176 / 212-1 / 212-2 / 212-3 / 212-4

    ▼ [0:00] 176 — Googleログイン機能確認
    ▼ [0:13] 212-1 — 同時ログイン制御
    1. debug/settings で login_max_devices=2 に設定
    2. 1つ目のコンテキストでマスターユーザーでログイン → 成功
    3. 2つ目のコンテキストで同じユーザーでログイン → 成功（制限内）
    4. 3つ目のコンテキストでログイン → 制限超過の動作確認
    5. テスト後: login_max_devices を元に戻す
    ✅ 期待: 同時ログイン制御機能が設定人数まで動作すること

    ▼ [0:66] 212-2 — 強制ログアウト
    ▼ [0:77] 212-3 — 自動ログアウト設定
    ▼ [0:84] 212-4 — 全端末ログアウト

