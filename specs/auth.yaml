- case_no: auth-110
  old_case_no: '267'
  sheet: B
  feature: 2段階認証
  movie: UC01
  description: |
    ①ログインIDがメールアドレスでないユーザー（例: admin）でログインする
    ②2段階認証の設定でエラーが表示されることを確認する
  expected: ログインIDがメールアドレス形式でない場合、2段階認証の設定でエラーが表示されること
  detailed_flow: |
    【UC01 テストフロー】この動画で確認するテスト番号:
      auth-110       (旧: 267)        二段階認証を有効化して設定が保存されること

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    auth-110 ── 二段階認証を有効化して設定が保存されること
    110-1. マスターユーザーでログイン
    110-2. システム設定画面（/admin/admin_setting/edit/1）で二段階認証の設定欄を確認
    110-3. ✅ 「二段階認証を有効にする」の設定項目が表示されていること
- case_no: auth-120
  old_case_no: '-'
  sheet: B
  feature: 2段階認証（QRコード）
  movie: UC02
  description: 2FAを有効化して QR コードが表示されることを確認する
  expected: QR コードが表示され、シークレットキーが生成されること
  detailed_flow: |
    【UC02 テストフロー】2段階認証詳細
    1. メールアドレス形式のマスターユーザーでログイン
    2. システム設定で「二段階認証を有効にする」を ON にする
    3. アカウント設定（/admin/setting/account）を開く
    4. 「2段階認証」を有効化（QR方式）
    5. ✅ QRコード画像が表示されること
- case_no: auth-130
  old_case_no: '-'
  sheet: B
  feature: 2段階認証（認証成功）
  movie: UC02
  description: 正しい TOTP コードを入力してログインに成功すること
  expected: 正しいコードでログインが完了し、ダッシュボードが表示されること
  detailed_flow: |
    1. 2FA設定済みのユーザーでログイン画面から ID/PW を入力
    2. ✅ 2段階認証コード入力画面が表示されること
    3. 正しい TOTP コードを入力して「確認」をクリック
    4. ✅ ダッシュボードに正常に遷移すること
- case_no: auth-140
  old_case_no: '-'
  sheet: B
