- case_no: auth-090
  old_case_no: "212-3"
  sheet: B
  feature: 同時ログインプラン
  category: 自動ログアウト
  description: ①自動ログアウト時間を「60」と設定し、自動ログアウトが機能すること
  expected: 1時間後に自動ログアウトされること。
  movie: AT02
  detailed_flow: |
    【AT02: 拡張ログイン機能フロー】対象テスト: 176 / 212-1 / 212-2 / 212-3 / 212-4

    ▼ [0:77] 212-3 — 自動ログアウト設定
    1. debug/settings で auto_logout_hour=1 に設定
    2. マスターユーザーでログイン
    3. /admin/setting/account で「自動ログアウト時間」が「1」になっていることを確認
       ※実際の1時間待機はE2Eテストでは不可能。設定のUI確認のみ
    4. テスト後: auto_logout_hour を元に戻す
    ✅ 期待: 1時間後に自動ログアウトされること

    ▼ [0:84] 212-4 — 全端末ログアウト

