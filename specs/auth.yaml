group: 認証（ログイン・ログアウト・パスワード変更）
spec_file: tests/auth.spec.js
base_url: '{{ TEST_BASE_URL }}'
cases:
- case_no: auth-010
  old_case_no: 144-01
  sheet: A
  feature: 推奨ブラウザ
  movie: AT01
  description: ①推奨ブラウザ以外で、PigeonCloudを開く。
  expected: 警告メッセージが出力されること
  detailed_flow: |
    【AT01 テストフロー】この動画で確認するテスト番号:
      auth-010       (旧: 144-01)     ログイン画面の初期表示が正常であること
      auth-020       (旧: 1-1)        マスターユーザーでログインしてダッシュボードに遷移できること
      auth-030       (旧: 1-2)        ログアウトしてログイン画面に戻れること
      auth-040       (旧: 38-1)       誤パスワードでログインするとエラーが表示されること

    ━━━ 実行フロー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    auth-010 ── ログイン画面の初期表示が正常であること
    10-1. ログイン画面を開く
    10-2. ✅ ログイン画面のタイトル（テナント名）が表示されていること
    10-3. ✅ IDの入力欄が表示されていること
    10-4. ✅ パスワードの入力欄が表示されていること
    10-5. ✅ 「ログイン」ボタンが表示されていること
    10-6. ✅ バージョン番号（Ver.X.X）が画面下部に表示されていること

    auth-020 ── マスターユーザーでログインしてダッシュボードに遷移できること
    20-1. IDにマスターユーザーのメールアドレスを入力
    20-2. パスワードを入力
    20-3. 「ログイン」ボタンをクリック
    20-4. ✅ ダッシュボード画面に遷移していること
    20-5. ✅ ナビゲーションメニューが表示されていること
    20-6. ✅ 左メニュー（サイドナビ）が表示されていること

    auth-030 ── ログアウトしてログイン画面に戻れること
    30-1. 右上のアバターアイコンをクリック
    30-2. 「ログアウト」メニューをクリック
    30-3. ✅ ログイン画面に戻っていること
    30-4. ✅ ID入力欄が表示されていること

    auth-040 ── 誤パスワードでログインするとエラーが表示されること
    40-1. IDにマスターユーザーのメールアドレスを入力
    40-2. パスワードに誤った値（wrong_password_123）を入力
    40-3. 「ログイン」ボタンをクリック
    40-4. ✅ ログイン画面のままであること（遷移しないこと）
    40-5. ✅ 「IDまたはパスワードが正しくありません」のエラーメッセージが表示されること
