  expected: 実行後、全てのデバイスからログアウトされること
  detailed_flow: |
    1. 複数端末でログイン
    2. 1つの端末で「全端末ログアウト」を実行
    3. ✅ 他の全端末でアクセス不可（ログイン画面へ）となること
- case_no: auth-180
  old_case_no: '-'
  sheet: B
  feature: 権限（設定アクセス拒否）
  movie: UC04
  description: 一般ユーザーが管理設定系 URL に直接アクセスして拒否されること
  expected: 403 Forbidden またはダッシュボードへのリダイレクト、エラー表示
  detailed_flow: |
    1. 一般ユーザーでログイン
    2. URL を直接 `/admin/setting/account` や `/admin/admin_setting/edit/1` に書き換えて遷移
    3. ✅ アクセスが拒否される（権限エラー画面またはダッシュボード戻り）こと
- case_no: auth-190
  old_case_no: '-'
  sheet: B
  feature: 権限（API拒否）
  movie: UC04
  description: 閲覧のみユーザーがレコード更新 API を直接叩いて拒否されること
  expected: 403 エラーが返り、更新が失敗すること
  detailed_flow: |
    1. 閲覧のみ権限のユーザーでログイン
    2. ブラウザの開発者ツールまたは fetch API を使用して `/api/admin/edit/dataset__N/ID` への POST を試行
    3. ✅ 403 Forbidden が返ること
    4. ✅ 実際にレコードが更新されていないこと
- case_no: auth-200
  old_case_no: '-'
  sheet: B
  feature: 権限（セキュリティバイパス試行）
  movie: UC04
  description: API への直接 POST でバリデーションをバイパスできないこと
  expected: サーバー側で適切にバリデーションされ、拒否されること
  detailed_flow: |
    1. ログインしていない状態、または不適切な権限で API エンドポイントにリクエスト送信
    2. ✅ セキュリティチェックによりリクエストが拒否されること
