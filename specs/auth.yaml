  movie: UC02
  description: 誤った TOTP コードを入力してエラーが表示されること
  expected: エラーメッセージが表示され、ログインが拒否されること
  detailed_flow: |
    1. 2FAコード入力画面で、誤った 6桁のコードを入力
    2. ✅ 「認証コードが正しくありません」等のエラーが表示されること
    3. 🔴 連続失敗でロックされることの確認（仕様による）
- case_no: auth-150
  old_case_no: '-'
  sheet: B
  feature: セッション管理（PW変更）
  movie: UC03
  description: 1つ目でパスワード変更 → 2つ目が強制ログアウトされる
  expected: パスワード変更後、他端末のセッションが無効化されること
  detailed_flow: |
    1. ブラウザAとブラウザBで同じユーザーでログイン
    2. ブラウザAでパスワードを変更
    3. ブラウザBでページをリロード
    4. ✅ ログイン画面にリダイレクトされ、セッションが切れていること
