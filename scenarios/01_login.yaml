name: ログイン
steps:
  - action: navigate
    value: /admin/login
  - action: fill
    selector: "input[type=email], input[name=email], #email"
    value: "{{ TEST_EMAIL }}"
  - action: fill
    selector: "input[type=password], input[name=password], #password"
    value: "{{ TEST_PASSWORD }}"
  - action: click
    selector: "button[type=submit], input[type=submit]"
  - action: wait_for
    selector: "body"
assertions:
  - type: url_contains
    value: /admin
screenshot: true
