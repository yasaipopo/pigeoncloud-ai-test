# catalog/workflow.yaml
# 承認ワークフロー シナリオカタログ
# 作成: 2026-06-22 / 関連: pigeon_cloud#3696（承認WF認可修正）の通常動線カバー
# 方針: E2Eはブラウザからの通常ユーザー動線のみ検証する（攻撃/認可バイパスは product integration test の責務・範囲外）

- id: wf-001
  title: 承認ワークフローで申請者が申請し承認者が承認するとレコードが承認済みになる
  priority: P1
  destructive: false
  scope: local
  source: ["pigeon_cloud#3696", "pigeon_cloud#3694"]
  precondition: |
    「wf-001-」プレフィックスの軽量テーブルを作成し、承認ワークフローを有効化する。
    debug API POST /api/admin/debug/create-user で申請者A・承認者B の2名を作成する（マスターadminの認証情報は変更しない）。
    承認ルート（workflow_template_a_json）に承認者B を type:admin で1段設定する（テーブル定義の保存 API POST /admin/edit/dataset/{id} 経由のデータ準備でよい）。
    検証の主操作（申請・承認）は必ずブラウザUIで行い、結果はブラウザの表示から取得する。raw API直叩きで申請・承認を代替しない。
  steps:
    - 申請者Aでログインし、wf-001-テーブルにレコードを1件作成して詳細画面から「申請」を実行する
    - 申請者Aの画面でレコードの状態表示を確認する（承認待ち）
    - いったんログアウトし、承認者Bでログインして承認待ちのレコード（または承認一覧）を開き「承認」を実行する
    - 承認者Bの画面でレコードの状態表示を確認する（承認済み）
  observations:
    - 申請者Aが申請した直後、レコードの詳細画面に「承認待ち」相当の状態表示（ワークフローのステータスバッジ／申請中の表示）がある [スクショ]
    - 承認者Bのログイン後、承認待ち一覧またはレコード詳細に当該レコードが承認対象として表示され「承認」ボタンが押せる [スクショ]
    - 承認者Bが承認した後、レコードの状態表示が「承認済み」相当（done / 承認完了）に変わっている（反映されるまで再読み込みして待つ）[スクショ]
