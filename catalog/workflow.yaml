# catalog/workflow.yaml
# 承認ワークフロー シナリオカタログ
# 作成: 2026-06-22 / 関連: pigeon_cloud#3696（承認WF認可修正）の通常動線カバー
# 方針: E2Eはブラウザからの通常ユーザー動線のみ検証する（攻撃/認可バイパスは product integration test の責務・範囲外）

- id: wf-001
  title: 承認ワークフローで申請者が申請し承認者が承認するとレコードが承認済みになる
  priority: P1
  destructive: false
  scope: local
  source: ["pigeon_cloud#3696", "pigeon_cloud#3694"]
  precondition: |
    「wf-001-」プレフィックスの軽量テーブルを作成し、承認ワークフローを有効化する。
    🔴 申請者と承認者は必ず別人にする。debug API POST /api/admin/debug/create-user で
    申請者A（表示名に「wf001-applicant」を含む）・承認者B（表示名に「wf001-approver」を含む）の2名を作成する。
    master(マスターユーザー)を申請者にも承認者にも使わない（master自己申請・自己承認はこのシナリオの不合格）。
    承認ルート（workflow_template_a_json）の承認者は **B のみ** を type:admin で1段設定する（マスターは承認者に入れない）。
    マスターadminの認証情報は変更しない。承認ルート設定はテーブル定義保存 API 経由のデータ準備でよいが、申請・承認の主操作は必ずブラウザUIで行い結果はブラウザ表示から取得する。raw API直叩きで申請・承認を代替しない。
  steps:
    - 申請者Aでログインし、wf-001-テーブルにレコードを1件作成して詳細画面から「申請」を実行する
    - 申請者Aの画面でレコード詳細（/view/{id}）のワークフロー履歴を確認する（承認待ち）
    - ログアウトし、承認者B（Aとは別メールアドレスのアカウント）でログインして当該レコード詳細を開く
    - 詳細画面の「承認」ボタンでモーダルを開き、モーダル内の確定「承認」ボタン（.modal-footer の ladda ボタン）を押して承認を確定する
    - 承認後のワークフロー履歴を確認する（承認済み・承認者はB）
  observations:
    # WF履歴の承認者列は display_name でなく email が表示される（2026-06-22 実機確認）。別人性は email で判定する
    - 申請者Aが申請した直後、レコード詳細（/view/{id}）のワークフロー履歴に「申請」行があり、その実行者が申請者Aのメールアドレスで、状態が「申請」、次行に承認者Bのメールアドレスと「承認待ち」が表示される [スクショ]
    - 承認者Bでログイン後、当該レコード詳細に「承認」ボタンが表示され押せる（ログイン中ユーザーのメールがB＝Aとは異なる）[スクショ]
    - 🔴 モーダル確定後、ワークフロー履歴の「承認」行の承認者が B のメールアドレス（申請者Aのメールとは異なる別人）で表示され、レコード状態が「承認済み（done）」になっている。トースト「承認しました」または「承認」ボタン消失で確定を確認（反映まで再読み込みして待つ）[スクショ]
