# catalog/records.yaml
# レコードCRUDシナリオカタログ（12件）
# 作成: 2026-06-11 / ソース: .claude/design-docs/2026-06-11-pilot-catalog-proposal.md §1

- id: rec-001
  title: レコードを新規作成して保存すると、一覧と詳細画面に入力値が表示される
  priority: P1
  destructive: false
  scope: local
  source: ["SAVE-01", "RC07", "unc-1080"]
  precondition: |
    「rec-001-」プレフィックスの軽量テーブル（テキスト・数値・メールフィールド程度の最小構成）を debug API POST /api/admin/debug/create-light-table で作成して使用する（ALLテストテーブルは使わない）。
    検証はこのシナリオで作成したテーブル内で完結させる。
    マスターadminの認証情報は変更しない。
  steps:
    - 作成した軽量テーブルの一覧画面を開く
    - 一覧画面の「＋」または「新規作成」ボタンから新規作成画面を開く
    - テキスト欄にこのシナリオ固有の文字列（例："rec001-作成テスト-{タイムスタンプ}"）を入力して登録ボタンを押す
  observations:
    - 登録後に詳細画面または一覧画面に遷移し、このシナリオで入力した固有文字列がそのまま表示されている [スクショ]
    - 一覧画面にこのシナリオで作成したレコードの行が表示されており、固有文字列を含む列が確認できる [スクショ]

- id: rec-002
  title: レコードのテキスト・数値フィールドを同時編集して保存すると、両方の値が詳細画面に永続化される
  priority: P1
  destructive: false
  scope: local
  source: ["SAVE-01", "SAVE-03", "SAVE-04", "unc-150"]
  precondition: |
    「rec-002-」プレフィックスの軽量テーブル（テキスト・数値フィールドを持つ最小構成）を debug API POST /api/admin/debug/create-light-table で作成して使用する（ALLテストテーブルは使わない）。
    テスト前にこのシナリオで編集対象となるレコードを1件作成しておく。
    検証はこのシナリオで作成したテーブル内で完結させる。
    マスターadminの認証情報は変更しない。
  steps:
    - このシナリオで作成したレコードの編集画面を開く
    - テキスト欄にこのシナリオ固有の文字列（例："rec002-更新テスト-{タイムスタンプ}"）を入力する
    - 数値欄にこのシナリオ固有の数値（例：5432）を入力して更新ボタンを押す
    - 詳細画面をリロードして表示を確認する
  observations:
    - 詳細画面のテキスト項目にこのシナリオで入力した固有文字列が表示されている [スクショ]
    - 詳細画面の数値項目にこのシナリオで入力した固有数値（5432）が表示されている [スクショ]
    - 片方のフィールドのみ変更され、もう片方が元の値のまま消えていないこと（race condition 未発生）[スクショ]

- id: rec-003
  title: レコードを個別削除すると確認ダイアログ後に一覧から消える
  priority: P1
  destructive: false
  scope: local
  source: ["rec-080", "rec-210"]
  precondition: |
    「rec-003-」プレフィックスの軽量テーブル（テキストフィールドを持つ最小構成）を debug API POST /api/admin/debug/create-light-table で作成して使用する（ALLテストテーブルは使わない）。
    このシナリオ内で固有文字列（例："rec003-削除対象-{タイムスタンプ}"）を持つレコードを1件作成する。
    検証はこのシナリオで作成したテーブル内で完結させる。
    マスターadminの認証情報は変更しない。
  steps:
    - 固有文字列を持つレコードを1件作成し、一覧画面でそのレコードが表示されていることを確認する
    - そのレコードの削除操作（削除ボタン・アクションメニューの削除など）を実行する
    - 確認ダイアログで削除を承認する
    - 一覧画面をリロードして表示を確認する
  observations:
    - 削除前の一覧にこのシナリオで作成したレコードの固有文字列を含む行が表示されている [スクショ]
    - 削除後にリロードした一覧から、そのレコードの固有文字列を含む行が消えている [スクショ]

- id: rec-004
  title: 簡易検索で一覧を絞り込むと、検索語に一致するレコードだけが表示される
  priority: P1
  destructive: false
  scope: local
  source: ["unc-110", "rec-070"]
  precondition: |
    「rec-004-」プレフィックスの軽量テーブル（テキストフィールドを持つ最小構成）を debug API POST /api/admin/debug/create-light-table で作成して使用する（ALLテストテーブルは使わない）。
    このシナリオ内で識別可能な固有文字列を持つレコードAと、その文字列を含まないレコードBを作成する（例：Aのテキスト = "rec004-SearchTarget-{タイムスタンプ}"、Bのテキスト = "rec004-OtherRecord-{タイムスタンプ}"）。
    検証はこのシナリオで作成したテーブル内で完結させる。
    マスターadminの認証情報は変更しない。
  steps:
    - レコードAとレコードBを作成した軽量テーブルの一覧画面を開く
    - 一覧画面の簡易検索バーにレコードAの固有文字列（"SearchTarget"を含む部分）を入力して検索を実行する
    - 検索をクリア（リセット）する
  observations:
    - 検索前の一覧にレコードAとレコードBの両方の行が表示されている [スクショ]
    - 検索後の一覧にレコードAの固有文字列を含む行が表示されている [スクショ]
    - 検索後の一覧にレコードBの固有文字列を含む行が表示されていない [スクショ]
    - 検索クリア後の一覧にレコードAとレコードBの両方が再び表示されている [スクショ]

- id: rec-005
  title: レコードのコピーで元の値が事前入力された新規フォームが開き、登録すると複製が一覧に増える
  priority: P1
  destructive: false
  scope: local
  source: ["rec-160", "unc-630"]
  precondition: |
    「rec-005-」プレフィックスの軽量テーブル（テキストフィールドを持つ最小構成）を debug API POST /api/admin/debug/create-light-table で作成して使用する（ALLテストテーブルは使わない）。
    このシナリオ内で固有文字列（例："rec005-コピー元-{タイムスタンプ}"）を持つレコードを1件作成する。
    検証はこのシナリオで作成したテーブル内で完結させる。
    マスターadminの認証情報は変更しない。
  steps:
    - 固有文字列を持つレコードを1件作成した一覧画面を開く
    - そのレコードのコピーボタン（アクションメニュー内「コピー」等）を押す
    - 開いた新規作成フォーム（元の値が事前入力済み）で登録ボタンを押す
  observations:
    # 2026-06-12 修正: 実仕様は確認ダイアログなしで /edit/new;ref=N の事前入力フォームへ直接遷移（パイロットrun 20260611-1247 で確認）
    - コピーボタン押下後、元レコードの固有文字列が事前入力された新規作成フォームが表示される [スクショ]
    - 登録後、一覧にこのシナリオで作成した固有文字列を含む行が2行以上表示されている（反映されるまで一覧を再読み込みして待つ）[スクショ]

- id: rec-006
  title: チェックボックスで選択したレコードだけが一括削除され、処理後に選択状態が解除される
  priority: P2
  destructive: false
  scope: local
  source: ["rec-020", "rec-150", "280-1", "280-2"]
  precondition: |
    「rec-006-」プレフィックスの軽量テーブル（テキストフィールドを持つ最小構成）を debug API POST /api/admin/debug/create-light-table で作成して使用する（ALLテストテーブルは使わない）。
    このシナリオ内で固有文字列を持つレコードを3件以上作成する（例："rec006-削除対象-{タイムスタンプ}"、"rec006-残存A-{タイムスタンプ}"、"rec006-残存B-{タイムスタンプ}"）。
    検証はこのシナリオで作成したテーブル内で完結させる。
    マスターadminの認証情報は変更しない。
  steps:
    - 作成した3件以上のレコードが表示されている一覧画面を開く
    - 1件目（削除対象）のチェックボックスにチェックを入れる
    - 表示された「一括削除」ボタンを押して確認モーダルで削除を実行する
    - 一覧画面をリロードして表示を確認する
  observations:
    - チェックを入れると「一括削除」ボタンが表示される [スクショ]
    - 削除実行後の一覧に、チェックしたレコードの固有文字列（"rec006-削除対象-"を含む）の行が消えている [スクショ]
    - 削除実行後の一覧に、チェックしなかった残存レコード（"rec006-残存A-"・"rec006-残存B-"を含む）の行が残っている [スクショ]
    - 削除処理完了後に全選択チェックボックスのチェックが外れている（選択状態が解除されている）[スクショ]

- id: rec-007
  title: 全選択して一括削除を開くとモーダルに対象件数と全データ削除の赤文字警告が表示される（実行はしない）
  priority: P2
  destructive: false
  scope: local
  source: ["rec-170", "rec-180"]
  precondition: |
    「rec-007-」プレフィックスの軽量テーブル（テキストフィールドを持つ最小構成）を debug API POST /api/admin/debug/create-light-table で作成して使用する（ALLテストテーブルは使わない）。
    このシナリオ内でレコードを3件作成する。
    検証はこのシナリオで作成したテーブル内で完結させる。
    マスターadminの認証情報は変更しない。
  steps:
    - 作成した3件のレコードが表示されている一覧画面を開く
    - 一覧ヘッダーの全選択チェックボックスにチェックを入れる
    - 「一括削除」ボタンを押してモーダルを開き、内容を確認してキャンセルで閉じる
    - 「一括編集」ボタンを押してモーダルを開き、内容を確認してキャンセルで閉じる
  observations:
    - 一括削除モーダルに数字「3」（このシナリオで作成した件数）を含む対象件数の表示がある [スクショ]
    - 一括削除モーダルに赤文字で「全データが削除されます」相当の注意書きが表示されている [スクショ]
    # 2026-06-12 修正: 全選択時の一括編集モーダルはIDリスト/件数ではなく「全データが更新されます」総称表示が実仕様（パイロットrun 20260611-1247 で確認）
    - 一括編集モーダルに「全データが更新されます」相当の対象範囲の表示がある [スクショ]
    - 両モーダルをキャンセルした後、このシナリオで作成した3件のレコードが一覧にすべて残っている [スクショ]

- id: rec-008
  title: フィルタ適用中に全選択一括削除すると、フィルタ該当レコードだけが削除され件数表示も一致する
  priority: P2
  destructive: false
  scope: local
  source: ["rec-190", "rec-220", "rec-060", "unc-910"]
  precondition: |
    「rec-008-」プレフィックスの軽量テーブル（テキスト・数値フィールドを持つ構成）を debug API POST /api/admin/debug/create-light-table で作成して使用する（ALLテストテーブルは使わない）。
    フィルタで区別できる2グループのレコードを事前に作成する（グループAに3件: 数値フィールド = 100 / グループBに2件: 数値フィールド = 200）。
    検証はこのシナリオで作成したテーブル内で完結させる。
    マスターadminの認証情報は変更しない。
  steps:
    - グループA（数値=100）3件とグループB（数値=200）2件が表示されている一覧画面を開く
    - グループAだけに一致するフィルタ（数値フィールド = 100）を適用する
    - 全選択チェックボックスにチェックを入れ、「一括削除」モーダルを開いて件数を確認してから削除を実行する
    - フィルタを解除して一覧を確認する
  observations:
    - フィルタ適用後の一覧にグループAの3件のみが表示されている [スクショ]
    - 一括削除確認モーダルの件数表示が「3」と一致している [スクショ]
    - 削除処理が「処理待ち」のまま停止せず完了し、完了メッセージまたは一覧への遷移が確認できる [スクショ]
    # 2026-06-12 修正: 一括削除は非同期反映。反映前の撮影は偽FAILになる（パイロットrun 20260611-1247 の教訓）
    - フィルタ解除後、グループAの行が一覧から消えるまで再読み込みしながら待ち（最大60秒）、グループBの2件のみが残っている [スクショ]

- id: rec-009
  title: 一括編集でフィールド値を更新すると、選択した全レコードに新しい値が反映される
  priority: P2
  destructive: false
  scope: local
  source: ["rec-030", "rec-060"]
  precondition: |
    「rec-009-」プレフィックスの軽量テーブル（テキストフィールドを持つ最小構成）を debug API POST /api/admin/debug/create-light-table で作成して使用する（ALLテストテーブルは使わない）。
    このシナリオ内でレコードを3件作成する。
    検証はこのシナリオで作成したテーブル内で完結させる。
    マスターadminの認証情報は変更しない。
  steps:
    - 作成した3件のレコードが表示されている一覧画面を開く
    - 全選択チェックボックスにチェックを入れ、メニューから「一括編集」を開く
    - 一括編集モーダルで「項目を追加」からテキストフィールドを選択し、固有文字列（例："rec009-一括更新-{タイムスタンプ}"）を入力して保存する
    - 一覧画面で3件の表示を確認する
  observations:
    - 一括編集モーダルにタイトル「一括編集」と「項目を追加」ボタンが表示されている [スクショ]
    - 一括編集モーダルに「編集中でロックされているデータは更新されません」相当の注意書きが表示されている [スクショ]
    - 保存後の一覧で、このシナリオで作成した3件全てのテキスト項目にこのシナリオで入力した固有文字列が表示されている [スクショ]

- id: rec-010
  title: レコードの編集開始でロックされ、キャンセル・保存のいずれでもロックが解除される
  priority: P2
  destructive: false
  scope: local
  source: ["LOCK-01", "LOCK-02", "LOCK-03", "rec-030"]
  precondition: |
    「rec-010-」プレフィックスの軽量テーブル（テキストフィールドを持つ最小構成）を debug API POST /api/admin/debug/create-light-table で作成して使用する（ALLテストテーブルは使わない）。
    このシナリオ内で操作対象のレコードを1件作成する。
    検証は単一ユーザー視点（ロック取得→キャンセルまたは保存でロック解除）のみを対象とする。他ユーザーが編集中の状態の検証は対象外。
    マスターadminの認証情報は変更しない。
  steps:
    - 作成したレコードの詳細画面を開く
    - 「編集」ボタンを押して編集モードに入る
    - 「キャンセル」ボタンを押して詳細表示に戻る
    - 再度「編集」ボタンを押して編集モードに入る
    - テキストフィールドの値を変更（例："rec010-保存後-{タイムスタンプ}"）して保存ボタンを押す
  observations:
    - 「編集」ボタン押下後、URLが編集用パスになるか画面に保存・キャンセルボタンが表示される（編集モード）[スクショ]
    - キャンセル後に「編集」ボタンが再表示されている（ロック解除を示す）[スクショ]
    - 保存後に「編集」ボタンが再表示されており（ロック解除）、詳細画面に変更後の固有文字列が表示されている [スクショ]

- id: rec-011
  title: 複数値フィールド（複数選択等）を持つレコードで他フィールドだけ編集保存しても複数値が消えない
  priority: P2
  destructive: false
  scope: local
  source: ["rec-200"]
  precondition: |
    「rec-011-」プレフィックスの軽量テーブル（テキストフィールド + 複数選択フィールド）を debug API POST /api/admin/debug/create-light-table で作成して使用する（ALLテストテーブルは使わない）。
    複数選択フィールドには選択肢を3件以上設定しておく（スキーマで事前定義）。
    このシナリオ内で複数選択フィールドに2つ以上の選択肢（例：選択肢A・選択肢B）を設定したレコードを1件作成する。
    検証はこのシナリオで作成したテーブル内で完結させる。
    マスターadminの認証情報は変更しない。
  steps:
    - 複数選択フィールドに2つ以上の値を設定したレコードの編集画面を開く
    - 複数選択フィールドには一切触れず、テキストフィールドの値だけを変更（例："rec011-テキスト変更-{タイムスタンプ}"）して保存する
    - 詳細画面で複数選択フィールドの表示を確認する
  observations:
    - 保存後の詳細画面でテキストフィールドにこのシナリオで変更した固有文字列が表示されている [スクショ]
    - 保存後の詳細画面で複数選択フィールドに、作成時に設定した2つの選択肢（選択肢A・選択肢B）が変更前と同一の状態で表示されており、いずれも消えていない（データ消失バグ未発生）[スクショ]

- id: rec-012
  title: 一覧のカラムヘッダクリックで昇順・降順ソートできる
  priority: P1
  destructive: false
  scope: local
  source: ["新規起案 2026-06-11"]
  precondition: |
    「rec-012-」プレフィックスの軽量テーブル（テキストフィールド + 数値フィールド）を debug API POST /api/admin/debug/create-light-table で作成して使用する（ALLテストテーブルは使わない）。
    数値フィールドにそれぞれ 10 / 2 / 35 を持つ3件のレコードを投入する。
    検証はこのシナリオで作成したテーブル内で完結させる。
    マスターadminの認証情報は変更しない。
  steps:
    - 一覧画面を開き、投入した3件のレコード（数値 10・2・35）が全て表示されるまで待ってから次に進む（反映ラグによる非決定的failの防止）
    - 数値カラムのヘッダをクリックして昇順ソートを適用する
    - もう一度同じヘッダをクリックして降順ソートを適用する
  observations:
    - 昇順クリック後、一覧の数値カラムがこのシナリオで投入したレコードの中で上から 2 / 10 / 35 の順に並んでいる [スクショ]
    - 降順クリック後、上から 35 / 10 / 2 の順に並んでいる [スクショ]
