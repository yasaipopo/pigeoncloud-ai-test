<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PigeonCloud プロダクトバグ一覧</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: bold; }
    .bugs-container {
      max-width: 1080px;
      margin: 20px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      padding: 40px 48px;
    }
    .bugs-container h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5em;
      padding-bottom: 0.3em;
      border-bottom: 3px solid #dc3545;
    }
    .bugs-container h2 {
      font-size: 1.4rem;
      margin-top: 2em;
      margin-bottom: 0.6em;
      padding-bottom: 0.3em;
      border-bottom: 2px solid #dee2e6;
    }
    .bugs-container h3 {
      font-size: 1.15rem;
      margin-top: 1.6em;
      margin-bottom: 0.5em;
      color: #343a40;
    }
    .bugs-container h4 {
      font-size: 1rem;
      margin-top: 1.2em;
      margin-bottom: 0.4em;
      color: #6c757d;
    }
    .bugs-container table {
      width: 100%;
      margin: 1em 0;
      border-collapse: collapse;
    }
    .bugs-container table th {
      background: #f1f3f5;
      padding: 8px 12px;
      border: 1px solid #dee2e6;
      text-align: left;
      font-size: 0.9rem;
    }
    .bugs-container table td {
      padding: 8px 12px;
      border: 1px solid #dee2e6;
      font-size: 0.9rem;
      vertical-align: top;
    }
    .bugs-container code {
      background: #f8f9fa;
      padding: 2px 6px;
      border-radius: 3px;
      color: #c7254e;
      font-size: 0.88em;
    }
    .bugs-container blockquote {
      border-left: 4px solid #dee2e6;
      padding: 8px 16px;
      color: #6c757d;
      margin: 1em 0;
    }
    .bugs-container ul, .bugs-container ol {
      padding-left: 1.8em;
      margin: 0.5em 0;
    }
    .bugs-container li { margin: 0.3em 0; }
    .bugs-container hr {
      margin: 2em 0;
      border-top: 1px dashed #ced4da;
    }
    .bugs-container a { color: #0d6efd; }
    .loading {
      text-align: center;
      padding: 60px;
      color: #6c757d;
    }
    .err {
      padding: 20px;
      background: #f8d7da;
      color: #842029;
      border-radius: 8px;
      margin: 20px 0;
    }
    /* 絵文字強調 */
    .bugs-container h2:first-letter,
    .bugs-container h3:first-letter { font-size: 1.2em; }
    /* カラー別強調 */
    .bugs-container h2:has-text("🔴"),
    .bugs-container h3:has-text("🔴") { color: #dc3545; }
    /* Summary box */
    .summary-box {
      background: linear-gradient(135deg, #fff, #f1f3f5);
      border: 1px solid #dee2e6;
      border-radius: 10px;
      padding: 16px 24px;
      margin: 20px 0;
    }
    .summary-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-right: 8px;
    }
    .summary-badge.critical { background: #dc3545; color: #fff; }
    .summary-badge.warn     { background: #ffc107; color: #000; }
    .summary-badge.info     { background: #0dcaf0; color: #000; }
    .summary-badge.success  { background: #198754; color: #fff; }
  </style>
</head>
<body>

<!-- ナビゲーションバー -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">
      <i class="bi bi-bug-fill me-2"></i>PigeonCloud プロダクトバグ一覧
    </span>
    <div class="d-flex align-items-center gap-3">
      <a href="index.html" class="btn btn-sm btn-outline-light">
        <i class="bi bi-house me-1"></i>トップ
      </a>
      <a href="sheet.html" class="btn btn-sm btn-outline-warning">
        <i class="bi bi-kanban me-1"></i>チェックシート
      </a>
      <a href="specs.html" class="btn btn-sm btn-outline-info">
        <i class="bi bi-list-check me-1"></i>テスト一覧
      </a>
      <button class="btn btn-sm btn-outline-secondary" onclick="doLogout()">
        <i class="bi bi-box-arrow-right me-1"></i>ログアウト
      </button>
    </div>
  </div>
</nav>

<div class="container py-2">
  <div class="bugs-container">
    <div id="loading" class="loading">
      <div class="spinner-border text-danger" role="status"></div>
      <div class="mt-3">バグ一覧を読み込み中...</div>
    </div>
    <div id="content" style="display:none"></div>
    <div id="err" class="err" style="display:none"></div>
  </div>

  <div class="text-center text-muted small py-3">
    最終更新: <span id="last-updated">-</span>
    &nbsp;|&nbsp;
    source: <code>.claude/product-bugs-suspected.md</code>
  </div>
</div>

<script>
  const API_URL = '__API_URL__';

  const token = localStorage.getItem('e2e_auth_token');
  if (!token) location.href = 'login.html';

  function doLogout() {
    localStorage.removeItem('e2e_auth_token');
    location.href = 'login.html';
  }

  async function loadBugList() {
    try {
      const res = await fetch(`${API_URL}/bugs`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 401) {
        localStorage.removeItem('e2e_auth_token');
        location.href = 'login.html';
        return;
      }
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
      const data = await res.json();
      const md = data.markdown || '';
      const updatedAt = data.updatedAt || '-';

      // Markdown → HTML
      const html = marked.parse(md);
      document.getElementById('content').innerHTML = html;
      document.getElementById('content').style.display = 'block';
      document.getElementById('loading').style.display = 'none';
      document.getElementById('last-updated').textContent =
        updatedAt !== '-' ? new Date(updatedAt).toLocaleString('ja-JP') : '-';
    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('err').style.display = 'block';
      document.getElementById('err').textContent = `読み込み失敗: ${e.message}`;
      console.error(e);
    }
  }

  loadBugList();
</script>

</body>
</html>
