<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - PigeonCloud E2E ビューアー</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8f9fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      font-size: 2rem;
      color: #0d6efd;
    }
  </style>
</head>
<body>

<div class="login-card px-3">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <!-- ロゴ・タイトル -->
      <div class="text-center mb-4">
        <div class="login-logo mb-2">
          <i class="bi bi-clipboard-check"></i>
        </div>
        <h5 class="mb-0 fw-bold">PigeonCloud E2E ビューアー</h5>
        <p class="text-muted small mt-1">管理者パスワードでログイン</p>
      </div>

      <!-- エラーメッセージ -->
      <div class="alert alert-danger d-none" id="error-msg">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span id="error-text">パスワードが正しくありません</span>
      </div>

      <!-- ログインフォーム -->
      <form id="login-form" onsubmit="doLogin(event)">
        <div class="mb-3">
          <label for="password" class="form-label">パスワード</label>
          <div class="input-group">
            <input type="password" class="form-control" id="password"
                   placeholder="パスワードを入力" autofocus required>
            <button class="btn btn-outline-secondary" type="button" id="toggle-pw"
                    onclick="togglePassword()" tabindex="-1">
              <i class="bi bi-eye" id="toggle-icon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100" id="login-btn">
          <i class="bi bi-box-arrow-in-right me-2"></i>ログイン
        </button>
      </form>
    </div>
  </div>
</div>

<script>
// APIのURLはビルド時に埋め込まれる
const API_URL = '__API_URL__';

// すでにトークンがあればindex.htmlへリダイレクト
(function checkAlreadyLoggedIn() {
  const token = localStorage.getItem('e2e_auth_token');
  if (token) {
    location.href = 'index.html';
  }
})();

async function doLogin(e) {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const errorEl = document.getElementById('error-msg');

  // ボタン無効化
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>ログイン中...';
  errorEl.classList.add('d-none');

  try {
    const r = await fetch(`${API_URL}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });

    if (r.ok) {
      const data = await r.json();
      localStorage.setItem('e2e_auth_token', data.token);
      location.href = 'index.html';
    } else {
      const data = await r.json().catch(() => ({}));
      document.getElementById('error-text').textContent = data.error || 'パスワードが正しくありません';
      errorEl.classList.remove('d-none');
    }
  } catch (err) {
    document.getElementById('error-text').textContent = 'サーバーに接続できませんでした: ' + err.message;
    errorEl.classList.remove('d-none');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>ログイン';
  }
}

function togglePassword() {
  const input = document.getElementById('password');
  const icon = document.getElementById('toggle-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'bi bi-eye';
  }
}
</script>
</body>
</html>
