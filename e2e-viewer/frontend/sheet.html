<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パイプラインチェックシート - PigeonCloud E2E</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }

    /* サマリーカード */
    .summary-card {
      border-radius: 10px;
      padding: 16px 20px;
      text-align: center;
      min-width: 100px;
    }
    .summary-card .num { font-size: 1.8rem; font-weight: bold; line-height: 1.1; }
    .summary-card .lbl { font-size: .72rem; color: #6c757d; }

    /* パイプラインテーブル */
    .pipeline-table th { white-space: nowrap; font-size: .82rem; }
    .pipeline-table td { vertical-align: middle; font-size: .85rem; }
    .pipeline-table .case-no { white-space: nowrap; font-weight: 600; }
    .pipeline-table .feature-col { max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pipeline-table .desc-col { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ステータスバッジ */
    .check-cell { text-align: center; cursor: pointer; min-width: 48px; }
    .check-cell:hover { background: #e9ecef; }
    .badge-ok { background: #198754; color: #fff; }
    .badge-ng { background: #dc3545; color: #fff; }
    .badge-pass { background: #198754; color: #fff; }
    .badge-fail-spec { background: #fd7e14; color: #fff; }
    .badge-fail-product { background: #dc3545; color: #fff; }
    .badge-fail-env { background: #6f42c1; color: #fff; }
    .badge-unchecked { background: #dee2e6; color: #6c757d; }

    /* spec タブ */
    .spec-tab { cursor: pointer; padding: 6px 14px; border-radius: 20px; font-size: .82rem; white-space: nowrap; }
    .spec-tab:hover { background: #e9ecef; }
    .spec-tab.active { background: #0d6efd; color: #fff; }
    .spec-tab .spec-count { font-size: .7rem; opacity: .7; }

    /* 進捗バー */
    .progress-thin { height: 6px; border-radius: 3px; }

    /* ノート編集モーダル */
    .note-indicator { cursor: pointer; opacity: .5; font-size: .7rem; }
    .note-indicator:hover { opacity: 1; }
    .note-indicator.has-note { opacity: 1; color: #0d6efd; }

    /* フィルタバー */
    .filter-bar { background: #fff; border-radius: 8px; padding: 10px 16px; margin-bottom: 12px; }
  </style>
</head>
<body>

<!-- ナビゲーション -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a href="index.html" class="navbar-brand text-decoration-none">
      <i class="bi bi-arrow-left me-2"></i>PigeonCloud E2E ビューアー
    </a>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline-info" onclick="initFromYaml()" title="yamlから初期データ投入">
        <i class="bi bi-cloud-upload me-1"></i>初期化
      </button>
      <button class="btn btn-sm btn-outline-secondary" onclick="doLogout()">
        <i class="bi bi-box-arrow-right me-1"></i>ログアウト
      </button>
    </div>
  </div>
</nav>

<div class="container py-4">

  <!-- サマリーバー -->
  <div class="card mb-3" id="summary-card">
    <div class="card-body">
      <h6 class="mb-3"><i class="bi bi-kanban me-1"></i>パイプライン進捗</h6>
      <div class="row g-3 mb-3">
        <!-- yaml -->
        <div class="col-md-4">
          <div class="border rounded p-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <strong class="small">1. YAML品質チェック</strong>
              <span class="text-muted small" id="yaml-ratio">-</span>
            </div>
            <div class="progress progress-thin mb-2">
              <div class="progress-bar bg-success" id="yaml-bar-ok" style="width:0%"></div>
              <div class="progress-bar bg-danger" id="yaml-bar-ng" style="width:0%"></div>
            </div>
            <div class="d-flex gap-2">
              <span class="badge badge-ok" id="yaml-ok">0</span>
              <span class="badge badge-ng" id="yaml-ng">0</span>
              <span class="badge badge-unchecked" id="yaml-unc">0</span>
            </div>
          </div>
        </div>
        <!-- spec -->
        <div class="col-md-4">
          <div class="border rounded p-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <strong class="small">2. Spec実装</strong>
              <span class="text-muted small" id="spec-ratio">-</span>
            </div>
            <div class="progress progress-thin mb-2">
              <div class="progress-bar bg-success" id="spec-bar-ok" style="width:0%"></div>
              <div class="progress-bar bg-danger" id="spec-bar-ng" style="width:0%"></div>
            </div>
            <div class="d-flex gap-2">
              <span class="badge badge-ok" id="spec-ok">0</span>
              <span class="badge badge-ng" id="spec-ng">0</span>
              <span class="badge badge-unchecked" id="spec-unc">0</span>
            </div>
          </div>
        </div>
        <!-- run -->
        <div class="col-md-4">
          <div class="border rounded p-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <strong class="small">3. 実行確認</strong>
              <span class="text-muted small" id="run-ratio">-</span>
            </div>
            <div class="progress progress-thin mb-2">
              <div class="progress-bar bg-success" id="run-bar-pass" style="width:0%"></div>
              <div class="progress-bar bg-warning" id="run-bar-fspec" style="width:0%"></div>
              <div class="progress-bar bg-danger" id="run-bar-fprod" style="width:0%"></div>
              <div class="progress-bar bg-purple" id="run-bar-fenv" style="width:0%"></div>
            </div>
            <div class="d-flex gap-2">
              <span class="badge badge-pass" id="run-pass">0</span>
              <span class="badge badge-fail-spec" id="run-fspec">0</span>
              <span class="badge badge-fail-product" id="run-fprod">0</span>
              <span class="badge badge-fail-env" id="run-fenv">0</span>
              <span class="badge badge-unchecked" id="run-unc">0</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Specタブ -->
  <div class="d-flex flex-wrap gap-2 mb-3" id="spec-tabs">
    <div class="spec-tab active" data-spec="all" onclick="selectSpec('all', this)">
      全て <span class="spec-count" id="tab-count-all"></span>
    </div>
  </div>

  <!-- フィルタバー -->
  <div class="filter-bar d-flex gap-3 align-items-center flex-wrap">
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline-secondary active" data-status-filter="all" onclick="setStatusFilter('all', this)">すべて</button>
      <button class="btn btn-sm btn-outline-warning" data-status-filter="unchecked" onclick="setStatusFilter('unchecked', this)">未チェック</button>
      <button class="btn btn-sm btn-outline-success" data-status-filter="ok" onclick="setStatusFilter('ok', this)">OK/PASSのみ</button>
      <button class="btn btn-sm btn-outline-danger" data-status-filter="ng" onclick="setStatusFilter('ng', this)">NG/FAILのみ</button>
    </div>
    <input class="form-control form-control-sm ms-auto" style="max-width:220px"
           id="search-box" placeholder="ケースNo/機能名で絞り込み..." oninput="applyFilters()">
    <span class="text-muted small" id="display-count"></span>
  </div>

  <!-- ローディング -->
  <div class="text-center py-5" id="loading">
    <div class="spinner-border text-secondary"></div>
  </div>

  <!-- メインテーブル -->
  <div class="card d-none" id="main-table-container">
    <div class="card-body p-0" style="overflow-x:auto">
      <table class="table table-hover table-sm pipeline-table mb-0">
        <thead class="table-dark">
          <tr>
            <th style="width:80px">No</th>
            <th style="width:120px">機能</th>
            <th>テスト内容</th>
            <th>期待結果</th>
            <th style="width:64px" class="text-center">1.YAML</th>
            <th style="width:64px" class="text-center">2.Spec</th>
            <th style="width:64px" class="text-center">3.Run</th>
            <th style="width:140px">更新</th>
          </tr>
        </thead>
        <tbody id="pipeline-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ノート編集モーダル -->
<div class="modal fade" id="noteModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title" id="noteModalTitle">ステータス編集</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label small fw-bold">ステータス</label>
          <div id="noteModalStatusButtons"></div>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-bold">備考</label>
          <textarea class="form-control" id="noteModalText" rows="3" placeholder="備考を入力..."></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-bold">更新者</label>
          <input class="form-control form-control-sm" id="noteModalBy" value="manual" placeholder="更新者名">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">キャンセル</button>
        <button type="button" class="btn btn-primary btn-sm" onclick="saveNote()">保存</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const CONFIG = { apiUrl: '__API_URL__' };

// =========================================
// 認証
// =========================================
const _token = localStorage.getItem('e2e_auth_token');
if (!_token) location.href = 'login.html';

function authHeaders() {
  return {
    'Authorization': `Bearer ${localStorage.getItem('e2e_auth_token')}`,
    'Content-Type': 'application/json'
  };
}
function doLogout() {
  localStorage.removeItem('e2e_auth_token');
  location.href = 'login.html';
}

// =========================================
// 状態管理
// =========================================
let allItems = [];
let currentSpec = 'all';
let currentStatusFilter = 'all';
let specList = [];

// 編集中モーダル用
let editingSpec = '';
let editingCaseNo = '';
let editingField = '';
let editingValue = null;

// =========================================
// 初期化
// =========================================
document.addEventListener('DOMContentLoaded', async () => {
  try {
    await Promise.all([loadPipeline(), loadSummary()]);
  } catch (e) {
    document.getElementById('loading').innerHTML =
      `<div class="alert alert-danger">読み込みエラー: ${escHtml(e.message)}</div>`;
  }
});

// =========================================
// データ読み込み
// =========================================
async function loadPipeline() {
  const r = await fetch(`${CONFIG.apiUrl}/pipeline`, { headers: authHeaders() });
  if (r.status === 401) { doLogout(); return; }
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const data = await r.json();
  allItems = data.items || [];

  // spec一覧を抽出
  const specSet = new Set();
  allItems.forEach(i => specSet.add(i.spec));
  specList = [...specSet].sort();

  buildSpecTabs();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main-table-container').classList.remove('d-none');
  applyFilters();
}

async function loadSummary() {
  const r = await fetch(`${CONFIG.apiUrl}/pipeline/summary`, { headers: authHeaders() });
  if (!r.ok) return;
  const s = await r.json();
  updateSummaryUI(s);
}

// =========================================
// サマリーUI更新
// =========================================
function updateSummaryUI(s) {
  const total = s.total || 1;

  // YAML
  const yamlOk = s.yaml?.ok || 0;
  const yamlNg = s.yaml?.ng || 0;
  const yamlUnc = s.yaml?.unchecked || 0;
  document.getElementById('yaml-ok').textContent = `OK ${yamlOk}`;
  document.getElementById('yaml-ng').textContent = `NG ${yamlNg}`;
  document.getElementById('yaml-unc').textContent = `- ${yamlUnc}`;
  document.getElementById('yaml-ratio').textContent = `${yamlOk}/${total}`;
  document.getElementById('yaml-bar-ok').style.width = `${(yamlOk/total*100).toFixed(1)}%`;
  document.getElementById('yaml-bar-ng').style.width = `${(yamlNg/total*100).toFixed(1)}%`;

  // Spec
  const specOk = s.spec?.ok || 0;
  const specNg = s.spec?.ng || 0;
  const specUnc = s.spec?.unchecked || 0;
  document.getElementById('spec-ok').textContent = `OK ${specOk}`;
  document.getElementById('spec-ng').textContent = `NG ${specNg}`;
  document.getElementById('spec-unc').textContent = `- ${specUnc}`;
  document.getElementById('spec-ratio').textContent = `${specOk}/${total}`;
  document.getElementById('spec-bar-ok').style.width = `${(specOk/total*100).toFixed(1)}%`;
  document.getElementById('spec-bar-ng').style.width = `${(specNg/total*100).toFixed(1)}%`;

  // Run
  const runPass = s.run?.pass || 0;
  const runFspec = s.run?.fail_spec || 0;
  const runFprod = s.run?.fail_product || 0;
  const runFenv = s.run?.fail_env || 0;
  const runUnc = s.run?.unchecked || 0;
  document.getElementById('run-pass').textContent = `PASS ${runPass}`;
  document.getElementById('run-fspec').textContent = `F:Spec ${runFspec}`;
  document.getElementById('run-fprod').textContent = `F:Prod ${runFprod}`;
  document.getElementById('run-fenv').textContent = `F:Env ${runFenv}`;
  document.getElementById('run-unc').textContent = `- ${runUnc}`;
  document.getElementById('run-ratio').textContent = `${runPass}/${total}`;
  document.getElementById('run-bar-pass').style.width = `${(runPass/total*100).toFixed(1)}%`;
  document.getElementById('run-bar-fspec').style.width = `${(runFspec/total*100).toFixed(1)}%`;
  document.getElementById('run-bar-fprod').style.width = `${(runFprod/total*100).toFixed(1)}%`;
  document.getElementById('run-bar-fenv').style.width = `${(runFenv/total*100).toFixed(1)}%`;
}

// =========================================
// Specタブ構築
// =========================================
function buildSpecTabs() {
  const container = document.getElementById('spec-tabs');
  container.innerHTML = '';

  // 全てタブ
  const allTab = document.createElement('div');
  allTab.className = 'spec-tab active';
  allTab.dataset.spec = 'all';
  allTab.onclick = () => selectSpec('all', allTab);
  allTab.innerHTML = `全て <span class="spec-count">(${allItems.length})</span>`;
  container.appendChild(allTab);

  specList.forEach(spec => {
    const count = allItems.filter(i => i.spec === spec).length;
    const tab = document.createElement('div');
    tab.className = 'spec-tab';
    tab.dataset.spec = spec;
    tab.onclick = () => selectSpec(spec, tab);
    tab.innerHTML = `${escHtml(spec)} <span class="spec-count">(${count})</span>`;
    container.appendChild(tab);
  });
}

function selectSpec(spec, el) {
  currentSpec = spec;
  document.querySelectorAll('.spec-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function setStatusFilter(status, btn) {
  currentStatusFilter = status;
  document.querySelectorAll('[data-status-filter]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

// =========================================
// フィルタ適用 & テーブル描画
// =========================================
function applyFilters() {
  const query = (document.getElementById('search-box').value || '').toLowerCase();
  let filtered = allItems;

  // specフィルタ
  if (currentSpec !== 'all') {
    filtered = filtered.filter(i => i.spec === currentSpec);
  }

  // ステータスフィルタ
  if (currentStatusFilter === 'unchecked') {
    filtered = filtered.filter(i => !i.yamlCheck || !i.specCheck || !i.runCheck);
  } else if (currentStatusFilter === 'ok') {
    filtered = filtered.filter(i =>
      (i.yamlCheck === 'ok' || i.specCheck === 'ok' || i.runCheck === 'pass')
    );
  } else if (currentStatusFilter === 'ng') {
    filtered = filtered.filter(i =>
      i.yamlCheck === 'ng' || i.specCheck === 'ng' ||
      (i.runCheck && i.runCheck.startsWith('fail'))
    );
  }

  // テキスト検索
  if (query) {
    filtered = filtered.filter(i =>
      (i.caseNo || '').toLowerCase().includes(query) ||
      (i.feature || '').toLowerCase().includes(query) ||
      (i.description || '').toLowerCase().includes(query)
    );
  }

  renderTable(filtered);
  document.getElementById('display-count').textContent = `${filtered.length}件表示`;
}

function renderTable(items) {
  const tbody = document.getElementById('pipeline-tbody');
  tbody.innerHTML = '';

  // spec でグループ化（currentSpec === 'all' のとき）
  if (currentSpec === 'all') {
    const groups = {};
    items.forEach(i => {
      if (!groups[i.spec]) groups[i.spec] = [];
      groups[i.spec].push(i);
    });
    // specList順で表示
    const orderedSpecs = specList.filter(s => groups[s]);
    orderedSpecs.forEach(spec => {
      // グループヘッダー
      const headerRow = tbody.insertRow();
      headerRow.innerHTML = `<td colspan="8" class="p-0 border-0">
        <div style="background:#e9ecef;font-size:.82rem;font-weight:600;padding:4px 12px;border-radius:4px;margin:8px 0 4px;color:#495057;">
          ${escHtml(spec)} <span style="font-weight:normal;color:#6c757d">(${groups[spec].length}件)</span>
        </div>
      </td>`;
      groups[spec].forEach(item => renderRow(tbody, item));
    });
  } else {
    items.forEach(item => renderRow(tbody, item));
  }
}

function renderRow(tbody, item) {
  const row = tbody.insertRow();
  row.dataset.spec = item.spec;
  row.dataset.caseNo = item.caseNo;

  const yamlBadge = checkBadge(item.yamlCheck, 'yaml');
  const specBadge = checkBadge(item.specCheck, 'spec');
  const runBadge = runCheckBadge(item.runCheck);

  const updatedInfo = item.updatedAt
    ? `<span class="text-muted" style="font-size:.72rem">${new Date(item.updatedAt).toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
       <br><span style="font-size:.68rem;color:#999">${escHtml(item.updatedBy || '')}</span>`
    : '<span class="text-muted" style="font-size:.72rem">-</span>';

  const yamlNote = item.yamlCheckNote ? `<i class="bi bi-chat-dots note-indicator has-note" title="${escHtml(item.yamlCheckNote)}"></i>` : '';
  const specNote = item.specCheckNote ? `<i class="bi bi-chat-dots note-indicator has-note" title="${escHtml(item.specCheckNote)}"></i>` : '';
  const runNote = item.runCheckNote ? `<i class="bi bi-chat-dots note-indicator has-note" title="${escHtml(item.runCheckNote)}"></i>` : '';

  row.innerHTML = `
    <td class="case-no">${escHtml(item.caseNo)}</td>
    <td class="feature-col" title="${escHtml(item.feature || '')}">${escHtml(item.feature || '')}</td>
    <td class="desc-col" title="${escHtml(item.description || '')}">${escHtml(item.description || '')}</td>
    <td class="desc-col" title="${escHtml(item.expected || '')}">${escHtml(item.expected || '')}</td>
    <td class="check-cell" onclick="openEdit('${escAttr(item.spec)}','${escAttr(item.caseNo)}','yamlCheck','${escAttr(item.yamlCheck||'')}','${escAttr(item.yamlCheckNote||'')}')">
      ${yamlBadge} ${yamlNote}
    </td>
    <td class="check-cell" onclick="openEdit('${escAttr(item.spec)}','${escAttr(item.caseNo)}','specCheck','${escAttr(item.specCheck||'')}','${escAttr(item.specCheckNote||'')}')">
      ${specBadge} ${specNote}
    </td>
    <td class="check-cell" onclick="openEdit('${escAttr(item.spec)}','${escAttr(item.caseNo)}','runCheck','${escAttr(item.runCheck||'')}','${escAttr(item.runCheckNote||'')}')">
      ${runBadge} ${runNote}
    </td>
    <td>${updatedInfo}</td>
  `;
}

// =========================================
// バッジ生成
// =========================================
function checkBadge(val, type) {
  if (val === 'ok') return '<span class="badge badge-ok">OK</span>';
  if (val === 'ng') return '<span class="badge badge-ng">NG</span>';
  return '<span class="badge badge-unchecked">-</span>';
}

function runCheckBadge(val) {
  if (val === 'pass') return '<span class="badge badge-pass">PASS</span>';
  if (val === 'fail_spec') return '<span class="badge badge-fail-spec">F:Spec</span>';
  if (val === 'fail_product') return '<span class="badge badge-fail-product">F:Prod</span>';
  if (val === 'fail_env') return '<span class="badge badge-fail-env">F:Env</span>';
  return '<span class="badge badge-unchecked">-</span>';
}

// =========================================
// 編集モーダル
// =========================================
function openEdit(spec, caseNo, field, currentVal, currentNote) {
  editingSpec = spec;
  editingCaseNo = caseNo;
  editingField = field;
  editingValue = currentVal || null;

  const titleMap = {
    yamlCheck: '1. YAML品質チェック',
    specCheck: '2. Spec実装',
    runCheck: '3. 実行確認',
  };
  document.getElementById('noteModalTitle').textContent =
    `${titleMap[field]} - ${spec} / ${caseNo}`;
  document.getElementById('noteModalText').value = currentNote || '';

  // ステータスボタンを生成
  const btnContainer = document.getElementById('noteModalStatusButtons');
  btnContainer.innerHTML = '';

  const options = field === 'runCheck'
    ? [
        { val: null, label: '未チェック', cls: 'btn-outline-secondary' },
        { val: 'pass', label: 'PASS', cls: 'btn-success' },
        { val: 'fail_spec', label: 'FAIL(Spec)', cls: 'btn-warning' },
        { val: 'fail_product', label: 'FAIL(Product)', cls: 'btn-danger' },
        { val: 'fail_env', label: 'FAIL(Env)', cls: 'btn-outline-purple' },
      ]
    : [
        { val: null, label: '未チェック', cls: 'btn-outline-secondary' },
        { val: 'ok', label: 'OK', cls: 'btn-success' },
        { val: 'ng', label: 'NG', cls: 'btn-danger' },
      ];

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.type = 'button';
    const isActive = (editingValue === opt.val) || (!editingValue && opt.val === null);
    btn.className = `btn btn-sm ${isActive ? opt.cls : 'btn-outline-secondary'} me-1 mb-1`;
    btn.textContent = opt.label;
    btn.onclick = () => {
      editingValue = opt.val;
      // ボタンのアクティブ状態更新
      btnContainer.querySelectorAll('button').forEach(b => b.className = `btn btn-sm btn-outline-secondary me-1 mb-1`);
      btn.className = `btn btn-sm ${opt.cls} me-1 mb-1`;
    };
    btnContainer.appendChild(btn);
  });

  new bootstrap.Modal(document.getElementById('noteModal')).show();
}

async function saveNote() {
  const note = document.getElementById('noteModalText').value;
  const updatedBy = document.getElementById('noteModalBy').value || 'manual';

  try {
    const r = await fetch(`${CONFIG.apiUrl}/pipeline`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({
        spec: editingSpec,
        caseNo: editingCaseNo,
        field: editingField,
        value: editingValue,
        note: note,
        updatedBy: updatedBy,
      })
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);

    // ローカルデータ更新
    const item = allItems.find(i => i.spec === editingSpec && i.caseNo === editingCaseNo);
    if (item) {
      item[editingField] = editingValue;
      item[editingField + 'Note'] = note;
      item.updatedAt = new Date().toISOString();
      item.updatedBy = updatedBy;
    }

    bootstrap.Modal.getInstance(document.getElementById('noteModal')).hide();
    applyFilters();
    loadSummary(); // サマリー再取得
  } catch (e) {
    alert('保存に失敗しました: ' + e.message);
  }
}

// =========================================
// yamlから初期化
// =========================================
async function initFromYaml() {
  if (!confirm('specs/ のYAMLからパイプラインチェックシートを初期化します。\n既存データはスキップされます（上書きしません）。\n\n続行しますか？')) return;

  // まず /specs からspec一覧を取得
  try {
    const r = await fetch(`${CONFIG.apiUrl}/specs`, { headers: authHeaders() });
    if (!r.ok) throw new Error(`specs取得失敗: HTTP ${r.status}`);
    const specsData = await r.json();
    const specsList = specsData.specs || [];

    if (specsList.length === 0) {
      alert('spec一覧が空です。upload_specs.py を先に実行してください。');
      return;
    }

    // /pipeline/init に投げるデータを構築
    const payload = specsList.map(s => ({
      spec: s.name.replace('.spec.js', '').replace('tests/', ''),
      cases: (s.cases || []).map(c => ({
        caseNo: c.caseNo || c.case_no || '',
        feature: c.feature || '',
        description: c.description || '',
        expected: c.expected || '',
      }))
    }));

    const r2 = await fetch(`${CONFIG.apiUrl}/pipeline/init`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ specs: payload, overwrite: false })
    });
    if (!r2.ok) throw new Error(`初期化失敗: HTTP ${r2.status}`);
    const result = await r2.json();
    alert(`初期化完了: ${result.registered}件登録、${result.skipped}件スキップ`);

    // リロード
    location.reload();
  } catch (e) {
    alert('初期化エラー: ' + e.message);
  }
}

// =========================================
// ユーティリティ
// =========================================
function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escAttr(str) {
  return String(str || '')
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/"/g, '\\"');
}
