<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>実行詳細 - PigeonCloud E2E</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .case-row {
      cursor: pointer;
      transition: background .1s;
    }
    .case-row:hover { background: #f0f0f0; }
    .case-row.status-failed { border-left: 3px solid #dc3545; }
    .case-row.status-passed { border-left: 3px solid #198754; }
    .case-row.status-skipped { border-left: 3px solid #adb5bd; }
    .status-badge-passed { background: #198754; }
    .status-badge-failed { background: #dc3545; }
    .status-badge-skipped { background: #6c757d; }
    .error-preview {
      font-family: monospace;
      font-size: .78rem;
      color: #dc3545;
      max-width: 500px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .progress { height: 12px; }
    .progress-live { height: 20px; border-radius: 6px; overflow: hidden; }
    .suite-header {
      background: #e9ecef;
      font-size: .82rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 4px;
      margin: 8px 0 4px;
      color: #495057;
    }
    .filter-bar { background: #fff; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; }
    .stat-card { border-radius: 10px; padding: 12px 16px; }

    /* 実行中カードのパルスアニメーション */
    @keyframes pulse-border {
      0%   { border-color: #0dcaf0; }
      50%  { border-color: #0d6efd; }
      100% { border-color: #0dcaf0; }
    }
    .card-running-anim {
      border: 2px solid #0dcaf0;
      animation: pulse-border 2s ease-in-out infinite;
    }

    /* ライブプログレスパネル */
    #live-progress-panel {
      background: linear-gradient(135deg, #e8f4f8, #f0f8ff);
      border: 1px solid #bee5eb;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .live-stat {
      text-align: center;
      padding: 6px 12px;
      border-radius: 8px;
      min-width: 60px;
    }
    .live-stat .num { font-size: 1.4rem; font-weight: bold; line-height: 1.1; }
    .live-stat .lbl { font-size: .68rem; color: #6c757d; }
  </style>
</head>
<body>

<!-- ナビゲーションバー -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a href="index.html" class="navbar-brand text-decoration-none">
      <i class="bi bi-arrow-left me-2"></i>PigeonCloud E2E ビューアー
    </a>
    <button class="btn btn-sm btn-outline-secondary" onclick="doLogout()">
      <i class="bi bi-box-arrow-right me-1"></i>ログアウト
    </button>
  </div>
</nav>

<div class="container py-4">

  <!-- ===== リアルタイム実行中プログレスパネル ===== -->
  <div id="live-progress-panel" style="display:none">
    <div class="d-flex align-items-center gap-2 mb-3">
      <div class="spinner-border spinner-border-sm text-info"></div>
      <strong class="text-info">テスト実行中...</strong>
      <span class="text-muted small ms-2">経過時間: <span id="live-elapsed">0秒</span></span>
    </div>

    <!-- プログレスバー（PASS=緑 / FAIL=赤 / SKIP=グレー / 残り=ライト） -->
    <div class="progress-live d-flex mb-2 bg-light" id="live-progress-bar">
      <div class="progress-bar bg-success" id="lpb-pass" style="width:0%" title="PASS"></div>
      <div class="progress-bar bg-danger"  id="lpb-fail" style="width:0%" title="FAIL"></div>
      <div class="progress-bar bg-secondary" id="lpb-skip" style="width:0%" title="SKIP"></div>
    </div>

    <div class="d-flex align-items-center justify-content-between mb-3">
      <span class="small text-muted">
        <span id="live-completed">0</span> /
        <span id="live-expected">?</span>件完了
      </span>
      <span class="small text-primary" id="live-eta"></span>
    </div>

    <!-- ライブカウント -->
    <div class="d-flex gap-2">
      <div class="live-stat bg-success bg-opacity-10">
        <div class="num text-success" id="live-pass">0</div>
        <div class="lbl">PASS</div>
      </div>
      <div class="live-stat bg-danger bg-opacity-10">
        <div class="num text-danger" id="live-fail">0</div>
        <div class="lbl">FAIL</div>
      </div>
      <div class="live-stat bg-secondary bg-opacity-10">
        <div class="num text-secondary" id="live-skip">0</div>
        <div class="lbl">SKIP</div>
      </div>
    </div>
  </div>

  <!-- ===== 実行情報ヘッダー ===== -->
  <div class="card mb-4" id="run-header">
    <div class="card-body">
      <div class="d-flex align-items-center gap-2 mb-2">
        <span class="fs-4" id="run-status-icon"></span>
        <h5 class="mb-0" id="run-id-title">読み込み中...</h5>
        <span id="run-env-badge"></span>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-auto"><span class="text-muted small">開始:</span> <span id="run-started">-</span></div>
        <div class="col-auto"><span class="text-muted small">時間:</span> <span id="run-duration">-</span></div>
        <div class="col-auto"><span class="text-muted small">コミット:</span> <code id="run-commit">-</code></div>
        <div class="col-auto"><span class="text-muted small">ブランチ:</span> <span id="run-branch">-</span></div>
        <div class="col-auto"><span class="text-muted small">Spec:</span> <span id="run-spec">-</span></div>
        <div class="col-auto" id="run-env-col" style="display:none">
          <span class="text-muted small">環境:</span>
          <a id="run-env-url" href="#" target="_blank" class="small">テスト環境</a>
        </div>
      </div>
      <!-- 統計バー -->
      <div class="row g-2 mb-2">
        <div class="col-auto">
          <div class="stat-card bg-success bg-opacity-10 d-inline-flex gap-2 align-items-center">
            <span class="text-success fw-bold fs-5" id="stat-pass">-</span>
            <span class="text-muted small">PASS</span>
          </div>
        </div>
        <div class="col-auto">
          <div class="stat-card bg-danger bg-opacity-10 d-inline-flex gap-2 align-items-center">
            <span class="text-danger fw-bold fs-5" id="stat-fail">-</span>
            <span class="text-muted small">FAIL</span>
          </div>
        </div>
        <div class="col-auto">
          <div class="stat-card bg-secondary bg-opacity-10 d-inline-flex gap-2 align-items-center">
            <span class="text-secondary fw-bold fs-5" id="stat-skip">-</span>
            <span class="text-muted small">SKIP</span>
          </div>
        </div>
        <div class="col-auto">
          <div class="stat-card bg-light d-inline-flex gap-2 align-items-center">
            <span class="fw-bold fs-5" id="stat-total">-</span>
            <span class="text-muted small">合計</span>
          </div>
        </div>
      </div>
      <div class="progress">
        <div class="progress-bar bg-success" id="progress-pass" style="width:0%"></div>
        <div class="progress-bar bg-danger"  id="progress-fail" style="width:0%"></div>
        <div class="progress-bar bg-secondary" id="progress-skip" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- フィルターバー -->
  <div class="filter-bar d-flex gap-3 align-items-center">
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline-secondary active" data-filter="all" onclick="filterCases('all', this)">すべて</button>
      <button class="btn btn-sm btn-outline-danger" data-filter="failed" onclick="filterCases('failed', this)">FAILのみ</button>
      <button class="btn btn-sm btn-outline-success" data-filter="passed" onclick="filterCases('passed', this)">PASSのみ</button>
      <button class="btn btn-sm btn-outline-secondary" data-filter="skipped" onclick="filterCases('skipped', this)">SKIPのみ</button>
    </div>
    <input class="form-control form-control-sm ms-auto" style="max-width:220px"
           id="search-box" placeholder="テスト名で絞り込み..." oninput="filterBySearch()">
    <span class="text-muted small" id="display-count"></span>
  </div>

  <!-- ローディング -->
  <div class="text-center py-5" id="loading">
    <div class="spinner-border text-secondary"></div>
  </div>

  <!-- テストケース一覧テーブル -->
  <div class="card d-none" id="cases-container">
    <div class="card-body p-0">
      <table class="table table-hover mb-0" id="cases-table">
        <thead class="table-dark">
          <tr>
            <th style="width:90px">状態</th>
            <th>テストケース</th>
            <th style="width:90px" class="text-end">時間</th>
            <th style="width:70px" class="text-center">添付</th>
          </tr>
        </thead>
        <tbody id="cases-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- テストケース詳細モーダル -->
<div class="modal fade" id="caseModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-title"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// APIのURLはビルド時に埋め込まれる
const CONFIG = {
  apiUrl: '__API_URL__',
};

// =========================================
// 認証チェック
// =========================================
const _token = localStorage.getItem('e2e_auth_token');
if (!_token) {
  location.href = 'login.html';
}

function authHeaders() {
  return {
    'Authorization': `Bearer ${localStorage.getItem('e2e_auth_token')}`,
    'Content-Type': 'application/json'
  };
}

function doLogout() {
  localStorage.removeItem('e2e_auth_token');
  location.href = 'login.html';
}

const urlParams = new URLSearchParams(location.search);
const runId = urlParams.get('runId');

let allCases = [];
let currentFilter = 'all';

// =========================================
// ポーリング・実行中進捗管理
// =========================================
let pollTimer = null;        // ポーリングタイマーID
let elapsedTimer = null;     // 経過時間タイマーID
let knownCaseIds = new Set(); // 既知ケースID（重複追加防止）
let runStartTime = null;     // 開始時刻（UnixMs）

/**
 * ポーリング開始（3秒ごとにrun情報・ケース一覧を更新）
 */
function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(async () => {
    await refreshRunInfo();
    await refreshCases();
  }, 3000);
}

/**
 * ポーリング停止
 */
function stopPolling() {
  if (pollTimer) {
    clearInterval(pollTimer);
    pollTimer = null;
  }
}

/**
 * 経過時間タイマー開始（1秒ごとに更新）
 */
function startElapsedTimer() {
  if (elapsedTimer) return;
  elapsedTimer = setInterval(() => {
    if (!runStartTime) return;
    const elapsed = Math.floor((Date.now() - runStartTime) / 1000);
    document.getElementById('live-elapsed').textContent = formatDuration(elapsed * 1000);
  }, 1000);
}

/**
 * 経過時間タイマー停止
 */
function stopElapsedTimer() {
  if (elapsedTimer) {
    clearInterval(elapsedTimer);
    elapsedTimer = null;
  }
}

/**
 * ライブプログレスパネルを非表示にして通常表示に切り替え
 */
function hideLiveProgress() {
  document.getElementById('live-progress-panel').style.display = 'none';
  document.getElementById('run-header').classList.remove('card-running-anim');
}

/**
 * ライブプログレスパネルの数値を更新
 */
function updateLiveProgress(run) {
  const completed = parseInt(run.totalCount) || 0;
  const expected  = parseInt(run.expectedTotal) || 0;
  const pass = parseInt(run.passCount) || 0;
  const fail = parseInt(run.failCount) || 0;
  const skip = parseInt(run.skipCount) || 0;
  const remaining = expected > 0 ? Math.max(0, expected - completed) : 0;

  // ライブカウント更新
  document.getElementById('live-pass').textContent = pass;
  document.getElementById('live-fail').textContent = fail;
  document.getElementById('live-skip').textContent = skip;
  document.getElementById('live-completed').textContent = completed;
  document.getElementById('live-expected').textContent = expected > 0 ? expected : '?';

  // プログレスバー幅計算（基準はexpectedTotal、なければcompletedを100%とする）
  const base = expected > 0 ? expected : (completed || 1);
  const passPct  = (pass  / base * 100).toFixed(1);
  const failPct  = (fail  / base * 100).toFixed(1);
  const skipPct  = (skip  / base * 100).toFixed(1);
  document.getElementById('lpb-pass').style.width = `${passPct}%`;
  document.getElementById('lpb-fail').style.width = `${failPct}%`;
  document.getElementById('lpb-skip').style.width = `${skipPct}%`;

  // ETA表示（完了数が5件超の場合のみ）
  const etaEl = document.getElementById('live-eta');
  if (completed > 5 && runStartTime && remaining > 0) {
    const elapsed = Date.now() - runStartTime;
    const msPerTest = elapsed / completed;
    const etaMs = msPerTest * remaining;
    etaEl.textContent = `あと約${formatDuration(etaMs)}`;
  } else if (remaining === 0 && expected > 0) {
    etaEl.textContent = 'まもなく完了';
  } else {
    etaEl.textContent = '';
  }
}

/**
 * run情報をAPIから取得してUIを更新（ポーリング用）
 */
async function refreshRunInfo() {
  try {
    const r = await fetch(
      `${CONFIG.apiUrl}/runs/${encodeURIComponent(runId)}`,
      { headers: authHeaders() }
    );
    if (!r.ok) return;
    const run = await r.json();

    updateLiveProgress(run);

    // 実行完了したらポーリングを停止して通常表示に切り替え
    if (run.runStatus !== 'running') {
      stopPolling();
      stopElapsedTimer();
      hideLiveProgress();
      updateFinalStats(run);
    }
  } catch (e) {
    // ネットワークエラーは無視して次のポーリングまで待つ
  }
}

/**
 * 完了後の最終統計をUIに反映
 */
function updateFinalStats(run) {
  const total = parseInt(run.totalCount) || 0;
  const pass  = parseInt(run.passCount) || 0;
  const fail  = parseInt(run.failCount) || 0;
  const skip  = parseInt(run.skipCount) || 0;

  // ステータスアイコン更新
  const statusIcon = {
    completed: '<i class="bi bi-check-circle-fill text-success"></i>',
    failed:    '<i class="bi bi-x-circle-fill text-danger"></i>',
    running:   '<i class="bi bi-arrow-repeat text-info"></i>'
  }[run.runStatus] || '';
  document.getElementById('run-status-icon').innerHTML = statusIcon;

  document.getElementById('stat-pass').textContent  = pass;
  document.getElementById('stat-fail').textContent  = fail;
  document.getElementById('stat-skip').textContent  = skip;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('run-duration').textContent = formatDuration(parseInt(run.durationMs) || 0);

  if (total > 0) {
    document.getElementById('progress-pass').style.width = `${(pass / total * 100).toFixed(1)}%`;
    document.getElementById('progress-fail').style.width = `${(fail / total * 100).toFixed(1)}%`;
    document.getElementById('progress-skip').style.width = `${(skip / total * 100).toFixed(1)}%`;
  }
}

/**
 * ケース一覧をAPIから取得（実行中は差分だけ先頭に追加）
 */
async function refreshCases() {
  try {
    const r = await fetch(
      `${CONFIG.apiUrl}/runs/${encodeURIComponent(runId)}/cases?limit=1000`,
      { headers: authHeaders() }
    );
    if (!r.ok) return;
    const data = await r.json();
    const newCases = (data.items || []).filter(c => !knownCaseIds.has(c.caseId));
    if (newCases.length === 0) return;

    // 新規ケースをallCasesに追加
    newCases.forEach(c => {
      allCases.unshift(c); // 最新が先頭
      knownCaseIds.add(c.caseId);
    });

    // テーブルの先頭にケース行を追加（フィルタ条件を考慮）
    prependCases(newCases);
  } catch (e) {
    // 無視
  }
}

/**
 * 新規ケースをテーブルの先頭に追加（実行中ポーリング用）
 */
function prependCases(newCases) {
  const tbody = document.getElementById('cases-tbody');
  const query = document.getElementById('search-box').value.toLowerCase();

  newCases.forEach(c => {
    // フィルタ条件に合わない場合はスキップ
    if (currentFilter !== 'all' && c.caseStatus !== currentFilter) return;
    if (query && !c.testTitle.toLowerCase().includes(query)) return;

    const row = document.createElement('tr');
    row.className = `case-row status-${c.caseStatus}`;
    row.dataset.status = c.caseStatus;
    row.dataset.title = c.testTitle.toLowerCase();
    row.dataset.caseId = c.caseId;
    row.onclick = () => openCaseModal(c);

    const hasVideo = !!c.videoKey;
    const hasScreenshot = c.screenshotKeys && c.screenshotKeys.length > 0;

    row.innerHTML = `
      <td>
        <span class="badge status-badge-${c.caseStatus}">${statusLabel(c.caseStatus)}</span>
      </td>
      <td>
        <div class="fw-medium">${escHtml(c.testTitle)}</div>
        ${c.errorMessage ? `<div class="error-preview">${escHtml(c.errorMessage.substring(0, 150))}</div>` : ''}
      </td>
      <td class="text-end text-muted small">${formatDuration(parseInt(c.durationMs) || 0)}</td>
      <td class="text-center">
        ${hasVideo ? '<i class="bi bi-play-circle text-primary me-1" title="動画あり"></i>' : ''}
        ${hasScreenshot ? `<i class="bi bi-images text-info" title="スクショ ${c.screenshotKeys.length}枚"></i>` : ''}
      </td>`;

    // suiteヘッダー行があれば一番上のケース行の前、なければtbodyの先頭に挿入
    if (tbody.firstChild) {
      tbody.insertBefore(row, tbody.firstChild);
    } else {
      tbody.appendChild(row);
    }
  });

  // 表示件数更新
  const displayCount = tbody.querySelectorAll('tr.case-row').length;
  document.getElementById('display-count').textContent = `${displayCount}件表示`;
}

// =========================================
// 初期化
// =========================================
document.addEventListener('DOMContentLoaded', async () => {
  if (!runId) {
    alert('runIdが指定されていません');
    location.href = 'index.html';
    return;
  }
  try {
    await Promise.all([loadRunInfo(), loadCases()]);
  } catch (e) {
    document.getElementById('loading').innerHTML =
      `<div class="alert alert-danger">読み込みエラー: ${escHtml(e.message)}</div>`;
  }
});

// =========================================
// 実行情報取得（初回）
// =========================================
async function loadRunInfo() {
  const r = await fetch(
    `${CONFIG.apiUrl}/runs/${encodeURIComponent(runId)}`,
    { headers: authHeaders() }
  );
  if (r.status === 401) { doLogout(); throw new Error('認証が切れました'); }
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const run = await r.json();

  document.title = `${run.runId} - PigeonCloud E2E`;

  const statusIcon = {
    completed: '<i class="bi bi-check-circle-fill text-success"></i>',
    failed:    '<i class="bi bi-x-circle-fill text-danger"></i>',
    running:   '<i class="bi bi-arrow-repeat text-info"></i>'
  }[run.runStatus] || '';
  document.getElementById('run-status-icon').innerHTML = statusIcon;
  document.getElementById('run-id-title').textContent = run.runId;
  document.getElementById('run-started').textContent = run.startedAt
    ? new Date(run.startedAt).toLocaleString('ja-JP') : '-';
  document.getElementById('run-duration').textContent = formatDuration(parseInt(run.durationMs) || 0);
  document.getElementById('run-commit').textContent = run.commitHash || '-';
  document.getElementById('run-branch').textContent = run.branch || '-';
  document.getElementById('run-spec').textContent = run.specFile || '-';

  if (run.testEnvUrl) {
    document.getElementById('run-env-url').href = run.testEnvUrl;
    document.getElementById('run-env-col').style.removeProperty('display');
  }

  // 本番 / ステージング バッジ
  const envBadgeEl = document.getElementById('run-env-badge');
  if (run.testEnvUrl && envBadgeEl) {
    if (run.testEnvUrl.includes('pigeon-cloud.com')) {
      envBadgeEl.innerHTML = '<span class="badge bg-danger ms-1">本番</span>';
    } else if (run.testEnvUrl.includes('pigeon-demo.com')) {
      envBadgeEl.innerHTML = '<span class="badge bg-warning text-dark ms-1">Staging</span>';
    }
  }

  const total = parseInt(run.totalCount) || 0;
  const pass  = parseInt(run.passCount) || 0;
  const fail  = parseInt(run.failCount) || 0;
  const skip  = parseInt(run.skipCount) || 0;

  document.getElementById('stat-pass').textContent  = pass;
  document.getElementById('stat-fail').textContent  = fail;
  document.getElementById('stat-skip').textContent  = skip;
  document.getElementById('stat-total').textContent = total;

  if (total > 0) {
    document.getElementById('progress-pass').style.width = `${(pass / total * 100).toFixed(1)}%`;
    document.getElementById('progress-fail').style.width = `${(fail / total * 100).toFixed(1)}%`;
    document.getElementById('progress-skip').style.width = `${(skip / total * 100).toFixed(1)}%`;
  }

  // 実行中の場合はライブプログレスパネルを表示してポーリング開始
  if (run.runStatus === 'running') {
    runStartTime = run.startedAt ? new Date(run.startedAt).getTime() : Date.now();
    document.getElementById('live-progress-panel').style.display = 'block';
    document.getElementById('run-header').classList.add('card-running-anim');
    updateLiveProgress(run);
    startElapsedTimer();
    startPolling();
  }
}

// =========================================
// テストケース一覧取得（初回）
// =========================================
async function loadCases() {
  const r = await fetch(
    `${CONFIG.apiUrl}/runs/${encodeURIComponent(runId)}/cases?limit=1000`,
    { headers: authHeaders() }
  );
  if (r.status === 401) { doLogout(); throw new Error('認証が切れました'); }
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const data = await r.json();
  allCases = data.items || [];

  // 既知ケースIDを登録
  allCases.forEach(c => knownCaseIds.add(c.caseId));

  document.getElementById('loading').style.display = 'none';
  document.getElementById('cases-container').classList.remove('d-none');

  renderCases(allCases);

  // 動画・スクショのpresigned URLをバックグラウンドで先読み
  preloadAssets();
}

/**
 * 全ケースの動画・スクショpresigned URLをバックグラウンドで先読み
 * 先読み済みならモーダルをクリック時に即表示できる
 */
async function preloadAssets() {
  const targets = allCases.filter(
    c => (c.screenshotKeys && c.screenshotKeys.length > 0) || c.videoKey
  );
  for (let i = 0; i < targets.length; i += 3) {
    await Promise.all(targets.slice(i, i + 3).map(c => fetchAssetUrls(c)));
  }
}

/**
 * 1ケース分の動画・スクショURLを取得してキャッシュ
 */
async function fetchAssetUrls(c) {
  if (c._assetsLoaded) return;
  c._assetsLoaded = true;

  // スクリーンショット
  if (c.screenshotKeys && c.screenshotKeys.length > 0) {
    const urls = [];
    await Promise.all(c.screenshotKeys.map(async key => {
      try {
        const r = await fetch(`${CONFIG.apiUrl}/assets/download-url`, {
          method: 'POST', headers: authHeaders(), body: JSON.stringify({ key })
        });
        if (r.ok) {
          const data = await r.json();
          urls.push({ url: data.downloadUrl, filename: key.split('/').pop() });
        }
      } catch (e) {}
    }));
    c._screenshotUrls = urls;
  }

  // 動画
  if (c.videoKey) {
    try {
      const r = await fetch(`${CONFIG.apiUrl}/assets/download-url`, {
        method: 'POST', headers: authHeaders(), body: JSON.stringify({ key: c.videoKey })
      });
      if (r.ok) {
        const data = await r.json();
        c._videoUrl = data.downloadUrl;
      }
    } catch (e) {}
  }
}

// =========================================
// テストケース描画（フル再描画）
// =========================================
function renderCases(cases) {
  const tbody = document.getElementById('cases-tbody');
  tbody.innerHTML = '';

  // describe単位でグループ化
  const groups = {};
  cases.forEach(c => {
    const suite = c.suiteName || '(グループなし)';
    if (!groups[suite]) groups[suite] = [];
    groups[suite].push(c);
  });

  let displayCount = 0;
  Object.entries(groups).forEach(([suiteName, suiteCases]) => {
    // グループヘッダー行
    const headerRow = tbody.insertRow();
    headerRow.innerHTML = `<td colspan="4" class="p-0 border-0">
      <div class="suite-header">${escHtml(suiteName)} <span class="text-muted fw-normal">(${suiteCases.length}件)</span></div>
    </td>`;

    suiteCases.forEach(c => {
      const row = tbody.insertRow();
      row.className = `case-row status-${c.caseStatus}`;
      row.dataset.status = c.caseStatus;
      row.dataset.title = c.testTitle.toLowerCase();
      row.dataset.caseId = c.caseId;
      row.onclick = () => openCaseModal(c);
      displayCount++;

      const hasVideo = !!c.videoKey;
      const hasScreenshot = c.screenshotKeys && c.screenshotKeys.length > 0;

      row.innerHTML = `
        <td>
          <span class="badge status-badge-${c.caseStatus}">${statusLabel(c.caseStatus)}</span>
        </td>
        <td>
          <div class="fw-medium">${escHtml(c.testTitle)}</div>
          ${c.errorMessage ? `<div class="error-preview">${escHtml(c.errorMessage.substring(0, 150))}</div>` : ''}
        </td>
        <td class="text-end text-muted small">${formatDuration(parseInt(c.durationMs) || 0)}</td>
        <td class="text-center">
          ${hasVideo ? '<i class="bi bi-play-circle text-primary me-1" title="動画あり"></i>' : ''}
          ${hasScreenshot ? `<i class="bi bi-images text-info" title="スクショ ${c.screenshotKeys.length}枚"></i>` : ''}
        </td>`;
    });
  });

  document.getElementById('display-count').textContent = `${displayCount}件表示`;
}

// =========================================
// フィルター
// =========================================
function filterCases(status, btn) {
  currentFilter = status;
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterBySearch() {
  applyFilters();
}

function applyFilters() {
  const query = document.getElementById('search-box').value.toLowerCase();
  let filtered = allCases;

  if (currentFilter !== 'all') {
    filtered = filtered.filter(c => c.caseStatus === currentFilter);
  }
  if (query) {
    filtered = filtered.filter(c => c.testTitle.toLowerCase().includes(query));
  }

  renderCases(filtered);
}

// =========================================
// テストケース詳細モーダル
// =========================================
async function openCaseModal(c) {
  document.getElementById('modal-title').textContent = c.testTitle;

  const statusClass = { passed: 'success', failed: 'danger', skipped: 'secondary' }[c.caseStatus];
  let html = `
    <div class="d-flex gap-3 mb-3">
      <span class="badge bg-${statusClass} fs-6">${statusLabel(c.caseStatus)}</span>
      <span class="text-muted">${formatDuration(parseInt(c.durationMs) || 0)}</span>
      <span class="text-muted small">${escHtml(c.specFile || '')}</span>
    </div>`;

  if (c.errorMessage) {
    html += `
      <div class="mb-3">
        <h6 class="text-danger"><i class="bi bi-exclamation-triangle me-1"></i>エラーメッセージ</h6>
        <pre class="bg-danger bg-opacity-10 text-danger p-3 rounded" style="font-size:.8rem;white-space:pre-wrap;word-break:break-all">${escHtml(c.errorMessage)}</pre>
      </div>`;
  }
  if (c.errorStack) {
    html += `
      <div class="mb-3">
        <h6 class="text-secondary"><i class="bi bi-stack me-1"></i>スタックトレース</h6>
        <pre class="bg-light p-3 rounded" style="font-size:.72rem;max-height:250px;overflow:auto;white-space:pre-wrap">${escHtml(c.errorStack)}</pre>
      </div>`;
  }

  // テストステップHTML（動画・スクショの後ろに追加するため別変数で保持）
  let stepsHtml = '';
  if (c.steps && c.steps.length > 0) {
    stepsHtml += `
      <div class="mt-3">
        <h6><i class="bi bi-list-check me-1"></i>テストステップ</h6>
        <ul class="list-unstyled mb-0 ps-1" style="font-size:.83rem;line-height:1.7">`;
    c.steps.forEach(s => {
      const icon = s.ok ? '✅' : '❌';
      const cls = s.ok ? 'text-dark' : 'text-danger fw-medium';
      stepsHtml += `<li class="${cls}">${icon} ${escHtml(s.title)}</li>`;
    });
    stepsHtml += `</ul>
      </div>`;
  }

  // 先読み済みなら即表示。まだなら「読み込み中」を出してモーダルを先に開く
  // 表示順: エラー → 動画 → スクショ → ステップ
  const alreadyLoaded = c._assetsLoaded;
  document.getElementById('modal-body').innerHTML = html +
    (alreadyLoaded
      ? buildAssetsHtml(c) + stepsHtml
      : '<div id="modal-assets-placeholder"><div class="text-center py-3"><div class="spinner-border spinner-border-sm text-secondary"></div></div></div>' + stepsHtml);

  const modal = new bootstrap.Modal(document.getElementById('caseModal'));
  modal.show();

  // 先読みされていない場合だけ取得してから差し替え
  if (!alreadyLoaded) {
    await fetchAssetUrls(c);
    const ph = document.getElementById('modal-assets-placeholder');
    if (ph) ph.outerHTML = buildAssetsHtml(c);
  }
}

/**
 * アセットHTMLを構築（動画 → スクショ → trace の順）
 */
function buildAssetsHtml(c) {
  let html = '';

  // 動画
  if (c._videoUrl) {
    html += `
      <div class="mb-3">
        <h6><i class="bi bi-camera-video me-1"></i>テスト動画</h6>
        <video controls class="w-100 rounded" style="max-height:480px;background:#000">
          <source src="${escHtml(c._videoUrl)}" type="video/webm">
          動画を再生できません
        </video>
      </div>`;
  }

  // スクリーンショット（複数枚対応）
  if (c._screenshotUrls && c._screenshotUrls.length > 0) {
    const shots = c._screenshotUrls;
    html += `<div class="mb-3">
      <h6><i class="bi bi-images me-1"></i>スクリーンショット
        <span class="badge bg-secondary ms-1">${shots.length}枚</span>
      </h6>
      <div class="row g-2">`;
    shots.forEach((item, idx) => {
      html += `
        <div class="col-12 col-md-6">
          <img src="${escHtml(item.url)}" class="img-fluid rounded border"
               style="cursor:zoom-in; max-height:360px; width:100%; object-fit:contain; background:#f8f9fa"
               alt="${escHtml(item.filename)}"
               onclick="openFullImage('${escHtml(item.url)}')">
          <div class="text-muted small mt-1">${escHtml(item.filename)}</div>
        </div>`;
    });
    html += '</div></div>';
  }

  // trace
  if (c.traceKey) {
    // traceはダウンロードURLを非同期で取得（fire and forget）
    html += `<div class="mt-2" id="trace-dl-${escHtml(c.caseId)}">
      <button class="btn btn-sm btn-outline-secondary"
        onclick="loadTraceUrl('${escHtml(c.caseId)}','${escHtml(c.traceKey)}')">
        <i class="bi bi-download me-1"></i>trace.zip をダウンロード
      </button>
    </div>`;
  }

  if (!html) {
    html = '<div class="text-muted small py-2">添付ファイルはありません</div>';
  }
  return `<div id="modal-assets">${html}</div>`;
}

/**
 * 画像を新しいタブでフルサイズ表示
 */
function openFullImage(url) {
  window.open(url, '_blank');
}

/**
 * trace.zipのダウンロードURL取得ボタン押下
 */
async function loadTraceUrl(caseId, traceKey) {
  const btn = document.querySelector(`#trace-dl-${caseId} button`);
  if (btn) btn.disabled = true;
  try {
    const r = await fetch(`${CONFIG.apiUrl}/assets/download-url`, {
      method: 'POST', headers: authHeaders(), body: JSON.stringify({ key: traceKey })
    });
    if (r.ok) {
      const data = await r.json();
      window.open(data.downloadUrl, '_blank');
    }
  } catch (e) {}
  if (btn) btn.disabled = false;
}

// =========================================
// ユーティリティ
// =========================================
function statusLabel(s) {
  return { passed: 'PASS', failed: 'FAIL', skipped: 'SKIP' }[s] || s;
}

function formatDuration(ms) {
  if (!ms || ms <= 0) return '-';
  const sec = Math.round(ms / 1000);
  if (sec < 60) return `${sec}秒`;
  const totalMin = Math.floor(sec / 60);
  const s = sec % 60;
  if (totalMin < 60) return `${totalMin}分${s}秒`;
  // 1時間以上の対応
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return `${h}時間${m}分`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
