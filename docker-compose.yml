version: '3.8'

services:
  claude-test-agent:
    build: .
    container_name: pigeon_test_agent
    env_file:
      - .env
    environment:
      # Playwright headlessモード強制
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
    volumes:
      # テストシナリオ（Claudeが読み書き）
      - ./scenarios:/app/scenarios
      # テストレポート出力先
      - ./reports:/app/reports
      # PigeonCloudソースコード（git pullのため書き込み権限が必要）
      - ./src/pigeon_cloud:/app/src/pigeon_cloud
      # Google Service Account認証（read-only）
      - ./secrets:/app/secrets:ro
      # Deploy Key（read-only・pull専用）
      - ~/.ssh/pigeon_test_deploy_key:/root/.ssh/deploy_key:ro
    restart: "no"
