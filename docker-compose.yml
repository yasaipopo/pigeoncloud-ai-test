version: '3.8'

x-common-volumes: &common-volumes
  volumes:
    - ./run_agent.sh:/app/run_agent.sh
    - ./run_orchestrator.sh:/app/run_orchestrator.sh
    - ./orchestrator_prompt.txt:/app/orchestrator_prompt.txt
    - ./agent_prompt_template.txt:/app/agent_prompt_template.txt
    - ./CLAUDE.md:/app/CLAUDE.md
    - ./playwright.config.js:/app/playwright.config.js
    - ./runner:/app/runner
    - ./specs:/app/specs
    - ./tests:/app/tests
    - ./scenarios:/app/scenarios
    - ./reports:/app/reports
    - ./src/pigeon_cloud:/app/src/pigeon_cloud
    - ./secrets:/app/secrets:ro
    - ~/.ssh/pigeon_test_deploy_key:/home/agent/.ssh/deploy_key:ro
    - ~/.claude:/home/agent/.claude
    - ~/.claude.json:/home/agent/.claude.json:ro
    - npm-cache:/home/agent/.npm

services:
  # オーケストレーター（Claude Codeが親・sub-agentで並列実行）
  orchestrator:
    build: .
    <<: *common-volumes
    container_name: pigeon_test_orchestrator
    env_file:
      - .env
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - MODE=orchestrator
      - MAX_WORKERS=${MAX_WORKERS:-5}
      - MAX_ROUNDS=${MAX_ROUNDS:-8}
    restart: "no"

  # 単体エージェント（手動実行・デバッグ用）
  agent:
    build: .
    <<: *common-volumes
    env_file:
      - .env
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - MODE=${MODE:-implement_skips}
      - TARGET_SPEC=${TARGET_SPEC:-}
      - AGENT_NUM=${AGENT_NUM:-1}
    restart: "no"

volumes:
  npm-cache:
