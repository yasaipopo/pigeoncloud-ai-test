version: '3.8'

x-agent-base: &agent-base
  build: .
  env_file:
    - .env
  environment:
    - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
  volumes:
    - ./runner:/app/runner
    - ./specs:/app/specs
    - ./tests:/app/tests
    - ./scenarios:/app/scenarios
    - ./reports:/app/reports
    - ./src/pigeon_cloud:/app/src/pigeon_cloud
    - ./secrets:/app/secrets:ro
    - ~/.ssh/pigeon_test_deploy_key:/home/agent/.ssh/deploy_key:ro
    - ~/.claude:/home/agent/.claude  # Claude Code Max認証をホストから共有
    - ~/.claude.json:/home/agent/.claude.json:ro  # Claude Code設定ファイル
  restart: "no"

services:
  # エージェント1（デフォルト・単体実行はこれだけ）
  agent-1:
    <<: *agent-base
    container_name: pigeon_test_agent_1
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - AGENT_NUM=1
      - MODE=${MODE:-run_tests}
      - TARGET_SPEC=${TARGET_SPEC:-}
      - TOTAL_AGENTS=${TOTAL_AGENTS:-1}

  # エージェント2（並列実行時）
  agent-2:
    <<: *agent-base
    container_name: pigeon_test_agent_2
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - AGENT_NUM=2
      - MODE=${MODE:-run_tests}
      - TARGET_SPEC=${TARGET_SPEC_2:-}
      - TOTAL_AGENTS=${TOTAL_AGENTS:-1}
    profiles:
      - parallel

  # エージェント3（並列実行時）
  agent-3:
    <<: *agent-base
    container_name: pigeon_test_agent_3
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - AGENT_NUM=3
      - MODE=${MODE:-run_tests}
      - TARGET_SPEC=${TARGET_SPEC_3:-}
      - TOTAL_AGENTS=${TOTAL_AGENTS:-1}
    profiles:
      - parallel
